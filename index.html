
<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tutor di Statistica</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#eef2f7;
}

.chat{
    max-width:700px;
    margin:30px auto;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.2);
}

.header{
    background:#0057b8;
    color:white;
    padding:18px;
    font-size:22px;
    font-weight:bold;
    text-align:center;
}

.messages{
    height:500px;
    overflow-y:auto;
    padding:20px;
    background:#f7f9fc;
}

.bot,.user{
    padding:12px;
    border-radius:12px;
    margin:10px 0;
    width:fit-content;
    max-width:80%;
}

.bot{
    background:#d9ecff;
}

.user{
    background:#0057b8;
    color:white;
    margin-left:auto;
}

.answers button{
    display:block;
    width:100%;
    margin:8px 0;
    padding:12px;
    font-size:16px;
    border:none;
    border-radius:8px;
    cursor:pointer;
    background:white;
    border:2px solid #0057b8;
}

.answers button:hover{
    background:#0057b8;
    color:white;
}

.footer{
    padding:15px;
    text-align:center;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="chat">

<div class="header">
🤖 Tutor di Statistica
</div>

<div class="messages" id="chat"></div>

<div class="footer" id="score">
Punteggio: 0
</div>

</div>

<script>

const quiz=[

{
q:"Qual è la media dei numeri 2,4,6,8?",
a:["4","5","6","8"],
c:1,
s:"La media è (2+4+6+8)/4 = 5."
},

{
q:"Qual è la mediana di 1,3,5,7,9?",
a:["3","5","7","9"],
c:1,
s:"La mediana è il valore centrale: 5."
},

{
q:"Quale indice misura la variabilità?",
a:["Moda","Media","Varianza","Mediana"],
c:2,
s:"La varianza misura la dispersione dei dati."
},

{
q:"La probabilità assume valori tra:",
a:["0 e 1","0 e 10","1 e 100","-1 e 1"],
c:0,
s:"Una probabilità è sempre compresa tra 0 e 1."
},

{
q:"La moda rappresenta:",
a:[
"Il valore più frequente",
"Il valore centrale",
"La media",
"La probabilità"
],
c:0,
s:"La moda è il valore che compare più spesso."
}

];

let domanda=0;
let punti=0;

const chat=document.getElementById("chat");

function bot(testo){
chat.innerHTML+=`<div class="bot">${testo}</div>`;
chat.scrollTop=chat.scrollHeight;
}

function user(testo){
chat.innerHTML+=`<div class="user">${testo}</div>`;
chat.scrollTop=chat.scrollHeight;
}

function mostraDomanda(){

if(domanda>=quiz.length){

bot("🎉 Quiz terminato!<br><br>Hai totalizzato <b>"+punti+
" / "+quiz.length+"</b>.");

if(punti==quiz.length)
bot("🏆 Complimenti! Hai risposto correttamente a tutte le domande.");

return;
}

setTimeout(()=>{

bot("<b>Domanda "+(domanda+1)+"</b><br><br>"+quiz[domanda].q);

let html="<div class='answers'>";

quiz[domanda].a.forEach((r,i)=>{

html+=`<button onclick="rispondi(${i})">${r}</button>`;

});

html+="</div>";

chat.innerHTML+=html;

chat.scrollTop=chat.scrollHeight;

},700);

}

function rispondi(i){

document.querySelector(".answers").remove();

user(quiz[domanda].a[i]);

if(i==quiz[domanda].c){

punti++;

bot("✅ Corretto!<br><br>"+quiz[domanda].s);

}else{

bot("❌ Risposta errata.<br><br>"+quiz[domanda].s);

}

document.getElementById("score").innerHTML="Punteggio: "+punti;

domanda++;

mostraDomanda();

}

bot("👋 Ciao! Sono il tuo tutor di Statistica.");

bot("Ti farò alcune domande a risposta multipla.");

mostraDomanda();

</script>

</body>
</html>
