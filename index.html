  {topic:"Analisi dell'Interdipendenza (paniere2)", q:"Si ha discordanza tra caratteri se:", options:["Ai valori più piccoli di una variabile corrispondono generalmente i più grandi dell'altra, e viceversa","Ai valori più piccoli di una variabile corrispondono generalmente i più piccoli dell'altra","Le due variabili sono perfettamente indipendenti tra loro","La codevianza tra le due variabili è nulla"], correct:0, explain:"La discordanza si manifesta quando ai valori piccoli di una variabile corrispondono valori grandi dell'altra, e viceversa.", difficulty:"media"},
  {topic:"Analisi dell'Interdipendenza (paniere2)", q:"La codevianza è una misura:", options:["Assoluta di concordanza","Relativa e adimensionale di concordanza","Sempre compresa tra -1 e 1","Applicabile solo a variabili qualitative"], correct:0, explain:"La codevianza è una misura assoluta (non normalizzata) del grado di concordanza tra due variabili, a differenza del coefficiente di correlazione che è relativo.", difficulty:"media"},
  {topic:"Analisi dell'Interdipendenza (paniere2)", q:"La correlazione, a differenza della regressione:", options:["Non richiede di stabilire quale variabile sia antecedente all'altra in termini di dipendenza","Richiede di individuare una variabile dipendente e una indipendente","Fornisce un'equazione predittiva esplicita per Y","Si applica a variabili misurate su scala nominale"], correct:0, explain:"La correlazione misura simmetricamente il grado di associazione, senza richiedere di stabilire un nesso di dipendenza direzionale come nella regressione.", difficulty:"media"},
  {topic:"Analisi dell'Interdipendenza (paniere2)", q:"Relazioni di discordanza significative tra variabili implicano:", options:["Un coefficiente di correlazione negativo","Un coefficiente di correlazione sempre positivo","L'assenza di qualunque relazione tra le variabili","Una codevianza sempre nulla"], correct:0, explain:"La discordanza tra variabili si associa a un coefficiente di correlazione negativo.", difficulty:"media"},
  {topic:"Analisi dell'Interdipendenza (paniere2)", q:"Se il coefficiente di correlazione è uguale a 0, vi è:", options:["Assenza di concordanza o discordanza","Massima concordanza tra le variabili","Massima discordanza tra le variabili","Un errore nei dati raccolti"], correct:0, explain:"Un coefficiente di correlazione nullo indica assenza sia di concordanza sia di discordanza lineare tra le variabili.", difficulty:"media"},
  {topic:"La distribuzione Normale (paniere2)", q:"La funzione di ripartizione di una variabile casuale X a valori reali è:", options:["La funzione che associa a ciascun valore x la probabilità che X assuma valori minori o uguali a x","La funzione che associa a x la probabilità che X assuma esattamente il valore x, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Il valore atteso della variabile casuale X, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","La varianza della variabile casuale X, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte"], correct:0, explain:"La funzione di ripartizione F(x)=P(X≤x) cumula la probabilità fino al valore x incluso.", difficulty:"media"},
  {topic:"La distribuzione Normale (paniere2)", q:"La funzione di densità della Normale, asintotica verso -infinito e +infinito, significa che:", options:["Si avvicina all'asse delle ascisse senza mai toccarlo","Tocca l'asse delle ascisse in un punto preciso","Diverge all'infinito senza limite, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Non è definita per valori estremi di X, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe"], correct:0, explain:"La curva Normale è asintotica: si avvicina sempre di più all'asse delle ascisse man mano che X si allontana dalla media, senza mai toccarlo.", difficulty:"media"},
  {topic:"La distribuzione Normale (paniere2)", q:"I valori attesi (parametri) nella variabile casuale Normale sono:", options:["Media e varianza","Solo la media, senza varianza","Solo la moda e la mediana","Il campo di variazione e la deviazione standard"], correct:0, explain:"La distribuzione Normale è completamente caratterizzata da due soli parametri: media e varianza.", difficulty:"facile"},
