  {topic:"Marketing e distribuzione (paniere)", q:"La distribuzione può avere un canale:", options:["Diretto","Indiretto lungo con più intermediari","Tramite grossisti come unica opzione","Digitale come unica modalità"], correct:0, explain:"La distribuzione può avvenire tramite canale diretto (senza intermediari) oppure indiretto (con uno o più intermediari).", difficulty:"facile"},
  {topic:"Marketing e distribuzione (paniere)", q:"L'orientamento dell'impresa al marketing:", options:["Si focalizza sul soddisfacimento della clientela con un approccio strategico di medio-lungo termine","Si focalizza esclusivamente sulla produzione di massa, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Ignora completamente i bisogni dei consumatori, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Si concentra unicamente sulla riduzione dei costi di produzione, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati"], correct:0, explain:"L'orientamento al marketing pone al centro il soddisfacimento del cliente con una visione strategica di medio-lungo periodo.", difficulty:"media"},
  {topic:"Marketing e distribuzione (paniere)", q:"L'orientamento dell'impresa al mercato:", options:["Si focalizza sui consumatori e sui loro bisogni","Si focalizza esclusivamente sul prodotto realizzato","Si focalizza esclusivamente sulla riduzione dei costi","Ignora le dinamiche competitive del settore"], correct:0, explain:"L'orientamento al mercato pone al centro i consumatori e i loro bisogni, oltre alle dinamiche competitive.", difficulty:"media"},
  {topic:"Funzioni aziendali (paniere)", q:"Le funzioni operative tipiche sono:", options:["Ricerca & Sviluppo","L'amministrazione del personale","La contabilità generale","La funzione legale"], correct:0, explain:"Ricerca & Sviluppo, produzione e marketing sono tipiche funzioni operative dell'impresa.", difficulty:"facile"},
  {topic:"Marketing e distribuzione (paniere)", q:"L'orientamento dell'impresa al prodotto:", options:["Si focalizza sulla produzione su larga scala","Si focalizza esclusivamente sui bisogni del singolo cliente","Ignora completamente le caratteristiche tecniche del prodotto","Si concentra unicamente sulla pubblicità e promozione"], correct:0, explain:"L'orientamento al prodotto si concentra sulla produzione efficiente su larga scala, con minore attenzione ai bisogni specifici della clientela.", difficulty:"media"},
  {topic:"Marketing e distribuzione (paniere)", q:"Non è una leva per il soddisfacimento dei bisogni della clientela:", options:["Logistica","Prodotto","Prezzo","Comunicazione"], correct:0, explain:"La logistica è una funzione di supporto, non una delle classiche leve del marketing mix (prodotto, prezzo, distribuzione, comunicazione).", difficulty:"media"},
  {topic:"Prodotto e innovazione (paniere)", q:"Non è una caratteristica materiale e immateriale del prodotto:", options:["Strategia di vendita di un competitor","Qualità del prodotto, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Design e packaging, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Marchio e reputazione, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale"], correct:0, explain:"La strategia di vendita di un concorrente è un fattore esterno, non una caratteristica intrinseca (materiale o immateriale) del prodotto.", difficulty:"media"},
  {topic:"Prodotto e innovazione (paniere)", q:"Non fa parte del ciclo di vita dell'innovazione:", options:["Sdoppiamento","Introduzione","Sviluppo","Maturità"], correct:0, explain:"Lo 'sdoppiamento' non è una fase classica del ciclo di vita dell'innovazione (introduzione, sviluppo, maturità, declino).", difficulty:"difficile"},
  {topic:"Organizzazione (paniere)", q:"E' una funzione di indirizzo e coordinamento:", options:["HR","La produzione di linea","La logistica di magazzino","La manutenzione degli impianti"], correct:0, explain:"La gestione delle risorse umane (HR) svolge tipicamente una funzione di indirizzo e coordinamento trasversale nell'impresa.", difficulty:"media"},
  {topic:"Strutture organizzative (paniere)", q:"E' un vantaggio della struttura matriciale:", options:["L'adattamento ad ambienti instabili","La riduzione dei costi di coordinamento","La semplicità di gestione del personale","L'assenza di doppia linea di comando"], correct:0, explain:"La struttura a matrice favorisce l'adattamento ad ambienti instabili grazie alla doppia prospettiva (funzionale e di prodotto/progetto).", difficulty:"media"},
  {topic:"Strutture organizzative (paniere)", q:"E' una struttura complessa:", options:["Struttura funzionale","Struttura elementare","Nessuna struttura organizzativa formale","Solo la struttura a rete informale"], correct:0, explain:"La struttura funzionale è considerata una struttura organizzativa complessa rispetto alla più semplice struttura elementare.", difficulty:"media"},
  {topic:"Strutture organizzative (paniere)", q:"La progettazione della struttura organizzativa:", options:["Studia le operazioni di gestione","Riguarda esclusivamente la redazione del bilancio","Si occupa solo della contabilità dei costi","Coincide con la sola pianificazione finanziaria"], correct:0, explain:"La progettazione della struttura organizzativa studia come organizzare le operazioni di gestione dell'impresa.", difficulty:"media"},
  {topic:"Strutture organizzative (paniere)", q:"La struttura funzionale è la più utile in caso di:", options:["Economie di scala e di specializzazione","Elevata diversificazione di prodotto","Forte instabilità dell'ambiente competitivo","Necessità di massima flessibilità locale"], correct:0, explain:"La struttura funzionale è indicata quando l'impresa punta su economie di scala e specializzazione delle competenze.", difficulty:"media"},
  {topic:"Strutture organizzative (paniere)", q:"E' uno svantaggio della struttura matriciale:", options:["Gli alti costi di coordinamento","L'eccessiva rigidità gerarchica","La scarsa capacità di adattamento","L'assenza di specializzazione funzionale"], correct:0, explain:"Uno svantaggio tipico della struttura a matrice sono gli elevati costi di coordinamento dovuti alla doppia linea di comando.", difficulty:"media"},
  {topic:"Strutture organizzative (paniere)", q:"La struttura matriciale:", options:["Ha due linee di direzioni: per funzioni e per prodotti","Ha un'unica linea gerarchica verticale","Esclude qualunque forma di specializzazione funzionale","È tipica solo delle piccole imprese familiari"], correct:0, explain:"La struttura matriciale combina due linee di direzione: una per funzioni e una per prodotti (o progetti).", difficulty:"media"},
  {topic:"Strutture organizzative (paniere)", q:"La struttura divisionale è la più utile in caso di:", options:["Economie di differenziazione","Economie di scala pure","Assenza di diversificazione produttiva","Attività aziendale svolta in un unico mercato omogeneo"], correct:0, explain:"La struttura divisionale è utile quando l'impresa punta su economie di differenziazione tra diverse linee di business.", difficulty:"media"},
  {topic:"Strutture organizzative (paniere)", q:"Una struttura elementare:", options:["È tipica delle piccole aziende","È tipica delle multinazionali","Prevede una struttura a matrice","Richiede una divisione per aree geografiche"], correct:0, explain:"La struttura elementare, semplice e poco gerarchizzata, è tipica delle piccole aziende.", difficulty:"facile"},
  {topic:"Bilancio (paniere)", q:"Il contenuto dello schema di Conto Economico:", options:["Coincide con quello del prospetto del reddito","Coincide con quello del prospetto del capitale","Riguarda esclusivamente i flussi di cassa","Coincide con il rendiconto finanziario"], correct:0, explain:"Il Conto Economico rappresenta il prospetto del reddito, cioè costi e ricavi di competenza dell'esercizio.", difficulty:"media"},
  {topic:"Bilancio (paniere)", q:"Il contenuto dello schema di Stato Patrimoniale:", options:["Coincide con quello del prospetto del capitale","Coincide con quello del prospetto del reddito","Riguarda esclusivamente i costi dell'esercizio","Coincide con il budget economico"], correct:0, explain:"Lo Stato Patrimoniale rappresenta il prospetto del capitale, cioè attività, passività e patrimonio netto in un dato istante.", difficulty:"media"},
  {topic:"Bilancio (paniere)", q:"Il Rendiconto Finanziario:", options:["Ha lo scopo di fornire informazioni per valutare la dinamica finanziaria di una impresa","Sostituisce integralmente lo Stato Patrimoniale, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Riguarda esclusivamente i costi di produzione, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Non è previsto dai principi contabili internazionali, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi"], correct:0, explain:"Il Rendiconto Finanziario fornisce informazioni sulla dinamica finanziaria (flussi di cassa) dell'impresa.", difficulty:"media"},
  {topic:"Bilancio IAS/IFRS (paniere)", q:"Quale tra i seguenti rappresenta uno dei due assunti di base dell'informativa di bilancio nel modello IASB:", options:["Competenza economica","Prudenza assoluta","Valutazione al solo costo storico","Unicità del bilancio consolidato"], correct:0, explain:"La competenza economica è uno dei due assunti di base (insieme alla continuità aziendale) dell'informativa di bilancio secondo lo IASB.", difficulty:"media"},
  {topic:"Bilancio IAS/IFRS (paniere)", q:"Quale tra i seguenti non rappresenta uno dei documenti che compongono il bilancio IAS/IFRS:", options:["Relazione sulla gestione","Stato patrimoniale","Conto economico complessivo","Rendiconto finanziario"], correct:0, explain:"La Relazione sulla gestione non è tra i documenti che compongono formalmente il bilancio IAS/IFRS, a differenza dei prospetti contabili.", difficulty:"media"},
  {topic:"Bilancio (paniere)", q:"Le imprese che redigono il bilancio in forma abbreviata:", options:["Sono esonerate dalla redazione del Rendiconto Finanziario","Sono obbligate a redigere il bilancio consolidato","Devono sempre nominare un revisore esterno","Non possono mai beneficiare di semplificazioni contabili"], correct:0, explain:"Le imprese che redigono il bilancio in forma abbreviata sono esonerate dalla redazione del Rendiconto Finanziario.", difficulty:"media"},
  {topic:"Gruppi economici (paniere)", q:"I gruppi economici sono caratterizzati dalla presenza di:", options:["Un unico soggetto economico e una pluralità di soggetti giuridici","Un unico soggetto giuridico e una pluralità di soggetti economici","Assenza totale di controllo tra le società","Una sola società priva di partecipazioni"], correct:0, explain:"I gruppi economici presentano un unico soggetto economico (che ne determina gli indirizzi) e una pluralità di soggetti giuridici distinti (le singole società).", difficulty:"media"},
  {topic:"Bilancio consolidato (paniere)", q:"Il metodo di consolidamento integrale:", options:["Consiste nella sostituzione della posta 'partecipazioni' presente nel bilancio della capogruppo con le attività e le passività, nonché i costi e i ricavi, delle controllate","Esclude dal consolidato qualunque dato delle società controllate, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Si applica solo alle società collegate, non alle controllate, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Coincide con il metodo del patrimonio netto, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa"], correct:0, explain:"Il consolidamento integrale sostituisce la voce partecipazioni con le attività, passività, costi e ricavi delle controllate, riga per riga.", difficulty:"media"},
  {topic:"Bilancio Pubbliche Amministrazioni (paniere)", q:"Quale tra le seguenti non rappresenta una delle tre funzioni riconducibili al bilancio delle Amministrazioni Pubbliche:", options:["La funzione economica","La funzione conoscitiva","La funzione autorizzatoria","La funzione di programmazione"], correct:0, explain:"La 'funzione economica' non rientra tra le tre funzioni classiche del bilancio pubblico (conoscitiva, autorizzatoria, di programmazione).", difficulty:"difficile"},
  {topic:"Bilancio integrato (paniere)", q:"Quale tra i seguenti rappresenta uno dei diversi elementi di contenuto del bilancio integrato indicati dal Framework dell'IIRC:", options:["Coerenza e comparabilità","Dati economico-finanziari isolati","Dati di natura ambientale isolati","Proiezioni di lungo periodo isolate"], correct:0, explain:"Coerenza e comparabilità sono uno degli elementi di contenuto indicati dal Framework dell'IIRC per il bilancio integrato.", difficulty:"difficile"},
  {topic:"Bilancio sociale (paniere)", q:"Quale tra le seguenti non rappresenta una delle tre sezioni da cui è solitamente composto un bilancio sociale:", options:["Focus strategico e orientamento al futuro","Identità aziendale","Riclassificazione del valore aggiunto","Relazione sociale"], correct:0, explain:"'Focus strategico e orientamento al futuro' non è tra le tre sezioni classiche del bilancio sociale (identità, valore aggiunto, relazione sociale).", difficulty:"difficile"},
  {topic:"Bilancio integrato (paniere)", q:"Quale tra le seguenti non rappresenta una delle tipologie di capitali indicata dal Framework dell'IIRC quale concetto fondamentale per la redazione di un bilancio integrato:", options:["Capitale economico","Capitale finanziario","Capitale intellettuale","Capitale naturale"], correct:0, explain:"Il 'capitale economico' non è tra le sei tipologie di capitale indicate dal Framework dell'IIRC (finanziario, produttivo, intellettuale, umano, sociale-relazionale, naturale).", difficulty:"difficile"},
  {topic:"Dichiarazione non finanziaria (paniere)", q:"Secondo la normativa italiana, gli indicatori di risultato non finanziari devono essere rappresentati:", options:["Nella Relazione sulla gestione","Nella Nota Integrativa","Nel bilancio consolidato di gruppo","Nel rendiconto finanziario"], correct:0, explain:"Secondo la normativa italiana, gli indicatori di risultato non finanziari vanno rappresentati nella Relazione sulla gestione.", difficulty:"media"},
  {topic:"Dichiarazione non finanziaria (paniere)", q:"Quale tra i seguenti non rappresenta uno degli elementi che la normativa europea individua come contenuto minimo della Dichiarazione non finanziaria:", options:["Gli assetti di governance societaria","I temi ambientali","Gli aspetti sociali e del personale","Il rispetto dei diritti umani"], correct:0, explain:"Gli assetti di governance societaria non rientrano tra i contenuti minimi previsti dalla normativa europea per la Dichiarazione non finanziaria.", difficulty:"difficile"},
  {topic:"CSRD (paniere)", q:"Quale tra i seguenti non rappresenta uno degli elementi innovativi introdotti dalla Corporate Sustainability Reporting Directive (CSRD) rispetto Non Financial Reporting Directive (NFRD):", options:["L'obbligo di redazione della Dichiarazione di sostenibilità anche per le PMI non quotate","L'estensione della platea di imprese obbligate al reporting, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","L'introduzione di standard europei comuni di rendicontazione, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","L'obbligo di assurance sulle informazioni di sostenibilità, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti"], correct:0, explain:"L'obbligo per le PMI non quotate non è tra gli elementi innovativi della CSRD, che riguarda principalmente le grandi imprese e quelle quotate.", difficulty:"difficile"},
  {topic:"L'azienda (paniere)", q:"I caratteri che qualificano una unità economica come azienda sono:", options:["Coordinazione sistemica; economicità; autonomia","La presenza di un capitale sociale minimo","La forma giuridica di società di capitali","Lo scopo di lucro dell'attività"], correct:0, explain:"I caratteri qualificanti dell'azienda sono coordinazione sistemica, economicità e autonomia.", difficulty:"media"},
  {topic:"Concetti economici (paniere)", q:"I beni o le risorse sono definiti 'economici' quando sono:", options:["Scarsi rispetto alle esigenze degli individui e non possono essere facilmente acquisiti","Disponibili in quantità illimitata per chiunque, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Privi di qualunque valore di scambio, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Forniti gratuitamente dallo Stato, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)"], correct:0, explain:"I beni economici sono scarsi rispetto ai bisogni e non facilmente acquisibili, a differenza dei beni liberi.", difficulty:"facile"},
  {topic:"Soggetto economico (paniere)", q:"Per 'soggetto economico' si intende:", options:["Il soggetto che esercita il governo dell'azienda, determinandone gli indirizzi di fondo","Il soggetto titolare formale dei diritti e obblighi aziendali, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Il singolo dipendente dell'impresa, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","L'ente pubblico che vigila sull'impresa, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità"], correct:0, explain:"Il soggetto economico è colui che esercita il governo dell'azienda e ne determina gli indirizzi di fondo, distinto dal soggetto giuridico.", difficulty:"media"},
  {topic:"Funzione di produzione (paniere)", q:"I momenti tipici della 'funzione di produzione' sono:", options:["Acquisto; consumo; destinazione all'esterno","L'acquisto di materie prime, isolatamente considerato","La vendita dei prodotti finiti, isolatamente considerata","La fase di finanziamento, isolatamente considerata"], correct:0, explain:"I momenti tipici della funzione di produzione sono acquisto, consumo (trasformazione) e destinazione all'esterno (vendita).", difficulty:"media"},
  {topic:"L'azienda (paniere)", q:"L'azienda può essere definita come:", options:["Un sistema aperto e dinamico","Un sistema chiuso e statico","Un insieme di beni privo di organizzazione","Un ente privo di relazioni con l'ambiente esterno"], correct:0, explain:"L'azienda è definita come un sistema aperto (in relazione con l'ambiente) e dinamico (in continua evoluzione).", difficulty:"facile"},
  {topic:"Unità economiche (paniere)", q:"Per 'unità economiche' si intendono:", options:["Tutti i soggetti che nel sistema economico odierno svolgono una attività economica","Le imprese private","Gli enti pubblici","Le famiglie"], correct:0, explain:"Le unità economiche comprendono tutti i soggetti (famiglie, imprese, Stato) che svolgono attività economica nel sistema.", difficulty:"media"},
  {topic:"Classificazione aziende (paniere)", q:"In relazione alla modalità con cui si rapportano al mercato, le aziende possono essere classificate in:", options:["Imprese; cooperative; associazioni e fondazioni; amministrazioni pubbliche","Imprese pubbliche e private","Piccole, medie e grandi imprese","Aziende manifatturiere e commerciali"], correct:0, explain:"In base al rapporto con il mercato, le aziende si classificano in imprese, cooperative, associazioni/fondazioni e amministrazioni pubbliche.", difficulty:"media"},
  {topic:"Economicità (paniere)", q:"Una azienda opera in condizione di economicità quando:", options:["Presenta, nel tempo, costanti condizioni di equilibrio economico, finanziario e monetario","Massimizza il fatturato indipendentemente dai costi sostenuti, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Riduce sistematicamente il numero di dipendenti, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Distribuisce sempre dividendi elevati ai soci, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi"], correct:0, explain:"L'economicità si realizza quando l'azienda mantiene nel tempo condizioni di equilibrio economico, finanziario e monetario.", difficulty:"media"},
  {topic:"Attività economica (paniere)", q:"I momenti tipici dell'attività economica sono:", options:["Consumo, produzione e trasferimento","Il consumo, isolatamente considerato","La produzione, isolatamente considerata","Il trasferimento di beni, isolatamente considerato"], correct:0, explain:"L'attività economica si articola nei momenti di consumo, produzione e trasferimento (scambio) di beni e servizi.", difficulty:"media"},
  {topic:"Zappa e la ragioneria (paniere)", q:"Secondo Zappa, il fondamentale indicatore del risultato economico dell'attività d'impresa è rappresentato:", options:["Dal reddito","Dal fatturato lordo","Dal solo valore delle immobilizzazioni","Dal numero di dipendenti"], correct:0, explain:"Per Zappa il reddito è il fondamentale indicatore di sintesi del risultato economico dell'attività d'impresa.", difficulty:"media"},
  {topic:"Economia Aziendale (paniere)", q:"L'Economia Aziendale:", options:["Studia l'azienda 'dall'interno' e si interessa di fatti e fenomeni concreti","Studia esclusivamente le politiche macroeconomiche di uno Stato, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Si occupa solo di diritto commerciale, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Ignora completamente i fenomeni gestionali concreti, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti"], correct:0, explain:"L'Economia Aziendale studia l'azienda dall'interno, occupandosi di fatti e fenomeni concreti della gestione.", difficulty:"media"},
  {topic:"Ambiente aziendale (paniere)", q:"Quale, tra i seguenti, non può essere classificato come un sub-sistema ambientale 'specifico':", options:["Ambiente politico","Ambiente tecnologico","Ambiente dei mercati","Ambiente competitivo"], correct:0, explain:"L'ambiente politico è generalmente considerato ambiente 'generale', non 'specifico', rispetto all'azienda.", difficulty:"difficile"},
  {topic:"Rischio aziendale (paniere)", q:"Secondo il più comune pensiero, le principali cause del rischio aziendale sono:", options:["La complessità del futuro e la limitata capacità previsionale dell'uomo","L'eccesso di regolamentazione statale, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","La presenza di concorrenti nel mercato, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","L'assenza di innovazione tecnologica, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)"], correct:0, explain:"Le principali cause del rischio aziendale risiedono nella complessità del futuro e nella limitata capacità previsionale umana.", difficulty:"media"},
  {topic:"CSR (paniere)", q:"La Corporate Social Responsibility (CSR):", options:["Si occupa della gestione e del miglioramento dell'impatto dell'attività aziendale sulla società e sull'ambiente","Riguarda la beneficenza occasionale dell'impresa","Coincide con il rispetto degli obblighi fiscali","Si applica alle imprese quotate in borsa"], correct:0, explain:"La CSR riguarda la gestione e il miglioramento dell'impatto dell'attività aziendale su società e ambiente.", difficulty:"media"},
  {topic:"Ambiente aziendale (paniere)", q:"L'ambiente è correttamente definito come:", options:["L'insieme delle condizioni e delle circostanze, di varia natura, nelle quali le aziende operano, e dei fenomeni e degli aspetti del mondo circostante, che trovano riflesso nei loro comportamenti","L'insieme delle sole norme giuridiche applicabili all'impresa, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Il solo mercato finanziario di riferimento, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","La sola concorrenza diretta dell'impresa, un dato che deriva dalla riclassificazione del conto economico a costo del venduto, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati"], correct:0, explain:"L'ambiente comprende l'insieme di condizioni, circostanze e fenomeni del mondo circostante che influenzano i comportamenti aziendali.", difficulty:"media"},
  {topic:"Visione zappiana (paniere)", q:"Nella visione zappiana, i due 'connotati' fondamentali dell'azienda sono:", options:["La visione sistemica e la sua capacità a perdurare nel tempo","La sola redditività e il solo fatturato, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","La forma giuridica e il capitale sociale, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Il numero di dipendenti e la sede legale, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale"], correct:0, explain:"Zappa individua nella visione sistemica e nella capacità di perdurare nel tempo i due connotati fondamentali dell'azienda.", difficulty:"media"},
  {topic:"Storia del pensiero aziendale (paniere)", q:"Il padre dell'Economia Aziendale è considerato:", options:["Gino Zappa","Luca Pacioli","Fabio Besta","Gino Ferrero"], correct:0, explain:"Gino Zappa è tradizionalmente considerato il padre dell'Economia Aziendale come disciplina scientifica.", difficulty:"facile"},
  {topic:"Rischio aziendale (paniere)", q:"Quale, tra i seguenti, non può essere considerato un carattere che contribuisce a configurare la cosiddetta entità del rischio:", options:["Momento di manifestazione del rischio","Intensità del rischio","Probabilità di accadimento","Ambito di manifestazione del rischio"], correct:0, explain:"Il 'momento di manifestazione' non è tra i caratteri classici dell'entità del rischio (intensità, probabilità, ambito).", difficulty:"difficile"},
  {topic:"CSR (paniere)", q:"Inizialmente, per Corporate Social Responsibility (CSR) si intendeva:", options:["Un'attività sostanzialmente filantropica che si affiancava alla normale attività d'impresa","Un obbligo di legge vincolante per tutte le imprese, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Una strategia core dell'attività aziendale fin dall'origine, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Un sistema di rendicontazione obbligatorio dal XIX secolo, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi"], correct:0, explain:"Inizialmente la CSR era intesa come un'attività prevalentemente filantropica, distinta dalla normale attività d'impresa.", difficulty:"media"},

  {topic:"Obsolescenza economica (paniere)", q:"Il fenomeno dell'obsolescenza economica:", options:["Potrebbe colpire direttamente il singolo fattore produttivo, ovvero abbattersi su tutta o parte dell'organizzazione aziendale o, ancora, sui prodotti/servizi aziendali","Riguarda esclusivamente i fattori produttivi materiali, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti), una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Non ha alcun effetto sulla vita utile dei beni, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Coincide con il deprezzamento fiscale previsto dalla legge, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti"], correct:0, explain:"L'obsolescenza economica può colpire il singolo fattore, l'intera organizzazione o i prodotti/servizi aziendali.", difficulty:"media"},
  {topic:"Gestione aziendale (paniere)", q:"Le operazioni di gestione sono:", options:["Sistematicamente coordinate tra loro sia nel tempo sia nello spazio","Tra loro indipendenti e scollegate, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Coordinate solo nel tempo, non nello spazio, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Prive di qualunque relazione con l'ambiente esterno, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)"], correct:0, explain:"Le operazioni di gestione sono sistematicamente coordinate tra loro, sia dal punto di vista temporale sia spaziale.", difficulty:"media"},
  {topic:"Processo di gestione (paniere)", q:"Le 3 (tre) fasi fondamentali in cui è articolato il processo di gestione sono:", options:["Approvvigionamento; trasformazione/produzione; scambio","Acquisto; vendita; finanziamento, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Produzione; distribuzione; consumo finale, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Progettazione; produzione; smaltimento, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità"], correct:0, explain:"Il processo di gestione si articola in approvvigionamento, trasformazione/produzione e scambio.", difficulty:"media"},
  {topic:"Capitale Intellettuale (paniere)", q:"Secondo il modello del Capitale Intellettuale, le 3 (tre) categorie principali di risorse intangibili sono:", options:["Competenze individuali; struttura interna; struttura esterna","Brevetti; marchi; licenze","Capitale finanziario; capitale fisico; capitale umano","Reputazione; fatturato; utile netto"], correct:0, explain:"Il modello del Capitale Intellettuale distingue competenze individuali, struttura interna e struttura esterna.", difficulty:"media"},
  {topic:"Obsolescenza economica (paniere)", q:"In virtù del fenomeno dell'obsolescenza economica:", options:["La vita utile economica di un fattore produttivo è più breve della sua durata tecnica","La vita utile economica coincide con la durata tecnica del bene","La durata tecnica è inferiore alla vita utile economica","Il fattore produttivo non si deprezza economicamente nel tempo"], correct:0, explain:"L'obsolescenza economica fa sì che la vita utile economica di un fattore sia generalmente più breve della sua durata tecnica.", difficulty:"media"},
  {topic:"Fattori produttivi (paniere)", q:"In una qualsiasi impresa, i fattori della produzione:", options:["Possono essere sia di natura materiale sia di natura immateriale","Sono di natura prevalentemente finanziaria","Coincidono con il capitale umano dell'impresa","Riguardano i beni strumentali durevoli"], correct:0, explain:"I fattori produttivi possono essere sia materiali (macchinari, materie prime) sia immateriali (brevetti, know-how).", difficulty:"facile"},
  {topic:"Processo di gestione (paniere)", q:"La fase della trasformazione/produzione comprende:", options:["Le operazioni attraverso le quali vengono impiegati i fattori produttivi specifici per ottenere prodotti o servizi","Le operazioni di vendita dei prodotti finiti","Le operazioni di acquisto delle materie prime","Le operazioni di natura finanziaria"], correct:0, explain:"La fase di trasformazione/produzione riguarda l'impiego dei fattori produttivi per ottenere prodotti o servizi.", difficulty:"media"},
