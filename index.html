<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Statistica — Preparazione Esame</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B2A4A;
    --navy-light:#2C3E63;
    --paper:#F7F3EA;
    --paper-dim:#EFE9DA;
    --amber:#E8A33D;
    --amber-dark:#C7822A;
    --ink:#232323;
    --ink-soft:#5A5A52;
    --correct:#5E8C6A;
    --correct-bg:#E4EEE2;
    --wrong:#B85450;
    --wrong-bg:#F5E3E0;
    --rule: rgba(27,42,74,0.15);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--navy);
    background-image:
      radial-gradient(circle at 10% 0%, rgba(232,163,61,0.08), transparent 40%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 32px);
    color:var(--ink);
    font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:32px 16px 60px;
  }
  .app{ width:100%; max-width:920px; }
  header.top{
    display:flex; align-items:baseline; justify-content:space-between;
    color:var(--paper); margin-bottom:22px; flex-wrap:wrap; gap:8px;
  }
  header.top .brand{ font-family:'Fraunces', serif; font-weight:600; font-size:1.7rem; letter-spacing:-0.01em; }
  header.top .brand em{ color:var(--amber); font-style:normal; }
  header.top .subtitle{ font-family:'IBM Plex Mono', monospace; font-size:0.75rem; color:rgba(247,243,234,0.65); letter-spacing:0.02em; }

  .layout{ display:grid; grid-template-columns: 1fr 220px; gap:20px; align-items:start; }
  @media (max-width: 720px){ .layout{ grid-template-columns: 1fr; } .stats-panel{ order:2; } }

  .card{
    background:var(--paper); border-radius:4px;
    box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 12px 28px rgba(0,0,0,0.28);
    position:relative; overflow:hidden;
  }
  .card::before{
    content:""; position:absolute; top:0; left:0; right:0; height:5px;
    background:linear-gradient(90deg, var(--amber), var(--amber-dark));
  }

  .progress-wrap{ padding:20px 28px 0; }
  .progress-top-row{ display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
  .progress-track{ position:relative; height:8px; background:var(--paper-dim); border-radius:99px; margin-top:6px; overflow:hidden; }
  .progress-fill{ position:absolute; top:0; left:0; bottom:0; background:var(--navy); border-radius:99px; transition:width 0.35s ease; }
  .progress-fill.infinite{
    width:35% !important;
    background:linear-gradient(90deg, transparent, var(--amber), transparent);
    animation: slide 1.4s linear infinite;
  }
  @keyframes slide{ 0%{ transform:translateX(-120%);} 100%{ transform:translateX(340%);} }
  .progress-label{ font-family:'IBM Plex Mono', monospace; font-size:0.72rem; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.06em; }
  .stop-link{
    font-family:'IBM Plex Mono', monospace; font-size:0.7rem; color:var(--amber-dark);
    background:none; border:none; cursor:pointer; text-decoration:underline; letter-spacing:0.03em; padding:0;
  }

  .question-area{ padding:26px 28px 28px; }
  .q-eyebrow{ font-family:'IBM Plex Mono', monospace; font-size:0.72rem; color:var(--amber-dark); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px; display:flex; gap:8px; align-items:center; }
  .q-eyebrow .topic{ background:var(--navy); color:var(--paper); padding:2px 8px; border-radius:99px; font-size:0.68rem; }
  .q-text{ font-family:'Fraunces', serif; font-weight:600; font-size:1.28rem; line-height:1.45; color:var(--navy); margin:0 0 22px; }

  .options{ display:flex; flex-direction:column; gap:10px; }
  .option{
    display:flex; align-items:flex-start; gap:12px; text-align:left; padding:13px 16px; border-radius:6px;
    border:1.5px solid var(--rule); background:#fff; cursor:pointer; font-family:'IBM Plex Sans', sans-serif;
    font-size:0.98rem; color:var(--ink); transition: border-color .15s ease, background .15s ease;
  }
  .option:hover:not(:disabled){ border-color:var(--amber); background:#FFFCF5; }
  .option:disabled{ cursor:default; }
  .option .box{
    flex:0 0 22px; width:22px; height:22px; border:1.5px solid var(--navy); border-radius:4px;
    display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono', monospace;
    font-size:0.72rem; font-weight:600; color:var(--navy); margin-top:1px; flex-shrink:0;
  }
  .option.correct{ background:var(--correct-bg); border-color:var(--correct); }
  .option.correct .box{ background:var(--correct); border-color:var(--correct); color:#fff; }
  .option.wrong{ background:var(--wrong-bg); border-color:var(--wrong); }
  .option.wrong .box{ background:var(--wrong); border-color:var(--wrong); color:#fff; }

  .explain{ margin-top:18px; padding:14px 16px; background:var(--paper-dim); border-left:3px solid var(--amber-dark); border-radius:0 4px 4px 0; font-size:0.9rem; color:var(--ink-soft); display:none; }
  .explain.show{ display:block; }
  .explain strong{ color:var(--navy); }

  .controls{ display:flex; justify-content:flex-end; margin-top:22px; }
  button.next{
    font-family:'IBM Plex Mono', monospace; font-size:0.85rem; font-weight:600; letter-spacing:0.02em;
    background:var(--navy); color:var(--paper); border:none; padding:11px 22px; border-radius:4px; cursor:pointer;
    opacity:0; pointer-events:none; transition:opacity .2s ease, background .15s ease;
  }
  button.next.show{ opacity:1; pointer-events:auto; }
  button.next:hover{ background:var(--navy-light); }

  .stats-panel{ background:var(--navy-light); border-radius:4px; padding:20px; color:var(--paper); font-family:'IBM Plex Mono', monospace; }
  .stats-panel h3{ margin:0 0 14px; font-family:'Fraunces', serif; font-weight:600; font-size:1rem; color:var(--amber); }
  .stat-row{ display:flex; justify-content:space-between; font-size:0.8rem; padding:7px 0; border-bottom:1px dashed rgba(247,243,234,0.15); }
  .stat-row:last-child{ border-bottom:none; }
  .stat-row .val{ color:#fff; font-weight:600; }
  .stat-row .val.good{ color:#8FCB9B; }
  .stat-row .val.bad{ color:#E39A96; }

  .result{ padding:40px 32px; text-align:center; }
  .result .big{ font-family:'Fraunces', serif; font-size:3.2rem; font-weight:700; color:var(--navy); margin:0; line-height:1; }
  .result .big span{ color:var(--amber-dark); }
  .result .verdict{ font-family:'IBM Plex Mono', monospace; font-size:0.85rem; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.06em; margin:10px 0 28px; }
  .result-actions{ display:flex; gap:12px; justify-content:center; flex-wrap:wrap; }
  .result-actions button{ font-family:'IBM Plex Mono', monospace; font-size:0.85rem; font-weight:600; padding:11px 20px; border-radius:4px; cursor:pointer; border:1.5px solid var(--navy); }
  .btn-primary{ background:var(--navy); color:var(--paper); }
  .btn-primary:hover{ background:var(--navy-light); }
  .btn-secondary{ background:transparent; color:var(--navy); }
  .btn-secondary:hover{ background:var(--paper-dim); }

  .review-list{ text-align:left; margin-top:30px; border-top:1px solid var(--rule); padding-top:20px; max-height:420px; overflow-y:auto; }
  .review-item{ padding:14px 0; border-bottom:1px solid var(--rule); font-size:0.88rem; }
  .review-item:last-child{ border-bottom:none; }
  .review-item .rq{ font-weight:600; color:var(--navy); margin-bottom:6px; }
  .review-item .ra-wrong{ color:var(--wrong); }
  .review-item .ra-correct{ color:var(--correct); }

  footer.credits{ text-align:center; color:rgba(247,243,234,0.4); font-family:'IBM Plex Mono', monospace; font-size:0.7rem; margin-top:26px; }

  .start-screen{ padding:40px 32px; text-align:center; }
  .start-screen h2{ font-family:'Fraunces', serif; font-size:1.6rem; color:var(--navy); margin:0 0 10px; }
  .start-screen p{ color:var(--ink-soft); font-size:0.95rem; max-width:560px; margin:0 auto 26px; line-height:1.55; }
  .mode-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; max-width:520px; margin:0 auto 26px; }
  @media (max-width:520px){ .mode-grid{ grid-template-columns:1fr; } }
  .mode-btn{
    font-family:'IBM Plex Mono', monospace; font-size:0.78rem; padding:14px 12px; border-radius:8px;
    border:1.5px solid var(--rule); background:#fff; cursor:pointer; color:var(--ink-soft); text-align:left; line-height:1.4;
  }
  .mode-btn b{ display:block; font-family:'IBM Plex Sans',sans-serif; font-size:0.92rem; color:var(--navy); margin-bottom:3px; }
  .mode-btn.active{ border-color:var(--amber-dark); background:var(--paper-dim); }
  .mode-btn.active b{ color:var(--amber-dark); }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">Quiz <em>Statistica</em></div>
    <div class="subtitle">banca da 45 domande + generatore infinito di esercizi numerici</div>
  </header>

  <div class="layout">
    <div class="card" id="mainCard"></div>
    <aside class="stats-panel" id="statsPanel" style="display:none;">
      <h3>Riepilogo live</h3>
      <div class="stat-row"><span>Risposte date</span><span class="val" id="statAnswered">0</span></div>
      <div class="stat-row"><span>Corrette</span><span class="val good" id="statCorrect">0</span></div>
      <div class="stat-row"><span>Errate</span><span class="val bad" id="statWrong">0</span></div>
      <div class="stat-row"><span>Accuratezza</span><span class="val" id="statAccuracy">—</span></div>
      <div class="stat-row"><span>Serie corrente</span><span class="val" id="statStreak">0</span></div>
    </aside>
  </div>

  <footer class="credits">Materiale di autoesercitazione non ufficiale · verificare sempre sui testi/slide del corso</footer>
</div>

<script>
/* =========================================================
   BANCA DOMANDE FISSE — concetti teorici
   ========================================================= */
const QUESTIONS = [
  {topic:"Statistica descrittiva", q:"La moda di una distribuzione di frequenze è:", options:["Il valore che occupa la posizione centrale","Il valore che si presenta con la frequenza più alta","La somma dei valori divisa per il numero di osservazioni","La differenza tra il valore massimo e minimo"], correct:1, explain:"La moda è il valore (o la classe) con la frequenza assoluta più elevata nella distribuzione."},
  {topic:"Statistica descrittiva", q:"La mediana di un insieme di dati ordinati è:", options:["La media aritmetica dei dati","Il valore centrale che divide i dati in due metà","Il valore più frequente","Lo scarto quadratico medio"], correct:1, explain:"La mediana è il valore che lascia il 50% delle osservazioni sotto e il 50% sopra, una volta ordinati i dati."},
  {topic:"Statistica descrittiva", q:"Quale indice di posizione è più sensibile ai valori estremi (outlier)?", options:["La mediana","La moda","La media aritmetica","Il primo quartile"], correct:2, explain:"La media aritmetica tiene conto di tutti i valori, quindi risente fortemente della presenza di valori anomali."},
  {topic:"Statistica descrittiva", q:"La varianza di un campione misura:", options:["La tendenza centrale dei dati","La dispersione dei dati attorno alla media","La forma della distribuzione","La correlazione tra due variabili"], correct:1, explain:"La varianza è la media dei quadrati degli scarti dalla media, quindi misura la dispersione dei dati."},
  {topic:"Statistica descrittiva", q:"La deviazione standard è definita come:", options:["Il quadrato della varianza","La radice quadrata della varianza","La differenza tra media e mediana","Il valore massimo meno il valore minimo"], correct:1, explain:"La deviazione standard è la radice quadrata della varianza ed è espressa nella stessa unità di misura dei dati."},
  {topic:"Statistica descrittiva", q:"Il coefficiente di variazione è utile perché:", options:["Elimina la necessità di calcolare la media","Permette di confrontare la variabilità di distribuzioni con unità o medie diverse","È sempre uguale alla deviazione standard","Misura solo la simmetria della distribuzione"], correct:1, explain:"Il CV = deviazione standard / media, ed essendo un numero puro consente confronti tra dataset diversi."},
  {topic:"Statistica descrittiva", q:"Il range (campo di variazione) è dato da:", options:["Media meno mediana","Valore massimo meno valore minimo","Terzo quartile meno primo quartile","Varianza diviso la media"], correct:1, explain:"Il range è la differenza tra il valore massimo e il valore minimo della distribuzione."},
  {topic:"Statistica descrittiva", q:"Lo scarto interquartile (IQR) si calcola come:", options:["Q3 − Q1","Q2 − Q1","Massimo − Minimo","Media − Mediana"], correct:0, explain:"L'IQR è la differenza tra il terzo quartile (Q3) e il primo quartile (Q1), ed è robusto agli outlier."},
  {topic:"Statistica descrittiva", q:"Una distribuzione con asimmetria positiva (destra) ha in genere:", options:["Media < Mediana < Moda","Moda < Mediana < Media","Media = Mediana = Moda","Mediana < Moda < Media"], correct:1, explain:"Nell'asimmetria positiva la coda si allunga a destra: Moda < Mediana < Media."},
  {topic:"Statistica descrittiva", q:"La curtosi di una distribuzione descrive:", options:["Il grado di appiattimento/appuntimento rispetto alla normale","La posizione centrale dei dati","Il numero di osservazioni","La correlazione tra due variabili"], correct:0, explain:"La curtosi misura quanto la distribuzione è 'appuntita' o 'piatta' rispetto alla distribuzione normale."},
  {topic:"Probabilità", q:"La probabilità di un evento certo è:", options:["0","1","0.5","Indeterminata"], correct:1, explain:"Un evento certo ha probabilità pari a 1 secondo gli assiomi di Kolmogorov."},
  {topic:"Probabilità", q:"Due eventi A e B sono indipendenti se:", options:["P(A∩B) = P(A) + P(B)","P(A∩B) = P(A) · P(B)","P(A∪B) = P(A) · P(B)","P(A|B) = P(B)"], correct:1, explain:"L'indipendenza tra due eventi implica che P(A∩B) = P(A)·P(B)."},
  {topic:"Probabilità", q:"La probabilità condizionata P(A|B) si definisce come:", options:["P(A∩B) / P(B), con P(B) > 0","P(A) + P(B)","P(A∪B) / P(A)","P(A) · P(B)"], correct:0, explain:"P(A|B) = P(A∩B) / P(B) è la definizione di probabilità condizionata."},
  {topic:"Probabilità", q:"Il teorema di Bayes permette di:", options:["Calcolare la varianza di una variabile casuale","Aggiornare la probabilità di un'ipotesi alla luce di nuove evidenze","Sommare eventi mutuamente esclusivi","Calcolare la media aritmetica"], correct:1, explain:"Il teorema di Bayes lega P(A|B) a P(B|A), P(A) e P(B), permettendo di aggiornare le probabilità a priori."},
  {topic:"Probabilità", q:"Due eventi mutuamente esclusivi (incompatibili) hanno:", options:["P(A∩B) = 0","P(A∩B) = P(A)·P(B)","P(A∪B) = 0","P(A|B) = P(A)"], correct:0, explain:"Se A e B non possono verificarsi insieme, la loro intersezione ha probabilità nulla."},
  {topic:"Probabilità", q:"La regola della somma per eventi non incompatibili è:", options:["P(A∪B) = P(A) + P(B)","P(A∪B) = P(A) + P(B) − P(A∩B)","P(A∪B) = P(A)·P(B)","P(A∪B) = P(A) − P(B)"], correct:1, explain:"Per evitare di contare due volte l'intersezione, si sottrae P(A∩B)."},
  {topic:"Variabili casuali", q:"Una variabile casuale discreta può assumere:", options:["Qualsiasi valore reale in un intervallo","Un numero finito o numerabile di valori","Solo valori negativi","Solo valori compresi tra 0 e 1"], correct:1, explain:"Le variabili discrete assumono valori isolati e numerabili (es. numero di successi)."},
  {topic:"Variabili casuali", q:"Il valore atteso E(X) di una variabile casuale rappresenta:", options:["Il valore più probabile in assoluto","La media ponderata dei valori secondo le rispettive probabilità","La varianza della variabile","Il valore massimo osservabile"], correct:1, explain:"E(X) è la media teorica, calcolata pesando ogni valore per la sua probabilità."},
  {topic:"Variabili casuali", q:"La funzione di densità di probabilità è associata a:", options:["Variabili casuali discrete","Variabili casuali continue","Solo alla distribuzione normale","Solo eventi indipendenti"], correct:1, explain:"Per le variabili continue si usa la densità di probabilità, mentre per le discrete la funzione di probabilità (massa)."},
  {topic:"Variabili casuali", q:"In una distribuzione Binomiale, i parametri sono:", options:["Media e varianza","n (numero di prove) e p (probabilità di successo)","Solo la media μ","Grado di libertà"], correct:1, explain:"La Binomiale B(n,p) descrive il numero di successi in n prove indipendenti con probabilità p."},
  {topic:"Variabili casuali", q:"La distribuzione di Poisson è utile per modellare:", options:["Il numero di eventi rari in un intervallo di tempo/spazio fissato","La proporzione di successi in un campione","Variabili continue simmetriche","Solo variabili con media zero"], correct:0, explain:"La Poisson modella conteggi di eventi rari e indipendenti in un intervallo definito."},
  {topic:"Variabili casuali", q:"Nella distribuzione Normale standardizzata (Z), media e deviazione standard valgono rispettivamente:", options:["1 e 0","0 e 1","0 e 0","1 e 1"], correct:1, explain:"La normale standard ha media 0 e deviazione standard 1, ottenuta tramite la trasformazione Z = (X−μ)/σ."},
  {topic:"Variabili casuali", q:"In una distribuzione Normale, circa quale percentuale dei dati ricade entro ±2 deviazioni standard dalla media?", options:["Circa 68%","Circa 95%","Circa 99.7%","Circa 50%"], correct:1, explain:"La regola empirica indica ~68% entro ±1σ, ~95% entro ±2σ e ~99.7% entro ±3σ."},
  {topic:"Campionamento", q:"Il campionamento casuale semplice garantisce che:", options:["Ogni unità della popolazione abbia la stessa probabilità di essere estratta","Solo le unità più rappresentative vengano scelte","Il campione coincida sempre con la popolazione","Non sia necessario definire la popolazione di riferimento"], correct:0, explain:"Nel campionamento casuale semplice ogni elemento ha eguale probabilità di selezione."},
  {topic:"Campionamento", q:"L'errore standard della media campionaria diminuisce quando:", options:["La numerosità campionaria n aumenta","La varianza della popolazione aumenta","Il campione diventa più piccolo","La popolazione diventa infinita"], correct:0, explain:"L'errore standard è σ/√n: all'aumentare di n, l'errore standard diminuisce."},
  {topic:"Campionamento", q:"Il Teorema del Limite Centrale afferma che:", options:["Ogni popolazione è distribuita normalmente","Per campioni sufficientemente grandi, la distribuzione della media campionaria tende alla normale","La varianza campionaria è sempre zero","La mediana è sempre uguale alla media"], correct:1, explain:"Il TLC garantisce che, all'aumentare di n, la distribuzione campionaria della media si approssima a una normale, indipendentemente dalla distribuzione della popolazione."},
  {topic:"Campionamento", q:"Un campionamento stratificato consiste nel:", options:["Estrarre unità solo dalle prime file dell'elenco","Dividere la popolazione in sottogruppi omogenei ed estrarre da ciascuno","Escludere le unità meno numerose","Selezionare un solo individuo per ogni gruppo etnico"], correct:1, explain:"Nel campionamento stratificato la popolazione è divisa in strati omogenei e si campiona da ciascuno, spesso proporzionalmente."},
  {topic:"Stima", q:"Uno stimatore si dice non distorto (corretto) quando:", options:["Il suo valore atteso coincide con il parametro della popolazione","La sua varianza è nulla","Dipende solo dalla numerosità campionaria","È sempre uguale alla mediana"], correct:0, explain:"Uno stimatore non distorto ha E(stimatore) = parametro vero, in media non sovrastima né sottostima."},
  {topic:"Stima", q:"Un intervallo di confidenza al 95% per la media indica che:", options:["Il 95% dei dati campionari cade in quell'intervallo","Se ripetessimo il campionamento molte volte, circa il 95% degli intervalli costruiti conterrebbe il vero parametro","Il parametro ha il 95% di probabilità di essere il valore osservato","La media campionaria è sbagliata nel 5% dei casi"], correct:1, explain:"L'interpretazione frequentista riguarda la procedura di costruzione dell'intervallo su ripetuti campionamenti, non la singola stima."},
  {topic:"Stima", q:"Aumentando il livello di confidenza (es. da 90% a 99%), a parità di altre condizioni, l'ampiezza dell'intervallo di confidenza:", options:["Diminuisce","Aumenta","Resta invariata","Diventa zero"], correct:1, explain:"Un livello di confidenza più alto richiede un intervallo più ampio per garantire la copertura del parametro."},
  {topic:"Stima", q:"Aumentando la dimensione campionaria n, a parità di altre condizioni, l'ampiezza dell'intervallo di confidenza:", options:["Aumenta","Diminuisce","Resta invariata","Raddoppia sempre"], correct:1, explain:"Poiché l'errore standard è proporzionale a 1/√n, campioni più grandi restringono l'intervallo di confidenza."},
  {topic:"Test di ipotesi", q:"L'ipotesi nulla (H0) in un test statistico rappresenta tipicamente:", options:["L'ipotesi che si vuole dimostrare come vera a tutti i costi","L'assenza di effetto o di differenza, presa come riferimento iniziale","Sempre l'ipotesi alternativa","Il valore osservato nel campione"], correct:1, explain:"H0 è l'ipotesi di 'status quo' (nessun effetto/differenza) che viene messa alla prova dai dati."},
  {topic:"Test di ipotesi", q:"L'errore di I tipo (alfa) consiste nel:", options:["Accettare H0 quando è falsa","Rifiutare H0 quando è vera","Accettare H1 quando è vera","Non calcolare il p-value"], correct:1, explain:"L'errore di I tipo è il rifiuto errato di un'ipotesi nulla vera, con probabilità pari al livello di significatività α."},
  {topic:"Test di ipotesi", q:"L'errore di II tipo (beta) consiste nel:", options:["Rifiutare H0 quando è vera","Accettare (non rifiutare) H0 quando è falsa","Rifiutare sempre H1","Aumentare il livello di significatività"], correct:1, explain:"L'errore di II tipo si verifica quando non si rifiuta H0 pur essendo falsa."},
  {topic:"Test di ipotesi", q:"Il p-value rappresenta:", options:["La probabilità che H0 sia vera","La probabilità di osservare un risultato estremo quanto (o più di) quello ottenuto, assumendo H0 vera","Il livello di confidenza dell'intervallo","La potenza del test"], correct:1, explain:"Il p-value è calcolato assumendo che H0 sia vera ed esprime quanto sono 'estremi' i dati osservati sotto tale ipotesi."},

/* =========================================================
   HELPER NUMERICI
   ========================================================= */
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function randChoice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function fmt(v){ return (Math.round(v*100)/100).toString().replace(/\.0+$/,'').replace(/(\.\d*?)0+$/,'$1').replace(/\.$/,''); }

function buildOptions(correctValue, distractorFn, formatFn){
  formatFn = formatFn || fmt;
  const correctFormatted = formatFn(correctValue);
  const wrongs = [];
  let attempts = 0;
  while(wrongs.length < 3 && attempts < 60){
    attempts++;
    const cand = formatFn(distractorFn());
    if(cand !== correctFormatted && !wrongs.includes(cand)) wrongs.push(cand);
  }
  let pad = 1;
  while(wrongs.length < 3){
    const filler = formatFn(Number(correctValue) + pad * (Math.random()<0.5?-1:1) * (Math.abs(Number(correctValue))*0.15 + pad));
    if(filler !== correctFormatted && !wrongs.includes(filler)) wrongs.push(filler);
    pad++;
  }
  const all = shuffle([correctFormatted, ...wrongs]);
  return { options: all, correct: all.indexOf(correctFormatted) };
}

/* =========================================================
   GENERATORE PROCEDURALE — esercizi numerici infiniti
   ========================================================= */
const GENERATORS = [

  function genMean(){
    const n = randInt(5,7);
    const data = Array.from({length:n}, ()=>randInt(2,60));
    const sum = data.reduce((a,b)=>a+b,0);
    const mean = sum/n;
    const sorted = [...data].sort((a,b)=>a-b);
    const median = n%2 ? sorted[(n-1)/2] : (sorted[n/2-1]+sorted[n/2])/2;
    const {options, correct} = buildOptions(mean, ()=>{
      const c = Math.random();
      if(c<0.34) return median;
      if(c<0.67) return sum;
      return mean + (Math.random()<0.5?1:-1)*randInt(1,8);
    });
    return { topic:"Calcolo — Media", q:`Calcola la media aritmetica del seguente insieme di dati: {${data.join(", ")}}`,
      options, correct, explain:`Media = somma dei valori (${sum}) / numerosità (${n}) = ${fmt(mean)}.` };
  },

  function genMedian(){
    const n = randChoice([5,7]);
    const data = Array.from({length:n}, ()=>randInt(1,99));
    const sorted = [...data].sort((a,b)=>a-b);
    const median = sorted[(n-1)/2];
    const mean = data.reduce((a,b)=>a+b,0)/n;
    const {options, correct} = buildOptions(median, ()=>{
      const c = Math.random();
      if(c<0.4) return mean;
      if(c<0.7) return sorted[randInt(0,n-1)];
      return median + randInt(-10,10);
    });
    return { topic:"Calcolo — Mediana", q:`Dato il seguente insieme di dati (non ordinato): {${data.join(", ")}}, qual è la mediana?`,
      options, correct, explain:`Ordinando: {${sorted.join(", ")}}. Con n=${n} (dispari) la mediana è il valore centrale: ${median}.` };
  },

  function genMode(){
    const repeated = randInt(1,30);
    const poolSet = new Set();
    while(poolSet.size < 6){ const v = randInt(1,30); if(v!==repeated) poolSet.add(v); }
    const data = shuffle([...poolSet, repeated, repeated]);
    const {options, correct} = buildOptions(repeated, ()=>{
      const c = Math.random();
      if(c<0.5) return data[randInt(0,data.length-1)];
      return repeated + (Math.random()<0.5?1:-1)*randInt(1,5);
    });
    return { topic:"Calcolo — Moda", q:`Qual è la moda del seguente insieme di dati? {${data.join(", ")}}`,
      options, correct, explain:`Il valore ${repeated} compare 2 volte, più di ogni altro valore nella serie (che compaiono 1 volta ciascuno).` };
  },

  function genRange(){
    const n = randInt(6,8);
    const data = Array.from({length:n}, ()=>randInt(5,95));
    const max = Math.max(...data), min = Math.min(...data);
    const range = max-min;
    const {options, correct} = buildOptions(range, ()=>{
      const c = Math.random();
      if(c<0.4) return max+min;
      if(c<0.7) return range + (Math.random()<0.5?1:-1)*randInt(1,10);
      return max;
    });
    return { topic:"Calcolo — Range", q:`Calcola il campo di variazione (range) del seguente insieme di dati: {${data.join(", ")}}`,
      options, correct, explain:`Range = massimo (${max}) − minimo (${min}) = ${range}.` };
  },

  function genVariance(){
    const n = randInt(4,5);
    const data = Array.from({length:n}, ()=>randInt(2,20));
    const mean = data.reduce((a,b)=>a+b,0)/n;
    const sumSq = data.reduce((acc,v)=>acc+Math.pow(v-mean,2),0);
    const variance = sumSq/n;
    const {options, correct} = buildOptions(variance, ()=>{
      const c = Math.random();
      if(c<0.4) return sumSq/(n-1);
      if(c<0.7) return Math.sqrt(variance);
      return variance + (Math.random()*4-2);
    });
    return { topic:"Calcolo — Varianza", q:`Calcola la varianza di popolazione (denominatore N) del seguente insieme di dati: {${data.join(", ")}}`,
      options, correct, explain:`Media = ${fmt(mean)}. Varianza = Σ(xᵢ−media)² / N = ${fmt(sumSq)} / ${n} = ${fmt(variance)}.` };
  },

  function genUrn(){
    const palette = ["rosse","blu","verdi","gialle","nere"];
    const chosen = shuffle(palette).slice(0,3);
    const counts = chosen.map(()=>randInt(2,15));
    const total = counts.reduce((a,b)=>a+b,0);
    const idx = randInt(0,2);
    const pct = (counts[idx]/total)*100;
    const {options, correct} = buildOptions(pct, ()=>{
      const c = Math.random();
      if(c<0.4) return (counts[idx]/(total-counts[idx]))*100;
      if(c<0.7) return ((total-counts[idx])/total)*100;
      return pct + (Math.random()<0.5?1:-1)*randInt(3,15);
    }, v=>fmt(v)+"%");
    return { topic:"Probabilità", q:`Un'urna contiene ${counts[0]} palline ${chosen[0]}, ${counts[1]} palline ${chosen[1]} e ${counts[2]} palline ${chosen[2]}. Estraendo una pallina a caso, qual è la probabilità che sia ${chosen[idx]}?`,
      options, correct, explain:`Totale palline = ${total}. P(${chosen[idx]}) = ${counts[idx]}/${total} ≈ ${fmt(pct)}%.` };
  },

  function genDice(){
    const k = randInt(1,5);
    const pct = ((6-k)/6)*100;
    const {options, correct} = buildOptions(pct, ()=>{
      const c = Math.random();
      if(c<0.4) return (k/6)*100;
      if(c<0.7) return ((6-k+1)/6)*100;
      return pct + (Math.random()<0.5?1:-1)*randInt(3,15);
    }, v=>fmt(v)+"%");
    return { topic:"Probabilità", q:`Lanciando un dado equilibrato a 6 facce, qual è la probabilità di ottenere un numero maggiore di ${k}?`,
      options, correct, explain:`I valori maggiori di ${k} sono ${6-k} su 6: P = (6−${k})/6 ≈ ${fmt(pct)}%.` };
  },

  function genZ(){
    const mu = randInt(40,100);
    const sigma = randInt(5,20);
    const x = mu + randInt(-3,3)*sigma + randInt(-4,4);
    const z = (x-mu)/sigma;
    const {options, correct} = buildOptions(z, ()=>{
      const c = Math.random();
      if(c<0.4) return (mu-x)/sigma;
      if(c<0.7) return (x-mu)/mu;
      return z + (Math.random()*1.6-0.8);
    });
    return { topic:"Calcolo — Punteggio z", q:`Una variabile ha media μ = ${mu} e deviazione standard σ = ${sigma}. Qual è il punteggio z per x = ${x}?`,
      options, correct, explain:`z = (x − μ) / σ = (${x} − ${mu}) / ${sigma} = ${fmt(z)}.` };
  },

  function genEmpirical(){
    const mu = randInt(50,100);
    const sigma = randInt(5,15);
    const k = randChoice([1,2,3]);
    const pctMap = {1:68,2:95,3:99.7};
    const lower = mu-k*sigma, upper = mu+k*sigma;
    const correctVal = pctMap[k];
    const {options, correct} = buildOptions(correctVal, ()=>{
      const others = Object.values(pctMap).filter(v=>v!==correctVal).concat([50,75,90]);
      return randChoice(others);
    }, v=>v+"%");
    return { topic:"Distribuzione Normale", q:`In una Normale con μ = ${mu} e σ = ${sigma}, che percentuale di dati ricade in [${lower}, ${upper}] (μ ± ${k}σ)?`,
      options, correct, explain:`Per la regola empirica, circa il ${correctVal}% dei dati ricade entro μ ± ${k}σ.` };
  },

  function genRegression(){
    const a = randInt(1,20);
    const b = randInt(1,10) * (Math.random()<0.5?1:-1);
    const x = randInt(2,20);
    const y = a + b*x;
    const {options, correct} = buildOptions(y, ()=>{
      const c = Math.random();
      if(c<0.4) return a - b*x;
      if(c<0.7) return a*x + b;
      return y + (Math.random()<0.5?1:-1)*randInt(2,15);
    });
    const bStr = b>=0 ? `+ ${b}` : `− ${Math.abs(b)}`;
    return { topic:"Regressione lineare", q:`Data la retta di regressione ŷ = ${a} ${bStr}x, qual è il valore previsto per x = ${x}?`,
      options, correct, explain:`ŷ = ${a} + (${b})·(${x}) = ${a} + ${b*x} = ${y}.` };
  },

  function genCV(){
    const mean = randInt(20,100);
    const sd = randInt(2, Math.max(3,Math.round(mean*0.5)));
    const cv = (sd/mean)*100;
    const {options, correct} = buildOptions(cv, ()=>{
      const c = Math.random();
      if(c<0.4) return (mean/sd)*100;
      if(c<0.7) return sd/mean;
      return cv + (Math.random()<0.5?1:-1)*randInt(3,15);
    }, v=>fmt(v)+"%");
    return { topic:"Calcolo — Coeff. di variazione", q:`Una distribuzione ha media = ${mean} e deviazione standard = ${sd}. Calcola il coefficiente di variazione (CV).`,
      options, correct, explain:`CV = (deviazione standard / media) × 100 = (${sd} / ${mean}) × 100 ≈ ${fmt(cv)}%.` };
  },

  function genCI(){
    const mean = randInt(50,150);
    const sigma = randInt(5,25);
    const n = randChoice([25,36,49,64,100]);
    const z = 1.96;
    const margin = z*sigma/Math.sqrt(n);
    const {options, correct} = buildOptions(margin, ()=>{
      const c = Math.random();
      if(c<0.4) return z*sigma/n;
      if(c<0.7) return sigma/Math.sqrt(n);
      return margin + (Math.random()*2-1);
    });
    return { topic:"Intervallo di confidenza", q:`Da un campione di n = ${n}, con σ = ${sigma}, calcola il margine di errore per un IC al 95% (z = 1.96) attorno alla media campionaria (μ = ${mean}).`,
      options, correct, explain:`Margine di errore = z · σ/√n = 1.96 × ${sigma}/√${n} = 1.96 × ${fmt(sigma/Math.sqrt(n))} ≈ ${fmt(margin)}.` };
  }
];

function generateProceduralQuestion(){ return randChoice(GENERATORS)(); }

/* =========================================================
   STATO E LOGICA APP
   ========================================================= */
let mode = 'all';
let isInfinite = false;
let order = [];
let current = 0;
let questionNumber = 1;
let answered = 0, correctCount = 0, wrongCount = 0, streak = 0;
let wrongLog = [];
let selectedMode = "all";
let fixedCycleOrder = [];
let fixedCyclePos = 0;
let currentQ = null;

const mainCard = document.getElementById('mainCard');
const statsPanel = document.getElementById('statsPanel');

function renderStart(){
  statsPanel.style.display = 'none';
  mainCard.innerHTML = `
    <div class="start-screen">
      <h2>Pronto per esercitarti?</h2>
      <p>Scegli tra la banca di domande teoriche a risposta multipla oppure il generatore infinito di esercizi numerici (media, mediana, probabilità, z-score, regressione, IC...), con numeri diversi ogni volta.</p>
      <div class="mode-grid">
        <button class="mode-btn active" data-mode="all"><b>Banca completa</b>45 domande teoriche</button>
        <button class="mode-btn" data-mode="15"><b>Prova rapida</b>15 domande teoriche</button>
        <button class="mode-btn" data-mode="gen"><b>Esercizi infiniti</b>solo calcolo, generati al volo</button>
        <button class="mode-btn" data-mode="mix"><b>Sessione mista infinita</b>teoria + calcolo, senza fine</button>
      </div>
      <div class="result-actions">
        <button class="btn-primary" id="startBtn">Inizia →</button>
      </div>
    </div>
  `;
  document.querySelectorAll('.mode-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      selectedMode = btn.dataset.mode;
    });
  });
  document.getElementById('startBtn').addEventListener('click', startQuiz);
}

function pickNextQuestion(){
  if(!isInfinite){
    return order[current];
  }
  if(mode === 'gen'){
    return generateProceduralQuestion();
  }
  // mix: 50% banca fissa (ciclica), 50% generata
  if(Math.random() < 0.5){
    if(fixedCyclePos >= fixedCycleOrder.length){ fixedCycleOrder = shuffle(QUESTIONS); fixedCyclePos = 0; }
    return fixedCycleOrder[fixedCyclePos++];
  }
  return generateProceduralQuestion();
}

function startQuiz(){
  mode = selectedMode;
  isInfinite = (mode === 'gen' || mode === 'mix');
  current = 0; questionNumber = 1; answered = 0; correctCount = 0; wrongCount = 0; streak = 0; wrongLog = [];

  if(!isInfinite){
    let pool = shuffle(QUESTIONS);
    if(mode !== 'all') pool = pool.slice(0, parseInt(mode,10));
    order = pool;
  } else {
    fixedCycleOrder = shuffle(QUESTIONS);
    fixedCyclePos = 0;
  }

  statsPanel.style.display = 'block';
  updateStats();
  currentQ = pickNextQuestion();
  renderQuestion();
}

function updateStats(){
  document.getElementById('statAnswered').textContent = isInfinite ? answered : (answered + " / " + order.length);
  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent = wrongCount;
  const acc = answered ? Math.round((correctCount/answered)*100) : 0;
  document.getElementById('statAccuracy').textContent = answered ? acc + "%" : "—";
  document.getElementById('statStreak').textContent = streak;
}

function renderQuestion(){
  const item = currentQ;
  const letters = ['A','B','C','D'];
  const optionsHtml = item.options.map((opt, idx)=>`
    <button class="option" data-idx="${idx}">
      <span class="box">${letters[idx]}</span>
      <span>${opt}</span>
    </button>
  `).join('');

  let progressHtml;
  if(!isInfinite){
    const pct = Math.round((current/order.length)*100);
    progressHtml = `
      <div class="progress-top-row">
        <span class="progress-label">Domanda ${current+1} di ${order.length}</span>
        <span class="progress-label">${pct}%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    `;
  } else {
    progressHtml = `
      <div class="progress-top-row">
        <span class="progress-label">Sessione infinita · domanda #${questionNumber}</span>
        <button class="stop-link" id="stopBtn">Termina e vedi il punteggio</button>
      </div>
      <div class="progress-track"><div class="progress-fill infinite"></div></div>
    `;
  }

  mainCard.innerHTML = `
    <div class="progress-wrap">${progressHtml}</div>
    <div class="question-area">
      <div class="q-eyebrow"><span class="topic">${item.topic}</span></div>
      <p class="q-text">${item.q}</p>
      <div class="options">${optionsHtml}</div>
      <div class="explain" id="explainBox"><strong>Spiegazione —</strong> <span id="explainText"></span></div>
      <div class="controls"><button class="next" id="nextBtn">Prossima domanda →</button></div>
    </div>
  `;

  document.querySelectorAll('.option').forEach(btn=>{
    btn.addEventListener('click', ()=> selectAnswer(parseInt(btn.dataset.idx,10)));
  });
  const stopBtn = document.getElementById('stopBtn');
  if(stopBtn) stopBtn.addEventListener('click', renderResult);
}

function selectAnswer(idx){
  const item = currentQ;
  const opts = document.querySelectorAll('.option');
  opts.forEach(o=>o.disabled = true);

  const isCorrect = idx === item.correct;
  opts[idx].classList.add(isCorrect ? 'correct' : 'wrong');
  if(!isCorrect){
    opts[item.correct].classList.add('correct');
    wrongLog.push({q:item.q, given:item.options[idx], correct:item.options[item.correct]});
  }

  answered++;
  if(isCorrect){ correctCount++; streak++; } else { wrongCount++; streak = 0; }
  updateStats();

  const explainBox = document.getElementById('explainBox');
  document.getElementById('explainText').textContent = item.explain;
  explainBox.classList.add('show');

  const nextBtn = document.getElementById('nextBtn');
  nextBtn.classList.add('show');
  const isLastFinite = (!isInfinite) && (current === order.length - 1);
  nextBtn.textContent = isLastFinite ? "Vedi risultato →" : "Prossima domanda →";
  nextBtn.addEventListener('click', ()=>{
    if(isLastFinite){ renderResult(); return; }
    current++;
    questionNumber++;
    currentQ = pickNextQuestion();
    renderQuestion();
  }, {once:true});
}

function renderResult(){
  const totalAsked = answered;
  const pct = totalAsked ? Math.round((correctCount/totalAsked)*100) : 0;
  let verdict = "Continua a esercitarti";
  if(pct >= 90) verdict = "Eccellente preparazione";
  else if(pct >= 75) verdict = "Buon livello, ripassa i punti deboli";
  else if(pct >= 60) verdict = "Sufficiente, serve più ripasso";

  const reviewHtml = wrongLog.length ? `
    <div class="review-list">
      <div class="q-eyebrow"><span class="topic">Da ripassare</span></div>
      ${wrongLog.map(w=>`
        <div class="review-item">
          <div class="rq">${w.q}</div>
          <div class="ra-wrong">La tua risposta: ${w.given}</div>
          <div class="ra-correct">Risposta corretta: ${w.correct}</div>
        </div>
      `).join('')}
    </div>
  ` : `<div class="review-list"><div class="rq" style="text-align:center;">Nessun errore. Ottimo lavoro! 🎓</div></div>`;

  mainCard.innerHTML = `
    <div class="result">
      <p class="big">${correctCount}<span>/${totalAsked}</span></p>
      <p class="verdict">${verdict} · ${pct}% di accuratezza</p>
      <div class="result-actions">
        <button class="btn-primary" id="retryBtn">Rifai (stessa modalità)</button>
        <button class="btn-secondary" id="homeBtn">Torna alla home</button>
      </div>
      ${reviewHtml}
    </div>
  `;
  document.getElementById('retryBtn').addEventListener('click', startQuiz);
  document.getElementById('homeBtn').addEventListener('click', renderStart);
}

renderStart();
</script>
</body>
</html>
