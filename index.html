  {topic:"FFR e circuiti (paniere)", q:"Il valore residuo di un FFR al termine di un periodo amministrativo scaturisce:", options:["Dalla differenza tra il costo di acquisizione del fattore e l'utilizzazione o il consumo subito dallo stesso","Dal solo valore di mercato corrente del bene, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Dalla somma tra costo storico e rivalutazione monetaria, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Dal valore nominale indicato in fattura di acquisto, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale"], correct:0, explain:"Il valore residuo di un Fattore a Fecondità Ripetuta (FFR) deriva dalla differenza tra costo di acquisizione e consumo/utilizzo subito.", difficulty:"media"},
  {topic:"Circuiti della gestione (paniere)", q:"L'avvio del circuito dei finanziamenti attinti a titolo di capitale di credito comporta:", options:["Una variazione finanziaria positiva (+ cassa) che si compensa con una variazione finanziaria negativa (+ debiti di finanziamento)","Una variazione economica positiva senza alcun effetto finanziario, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Una riduzione del capitale proprio dell'impresa, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Un decremento delle disponibilità liquide, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi"], correct:0, explain:"L'avvio del finanziamento a titolo di credito genera un incremento di cassa compensato da un incremento dei debiti di finanziamento.", difficulty:"media"},
  {topic:"Aspetti della gestione (paniere)", q:"L'aspetto finanziario è anche detto:", options:["Aspetto originario","Aspetto derivato","Aspetto secondario","Aspetto residuale"], correct:0, explain:"L'aspetto finanziario è anche definito 'aspetto originario' della gestione, da cui deriva l'aspetto economico.", difficulty:"media"},
  {topic:"Circuito degli investimenti (paniere)", q:"Il c.d. circuito degli investimenti è composto da:", options:["1) il circuito della produzione; 2) il circuito dei finanziamenti concessi","Solo dal circuito della produzione","Solo dal circuito dei finanziamenti attinti a titolo di capitale di proprietà","1) il circuito dei finanziamenti a titolo di credito; 2) il circuito della produzione"], correct:0, explain:"Il circuito degli investimenti comprende il circuito della produzione e quello dei finanziamenti concessi a terzi.", difficulty:"difficile"},
  {topic:"Variazioni finanziarie (paniere)", q:"Un decremento dei debiti di finanziamento rappresenta:", options:["Una variazione finanziaria positiva","Una variazione finanziaria negativa","Una variazione economica positiva","Un incremento delle disponibilità liquide"], correct:0, explain:"Un decremento dei debiti di finanziamento (una passività) rappresenta una variazione finanziaria positiva.", difficulty:"media"},
  {topic:"Variazioni finanziarie (paniere)", q:"Una variazione finanziaria positiva:", options:["Misura una variazione economica positiva","Misura sempre una variazione economica negativa","Non ha alcuna relazione con l'aspetto economico","Coincide sempre con un incremento di cassa"], correct:0, explain:"Una variazione finanziaria positiva (es. incasso) misura tipicamente una corrispondente variazione economica positiva (ricavo).", difficulty:"media"},
  {topic:"Circuiti della gestione (paniere)", q:"L'avvio del circuito della produzione con pagamento dilazionato comporta:", options:["Una variazione finanziaria negativa (+ debiti di funzionamento) che misura una variazione economica di reddito negativa (+ costi)","Una variazione finanziaria positiva senza alcun effetto economico, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Un incremento immediato di cassa, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Una riduzione dei debiti di funzionamento, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa"], correct:0, explain:"L'acquisto con pagamento dilazionato genera un debito di funzionamento (variazione finanziaria negativa) collegato a un costo (variazione economica negativa).", difficulty:"media"},
  {topic:"Circuiti della gestione (paniere)", q:"Il circuito dei finanziamenti attinti a titolo di capitale di credito si differenzia dal circuito dei finanziamenti attinti a titolo di capitale di proprietà in quanto:", options:["Il vincolo di restituzione è giuridicamente previsto; la scadenza è prefissata; i soggetti finanziatori sono esterni e talvolta proprietari","Non prevede alcun obbligo di restituzione, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Coincide esattamente con il circuito della produzione, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Riguarda esclusivamente i soci fondatori dell'impresa, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti"], correct:0, explain:"Il capitale di credito ha un vincolo di restituzione giuridicamente previsto e una scadenza prefissata, a differenza del capitale di proprietà.", difficulty:"media"},
  {topic:"Circuiti della gestione (paniere)", q:"Il circuito dei finanziamenti attinti a titolo di capitale di proprietà comporta:", options:["In fase di avvio, un incremento di mezzi monetari e, in fase di chiusura, un esborso di mezzi monetari","In fase di avvio, un esborso di mezzi monetari, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Nessun effetto sulle disponibilità liquide dell'impresa, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Un obbligo di restituzione a scadenza prefissata, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)"], correct:0, explain:"Il conferimento di capitale proprio genera un incremento di cassa in avvio e un esborso (restituzione) in chiusura del circuito.", difficulty:"media"},
  {topic:"Circuiti della gestione (paniere)", q:"Secondo il modello dei circuiti della gestione, è possibile individuare i seguenti circuiti di operazioni:", options:["1) il circuito della produzione; 2) il circuito dei finanziamenti attinti a titolo di capitale di proprietà; 3) il circuito dei finanziamenti attinti a titolo di capitale di credito; 4) il circuito dei finanziamenti concessi","Solo il circuito della produzione e quello del capitale di credito, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Solo due circuiti: produzione e finanziamenti concessi, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Un unico circuito che unifica produzione e finanziamento, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità, un dato che deriva dalla riclassificazione del conto economico a costo del venduto"], correct:0, explain:"Il modello dei circuiti individua quattro circuiti: produzione, finanziamenti a titolo di proprietà, finanziamenti a titolo di credito, finanziamenti concessi.", difficulty:"media"},
  {topic:"Circuiti della gestione (paniere)", q:"Il circuito della produzione comporta:", options:["In fase di avvio, un esborso di mezzi monetari e, in fase di chiusura, un recupero di mezzi monetari","In fase di avvio, un incasso e in chiusura un esborso, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Nessun effetto monetario in nessuna delle due fasi, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Un obbligo di restituzione a titolo di capitale di credito, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati"], correct:0, explain:"Il circuito della produzione inizia con un esborso (acquisto fattori) e si chiude con un recupero monetario (incasso vendite).", difficulty:"media"},
  {topic:"Reddito di periodo (paniere)", q:"Il motivo principale alla base della richiesta del reddito di periodo da parte del management è il seguente:", options:["Decidere quali azioni intraprendere per garantire la sopravvivenza e l'evoluzione del sistema aziendale","Calcolare esclusivamente l'imposta da versare allo Stato, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Determinare il valore nominale delle azioni, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Redigere il solo bilancio consolidato di gruppo, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale"], correct:0, explain:"Il reddito di periodo serve al management per decidere le azioni necessarie a garantire sopravvivenza ed evoluzione dell'azienda.", difficulty:"media"},
  {topic:"Metodologia patrimoniale (paniere)", q:"Secondo la metodologia patrimoniale, il reddito totale o d'impresa è dato:", options:["Dalla differenza tra il capitale restituito al tempo tz ed il capitale iniziale conferito al tempo t0, dal cui calcolo bisogna però escludere i valori degli ulteriori conferimenti effettuati dai soci in momenti successivi a quello di costituzione dell'azienda e quelli dei prelievi di capitale (e di reddito) disposti a favore degli stessi soci nel corso della sua intera vita","Dalla sola somma dei ricavi conseguiti nell'intera vita dell'impresa, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Dalla differenza tra entrate e uscite di cassa in un singolo esercizio, un dato che deriva dalla riclassificazione del conto economico a costo del venduto, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Dal valore nominale del capitale sociale sottoscritto, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa"], correct:0, explain:"La metodologia patrimoniale calcola il reddito totale come differenza tra capitale restituito e capitale iniziale, al netto di conferimenti e prelievi successivi.", difficulty:"difficile"},
  {topic:"Reddito totale (paniere)", q:"Il reddito totale o d'impresa può essere determinato attraverso le seguenti metodologie:", options:["Reddituale; finanziaria; patrimoniale","La metodologia reddituale, isolatamente considerata","La metodologia finanziaria, isolatamente considerata","Il metodo dei cicli conclusi, isolatamente considerato"], correct:0, explain:"Il reddito totale d'impresa può essere determinato tramite metodologia reddituale, finanziaria o patrimoniale.", difficulty:"media"},
  {topic:"Reddito totale (paniere)", q:"Il reddito totale o d'impresa si differenzia dal reddito di periodo in virtù:", options:["Dell'arco temporale di riferimento","Del solo criterio di valutazione delle rimanenze","Dell'assenza di competenza economica","Della sola forma giuridica dell'impresa"], correct:0, explain:"Il reddito totale si riferisce all'intera vita dell'impresa, mentre il reddito di periodo a un singolo esercizio: la differenza sta nell'arco temporale considerato.", difficulty:"media"},
  {topic:"Reddito totale (paniere)", q:"Quale delle seguenti condizioni non è essenziale ai fini del calcolo del reddito totale o d'impresa:", options:["L'assenza di denaro in cassa","La cessazione dell'attività aziendale","La liquidazione di tutte le attività e passività","La conoscenza dell'intera vita dell'impresa"], correct:0, explain:"L'assenza di denaro in cassa non è una condizione necessaria per il calcolo del reddito totale, a differenza della cessazione e liquidazione dell'impresa.", difficulty:"difficile"},
  {topic:"Definizione di reddito (paniere)", q:"In linea generale, il reddito può essere definito come:", options:["Il flusso di ricchezza che, in definiti archi temporali di vita dell'impresa, per effetto dello svolgimento della gestione si va ad aggiungere o a sottrarre al capitale conferito dalla proprietà","Il valore nominale del capitale sociale sottoscritto dai soci, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","La somma di tutte le disponibilità liquide dell'impresa, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Il totale dei debiti verso fornitori e banche, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)"], correct:0, explain:"Il reddito è il flusso di ricchezza che si aggiunge o sottrae al capitale conferito, per effetto della gestione in un arco temporale definito.", difficulty:"media"},
  {topic:"Metodologia finanziaria (paniere)", q:"Secondo la metodologia finanziaria, il reddito totale o d'impresa è dato:", options:["Dalla differenza tra tutte le entrate di denaro (con esclusione di quelle dovute ai conferimenti iniziali e/o successivi) e tutte le uscite di denaro (con esclusione di quelle relative ai rimborsi di capitale e/o ai prelievi di utili)","Dalla differenza tra capitale finale e capitale iniziale, senza alcuna esclusione, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Dalla somma dei soli ricavi di vendita conseguiti, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Dal valore delle sole immobilizzazioni materiali, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità, un dato che deriva dalla riclassificazione del conto economico a costo del venduto"], correct:0, explain:"La metodologia finanziaria calcola il reddito totale come differenza tra entrate e uscite di denaro, escludendo i movimenti di capitale proprio.", difficulty:"difficile"},
  {topic:"Ricavi e costi (paniere)", q:"Se i ricavi sono superiori ai costi:", options:["L'impresa crea ricchezza","L'impresa consuma ricchezza","Il capitale proprio si riduce necessariamente","L'impresa è sempre in perdita"], correct:0, explain:"Quando i ricavi superano i costi, l'impresa consegue un utile, cioè crea ricchezza.", difficulty:"facile"},
  {topic:"Competenza economica (paniere)", q:"La principale funzione del principio di competenza economica è quella di:", options:["Fornire le indicazioni per individuare i costi e i ricavi di pertinenza di circoscritti archi temporali","Determinare esclusivamente l'aliquota fiscale applicabile, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Calcolare il valore nominale delle azioni, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Redigere il solo rendiconto finanziario, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati"], correct:0, explain:"Il principio di competenza economica individua i costi e i ricavi di pertinenza di uno specifico arco temporale (esercizio).", difficulty:"media"},
  {topic:"Reddito positivo (paniere)", q:"Il reddito positivo di un'impresa è anche definito:", options:["Utile","Perdita","Valore aggiunto","Margine di contribuzione"], correct:0, explain:"Il reddito positivo di un'impresa è definito come utile.", difficulty:"facile"},
  {topic:"Schema del reddito (paniere)", q:"Rispetto allo schema del reddito del primo periodo di vita dell'impresa, in quello di un periodo intermedio:", options:["È necessario aggiungere un'ulteriore categoria di valori nelle sezioni dei componenti sia negativi sia positivi","Non vi è alcuna differenza rispetto al primo periodo, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Si eliminano tutte le rimanenze iniziali, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Si escludono i ratei e i risconti, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale"], correct:0, explain:"Nello schema di un periodo intermedio si aggiunge un'ulteriore categoria di valori (le rimanenze iniziali) sia tra i componenti positivi sia negativi.", difficulty:"difficile"},
  {topic:"Costi integrati (paniere)", q:"La categoria dei costi integrati comprende:", options:["I valori degli accantonamenti per rischi futuri e per spese future","I soli costi già pagati in via definitiva, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","I ricavi differiti al periodo successivo, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Le sole rimanenze finali di magazzino, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi"], correct:0, explain:"I costi integrati comprendono gli accantonamenti per rischi e spese future, stimati per competenza.", difficulty:"difficile"},
  {topic:"Modello dei cicli conclusi (paniere)", q:"Secondo il modello dei cicli conclusi, l'evento critico che legittima il riconoscimento dei ricavi è:", options:["Lo scambio","L'ordine del cliente","L'inizio della produzione","Il preventivo di vendita"], correct:0, explain:"Nel modello dei cicli conclusi, il ricavo si riconosce al momento dello scambio (vendita) con il cliente.", difficulty:"media"},
  {topic:"Schema del reddito (paniere)", q:"Quale tra le seguenti categorie non è compresa tra i componenti negativi dello schema del reddito del primo periodo di vita dell'impresa:", options:["Costi da rinviare al futuro","Costi di esercizio","Rimanenze finali attive","Fondi per rischi e oneri"], correct:0, explain:"I 'costi da rinviare al futuro' non rientrano tra i componenti negativi, essendo semmai rappresentati tra le attività (risconti attivi).", difficulty:"difficile"},
  {topic:"Rimanenze passive (paniere)", q:"Le rimanenze passive rappresentano:", options:["Ricavi già conseguiti per servizi che l'impresa rilascerà nei successivi periodi al cliente, dopo aver sostenuto i costi necessari per la produzione degli output","Costi sostenuti ma non ancora di competenza dell'esercizio, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Crediti verso clienti non ancora incassati, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Debiti verso fornitori di beni strumentali, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa"], correct:0, explain:"Le rimanenze passive rappresentano ricavi già incassati per prestazioni che l'impresa dovrà ancora erogare in futuro.", difficulty:"difficile"},
  {topic:"Schema del capitale (paniere)", q:"Rispetto allo schema del capitale del primo periodo di vita dell'impresa, in quello di un periodo intermedio:", options:["Non vi è la necessità di aggiungere alcunché, fatta eccezione per l'area del capitale di proprietà","È necessario eliminare tutte le immobilizzazioni, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Si escludono i FFR dall'attivo patrimoniale, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Cambia radicalmente la struttura dello schema, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti"], correct:0, explain:"Nello schema del capitale di un periodo intermedio non occorre aggiungere elementi, salvo per l'area relativa al capitale di proprietà (utili pregressi).", difficulty:"difficile"},
  {topic:"Schema del capitale (paniere)", q:"Nello schema del capitale del primo periodo di vita dell'impresa, i FFR sono compresi tra:", options:["I componenti economici delle Attività","I componenti finanziari delle Passività","I componenti economici delle Passività","I componenti finanziari delle Attività"], correct:0, explain:"I Fattori a Fecondità Ripetuta (FFR) sono classificati tra i componenti economici delle Attività nello schema del capitale.", difficulty:"difficile"},
  {topic:"Inerenza dei costi (paniere)", q:"Secondo il principio dell'inerenza dei costi, sono considerati di competenza economica del periodo:", options:["I costi inerenti ai cicli conclusi con la realizzazione dei ricavi","Tutti i costi sostenuti nell'esercizio, indipendentemente dai ricavi","Solo i costi relativi a beni strumentali","Solo i costi di natura finanziaria"], correct:0, explain:"Il principio di inerenza considera di competenza i costi correlati ai cicli conclusi con la realizzazione dei relativi ricavi.", difficulty:"media"},
  {topic:"Schema del capitale (paniere)", q:"Nello schema del capitale del primo periodo di vita dell'impresa, i Fondi per spese future sono compresi tra:", options:["I componenti finanziari delle Passività","I componenti economici delle Attività","I componenti finanziari delle Attività","I componenti economici delle Passività"], correct:0, explain:"I Fondi per spese future sono classificati tra i componenti finanziari delle Passività nello schema del capitale.", difficulty:"difficile"},
  {topic:"Ratei e risconti (paniere)", q:"I ratei attivi sorgono a fronte di:", options:["Ricavi da integrare","Costi già sostenuti per competenza futura","Ricavi già incassati per competenza futura","Costi da rinviare al futuro"], correct:0, explain:"I ratei attivi rappresentano ricavi di competenza dell'esercizio ma non ancora riscossi, quindi 'da integrare'.", difficulty:"media"},
  {topic:"Cicli in corso di svolgimento (paniere)", q:"Quale tra le seguenti non rappresenta una caratteristica che contraddistingue il modello dei cicli in corso di svolgimento:", options:["Asimmetria nel trattamento di utili o perdite in corso","Valutazione ai valori di mercato correnti","Riconoscimento anticipato dei ricavi rispetto allo scambio","Maggiore volatilità del reddito di periodo"], correct:0, explain:"Il modello dei cicli in corso di svolgimento tende a un trattamento simmetrico (non asimmetrico) di utili e perdite in corso, a differenza del modello dei cicli conclusi.", difficulty:"difficile"},
  {topic:"Valutazione delle attività (paniere)", q:"Secondo il modello dei cicli conclusi, ai fini della valutazione delle attività, se il valore di presumibile realizzo diretto o indiretto è inferiore al costo:", options:["Esiste un unico valore ragionevole","Esiste un'area di valori ragionevoli","Si deve utilizzare sempre il costo storico","Il bene va eliminato dall'attivo patrimoniale"], correct:0, explain:"Se il valore di presumibile realizzo è inferiore al costo, il principio della prudenza impone di usare quel valore, che risulta l'unico valore ragionevole.", difficulty:"difficile"},
  {topic:"Passività finanziarie (paniere)", q:"Minore è il valore assegnato alle passività finanziarie:", options:["Maggiore è il rischio che le future uscite possano rivelarsi più elevate rispetto ad esse","Minore è il rischio per l'impresa in ogni circostanza, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Maggiore è la solidità patrimoniale dell'impresa, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Minore è l'ammontare del capitale proprio, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)"], correct:0, explain:"Sottovalutare le passività finanziarie aumenta il rischio che le uscite future risultino superiori a quanto contabilizzato.", difficulty:"difficile"},
  {topic:"Valutazione delle passività (paniere)", q:"Secondo il modello dei cicli conclusi, ai fini della valutazione delle passività, se il valore di presumibile estinzione è inferiore al valore nominale:", options:["Esiste un'area di valori ragionevoli","Esiste un unico valore ragionevole","Si deve sempre utilizzare il valore nominale","La passività va eliminata dal passivo patrimoniale"], correct:0, explain:"Se il valore di presumibile estinzione è inferiore al nominale, si apre un'area di valori ragionevoli tra cui scegliere prudenzialmente.", difficulty:"difficile"},
  {topic:"ROE ROI (paniere)", q:"Il ROE si calcola come:", options:["Rapporto tra il reddito netto ed il capitale proprio","Rapporto tra il reddito operativo e il capitale investito","Differenza tra ricavi e costi operativi","Rapporto tra fatturato e capitale sociale"], correct:0, explain:"Il ROE (Return on Equity) è il rapporto tra reddito netto e capitale proprio, misura di redditività per gli azionisti.", difficulty:"media"},
  {topic:"Gestione aziendale (paniere)", q:"La gestione accessoria comprende:", options:["Le operazioni di natura complementare rispetto all'attività caratteristica","Solo le operazioni di natura finanziaria, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Solo le operazioni straordinarie dell'impresa, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","L'attività produttiva principale dell'impresa, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità"], correct:0, explain:"La gestione accessoria riguarda operazioni complementari, distinte dall'attività caratteristica (core) dell'impresa.", difficulty:"media"},
  {topic:"Equilibrio economico (paniere)", q:"Un'impresa garantisce una adeguata remunerazione del capitale di rischio quando:", options:["Il rendimento del capitale proprio è almeno pari al suo costo opportunità","Il fatturato supera i costi variabili totali, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Il capitale sociale è interamente versato, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","I debiti finanziari sono pari a zero, un dato che deriva dalla riclassificazione del conto economico a costo del venduto"], correct:0, explain:"L'adeguata remunerazione del capitale di rischio si ha quando il rendimento del capitale proprio eguaglia o supera il suo costo opportunità.", difficulty:"media"},
  {topic:"Leva finanziaria (paniere)", q:"Si parla di leva finanziaria negativa se:", options:["Il ROI è inferiore al tasso di indebitamento (i)","Il ROI è superiore al tasso di indebitamento (i)","Il capitale proprio supera il capitale di terzi","L'impresa non ha alcun debito finanziario"], correct:0, explain:"La leva finanziaria è negativa quando il ROI è inferiore al costo del debito (i), riducendo il ROE al crescere dell'indebitamento.", difficulty:"media"},
  {topic:"Equilibrio economico (paniere)", q:"Un'impresa opera in condizioni di equilibrio economico quando:", options:["Produce ricavi in grado sia di coprire i costi sia di garantire una remunerazione adeguata al capitale di rischio","Produce ricavi appena sufficienti a coprire i soli costi variabili, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Distribuisce sempre l'intero utile ai soci, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Non sostiene alcun costo fisso di struttura, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati"], correct:0, explain:"L'equilibrio economico richiede ricavi capaci di coprire i costi e remunerare adeguatamente il capitale di rischio.", difficulty:"media"},
  {topic:"ROE ROI (paniere)", q:"Il ROI si calcola come:", options:["Rapporto tra il reddito operativo ed il capitale investito al netto degli investimenti accessori","Rapporto tra reddito netto e capitale proprio, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Differenza tra ricavi totali e costi fissi, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Rapporto tra fatturato e numero di dipendenti, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale"], correct:0, explain:"Il ROI (Return on Investment) è il rapporto tra reddito operativo e capitale investito nella gestione caratteristica.", difficulty:"media"},
  {topic:"Costo opportunità (paniere)", q:"Il costo opportunità del capitale proprio (Ke):", options:["È pari alla somma tra il tasso di rendimento del capitale impiegato in investimenti esenti da rischio ed il premio per il rischio","Coincide sempre con il tasso di interesse sui debiti bancari, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","È pari al valore nominale delle azioni emesse, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Non ha alcuna relazione con il rischio d'impresa, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi"], correct:0, explain:"Il Ke si calcola sommando il tasso privo di rischio e un premio per il rischio assunto dagli azionisti.", difficulty:"media"},
  {topic:"Leva finanziaria (paniere)", q:"Ceteris paribus, in caso di leva finanziaria positiva:", options:["Se l'indebitamento finanziario (D) aumenta, il ROE aumenta","Se l'indebitamento finanziario (D) aumenta, il ROE diminuisce sempre","Il ROE resta indipendente dal livello di indebitamento","Il ROI diminuisce all'aumentare del debito"], correct:0, explain:"Con leva finanziaria positiva (ROI>costo del debito), l'aumento dell'indebitamento amplifica il ROE.", difficulty:"media"},
  {topic:"Valore aggiunto (paniere)", q:"Il valore aggiunto:", options:["Si ottiene dalla differenza tra il valore della produzione e i costi esterni","Coincide con il reddito operativo dell'esercizio, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Si ottiene sommando tutti i costi di produzione, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","È pari al capitale sociale sottoscritto dai soci, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa"], correct:0, explain:"Il valore aggiunto è la differenza tra il valore della produzione e i costi per beni e servizi acquistati da terzi (costi esterni).", difficulty:"media"},
  {topic:"Capitale di funzionamento (paniere)", q:"Se correttamente determinato, il capitale di funzionamento:", options:["Non potrà mai essere superiore al capitale economico","Coincide sempre esattamente con il capitale economico","Supera sempre il capitale di liquidazione","È sempre pari al capitale sociale nominale"], correct:0, explain:"Il capitale di funzionamento, se correttamente determinato, non supera il capitale economico, che ne rappresenta il limite superiore fisiologico.", difficulty:"difficile"},
  {topic:"Capitale economico (paniere)", q:"Nell'ambito di una transazione avente ad oggetto un'impresa, il valore assegnato al suo capitale economico rappresenta:", options:["Dal punto di vista del compratore, il massimo prezzo d'acquisto che è disposto a pagare","Il valore minimo che il venditore è disposto ad accettare in ogni caso, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Il valore nominale del capitale sociale risultante dallo statuto, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Il valore contabile delle sole immobilizzazioni materiali, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti"], correct:0, explain:"Il capitale economico rappresenta, dal punto di vista del compratore, il prezzo massimo che sarebbe disposto a pagare per l'azienda.", difficulty:"media"},
  {topic:"Capitale economico (paniere)", q:"Le principali finalità assegnabili al calcolo del capitale economico sono:", options:["1) l'esigenza di conoscere il valore assegnabile al complesso aziendale in occasione di transazioni che lo abbiano a oggetto; 2) la funzione di «collaudo» della correttezza del valore assegnato al capitale di funzionamento","La determinazione dell'imposta patrimoniale dovuta","La redazione del bilancio consolidato di gruppo","La quotazione in borsa dell'impresa"], correct:0, explain:"Il capitale economico serve sia per le transazioni sull'azienda sia come 'collaudo' della correttezza del capitale di funzionamento.", difficulty:"difficile"},
  {topic:"Nozione di capitale (paniere)", q:"Nelle scienze economico-aziendali, la nozione di capitale si presta ad un'indagine:", options:["Sia qualitativo-analitica sia quantitativo-sintetica","Di natura qualitativa, isolatamente considerata","Di natura quantitativa, isolatamente considerata","Di tipo giuridico-formale, isolatamente considerata"], correct:0, explain:"La nozione di capitale ammette sia un'indagine qualitativo-analitica sia una quantitativo-sintetica, a seconda della configurazione considerata.", difficulty:"difficile"},
  {topic:"Capitale economico (paniere)", q:"La configurazione del capitale economico o valore economico del capitale:", options:["Esalta in misura massima il profilo quantitativo-sintetico","Esalta il profilo qualitativo-analitico, isolatamente considerato","Coincide con il capitale di bilancio","Riguarda le immobilizzazioni materiali dell'impresa"], correct:0, explain:"Il capitale economico esalta al massimo grado il profilo quantitativo-sintetico, essendo una stima di sintesi del valore complessivo.", difficulty:"difficile"},
  {topic:"Nozione di capitale (paniere)", q:"Nelle scienze economico-aziendali, la nozione di capitale prevalente è quella che ne esalta:", options:["Il legame con le condizioni di equilibrio, in particolare economico","Il solo aspetto giuridico-formale della proprietà, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Il valore nominale delle azioni emesse, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","La sola composizione fisica dei beni aziendali, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati"], correct:0, explain:"La nozione di capitale prevalente in economia aziendale ne esalta il legame con le condizioni di equilibrio, soprattutto economico.", difficulty:"difficile"},
  {topic:"Capitale di liquidazione (paniere)", q:"La configurazione del capitale di liquidazione:", options:["Riflette una lettura del fenomeno aziendale massimamente disaggregata","Riflette una visione unitaria e sistemica dell'azienda in funzionamento","Coincide sempre con il capitale economico","Si applica solo alle aziende in piena attività"], correct:0, explain:"Il capitale di liquidazione riflette una lettura disaggregata, valutando i singoli beni separatamente in ottica di cessione.", difficulty:"difficile"},
  {topic:"Capitale di funzionamento (paniere)", q:"Nel calcolo del capitale di funzionamento:", options:["Le singole potenzialità sono oggetto di riconoscimento e valutazione distinti","Si valuta l'azienda come un unico blocco indivisibile, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Si esclude qualunque valutazione delle immobilizzazioni, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Si utilizza sempre il valore di mercato dell'intera azienda, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale"], correct:0, explain:"Nel capitale di funzionamento le singole poste (potenzialità) vengono riconosciute e valutate distintamente, a differenza del capitale economico.", difficulty:"difficile"},
  {topic:"Capitale di funzionamento (paniere)", q:"Il capitale di funzionamento è anche definito come:", options:["Un fondo di valori","Un flusso di ricchezza prodotta","Il valore nominale del capitale sociale","Il totale dei debiti a breve termine"], correct:0, explain:"Il capitale di funzionamento è definito come un fondo di valori, cioè una grandezza di stock riferita a un dato istante.", difficulty:"media"},
  {topic:"Capitale economico (paniere)", q:"I parametri da assumere per il calcolo del capitale economico sono:", options:["1) tempo; 2) reddito medio atteso; 3) tasso di attualizzazione","Il fatturato dell'ultimo esercizio, isolatamente considerato","Il capitale sociale sottoscritto, isolatamente considerato","Il numero di dipendenti dell'impresa, isolatamente considerato"], correct:0, explain:"Il calcolo del capitale economico richiede tempo, reddito medio atteso e tasso di attualizzazione (metodo reddituale).", difficulty:"media"},
  {topic:"Avviamento (paniere)", q:"È possibile misurare il livello di avviamento di una azienda attraverso:", options:["Il riferimento ai redditi che essa produrrà in prospettiva","Il solo valore contabile delle immobilizzazioni, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Il valore nominale del capitale sociale, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Il numero di anni di attività dell'impresa, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa"], correct:0, explain:"L'avviamento si misura tipicamente in relazione ai redditi prospettici che l'azienda sarà in grado di produrre.", difficulty:"media"},
  {topic:"Capitale di funzionamento (paniere)", q:"Quando il capitale di funzionamento supera il capitale netto di bilancio, è possibile che:", options:["Siano state sottovalutate le attività e/o sopravvalutate le passività","Siano state sopravvalutate le attività e sottovalutate le passività","Il bilancio sia stato redatto in perfetta conformità ai valori reali","Non vi sia alcuna differenza di valutazione tra le poste"], correct:0, explain:"Se il capitale di funzionamento supera il capitale di bilancio, è probabile che vi siano state sottovalutazioni di attività o sopravvalutazioni di passività (riserve occulte).", difficulty:"difficile"},
  {topic:"Configurazioni di capitale (paniere)", q:"Fisiologicamente, per un'azienda in normale funzionamento:", options:["Il capitale economico supera il capitale di funzionamento che, a sua volta, supera il capitale di liquidazione","Il capitale di liquidazione supera il capitale economico","Le tre configurazioni di capitale coincidono esattamente tra loro","Il capitale di funzionamento supera il capitale economico"], correct:0, explain:"In condizioni fisiologiche, la gerarchia tipica è: capitale economico > capitale di funzionamento > capitale di liquidazione.", difficulty:"media"},
  {topic:"Riserva potenziale (paniere)", q:"Quando il capitale economico supera il capitale di funzionamento, la distanza che separa le due configurazioni di capitale viene definita:", options:["Riserva potenziale","Riserva occulta","Annacquamento di capitale","Avviamento negativo"], correct:0, explain:"La distanza tra capitale economico (maggiore) e capitale di funzionamento è definita riserva potenziale.", difficulty:"media"},
  {topic:"Riserva potenziale (paniere)", q:"Quando il capitale netto di bilancio supera il capitale economico che, a sua volta, supera il capitale di funzionamento:", options:["La distanza che separa il capitale economico dal capitale di funzionamento viene definita disvelamento dell'intera riserva potenziale","Non si può parlare di alcuna riserva potenziale, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","La distanza viene definita riserva occulta totale, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Si tratta di un caso impossibile da verificarsi, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)"], correct:0, explain:"In questo scenario, la distanza tra capitale economico e capitale di funzionamento rappresenta il disvelamento dell'intera riserva potenziale.", difficulty:"difficile"},
  {topic:"Avviamento (paniere)", q:"Il valore dell'avviamento è convenzionalmente misurato come distanza quantitativa che separa:", options:["Il valore economico del capitale dalla somma algebrica dei valori degli elementi espliciti del suo capitale isolatamente considerati","Il capitale sociale nominale dal capitale di liquidazione, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Il fatturato annuo dal capitale investito netto, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Il valore contabile lordo da quello netto delle immobilizzazioni, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità"], correct:0, explain:"L'avviamento è la distanza tra il valore economico del capitale e la somma dei valori dei singoli elementi patrimoniali isolatamente considerati.", difficulty:"difficile"},
  {topic:"Capitale di bilancio (paniere)", q:"Per capitale di bilancio si intende:", options:["La rappresentazione del capitale che viene espressa in quel documento ufficiale che è il bilancio d'esercizio","Il valore di mercato corrente dell'intera azienda, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Il capitale sociale minimo previsto dalla legge, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Il capitale conferito dai soli soci fondatori, un dato che deriva dalla riclassificazione del conto economico a costo del venduto"], correct:0, explain:"Il capitale di bilancio è la rappresentazione del capitale espressa nel documento ufficiale del bilancio d'esercizio.", difficulty:"media"},
  {topic:"Capitale di funzionamento (paniere)", q:"Se in bilancio viene rappresentata una misura del capitale superiore a quella del capitale di funzionamento:", options:["Si danneggiano i soci futuri a vantaggio di quelli attuali","Si danneggiano i soci attuali a vantaggio di quelli futuri","Non vi è alcun effetto sui soci dell'impresa","Si genera automaticamente una riserva potenziale"], correct:0, explain:"Sopravvalutare il capitale in bilancio avvantaggia i soci attuali (distribuendo utili non reali) a scapito dei soci futuri.", difficulty:"difficile"},
  {topic:"Riserva occulta (paniere)", q:"Quando il capitale di funzionamento supera il capitale netto di bilancio, la distanza che separa le due configurazioni di capitale viene definita:", options:["Riserva occulta","Riserva potenziale","Annacquamento di capitale","Avviamento positivo"], correct:0, explain:"Quando il capitale di funzionamento (reale) supera quello di bilancio (dichiarato), la distanza è definita riserva occulta.", difficulty:"media"},
  {topic:"Autofinanziamento (paniere)", q:"L'effetto di permanenza della quota di autofinanziamento corrispondente ai consumi di FFR è da considerarsi:", options:["Temporaneo","Permanente e irreversibile","Nullo, poiché non genera alcun effetto finanziario","Rilevante solo ai fini fiscali"], correct:0, explain:"L'effetto di permanenza della quota di autofinanziamento da consumi di FFR è temporaneo, essendo destinato a essere reinvestito nel rinnovo dei fattori.", difficulty:"difficile"},
  {topic:"Fabbisogno finanziario (paniere)", q:"Le dimensioni che definiscono un fabbisogno finanziario sono:", options:["Quantitativa e temporale","La dimensione quantitativa, isolatamente considerata","La dimensione temporale, isolatamente considerata","La dimensione qualitativa, isolatamente considerata"], correct:0, explain:"Il fabbisogno finanziario si definisce attraverso una dimensione quantitativa (l'ammontare) e una temporale (la durata).", difficulty:"media"},
  {topic:"Equilibrio finanziario (paniere)", q:"Le operazioni che fanno capo ai seguenti circuiti sono orientate all'equilibrio finanziario:", options:["Circuito dei finanziamenti attinti a titolo di capitale di proprietà e Circuito dei finanziamenti attinti a titolo di capitale di credito","Solo il circuito della produzione, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Solo il circuito dei finanziamenti concessi, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Nessun circuito è orientato all'equilibrio finanziario, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale"], correct:0, explain:"I circuiti dei finanziamenti (capitale proprio e capitale di credito) sono orientati a garantire l'equilibrio finanziario dell'impresa.", difficulty:"difficile"},
  {topic:"Circuiti della gestione (paniere)", q:"Quale tra i seguenti circuiti è considerato la causa fisiologica di possibili disarmonie di flussi finanziari in ingresso e in uscita:", options:["Circuito della produzione","Circuito dei finanziamenti a titolo di capitale di proprietà","Circuito dei finanziamenti a titolo di capitale di credito","Circuito dei finanziamenti concessi"], correct:0, explain:"Il circuito della produzione, con i suoi sfasamenti temporali tra esborsi e incassi, è la causa fisiologica di disarmonie nei flussi finanziari.", difficulty:"difficile"},
  {topic:"CCN (paniere)", q:"Il Capitale Circolante Netto (CCN) è dato dalla differenza tra:", options:["Capitale Circolante (lordo) e Passività a breve termine","Attivo immobilizzato e Passività a lungo termine","Capitale proprio e Capitale di terzi","Ricavi totali e Costi variabili totali"], correct:0, explain:"Il CCN si calcola come differenza tra il capitale circolante lordo (attivo a breve) e le passività a breve termine.", difficulty:"media"},
  {topic:"Autofinanziamento (paniere)", q:"L'autofinanziamento può essere calcolato come differenza tra:", options:["I ricavi di competenza economica e i consumi di FFS e FFR per la produzione venduta","I ricavi totali e i costi variabili totali, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Le entrate e le uscite di cassa dell'esercizio, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Il capitale sociale e le riserve statutarie, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi"], correct:0, explain:"L'autofinanziamento si calcola come differenza tra ricavi di competenza e consumi di fattori produttivi per la produzione venduta.", difficulty:"difficile"},
  {topic:"Riclassificazione del capitale (paniere)", q:"Quando il capitale di un'impresa è riclassificato in funzione dei singoli elementi patrimoniali attivi e passivi individualmente osservati, il passivo patrimoniale è composto da:", options:["Passivo a breve, passivo a medio/lungo termine e capitale di proprietà","Immobilizzazioni e disponibilità liquide","Crediti e rimanenze di magazzino","Capitale sociale e riserve statutarie"], correct:0, explain:"Nella riclassificazione finanziaria, il passivo patrimoniale si compone di passivo a breve, a medio/lungo termine e capitale di proprietà.", difficulty:"media"},
  {topic:"Equilibrio finanziario (paniere)", q:"L'equilibrio finanziario può essere definito come:", options:["Una condizione dinamica di armonica composizione, nel tempo, tra afflussi e deflussi di risorse finanziarie","Una condizione statica di parità tra attivo e passivo patrimoniale, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","La sola assenza di debiti verso banche, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Il pareggio tra costi fissi e costi variabili, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti"], correct:0, explain:"L'equilibrio finanziario è una condizione dinamica di armonica composizione tra afflussi e deflussi finanziari nel tempo.", difficulty:"media"},
  {topic:"Autofinanziamento (paniere)", q:"L'autofinanziamento è definito come:", options:["Il flusso di CCN prodotto dalla gestione caratteristica corrente","Il capitale sociale versato dai soci in fase di costituzione","Il debito bancario a medio-lungo termine","Il valore delle immobilizzazioni finanziarie"], correct:0, explain:"L'autofinanziamento è il flusso di Capitale Circolante Netto generato dalla gestione caratteristica corrente dell'impresa.", difficulty:"media"},
  {topic:"Riclassificazione del capitale (paniere)", q:"Quando gli elementi del capitale di un'impresa sono riclassificati in funzione della loro prospettiva di permanenza come classi di valori, l'attivo patrimoniale è composto da:", options:["Immobilizzazioni e disponibilità","Crediti verso clienti, isolatamente considerati","Capitale proprio e riserve, isolatamente considerati","Passività a breve termine, isolatamente considerate"], correct:0, explain:"Nella riclassificazione per permanenza, l'attivo patrimoniale si compone di immobilizzazioni (lunga durata) e disponibilità (breve durata).", difficulty:"media"},
  {topic:"Outsourcing (paniere)", q:"Quando si ha l'Outsourcing:", options:["Con l'affidamento ad altre aziende di attività più o meno complesse, ma non strategiche","Quando l'impresa internalizza tutte le proprie funzioni operative, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Quando l'impresa acquisisce un concorrente diretto, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Quando l'impresa emette nuove azioni sul mercato, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)"], correct:0, explain:"L'outsourcing consiste nell'affidare a terzi attività non strategiche, mantenendo internamente il core business.", difficulty:"facile"},
  {topic:"Interdipendenze organizzative (paniere)", q:"Cosa sono le interdipendenze generiche:", options:["Quelle che si verificano per legami dipendenti esclusivamente dall'appartenenza alla medesima azienda","Quelle che derivano da un rapporto sequenziale tra le unità organizzative, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Quelle che derivano da un rapporto reciproco e continuo tra le unità, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Quelle che riguardano solo unità organizzative appartenenti ad aziende diverse, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità"], correct:0, explain:"Le interdipendenze generiche derivano semplicemente dall'appartenenza delle unità alla stessa organizzazione aziendale.", difficulty:"difficile"},
  {topic:"Divisione del lavoro (paniere)", q:"In azienda, la divisione ed il coordinamento del lavoro quali dimensioni può interessare:", options:["La dimensione orizzontale e la dimensione verticale","Solo la dimensione orizzontale, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Solo la dimensione verticale, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Nessuna dimensione specifica, un dato che deriva dalla riclassificazione del conto economico a costo del venduto"], correct:0, explain:"La divisione e il coordinamento del lavoro riguardano sia la dimensione orizzontale (specializzazione) sia quella verticale (gerarchia).", difficulty:"media"},
  {topic:"Business network (paniere)", q:"Quando si parla di Business network a cosa si fa riferimento:", options:["Alla costituzione di reti tra diverse aziende","Alla struttura gerarchica interna di una singola impresa","Al bilancio consolidato di un gruppo societario","Alla rete informatica interna di un'impresa"], correct:0, explain:"Il business network si riferisce alla costituzione di reti di collaborazione tra diverse aziende.", difficulty:"media"},
  {topic:"Configurazione a matrice (paniere)", q:"Quali sono i vantaggi collegati alla configurazione a matrice:", options:["Lo sviluppo di competenze","La riduzione dei costi di coordinamento","La massima semplicità gestionale","L'assenza di doppia linea di comando"], correct:0, explain:"Tra i vantaggi della configurazione a matrice vi è lo sviluppo di competenze trasversali, pur a fronte di maggiori costi di coordinamento.", difficulty:"media"},
  {topic:"Divisione del lavoro (paniere)", q:"Quali sono le economie in azienda collegate alla divisione del lavoro:", options:["Economie di specializzazione, economie di scala, economie di raggio d'azione","Le economie di scala, isolatamente considerate","Le economie di specializzazione, isolatamente considerate","Le diseconomie di scala"], correct:0, explain:"La divisione del lavoro genera economie di specializzazione, di scala e di raggio d'azione (scope).", difficulty:"media"},
  {topic:"Configurazione divisionale (paniere)", q:"Quali sono i vantaggi collegati alla configurazione divisionale:", options:["La presenza di flessibilità alle esigenze dei clienti e di coordinamento tra le divisioni","La massima riduzione dei costi di struttura generale, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","L'assenza totale di duplicazione di funzioni, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","La garanzia di un'unica linea di comando gerarchica, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale"], correct:0, explain:"La struttura divisionale offre flessibilità verso le esigenze dei clienti e favorisce il coordinamento interno a ciascuna divisione.", difficulty:"media"},
  {topic:"Burocrazie (paniere)", q:"Le grandi burocrazie quali problematiche possono determinare:", options:["La creazione di buropatologie","Un aumento della flessibilità operativa","Una riduzione dei tempi decisionali","Un incremento dell'autonomia dei singoli operatori"], correct:0, explain:"Le grandi burocrazie possono generare le cosiddette 'buropatologie', cioè disfunzioni tipiche delle strutture eccessivamente burocratizzate.", difficulty:"media"},
  {topic:"Configurazione per processi (paniere)", q:"Quali sono i vantaggi collegati alla configurazione per processi:", options:["Promuove il lavoro di gruppo e le collaborazioni","Riduce sempre il time-to-market dei prodotti a zero","Elimina completamente la necessità di specializzazione","Garantisce l'assenza di conflitti interni"], correct:0, explain:"La configurazione per processi promuove il lavoro di gruppo e la collaborazione tra funzioni diverse.", difficulty:"media"},
  {topic:"Configurazione funzionale (paniere)", q:"Quali sono i vantaggi collegati alla configurazione funzionale:", options:["La presenza di economie di scala","La massima flessibilità verso il cliente","L'assenza di specializzazione delle competenze","La rapidità decisionale in contesti dinamici"], correct:0, explain:"La configurazione funzionale favorisce economie di scala grazie alla specializzazione delle funzioni.", difficulty:"media"},

  {topic:"Orientamento al cliente (paniere)", q:"Quale dovrebbe essere il risultato ultimo dell'attività di produzione/erogazione dell'azienda:", options:["La soddisfazione del cliente","La massimizzazione dei costi di struttura","La riduzione della qualità per contenere i costi","L'eliminazione di ogni forma di controllo di gestione"], correct:0, explain:"Il risultato ultimo dell'attività aziendale dovrebbe essere la soddisfazione del cliente finale.", difficulty:"facile"},
  {topic:"Processi aziendali (paniere)", q:"Nel settore sanitario, la diagnosi a quale attività appartiene:", options:["Alle attività primarie","Alle attività di supporto","Alle attività amministrative","Alle attività di natura esclusivamente finanziaria"], correct:0, explain:"La diagnosi, essendo un'attività core nell'erogazione del servizio sanitario, appartiene alle attività primarie.", difficulty:"media"},
  {topic:"Processi aziendali (paniere)", q:"Nel settore sanitario, la farmacia a quale attività appartiene:", options:["Alle attività di supporto","Alle attività primarie","Alle attività di indirizzo strategico","Alle sole attività di marketing"], correct:0, explain:"La farmacia ospedaliera è generalmente considerata un'attività di supporto rispetto alle attività primarie di cura.", difficulty:"media"},
  {topic:"Gerarchia dei processi (paniere)", q:"Esiste una sola gerarchia di processi aziendali:", options:["No, i processi primari a loro volta possono articolarsi in sottoprocessi","Sì, esiste un'unica gerarchia rigida e immutabile, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","No, i processi sono sempre del tutto indipendenti tra loro, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Sì, ma solo nelle grandi imprese multinazionali, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi"], correct:0, explain:"I processi primari possono articolarsi ulteriormente in sottoprocessi, quindi non esiste un'unica gerarchia rigida.", difficulty:"media"},
  {topic:"Processi aziendali (paniere)", q:"Il marketing e la distribuzione fanno parte di quali processi aziendali:", options:["Processi primari","Processi di supporto","Processi di indirizzo strategico esclusivamente","Processi puramente amministrativi"], correct:0, explain:"Marketing e distribuzione rientrano tra i processi primari, direttamente collegati alla creazione di valore per il cliente.", difficulty:"media"},
  {topic:"Nuovi scenari economici (paniere)", q:"I nuovi scenari dell'economia quali esigenze pongono all'azienda:", options:["Di rispondere meglio e più in fretta ad una domanda meno forte, mutevole e più adulta","Di ridurre drasticamente la qualità del prodotto offerto, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Di ignorare le esigenze specifiche dei singoli clienti, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Di concentrarsi esclusivamente sulla produzione di massa standardizzata, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa"], correct:0, explain:"I nuovi scenari economici richiedono all'azienda di rispondere più rapidamente a una domanda meno intensa, mutevole e più matura.", difficulty:"media"},
  {topic:"Visione per processi (paniere)", q:"Perché la visione per processi è innovativa:", options:["Perché assicura una visione integrata delle attività realizzate dall'azienda, evidenziandone le interdipendenze indipendentemente dalla struttura organizzativa adottata","Perché elimina completamente la necessità di una struttura organizzativa, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Perché si applica esclusivamente alle piccole imprese familiari, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Perché riduce sempre e comunque i tempi di produzione a zero, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti"], correct:0, explain:"La visione per processi offre un'integrazione delle attività aziendali, evidenziando le interdipendenze a prescindere dalla struttura organizzativa formale.", difficulty:"media"},
  {topic:"Catena del valore (paniere)", q:"Cosa consente di visualizzare la Catena del valore:", options:["La catena del valore visualizza il valore totale prodotto dall'azienda","I costi fissi di struttura, isolatamente considerati","Il fatturato annuo dell'impresa, isolatamente considerato","La struttura giuridica dell'impresa, isolatamente considerata"], correct:0, explain:"La catena del valore di Porter visualizza il valore totale prodotto dall'azienda, scomposto in attività primarie e di supporto.", difficulty:"media"},
  {topic:"Ridefinizione dei processi (paniere)", q:"I processi individuati in un'azienda possono essere ridefiniti:", options:["Sì, attraverso il cambiamento radicale o il cambiamento incrementale","No, una volta definiti restano immutabili nel tempo, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Solo attraverso una fusione con un'altra impresa, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Solo su decisione di un'autorità di regolazione esterna, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità"], correct:0, explain:"I processi aziendali possono essere ridefiniti tramite cambiamento radicale (reingegnerizzazione) o incrementale (miglioramento continuo).", difficulty:"media"},
  {topic:"Clausola generale di bilancio (paniere)", q:"Quale tra i seguenti è uno dei tre attributi della c.d. clausola generale:", options:["Correttezza","Prudenza assoluta","Il solo criterio del costo storico","L'unicità del documento contabile"], correct:0, explain:"La correttezza è uno dei tre attributi della clausola generale di bilancio (insieme a chiarezza e rappresentazione veritiera).", difficulty:"media"},

  {topic:"Economia aziendale e politica (paniere)", q:"Lo studio dell'economia aziendale e quello dell'economia politica hanno in comune:", options:["La qualità dei problemi da impostare e portare a soluzione","L'identico oggetto di studio in ogni dettaglio","L'assenza di qualunque relazione tra le due discipline","Il medesimo metodo di analisi quantitativa"], correct:0, explain:"Economia aziendale e politica condividono la natura dei problemi economici da affrontare, pur con approcci e oggetti di studio diversi.", difficulty:"difficile"},
  {topic:"L'azienda (paniere)", q:"In una prima approssimazione, l'azienda può essere definita come:", options:["Quella particolare unità economica che, al di là dell'individuo, organizza e conduce il processo di produzione-scambio-consumo","Un ente esclusivamente giuridico privo di rilevanza economica, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Un semplice insieme di beni materiali non organizzati, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Un'entità la cui attività si esaurisce nel solo consumo, un dato che deriva dalla riclassificazione del conto economico a costo del venduto"], correct:0, explain:"L'azienda è definita come l'unità economica che organizza e conduce il processo di produzione-scambio-consumo.", difficulty:"media"},
  {topic:"Soggetto giuridico (paniere)", q:"Per soggetto giuridico si intende:", options:["Quella persona fisica o giuridica, per la quale l'azienda viene istituita e retta e che si assume i diritti e gli obblighi derivanti dalle operazioni aziendali","Il soggetto che determina esclusivamente gli indirizzi strategici di fondo, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Il singolo dipendente con qualifica dirigenziale, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","L'ente pubblico di vigilanza sul settore, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati"], correct:0, explain:"Il soggetto giuridico è la persona fisica o giuridica titolare dei diritti e obblighi derivanti dalle operazioni aziendali.", difficulty:"media"},
  {topic:"Azienda composta (paniere)", q:"Per azienda composta si intende:", options:["Una azienda che svolge un processo di produzione, facendovi seguire il processo del consumo","Un'azienda priva di qualunque processo produttivo, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Un gruppo societario con più soggetti giuridici, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Un'azienda che opera esclusivamente nel settore pubblico, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale"], correct:0, explain:"L'azienda composta svolge sia il processo di produzione sia quello di consumo (es. imprese familiari con consumo diretto dei soci).", difficulty:"difficile"},
  {topic:"Storia del pensiero aziendale (paniere)", q:"Quale tra i seguenti Maestri definì l'economia aziendale come «la scienza che studia le condizioni di esistenza e le manifestazioni di vita delle aziende, e cioè la scienza dell'amministrazione economica»:", options:["Gino Zappa","Fabio Besta","Luca Pacioli","Egidio Giannessi"], correct:0, explain:"Questa celebre definizione dell'economia aziendale è attribuita a Gino Zappa.", difficulty:"media"},
  {topic:"Economia aziendale e politica (paniere)", q:"L'economia aziendale e l'economia politica sono:", options:["Rami della scienza economica","Discipline completamente indipendenti e senza alcun legame","Sinonimi della stessa identica disciplina","Branche esclusive del diritto commerciale"], correct:0, explain:"Economia aziendale ed economia politica sono entrambe considerate rami della più ampia scienza economica.", difficulty:"media"},

  {topic:"Capitalista (paniere)", q:"Per capitalista si intende:", options:["Quel tipo di finanziatore che fornisce i mezzi all'azienda divenendone proprietario o comproprietario","Il finanziatore che presta denaro a titolo di debito con obbligo di restituzione, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Il dipendente con la qualifica più elevata in azienda, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","L'ente pubblico che regola il mercato dei capitali, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi"], correct:0, explain:"Il capitalista è il finanziatore che apporta capitale di proprietà, divenendo proprietario o comproprietario dell'azienda.", difficulty:"media"},
  {topic:"Nozione di impresa (paniere)", q:"In economia aziendale, la nozione di impresa fa riferimento:", options:["Alla azienda di produzione","Alle aziende di erogazione","Alle amministrazioni pubbliche","Alle aziende non profit"], correct:0, explain:"In economia aziendale, il termine 'impresa' fa riferimento specificamente all'azienda di produzione.", difficulty:"media"},
  {topic:"Ragioneria (paniere)", q:"La ragioneria ha il compito preminente di:", options:["Dettare la metodologia delle rilevazioni delle quantità economiche aziendali","Definire esclusivamente le politiche di marketing dell'impresa, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Determinare la struttura organizzativa ottimale, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Gestire le relazioni sindacali con i dipendenti, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa"], correct:0, explain:"La ragioneria ha il compito di dettare la metodologia delle rilevazioni quantitative economiche dell'azienda.", difficulty:"media"},
  {topic:"Teoria dei sistemi (paniere)", q:"Secondo i consolidati schemi di analisi, quale tra le seguenti caratteristiche di sistema non è annoverabile nel sistema-azienda:", options:["Semplice","Complesso","Aperto","Dinamico"], correct:0, explain:"Il sistema-azienda è considerato complesso, aperto e dinamico, non 'semplice'.", difficulty:"media"},
  {topic:"Teoria dei sistemi (paniere)", q:"In relazione alle variazioni delle loro condizioni interne, i sistemi si dividono in:", options:["Sistemi statici e sistemi dinamici","Sistemi aperti e sistemi chiusi","Sistemi semplici e sistemi complessi","Sistemi fisici e sistemi socioeconomici"], correct:0, explain:"In base alle variazioni delle condizioni interne, i sistemi si classificano in statici e dinamici.", difficulty:"media"},
  {topic:"Teoria dei sistemi (paniere)", q:"In relazione alla natura delle relazioni instaurabili tra i suoi diversi elementi, i sistemi si dividono in:", options:["Sistemi deterministici e sistemi stocastici","Sistemi aperti e sistemi chiusi, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Sistemi statici e sistemi dinamici, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Sistemi semplici e sistemi complessi, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti"], correct:0, explain:"In base alla natura delle relazioni tra gli elementi, i sistemi si dividono in deterministici e stocastici.", difficulty:"media"},
  {topic:"Teoria dei sistemi (paniere)", q:"Per sistema generale si intende:", options:["Un insieme di elementi legati da un reciproco vincolo relazionale, unitariamente coordinati e integrati per il perseguimento di un obiettivo comune","Un insieme di elementi privi di qualunque relazione tra loro, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Una struttura esclusivamente fisica priva di finalità, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Un insieme di norme giuridiche applicabili all'impresa, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)"], correct:0, explain:"Un sistema generale è un insieme di elementi coordinati e integrati per il perseguimento di un obiettivo comune.", difficulty:"media"},
  {topic:"Sistema-azienda (paniere)", q:"Secondo i nuovi schemi di analisi, il sistema-azienda viene riconosciuto come:", options:["Un sistema complesso e non totalmente dominabile","Un sistema semplice e interamente prevedibile","Un sistema chiuso e statico","Un sistema privo di relazioni con l'ambiente"], correct:0, explain:"Secondo gli schemi di analisi più recenti, il sistema-azienda è riconosciuto come complesso e non totalmente dominabile.", difficulty:"media"},
  {topic:"Sistema-azienda (paniere)", q:"Il sistema-azienda appartiene alla classe dei sistemi:", options:["Socioeconomici","Esclusivamente fisici","Esclusivamente meccanici","Puramente informatici"], correct:0, explain:"Il sistema-azienda appartiene alla classe dei sistemi socioeconomici, in quanto coinvolge persone e risorse economiche.", difficulty:"media"},
  {topic:"Sistemi dinamici (paniere)", q:"Un sistema dinamico è definito stabile quando:", options:["Tende a ripristinare lo stato iniziale di equilibrio, continuamente perturbato dall'azione di fattori esterni","Non subisce perturbazioni esterne di alcun tipo","Cambia costantemente il proprio stato senza ripristinarlo","Coincide con un sistema chiuso"], correct:0, explain:"Un sistema dinamico stabile tende a ripristinare l'equilibrio iniziale nonostante le perturbazioni esterne continue.", difficulty:"media"},

  {topic:"Sub-sistemi aziendali (paniere)", q:"Quale tra i diversi sub-sistemi aziendali risente maggiormente dei condizionamenti ambientali:", options:["Operativo","Informativo","Organizzativo di secondo livello","Di controllo interno"], correct:0, explain:"Il sub-sistema operativo, essendo a diretto contatto con l'ambiente esterno, risente maggiormente dei suoi condizionamenti.", difficulty:"difficile"},
  {topic:"Sub-sistemi aziendali (paniere)", q:"Il sub-sistema della rilevazione può essere anche definito come:", options:["Subsistema informativo","Subsistema operativo","Subsistema organizzativo","Subsistema della gestione"], correct:0, explain:"Il sub-sistema della rilevazione è anche definito subsistema informativo, occupandosi della raccolta e comunicazione dei dati.", difficulty:"media"},

  {topic:"Sub-sistemi aziendali (paniere)", q:"Quale tra i seguenti sub-sistemi non deriva dalla scomposizione del sistema ambientale:", options:["Subsistema della gestione","Subsistema dei mercati","Subsistema politico-istituzionale","Subsistema tecnologico"], correct:0, explain:"Il subsistema della gestione deriva dalla scomposizione del sistema aziendale, non da quello ambientale.", difficulty:"difficile"},
  {topic:"Sub-sistemi aziendali (paniere)", q:"Quale tra i seguenti sub-sistemi è rilevabile nell'ambito del sub-sistema dell'aspetto finanziario:", options:["Subsistema relativo all'andamento monetario","Subsistema dell'aspetto economico, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Subsistema organizzativo, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Subsistema ambientale specifico, un dato che deriva dalla riclassificazione del conto economico a costo del venduto"], correct:0, explain:"Il subsistema relativo all'andamento monetario è rilevabile nell'ambito del sub-sistema dell'aspetto finanziario.", difficulty:"difficile"},
  {topic:"Sub-sistemi aziendali (paniere)", q:"Il subsistema dei mercati attiene all'ambiente:", options:["Economico","Politico","Tecnologico","Sociale"], correct:0, explain:"Il subsistema dei mercati attiene all'ambiente economico, in cui l'impresa scambia beni e servizi.", difficulty:"media"},
  {topic:"Sub-sistemi aziendali (paniere)", q:"Il sub-sistema operativo o ramo operativo è il frutto dell'integrazione dei due seguenti sub-sistemi:", options:["Subsistema dell'organizzazione e subsistema della gestione","Subsistema informativo e subsistema di controllo, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Subsistema economico e subsistema patrimoniale, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Subsistema finanziario e subsistema monetario, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati"], correct:0, explain:"Il sub-sistema operativo nasce dall'integrazione tra il subsistema dell'organizzazione e quello della gestione.", difficulty:"difficile"},
