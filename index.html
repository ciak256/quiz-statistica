  {topic:"Macroeconomia", q:"Il tasso di disoccupazione è definito come:", options:["Il rapporto tra occupati e popolazione totale, una relazione che vale solo in ipotesi molto restrittive","Il rapporto tra persone in cerca di occupazione e forza lavoro totale","Il numero assoluto di disoccupati, un'impostazione che trascura il ruolo delle aspettative degli agenti","Il rapporto tra PIL e popolazione, una conclusione non coerente con i modelli macroeconomici standard"], correct:1, explain:"Il tasso di disoccupazione è calcolato dividendo il numero di persone in cerca di lavoro per la forza lavoro complessiva (occupati + disoccupati).", difficulty:"difficile"},
  {topic:"Politiche economiche", q:"La politica fiscale è condotta principalmente da:", options:["La Banca Centrale, un'ipotesi semplificatrice poco aderente alla realtà dei mercati","Il Governo, tramite spesa pubblica e tassazione","Le singole imprese private, una lettura che non considera l'equilibrio complessivo del sistema economico","I sindacati, un meccanismo che si verifica solo in condizioni teoriche estreme"], correct:1, explain:"La politica fiscale riguarda le decisioni di spesa pubblica e tassazione adottate dal Governo per influenzare l'economia.", difficulty:"facile"},
  {topic:"Politiche economiche", q:"La politica monetaria è condotta principalmente da:", options:["Il Parlamento","La Banca Centrale","I Ministeri delle finanze regionali","Le associazioni di categoria"], correct:1, explain:"La politica monetaria è di competenza della Banca Centrale, che agisce su tassi di interesse, offerta di moneta e altri strumenti.", difficulty:"facile"},
  {topic:"Politiche economiche", q:"Uno strumento tipico di politica monetaria è:", options:["La variazione dei tassi di interesse ufficiali","L'aumento delle imposte dirette","La costruzione di infrastrutture pubbliche","La riduzione della spesa sanitaria"], correct:0, explain:"Le banche centrali utilizzano principalmente la variazione dei tassi di interesse (e altri strumenti come le operazioni di mercato aperto) per condurre la politica monetaria.", difficulty:"facile"},
  {topic:"Politiche economiche", q:"L'obiettivo primario dichiarato della Banca Centrale Europea (BCE) è:", options:["Massimizzare l'occupazione a ogni costo, un'interpretazione che confonde variabili di natura diversa","Mantenere la stabilità dei prezzi nell'area euro","Finanziare direttamente i governi, un effetto che la teoria economica prevalente non conferma","Fissare i salari minimi europei, una relazione che vale solo in ipotesi molto restrittive"], correct:1, explain:"Il mandato principale della BCE, sancito dai Trattati, è il mantenimento della stabilità dei prezzi nell'Eurozona.", difficulty:"media"},
  {topic:"Concetti fondamentali", q:"Il costo opportunità di una scelta è:", options:["Il costo monetario diretto sostenuto, un'impostazione che trascura il ruolo delle aspettative degli agenti","Il valore della migliore alternativa a cui si rinuncia effettuando quella scelta","Sempre pari a zero, una conclusione non coerente con i modelli macroeconomici standard","Un costo che non deve mai essere considerato, un'ipotesi semplificatrice poco aderente alla realtà dei mercati"], correct:1, explain:"Il costo opportunità rappresenta ciò a cui si rinuncia scegliendo un'alternativa rispetto alla migliore opzione disponibile non scelta.", difficulty:"media"},
  {topic:"Concetti fondamentali", q:"I rendimenti di scala crescenti si verificano quando:", options:["Un aumento proporzionale di tutti gli input genera un aumento più che proporzionale dell'output","L'output rimane costante all'aumentare degli input, una lettura che non considera l'equilibrio complessivo del sistema economico","Un aumento degli input riduce sempre l'output, un meccanismo che si verifica solo in condizioni teoriche estreme","Non esiste alcuna relazione tra input e output, un'interpretazione che confonde variabili di natura diversa"], correct:0, explain:"Si parla di rendimenti di scala crescenti quando raddoppiando tutti gli input, l'output aumenta più che proporzionalmente.", difficulty:"difficile"},
  {topic:"Benessere e mercato", q:"Il surplus del consumatore è dato da:", options:["Il prezzo pagato per il bene, un effetto che la teoria economica prevalente non conferma","La differenza tra la disponibilità a pagare del consumatore e il prezzo effettivamente pagato","Il costo di produzione del bene, una relazione che vale solo in ipotesi molto restrittive","Il totale delle tasse pagate, un'impostazione che trascura il ruolo delle aspettative degli agenti"], correct:1, explain:"Il surplus del consumatore misura il beneficio netto ottenuto dal consumatore rispetto a quanto sarebbe stato disposto a pagare.", difficulty:"difficile"},
  {topic:"Benessere e mercato", q:"Il surplus del produttore è dato da:", options:["Il costo totale di produzione, una conclusione non coerente con i modelli macroeconomici standard","La differenza tra il prezzo di vendita ricevuto e il prezzo minimo a cui il produttore sarebbe stato disposto a vendere","Il fatturato lordo dell'impresa, un'ipotesi semplificatrice poco aderente alla realtà dei mercati","Le tasse pagate dal produttore, una lettura che non considera l'equilibrio complessivo del sistema economico"], correct:1, explain:"Il surplus del produttore rappresenta il guadagno netto del venditore rispetto al prezzo minimo accettabile per la vendita.", difficulty:"difficile"},
  {topic:"Fallimenti di mercato", q:"Un'esternalità negativa si verifica quando:", options:["Un'attività economica genera un beneficio per soggetti terzi non coinvolti, un meccanismo che si verifica solo in condizioni teoriche estreme","Un'attività economica impone un costo a soggetti terzi non coinvolti nella transazione (es. inquinamento)","Il mercato funziona in modo perfettamente efficiente, un'interpretazione che confonde variabili di natura diversa","Non esistono effetti esterni all'attività economica, un effetto che la teoria economica prevalente non conferma"], correct:1, explain:"Le esternalità negative sono costi che ricadono su terzi estranei alla transazione economica che le genera, come nel caso dell'inquinamento.", difficulty:"difficile"},
  {topic:"Fallimenti di mercato", q:"I beni pubblici sono caratterizzati da:", options:["Escludibilità e rivalità nel consumo, una relazione che vale solo in ipotesi molto restrittive","Non escludibilità e non rivalità nel consumo","Prezzo sempre elevato, un'impostazione che trascura il ruolo delle aspettative degli agenti","Produzione esclusivamente privata, una conclusione non coerente con i modelli macroeconomici standard"], correct:1, explain:"I beni pubblici (es. difesa nazionale, illuminazione stradale) non possono escludere alcuno dal consumo e il consumo di uno non riduce la disponibilità per gli altri.", difficulty:"facile"},
  {topic:"Economia internazionale", q:"La bilancia dei pagamenti registra:", options:["Solo le esportazioni di beni, un'ipotesi semplificatrice poco aderente alla realtà dei mercati","L'insieme delle transazioni economiche di un paese con il resto del mondo in un dato periodo","Il bilancio dello Stato, una lettura che non considera l'equilibrio complessivo del sistema economico","Il debito pubblico interno, un meccanismo che si verifica solo in condizioni teoriche estreme"], correct:1, explain:"La bilancia dei pagamenti riepiloga tutte le transazioni economiche (beni, servizi, capitali) tra residenti e non residenti.", difficulty:"facile"},
  {topic:"Economia internazionale", q:"Il tasso di cambio è definito come:", options:["Il tasso di interesse pagato sui titoli di Stato, un'interpretazione che confonde variabili di natura diversa","Il prezzo di una valuta espresso in termini di un'altra valuta","Il livello generale dei prezzi interni, un effetto che la teoria economica prevalente non conferma","Il tasso di crescita del PIL, una relazione che vale solo in ipotesi molto restrittive"], correct:1, explain:"Il tasso di cambio indica quante unità di una valuta sono necessarie per acquistarne un'unità di un'altra.", difficulty:"media"},
  {topic:"Finanza pubblica", q:"Il debito pubblico rappresenta:", options:["Il disavanzo di un singolo anno, un'impostazione che trascura il ruolo delle aspettative degli agenti","L'ammontare complessivo dei prestiti contratti nel tempo dallo Stato e non ancora rimborsati","Le tasse pagate in un anno, una conclusione non coerente con i modelli macroeconomici standard","Il patrimonio netto dello Stato, un'ipotesi semplificatrice poco aderente alla realtà dei mercati"], correct:1, explain:"Il debito pubblico è lo stock cumulato di tutti i disavanzi (deficit) pubblici accumulati nel tempo, al netto dei rimborsi.", difficulty:"media"},
  {topic:"Finanza pubblica", q:"Il disavanzo (deficit) pubblico di un anno è dato da:", options:["Il totale del debito pubblico accumulato, una lettura che non considera l'equilibrio complessivo del sistema economico","La differenza negativa tra entrate e uscite pubbliche in quell'anno","Il PIL nominale dell'anno, un meccanismo che si verifica solo in condizioni teoriche estreme","Le esportazioni nette, un'interpretazione che confonde variabili di natura diversa"], correct:1, explain:"Il deficit pubblico annuale è la differenza tra le uscite e le entrate dello Stato in un singolo esercizio finanziario, quando le uscite superano le entrate.", difficulty:"media"},
  {topic:"Macroeconomia", q:"La domanda aggregata di un'economia è tipicamente composta da:", options:["Solo dai consumi delle famiglie, un effetto che la teoria economica prevalente non conferma","Consumi, investimenti, spesa pubblica ed esportazioni nette","Solo dalle esportazioni, una relazione che vale solo in ipotesi molto restrittive","Solo dagli investimenti delle imprese, un'impostazione che trascura il ruolo delle aspettative degli agenti"], correct:1, explain:"La domanda aggregata (Y = C + I + G + NX) somma consumi, investimenti, spesa pubblica ed esportazioni nette.", difficulty:"media"},
  {topic:"Macroeconomia", q:"La moneta svolge principalmente le funzioni di:", options:["Solo mezzo di scambio, una conclusione non coerente con i modelli macroeconomici standard","Mezzo di scambio, unità di conto e riserva di valore","Solo strumento di investimento, un'ipotesi semplificatrice poco aderente alla realtà dei mercati","Solo strumento di tassazione, una lettura che non considera l'equilibrio complessivo del sistema economico"], correct:1, explain:"La moneta assolve a tre funzioni fondamentali: facilitare gli scambi, fungere da unità di misura dei valori, e conservare valore nel tempo.", difficulty:"facile"},
  {topic:"Macroeconomia", q:"Il tasso di interesse reale è calcolato come:", options:["Tasso nominale più tasso di inflazione","Tasso nominale meno tasso di inflazione","Tasso di inflazione diviso il PIL","Tasso nominale moltiplicato per l'inflazione"], correct:1, explain:"Il tasso di interesse reale approssima la differenza tra il tasso nominale e il tasso di inflazione, misurando il rendimento in termini di potere d'acquisto.", difficulty:"media"},
  {topic:"Macroeconomia", q:"La curva di Phillips descrive, nel breve periodo, la relazione tra:", options:["PIL e popolazione","Inflazione e disoccupazione","Tassi di cambio e esportazioni","Debito pubblico e tasso di interesse"], correct:1, explain:"La curva di Phillips ipotizza, nel breve periodo, una relazione inversa tra tasso di inflazione e tasso di disoccupazione.", difficulty:"facile"},
  {topic:"Macroeconomia", q:"Il moltiplicatore keynesiano descrive:", options:["L'effetto amplificato di una variazione della spesa autonoma sul reddito nazionale complessivo","La relazione tra tasso di cambio ed esportazioni, un meccanismo che si verifica solo in condizioni teoriche estreme","Il rapporto tra debito pubblico e PIL, un'interpretazione che confonde variabili di natura diversa","La quota di risparmio delle famiglie, un effetto che la teoria economica prevalente non conferma"], correct:0, explain:"Secondo la teoria keynesiana, una variazione della spesa autonoma (es. investimenti pubblici) genera un effetto moltiplicato sul reddito nazionale, superiore alla spesa iniziale.", difficulty:"difficile"},
  {topic:"Microeconomia", q:"Un bene si definisce normale quando, all'aumentare del reddito, la quantità domandata:", options:["Resta necessariamente costante","Aumenta","Diventa negativa","Diminuisce sempre"], correct:1, explain:"Per i beni normali la domanda cresce al crescere del reddito del consumatore, a differenza dei beni inferiori.", difficulty:"facile"},
  {topic:"Macroeconomia", q:"Una politica monetaria espansiva, tipicamente attuata riducendo i tassi di interesse, mira a:", options:["Eliminare strutturalmente la disoccupazione frizionale","Ridurre immediatamente e in modo diretto il debito pubblico","Stimolare consumi e investimenti sostenendo la domanda aggregata","Aumentare automaticamente le esportazioni nette a zero costo"], correct:2, explain:"Riducendo i tassi di interesse si abbassa il costo del credito, incentivando consumi e investimenti e sostenendo così la domanda aggregata.", difficulty:"media"},
  {topic:"Microeconomia", q:"In un mercato di concorrenza perfetta, ciascuna impresa è:", options:["Price maker, in grado di fissare liberamente il prezzo di vendita, una conclusione non coerente con i modelli macroeconomici standard","Price taker, cioè accetta il prezzo di mercato senza poterlo influenzare individualmente","Protetta da barriere all'entrata insormontabili, un'ipotesi semplificatrice poco aderente alla realtà dei mercati","L'unica offerente presente sul mercato di riferimento, una lettura che non considera l'equilibrio complessivo del sistema economico"], correct:1, explain:"In concorrenza perfetta, data la numerosità di imprese e l'omogeneità del prodotto, ciascuna impresa prende il prezzo come dato (price taker).", difficulty:"media"},
  {topic:"Macroeconomia", q:"L'inflazione da domanda si manifesta principalmente quando:", options:["I costi delle materie prime diminuiscono stabilmente nel tempo, un meccanismo che si verifica solo in condizioni teoriche estreme","La domanda aggregata cresce più rapidamente della capacità produttiva del sistema economico","Il tasso di cambio si apprezza in modo permanente, un'interpretazione che confonde variabili di natura diversa","La disoccupazione raggiunge il suo livello naturale, un effetto che la teoria economica prevalente non conferma"], correct:1, explain:"Quando la domanda aggregata supera la capacità dell'offerta di adeguarsi, si generano pressioni al rialzo sui prezzi (inflazione da domanda).", difficulty:"media"},
  {topic:"Commercio internazionale", q:"Secondo il principio del vantaggio comparato, un paese conviene specializzarsi nella produzione del bene per cui presenta:", options:["Il costo opportunità relativamente più basso rispetto agli altri beni","Il prezzo di vendita interno più elevato","Il costo assoluto più basso in termini monetari rispetto agli altri paesi","La maggiore disponibilità di manodopera in assoluto"], correct:0, explain:"Il vantaggio comparato riguarda il costo opportunità relativo: conviene specializzarsi dove tale costo è minore, anche senza un vantaggio assoluto.", difficulty:"difficile"},
  {topic:"Macroeconomia", q:"La curva di Phillips, nella sua formulazione originaria, ipotizza una relazione tra:", options:["Tasso di disoccupazione e tasso di inflazione (o crescita salariale)","Produttività del lavoro e ore di straordinario, una relazione che vale solo in ipotesi molto restrittive","Tasso di cambio e bilancia commerciale, un'impostazione che trascura il ruolo delle aspettative degli agenti","Tasso di interesse reale e debito pubblico, una conclusione non coerente con i modelli macroeconomici standard"], correct:0, explain:"La curva di Phillips originaria ipotizza una relazione inversa tra disoccupazione e inflazione (o dinamica salariale) nel breve periodo.", difficulty:"difficile"},
  {topic:"Microeconomia", q:"L'elasticità della domanda al prezzo è definita come:", options:["Il prodotto tra prezzo e quantità venduta, un'ipotesi semplificatrice poco aderente alla realtà dei mercati","La differenza assoluta tra prezzo e quantità domandata, una lettura che non considera l'equilibrio complessivo del sistema economico","Il rapporto tra variazione percentuale della quantità domandata e variazione percentuale del prezzo","Il rapporto tra reddito e prezzo di mercato, un meccanismo che si verifica solo in condizioni teoriche estreme"], correct:2, explain:"L'elasticità al prezzo misura la sensibilità della quantità domandata al variare percentuale del prezzo del bene.", difficulty:"difficile"},
  {topic:"Macroeconomia", q:"Un deficit di bilancia commerciale si verifica quando:", options:["Le esportazioni superano sempre le importazioni, un'interpretazione che confonde variabili di natura diversa","Il tasso di cambio è fisso rispetto alle altre valute, un effetto che la teoria economica prevalente non conferma","Il valore delle importazioni supera quello delle esportazioni in un dato periodo","Il PIL cresce più velocemente dell'inflazione, una relazione che vale solo in ipotesi molto restrittive"], correct:2, explain:"Il deficit commerciale si registra quando il valore dei beni e servizi importati eccede quello dei beni e servizi esportati.", difficulty:"difficile"},
  {topic:"Concetti generali", q:"L'economia politica studia principalmente:", options:["Esclusivamente le norme giuridiche che regolano il commercio internazionale, un'ipotesi semplificatrice poco aderente alla realtà dei mercati","Unicamente la contabilità interna delle singole imprese, una lettura che non considera l'equilibrio complessivo del sistema economico","Il modo in cui gli individui e la società allocano risorse scarse per soddisfare bisogni illimitati","Solo il funzionamento delle istituzioni politiche di uno Stato, un meccanismo che si verifica solo in condizioni teoriche estreme"], correct:2, explain:"L'economia politica studia come individui e società allocano risorse scarse tra usi alternativi per soddisfare bisogni potenzialmente illimitati.", difficulty:"facile"},
  {topic:"Microeconomia", q:"La curva di domanda ha tipicamente un andamento:", options:["Crescente rispetto al prezzo in ogni circostanza","Decrescente rispetto al prezzo, per la legge della domanda","Sempre verticale, indipendente dal prezzo","Perfettamente orizzontale indipendentemente dal bene"], correct:1, explain:"La curva di domanda è generalmente decrescente: al crescere del prezzo la quantità domandata tende a ridursi, coerentemente con la legge della domanda.", difficulty:"facile"},
  {topic:"Microeconomia", q:"Il costo opportunità di una scelta economica è:", options:["Il valore della migliore alternativa a cui si rinuncia effettuando quella scelta","Il costo monetario diretto sostenuto per l'acquisto di un bene, un'impostazione che trascura il ruolo delle aspettative degli agenti","La somma di tutti i costi fissi sostenuti dall'impresa, una conclusione non coerente con i modelli macroeconomici standard","Il prezzo di mercato corrente del bene scelto, un'ipotesi semplificatrice poco aderente alla realtà dei mercati"], correct:0, explain:"Il costo opportunità rappresenta ciò a cui si rinuncia scegliendo un'alternativa rispetto alla migliore tra quelle scartate.", difficulty:"facile"},
  {topic:"Macroeconomia", q:"Il tasso di disoccupazione è calcolato come:", options:["Differenza tra popolazione attiva e popolazione occupata in valore assoluto","Rapporto tra persone in cerca di occupazione e forze di lavoro totali","Rapporto tra occupati e popolazione totale del paese","Rapporto tra PIL e numero di occupati"], correct:1, explain:"Il tasso di disoccupazione è il rapporto percentuale tra il numero di persone in cerca di occupazione e il totale delle forze di lavoro (occupati più disoccupati).", difficulty:"facile"},
  {topic:"Microeconomia", q:"Un monopolio si configura quando in un mercato:", options:["Esistono solo due imprese che si dividono l'intero mercato, una lettura che non considera l'equilibrio complessivo del sistema economico","Un'unica impresa è l'unica offerente del bene, senza sostituti stretti disponibili","Sono presenti moltissime piccole imprese che vendono un prodotto omogeneo","Tutte le imprese vendono lo stesso bene a un prezzo fissato dallo Stato, un meccanismo che si verifica solo in condizioni teoriche estreme"], correct:1, explain:"Nel monopolio un'unica impresa detiene l'intera offerta del bene, in assenza di validi sostituti, potendo influenzare il prezzo di mercato.", difficulty:"facile"},
  {topic:"Macroeconomia", q:"La politica fiscale espansiva viene attuata tipicamente attraverso:", options:["Una riduzione della base monetaria in circolazione","Un aumento dei tassi di interesse fissati dalla banca centrale","Un aumento della spesa pubblica e/o una riduzione delle imposte","L'imposizione di dazi doganali sulle importazioni"], correct:2, explain:"La politica fiscale espansiva mira a stimolare la domanda aggregata aumentando la spesa pubblica e/o riducendo il carico fiscale su famiglie e imprese.", difficulty:"media"},
  {topic:"Microeconomia", q:"L'equilibrio di mercato in concorrenza si realizza nel punto in cui:", options:["L'offerta supera costantemente la domanda a ogni livello di prezzo","La domanda è sempre pari a zero, un'interpretazione che confonde variabili di natura diversa","La quantità domandata eguaglia la quantità offerta al prezzo di equilibrio","Il prezzo è fissato indipendentemente da domanda e offerta, un effetto che la teoria economica prevalente non conferma"], correct:2, explain:"L'equilibrio di mercato si determina nel punto di incontro tra curva di domanda e curva di offerta, dove quantità domandata e offerta coincidono.", difficulty:"media"},
  {topic:"Macroeconomia", q:"Un aumento della base monetaria da parte della banca centrale, a parità di altre condizioni, tende a produrre nel breve periodo:", options:["Una riduzione strutturale del debito pubblico, una relazione che vale solo in ipotesi molto restrittive","Un aumento immediato e automatico dei tassi di interesse, un'impostazione che trascura il ruolo delle aspettative degli agenti","Una contrazione della domanda aggregata, una conclusione non coerente con i modelli macroeconomici standard","Una riduzione dei tassi di interesse e uno stimolo a consumi e investimenti"], correct:3, explain:"Un'espansione della base monetaria tende, nel breve periodo, a ridurre i tassi di interesse, incentivando consumi e investimenti attraverso il canale del credito.", difficulty:"media"},
  {topic:"Commercio internazionale", q:"Il tasso di cambio tra due valute esprime:", options:["Esclusivamente il valore delle esportazioni nette di un paese","La quantità di moneta emessa da una banca centrale in un anno","Il livello generale dei prezzi di un'economia rispetto a un'altra in termini assoluti","Il rapporto al quale una valuta può essere scambiata con un'altra sul mercato dei cambi"], correct:3, explain:"Il tasso di cambio indica il rapporto di conversione tra due valute, determinato dal mercato dei cambi (o fissato da accordi istituzionali nei regimi a cambio fisso).", difficulty:"media"},
  {topic:"Microeconomia", q:"Un bene inferiore è tale perché, all'aumentare del reddito del consumatore, la relativa domanda:", options:["Resta necessariamente invariata","Diventa negativa in valore assoluto","Tende sempre ad aumentare in proporzione al reddito","Tende a diminuire"], correct:3, explain:"Per i beni inferiori la domanda si riduce all'aumentare del reddito, poiché i consumatori li sostituiscono con beni ritenuti qualitativamente superiori.", difficulty:"media"},
  {topic:"Macroeconomia", q:"Il debito pubblico di un paese rappresenta:", options:["La somma dei soli interessi pagati sui titoli di Stato in un anno, un'ipotesi semplificatrice poco aderente alla realtà dei mercati","Il valore complessivo delle esportazioni nette annue, una lettura che non considera l'equilibrio complessivo del sistema economico","Il disavanzo di bilancio registrato in un singolo anno, un meccanismo che si verifica solo in condizioni teoriche estreme","L'ammontare complessivo delle passività finanziarie accumulate dallo Stato nel tempo per finanziare i propri disavanzi"], correct:3, explain:"Il debito pubblico è lo stock complessivo di passività accumulate dallo Stato nel tempo, distinto dal disavanzo (deficit) che è il flusso annuale che lo alimenta.", difficulty:"media"},
  {topic:"Microeconomia", q:"In presenza di un'esternalità negativa di produzione, il costo sociale di un'attività risulta:", options:["Inferiore al costo privato sostenuto dall'impresa, un'interpretazione che confonde variabili di natura diversa","Sempre identico al costo privato dell'impresa, un effetto che la teoria economica prevalente non conferma","Indipendente da qualunque effetto sui soggetti terzi, una relazione che vale solo in ipotesi molto restrittive","Superiore al costo privato sostenuto dall'impresa che la produce"], correct:3, explain:"Con un'esternalità negativa (es. inquinamento), il costo sociale eccede il costo privato dell'impresa, perché include anche i danni imposti a soggetti terzi non compensati.", difficulty:"difficile"},
  {topic:"Macroeconomia", q:"La legge di Okun descrive empiricamente la relazione tra:", options:["Tasso di interesse nominale e tasso di interesse reale, un'impostazione che trascura il ruolo delle aspettative degli agenti","Tasso di cambio e bilancia commerciale di un paese, una conclusione non coerente con i modelli macroeconomici standard","Spesa pubblica e gettito fiscale complessivo, un'ipotesi semplificatrice poco aderente alla realtà dei mercati","Variazioni del tasso di disoccupazione e variazioni della crescita del PIL"], correct:3, explain:"La legge di Okun individua una relazione empirica inversa tra variazioni della disoccupazione e variazioni della crescita del prodotto interno lordo.", difficulty:"difficile"},
  {topic:"Commercio internazionale", q:"Un regime di cambi flessibili, rispetto a uno di cambi fissi, si caratterizza per il fatto che il valore della valuta:", options:["Coincide sempre con il valore di un'altra valuta di riferimento per accordo internazionale","Si determina liberamente in base alle forze di domanda e offerta sul mercato valutario","Dipende esclusivamente dal livello del debito pubblico","È sempre fissato per legge dalla banca centrale e non può variare"], correct:1, explain:"Nei cambi flessibili il valore della valuta fluttua liberamente in base a domanda e offerta sul mercato dei cambi, a differenza dei cambi fissi ancorati a un valore di riferimento.", difficulty:"difficile"},
  {topic:"Concetti generali", q:"I beni economici, a differenza dei beni liberi, si caratterizzano per il fatto di essere:", options:["Disponibili in quantità illimitata per chiunque ne abbia bisogno","Privi di qualunque utilità per il consumatore","Sempre di proprietà pubblica e non scambiabili","Scarsi rispetto ai bisogni e quindi soggetti a un prezzo di mercato"], correct:3, explain:"I beni economici sono scarsi rispetto ai bisogni da soddisfare e per questo hanno un valore di scambio, a differenza dei beni liberi (come l'aria) disponibili in quantità illimitata.", difficulty:"facile"},

  {topic:"Integrazione europea", q:"Il Trattato di Maastricht (1992) istituì:", options:["La CEE, una ricostruzione che gli storici economici non condividono più","L'Unione Europea, ponendo le basi per l'Unione Economica e Monetaria","La Società delle Nazioni, un'interpretazione superata dalla storiografia più recente","L'OPEC, una lettura che non tiene conto del contesto storico di riferimento"], correct:1, explain:"Il Trattato di Maastricht trasformò la CEE in Unione Europea e pose le basi per la successiva introduzione della moneta unica.", difficulty:"facile"},
  {topic:"Integrazione europea", q:"L'euro come moneta unica europea è stato introdotto:", options:["Solo in forma scritturale nel 1999 e in circolazione fisica nel 2002","Immediatamente in tutti i paesi UE nel 1957, una semplificazione che ignora le cause strutturali del fenomeno","Nel 2008, dopo la crisi finanziaria, una versione dei fatti priva di riscontri documentali solidi","Nel 1944, con Bretton Woods, un'impostazione che confonde fasi storiche ed economiche distinte"], correct:0, explain:"L'euro è stato introdotto come moneta scritturale (contabile) nel 1999 e come moneta fisica in circolazione dal 2002.", difficulty:"media"},
  {topic:"Crisi contemporanee", q:"La crisi petrolifera del 1973 fu causata principalmente da:", options:["Un terremoto in Medio Oriente, una tesi minoritaria non confermata dalle fonti disponibili","L'embargo petrolifero dei paesi OPEC in seguito alla guerra del Kippur","Una crisi bancaria europea, una generalizzazione che non riflette le differenze tra le diverse aree","La fine del gold standard, una ricostruzione che gli storici economici non condividono più"], correct:1, explain:"L'embargo petrolifero deciso dai paesi OPEC nel 1973, in risposta al sostegno occidentale a Israele nella guerra del Kippur, provocò un forte shock nei prezzi del petrolio.", difficulty:"media"},
  {topic:"Crisi contemporanee", q:"La stagflazione degli anni '70 è caratterizzata da:", options:["Bassa inflazione e alta crescita, un'interpretazione superata dalla storiografia più recente","Coesistenza di alta inflazione e stagnazione economica (bassa crescita/alta disoccupazione)","Deflazione e piena occupazione, una lettura che non tiene conto del contesto storico di riferimento","Crescita del PIL senza alcuna inflazione, una semplificazione che ignora le cause strutturali del fenomeno"], correct:1, explain:"La stagflazione descrive la situazione, insolita per la teoria economica tradizionale, in cui inflazione elevata e stagnazione economica si presentano contemporaneamente.", difficulty:"difficile"},
  {topic:"Crisi contemporanee", q:"La crisi del debito sovrano europeo (2010-2012) colpì in particolare:", options:["Solo la Germania, una versione dei fatti priva di riscontri documentali solidi","Paesi come Grecia, Portogallo, Irlanda, Spagna e Italia","Solo i paesi extra-UE, un'impostazione che confonde fasi storiche ed economiche distinte","Solo gli Stati Uniti, una tesi minoritaria non confermata dalle fonti disponibili"], correct:1, explain:"La crisi del debito sovrano colpì soprattutto alcuni paesi dell'area euro con elevato debito pubblico e/o squilibri di bilancio, tra cui Grecia, Portogallo, Irlanda, Spagna e Italia.", difficulty:"facile"},
  {topic:"Globalizzazione", q:"La globalizzazione economica ha comportato principalmente:", options:["L'isolamento dei mercati nazionali, una generalizzazione che non riflette le differenze tra le diverse aree","Una crescente integrazione dei mercati mondiali di beni, capitali e lavoro","La scomparsa del commercio internazionale, una ricostruzione che gli storici economici non condividono più","Il ritorno a economie di sussistenza, un'interpretazione superata dalla storiografia più recente"], correct:1, explain:"La globalizzazione ha progressivamente integrato mercati, catene produttive e flussi finanziari a livello mondiale.", difficulty:"media"},
  {topic:"Colonialismo", q:"Il colonialismo europeo del XIX secolo fu motivato anche da:", options:["La totale assenza di interessi economici, una lettura che non tiene conto del contesto storico di riferimento","La ricerca di materie prime e nuovi mercati per i prodotti industriali","La volontà di ridurre la produzione industriale europea, una semplificazione che ignora le cause strutturali del fenomeno","L'abolizione del commercio internazionale, una versione dei fatti priva di riscontri documentali solidi"], correct:1, explain:"L'espansione coloniale ottocentesca fu spinta anche da motivazioni economiche, quali l'approvvigionamento di materie prime e la ricerca di sbocchi commerciali.", difficulty:"difficile"},
  {topic:"Colonialismo", q:"Le Compagnie delle Indie (es. inglese, olandese) erano:", options:["Eserciti regolari statali, un'impostazione che confonde fasi storiche ed economiche distinte","Società commerciali con privilegi statali per il commercio con le colonie","Organizzazioni religiose, una tesi minoritaria non confermata dalle fonti disponibili","Sindacati dei lavoratori, una generalizzazione che non riflette le differenze tra le diverse aree"], correct:1, explain:"Le Compagnie delle Indie erano società commerciali private che godevano di privilegi (spesso monopolistici) concessi dallo Stato per il commercio coloniale.", difficulty:"facile"},
  {topic:"Demografia storica", q:"La rivoluzione demografica europea (XVIII-XIX secolo) fu caratterizzata da:", options:["Un forte calo della popolazione, una ricostruzione che gli storici economici non condividono più","Una forte crescita della popolazione dovuta soprattutto al calo della mortalità","L'assenza di variazioni demografiche, un'interpretazione superata dalla storiografia più recente","Una migrazione di massa verso le campagne, una lettura che non tiene conto del contesto storico di riferimento"], correct:1, explain:"Il miglioramento delle condizioni igienico-sanitarie e alimentari ridusse la mortalità, determinando una crescita sostenuta della popolazione europea.", difficulty:"difficile"},
  {topic:"Trasporti e infrastrutture", q:"La rivoluzione dei trasporti dell'Ottocento fu segnata soprattutto da:", options:["La diffusione dell'automobile","La diffusione della ferrovia","L'invenzione dell'aereo","La costruzione dei primi grattacieli"], correct:1, explain:"Nel XIX secolo la rete ferroviaria si sviluppò rapidamente, rivoluzionando i trasporti di merci e persone e favorendo l'integrazione dei mercati.", difficulty:"facile"},
  {topic:"Terza rivoluzione industriale", q:"La cosiddetta terza rivoluzione industriale (o rivoluzione informatica) è associata a:", options:["La diffusione della macchina a vapore, una semplificazione che ignora le cause strutturali del fenomeno","La diffusione di computer, elettronica e telecomunicazioni dalla seconda metà del Novecento","Il ritorno all'artigianato, una versione dei fatti priva di riscontri documentali solidi","La scomparsa dell'industria manifatturiera, un'impostazione che confonde fasi storiche ed economiche distinte"], correct:1, explain:"La terza rivoluzione industriale, a partire dalla seconda metà del XX secolo, è caratterizzata dalla diffusione di tecnologie informatiche ed elettroniche.", difficulty:"difficile"},
  {topic:"Industrializzazione italiana", q:"La rivoluzione industriale in Italia si sviluppò principalmente:", options:["Prima che in Inghilterra, una tesi minoritaria non confermata dalle fonti disponibili, un'interpretazione superata dalla storiografia più recente","Tra la fine dell'Ottocento e l'inizio del Novecento, soprattutto nel Nord-Ovest ('triangolo industriale')","Solo nel Sud Italia, una generalizzazione che non riflette le differenze tra le diverse aree, una lettura che non tiene conto del contesto storico di riferimento","Durante il Medioevo, una ricostruzione che gli storici economici non condividono più, una semplificazione che ignora le cause strutturali del fenomeno"], correct:1, explain:"L'industrializzazione italiana si concentrò soprattutto tra fine '800 e inizio '900 nel cosiddetto 'triangolo industriale' (Milano-Torino-Genova).", difficulty:"media"},
  {topic:"Industrializzazione extraeuropea", q:"L'industrializzazione giapponese (era Meiji) ebbe inizio:", options:["Nel XVI secolo","Nella seconda metà del XIX secolo","Dopo la Seconda guerra mondiale","Nel Medioevo"], correct:1, explain:"Con la Restaurazione Meiji (a partire dal 1868), il Giappone avviò un rapido processo di modernizzazione e industrializzazione.", difficulty:"facile"},
  {topic:"Rivoluzione industriale", q:"La prima rivoluzione industriale, sviluppatasi in Gran Bretagna a partire dal XVIII secolo, fu trainata soprattutto da:", options:["L'industria elettronica e digitale, una versione dei fatti priva di riscontri documentali solidi","Il settore tessile e l'introduzione della macchina a vapore","La produzione di massa dell'automobile, un'impostazione che confonde fasi storiche ed economiche distinte","Lo sviluppo delle telecomunicazioni satellitari, una tesi minoritaria non confermata dalle fonti disponibili"], correct:1, explain:"La prima rivoluzione industriale fu guidata dall'innovazione nel settore tessile e dalla diffusione della macchina a vapore di Watt come nuova fonte di energia.", difficulty:"facile"},
  {topic:"Sistemi economici", q:"Il feudalesimo medievale si fondava principalmente su:", options:["Un rapporto di concessione della terra in cambio di fedeltà e prestazioni militari","Il libero scambio di merci tra stati sovrani, una generalizzazione che non riflette le differenze tra le diverse aree","La produzione industriale su larga scala, una ricostruzione che gli storici economici non condividono più","L'uso diffuso della moneta cartacea come mezzo di pagamento, un'interpretazione superata dalla storiografia più recente"], correct:0, explain:"Il sistema feudale si basava sulla concessione di terre (feudi) da parte del signore in cambio di fedeltà e servizio militare da parte del vassallo.", difficulty:"facile"},
  {topic:"Rivoluzione industriale", q:"La seconda rivoluzione industriale, tra la fine dell'Ottocento e i primi del Novecento, fu caratterizzata soprattutto da:", options:["L'utilizzo di elettricità e petrolio come nuove fonti di energia e dallo sviluppo della siderurgia","La diffusione di internet e dei personal computer, una lettura che non tiene conto del contesto storico di riferimento","L'introduzione esclusiva della macchina a vapore nel settore tessile, una semplificazione che ignora le cause strutturali del fenomeno","Il ritorno a un'economia prevalentemente agricola e artigianale, una versione dei fatti priva di riscontri documentali solidi"], correct:0, explain:"La seconda rivoluzione industriale vide l'affermarsi di elettricità, petrolio, chimica e siderurgia come nuovi motori dello sviluppo economico.", difficulty:"media"},
  {topic:"Crisi economiche", q:"La Grande Depressione, avviata con il crollo di Wall Street nel 1929, si diffuse a livello internazionale principalmente attraverso:", options:["La contrazione del commercio internazionale e dei flussi finanziari tra paesi","La scoperta di nuove risorse energetiche a basso costo, un'impostazione che confonde fasi storiche ed economiche distinte","Un improvviso aumento generalizzato dei salari reali, una tesi minoritaria non confermata dalle fonti disponibili","L'introduzione immediata dell'euro come moneta unica, una generalizzazione che non riflette le differenze tra le diverse aree"], correct:0, explain:"La crisi del 1929 si propagò a livello globale attraverso il crollo del commercio internazionale, la contrazione del credito e la caduta degli investimenti esteri.", difficulty:"media"},
  {topic:"Sistema monetario", q:"Il sistema di Bretton Woods, istituito nel secondo dopoguerra, prevedeva:", options:["La libera fluttuazione di tutte le valute mondiali fin dall'inizio","L'abolizione totale del commercio internazionale","Un'unica moneta mondiale gestita da un solo stato","Cambi fissi tra le valute, ancorati al dollaro convertibile in oro"], correct:3, explain:"Bretton Woods (1944) istituì un sistema di cambi fissi ma aggiustabili, con il dollaro convertibile in oro come valuta di riferimento internazionale.", difficulty:"media"},
  {topic:"Storia del pensiero economico", q:"Adam Smith, nella 'Ricchezza delle nazioni', sostenne che la crescita economica fosse favorita soprattutto da:", options:["Un controllo statale rigido su tutti i prezzi e i salari, una ricostruzione che gli storici economici non condividono più","L'abolizione totale della proprietà privata, un'interpretazione superata dalla storiografia più recente","La chiusura protezionistica dei mercati nazionali, una lettura che non tiene conto del contesto storico di riferimento","La divisione del lavoro e il funzionamento del libero mercato guidato dalla 'mano invisibile'"], correct:3, explain:"Smith attribuì alla divisione del lavoro e alla libera concorrenza di mercato, regolata dalla 'mano invisibile', il motore della crescita della ricchezza delle nazioni.", difficulty:"difficile"},
  {topic:"Crisi economiche", q:"La stagflazione degli anni Settanta si caratterizzò per la compresenza inusuale di:", options:["Tassi di interesse negativi diffusi in tutte le economie avanzate","Crescita economica sostenuta e piena occupazione stabile","Deflazione generalizzata e surplus di bilancio pubblico","Alta inflazione e stagnazione economica con elevata disoccupazione"], correct:3, explain:"La stagflazione unì, in contrasto con la curva di Phillips tradizionale, alta inflazione, bassa crescita ed elevata disoccupazione, anche a causa degli shock petroliferi.", difficulty:"difficile"},
  {topic:"Sistema economico italiano", q:"Il 'miracolo economico' italiano degli anni '50-'60 fu favorito, tra l'altro, da:", options:["Il crollo strutturale della produzione industriale del Nord Italia, una semplificazione che ignora le cause strutturali del fenomeno","Un'economia chiusa e prevalentemente agricola priva di esportazioni, una versione dei fatti priva di riscontri documentali solidi","La totale assenza di investimenti esteri nel paese, un'impostazione che confonde fasi storiche ed economiche distinte","Bassi costi del lavoro, apertura ai mercati europei e forte crescita dell'industria manifatturiera"], correct:3, explain:"Il boom economico italiano fu sostenuto da bassi costi salariali, apertura commerciale verso l'Europa e dalla rapida espansione dell'industria manifatturiera.", difficulty:"difficile"},
  {topic:"Sistema monetario", q:"Il passaggio dal gold standard classico a sistemi di cambio più flessibili fu determinato soprattutto da:", options:["L'abolizione totale del commercio internazionale di beni, una tesi minoritaria non confermata dalle fonti disponibili","Un accordo per aumentare artificialmente il prezzo dell'oro in modo permanente, una generalizzazione che non riflette le differenze tra le diverse aree","La scoperta di enormi nuovi giacimenti auriferi che rese l'oro superfluo, una ricostruzione che gli storici economici non condividono più","La crescente difficoltà di mantenere la convertibilità in oro durante shock economici e guerre"], correct:3, explain:"Le tensioni economiche, i conflitti mondiali e la necessità di politiche monetarie più flessibili resero insostenibile la rigida convertibilità in oro nel lungo periodo.", difficulty:"difficile"},
  {topic:"Rivoluzione industriale", q:"La rivoluzione industriale contribuì storicamente a un profondo cambiamento sociale legato soprattutto a:", options:["La scomparsa totale del lavoro manifatturiero","Un'immediata riduzione delle disuguaglianze economiche tra le classi","Il ritorno diffuso della popolazione verso le campagne","L'urbanizzazione crescente e la formazione di una classe operaia salariata"], correct:3, explain:"L'industrializzazione favorì una massiccia migrazione dalle campagne alle città e la nascita di una nuova classe operaia impiegata nelle fabbriche.", difficulty:"difficile"},
  {topic:"Concetti generali", q:"La storia economica studia principalmente:", options:["Unicamente le biografie dei singoli imprenditori, una ricostruzione che gli storici economici non condividono più","L'evoluzione nel tempo dei sistemi produttivi, degli scambi e delle istituzioni economiche","Solo la storia delle istituzioni politiche contemporanee, un'interpretazione superata dalla storiografia più recente","Esclusivamente le battaglie e i conflitti militari del passato, una lettura che non tiene conto del contesto storico di riferimento"], correct:1, explain:"La storia economica analizza come nel tempo si siano trasformati sistemi produttivi, scambi commerciali, istituzioni e strutture sociali legate all'economia.", difficulty:"facile"},
  {topic:"Sistemi economici", q:"L'economia di sussistenza, tipica delle società preindustriali, era caratterizzata da:", options:["Una produzione destinata principalmente all'autoconsumo delle famiglie e delle comunità locali","La prevalenza del settore terziario sull'agricoltura, una semplificazione che ignora le cause strutturali del fenomeno","Un uso diffuso di tecnologie industriali avanzate, una versione dei fatti priva di riscontri documentali solidi","Un'elevata specializzazione produttiva orientata all'esportazione, un'impostazione che confonde fasi storiche ed economiche distinte"], correct:0, explain:"Nell'economia di sussistenza la produzione era destinata prevalentemente al consumo diretto della famiglia o della comunità, con scarsi scambi di mercato.", difficulty:"facile"},
  {topic:"Rivoluzione industriale", q:"La diffusione della ferrovia nell'Ottocento contribuì soprattutto a:", options:["Ridurre i costi e i tempi di trasporto di merci e persone su lunghe distanze","Frenare lo sviluppo dell'industria siderurgica, una tesi minoritaria non confermata dalle fonti disponibili","Ridurre drasticamente la popolazione urbana, una generalizzazione che non riflette le differenze tra le diverse aree","Sostituire completamente la navigazione marittima commerciale, una ricostruzione che gli storici economici non condividono più"], correct:0, explain:"La ferrovia abbatté costi e tempi di trasporto, favorendo l'integrazione dei mercati interni e stimolando la domanda di ferro, carbone e macchinari.", difficulty:"facile"},
  {topic:"Storia del pensiero economico", q:"La scuola economica mercantilista, diffusa tra XVI e XVIII secolo, riteneva che la ricchezza di una nazione dipendesse principalmente da:", options:["Lo sviluppo esclusivo del settore agricolo interno, un'interpretazione superata dalla storiografia più recente","L'abolizione di ogni forma di commercio con le colonie, una lettura che non tiene conto del contesto storico di riferimento","L'accumulo di metalli preziosi ottenuto attraverso un saldo commerciale positivo con l'estero","La totale apertura dei mercati senza alcuna regolamentazione statale, una semplificazione che ignora le cause strutturali del fenomeno"], correct:2, explain:"I mercantilisti identificavano la ricchezza nazionale soprattutto con l'accumulo di oro e argento, da ottenere favorendo le esportazioni e limitando le importazioni.", difficulty:"media"},
  {topic:"Sistema monetario", q:"L'introduzione dell'euro come moneta unica europea ebbe, tra i suoi effetti principali, quello di:", options:["Escludere automaticamente ogni forma di commercio con paesi extra-UE","Aumentare significativamente il numero di valute in circolazione in Europa","Eliminare i costi di conversione valutaria e i rischi di cambio tra i paesi aderenti","Permettere a ciascun paese membro di mantenere una propria politica monetaria autonoma"], correct:2, explain:"L'adozione dell'euro eliminò i costi di conversione e il rischio di cambio tra i paesi membri, ma comportò anche la cessione della politica monetaria nazionale alla BCE.", difficulty:"media"},
  {topic:"Crisi economiche", q:"Le politiche del New Deal, adottate negli Stati Uniti negli anni Trenta, miravano principalmente a:", options:["Chiudere completamente i mercati finanziari statunitensi, una versione dei fatti priva di riscontri documentali solidi","Rilanciare l'economia attraverso investimenti pubblici e riforme sociali dopo la Grande Depressione","Reintrodurre la piena convertibilità del dollaro in oro senza limiti, un'impostazione che confonde fasi storiche ed economiche distinte","Ridurre drasticamente la spesa pubblica per pareggiare il bilancio federale, una tesi minoritaria non confermata dalle fonti disponibili"], correct:1, explain:"Il New Deal di Roosevelt combinò investimenti pubblici, riforme del sistema finanziario e misure di sostegno sociale per contrastare gli effetti della Grande Depressione.", difficulty:"media"},
  {topic:"Rivoluzione industriale", q:"Il fenomeno del luddismo, agli inizi dell'Ottocento in Inghilterra, consistette in:", options:["Proteste e distruzioni di macchinari da parte di lavoratori che ne temevano gli effetti sull'occupazione","Un movimento a favore della piena automazione della produzione tessile, una generalizzazione che non riflette le differenze tra le diverse aree","Un accordo commerciale tra Inghilterra e Francia sul tessile, una ricostruzione che gli storici economici non condividono più","Una politica economica statale di sostegno all'industrializzazione, un'interpretazione superata dalla storiografia più recente"], correct:0, explain:"I luddisti distruggevano i nuovi macchinari industriali, temendo che la meccanizzazione riducesse posti di lavoro e salari degli operai tessili.", difficulty:"media"},
  {topic:"Storia del pensiero economico", q:"John Maynard Keynes, nella sua opera principale del 1936, sostenne in particolare che:", options:["In condizioni di recessione lo Stato deve intervenire attivamente per sostenere la domanda aggregata","La moneta è del tutto neutrale rispetto alle variabili reali dell'economia nel breve periodo","I mercati si autoregolano sempre efficacemente senza alcun bisogno di intervento pubblico","La disoccupazione non può mai derivare da un'insufficienza della domanda aggregata"], correct:0, explain:"Keynes, nella 'Teoria generale', sostenne che nelle fasi di recessione lo Stato dovesse intervenire con politiche espansive per sostenere occupazione e domanda aggregata.", difficulty:"media"},
  {topic:"Sistema economico italiano", q:"La 'ricostruzione' economica italiana del secondo dopoguerra fu favorita, tra l'altro, da:", options:["Gli aiuti economici del Piano Marshall e la ripresa degli scambi commerciali internazionali","La chiusura definitiva di tutti gli impianti industriali danneggiati dalla guerra","L'isolamento economico totale dell'Italia dai mercati europei, una lettura che non tiene conto del contesto storico di riferimento","Un forte incremento della produzione agricola a scapito dell'industria, una semplificazione che ignora le cause strutturali del fenomeno"], correct:0, explain:"Gli aiuti statunitensi del Piano Marshall e la progressiva riapertura del commercio internazionale sostennero la ricostruzione economica italiana ed europea nel dopoguerra.", difficulty:"difficile"},
  {topic:"Crisi economiche", q:"Gli shock petroliferi degli anni Settanta ebbero, tra le principali conseguenze, quella di:", options:["Ridurre stabilmente il prezzo internazionale del petrolio, una versione dei fatti priva di riscontri documentali solidi","Eliminare la dipendenza energetica dei paesi industrializzati dal petrolio, un'impostazione che confonde fasi storiche ed economiche distinte","Aumentare fortemente i costi di produzione e alimentare la stagflazione nelle economie industrializzate","Favorire una crescita economica priva di tensioni inflazionistiche, una tesi minoritaria non confermata dalle fonti disponibili"], correct:2, explain:"Gli shock petroliferi del 1973 e del 1979 fecero impennare i costi energetici e produttivi, contribuendo alla stagflazione (alta inflazione e bassa crescita) di quegli anni.", difficulty:"difficile"},
  {topic:"Sistema monetario", q:"Il 'Nixon shock' del 1971 comportò in particolare:", options:["L'introduzione immediata dell'euro come nuova moneta internazionale, una generalizzazione che non riflette le differenze tra le diverse aree","Un accordo per fissare in modo permanente tutti i tassi di cambio mondiali, una ricostruzione che gli storici economici non condividono più","La sospensione della convertibilità del dollaro in oro, avviando la fine del sistema di Bretton Woods","Il ritorno generalizzato al gold standard classico ottocentesco, un'interpretazione superata dalla storiografia più recente"], correct:2, explain:"Nel 1971 il presidente Nixon sospese la convertibilità del dollaro in oro, ponendo di fatto fine al sistema dei cambi fissi di Bretton Woods.", difficulty:"difficile"},
