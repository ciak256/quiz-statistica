<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Pegaso — Preparazione Esami</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B2A4A; --navy-light:#2C3E63;
    --paper:#F7F3EA; --paper-dim:#EFE9DA;
    --amber:#E8A33D; --amber-dark:#C7822A;
    --ink:#232323; --ink-soft:#5A5A52;
    --correct:#5E8C6A; --correct-bg:#E4EEE2;
    --wrong:#B85450; --wrong-bg:#F5E3E0;
    --rule: rgba(27,42,74,0.15);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--navy);
    background-image:
      radial-gradient(circle at 10% 0%, rgba(232,163,61,0.08), transparent 40%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 32px);
    color:var(--ink); font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh; display:flex; justify-content:center; padding:32px 16px 60px;
  }
  .app{ width:100%; max-width:940px; }
  header.top{ display:flex; align-items:baseline; justify-content:space-between; color:var(--paper); margin-bottom:22px; flex-wrap:wrap; gap:8px; }
  header.top .brand{ font-family:'Fraunces', serif; font-weight:600; font-size:1.7rem; letter-spacing:-0.01em; }
  header.top .brand em{ color:var(--amber); font-style:normal; }
  header.top .subtitle{ font-family:'IBM Plex Mono', monospace; font-size:0.75rem; color:rgba(247,243,234,0.65); letter-spacing:0.02em; }

  .layout{ display:grid; grid-template-columns: 1fr 220px; gap:20px; align-items:start; }
  @media (max-width: 720px){ .layout{ grid-template-columns: 1fr; } .stats-panel{ order:2; } }

  .card{ background:var(--paper); border-radius:4px; box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 12px 28px rgba(0,0,0,0.28); position:relative; overflow:hidden; }
  .card::before{ content:""; position:absolute; top:0; left:0; right:0; height:5px; background:linear-gradient(90deg, var(--amber), var(--amber-dark)); }

  .progress-wrap{ padding:20px 28px 0; }
  .progress-top-row{ display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
  .progress-track{ position:relative; height:8px; background:var(--paper-dim); border-radius:99px; margin-top:6px; overflow:hidden; }
  .progress-fill{ position:absolute; top:0; left:0; bottom:0; background:var(--navy); border-radius:99px; transition:width 0.35s ease; }
  .progress-fill.infinite{ width:35% !important; background:linear-gradient(90deg, transparent, var(--amber), transparent); animation: slide 1.4s linear infinite; }
  @keyframes slide{ 0%{ transform:translateX(-120%);} 100%{ transform:translateX(340%);} }
  .progress-label{ font-family:'IBM Plex Mono', monospace; font-size:0.72rem; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.06em; }
  .stop-link{ font-family:'IBM Plex Mono', monospace; font-size:0.7rem; color:var(--amber-dark); background:none; border:none; cursor:pointer; text-decoration:underline; letter-spacing:0.03em; padding:0; }

  .question-area{ padding:26px 28px 28px; }
  .q-eyebrow{ font-family:'IBM Plex Mono', monospace; font-size:0.72rem; color:var(--amber-dark); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .q-eyebrow .topic{ background:var(--navy); color:var(--paper); padding:2px 8px; border-radius:99px; font-size:0.68rem; }
  .q-eyebrow .subj{ color:var(--ink-soft); }
  .q-text{ font-family:'Fraunces', serif; font-weight:600; font-size:1.26rem; line-height:1.45; color:var(--navy); margin:0 0 22px; }

  .options{ display:flex; flex-direction:column; gap:10px; }
  .option{ display:flex; align-items:flex-start; gap:12px; text-align:left; padding:13px 16px; border-radius:6px; border:1.5px solid var(--rule); background:#fff; cursor:pointer; font-family:'IBM Plex Sans', sans-serif; font-size:0.98rem; color:var(--ink); transition: border-color .15s ease, background .15s ease; }
  .option:hover:not(:disabled){ border-color:var(--amber); background:#FFFCF5; }
  .option:disabled{ cursor:default; }
  .option .box{ flex:0 0 22px; width:22px; height:22px; border:1.5px solid var(--navy); border-radius:4px; display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono', monospace; font-size:0.72rem; font-weight:600; color:var(--navy); margin-top:1px; flex-shrink:0; }
  .option.correct{ background:var(--correct-bg); border-color:var(--correct); }
  .option.correct .box{ background:var(--correct); border-color:var(--correct); color:#fff; }
  .option.wrong{ background:var(--wrong-bg); border-color:var(--wrong); }
  .option.wrong .box{ background:var(--wrong); border-color:var(--wrong); color:#fff; }

  .explain{ margin-top:18px; padding:14px 16px; background:var(--paper-dim); border-left:3px solid var(--amber-dark); border-radius:0 4px 4px 0; font-size:0.9rem; color:var(--ink-soft); display:none; }
  .explain.show{ display:block; }
  .explain strong{ color:var(--navy); }

  .controls{ display:flex; justify-content:flex-end; margin-top:22px; }
  button.next{ font-family:'IBM Plex Mono', monospace; font-size:0.85rem; font-weight:600; letter-spacing:0.02em; background:var(--navy); color:var(--paper); border:none; padding:11px 22px; border-radius:4px; cursor:pointer; opacity:0; pointer-events:none; transition:opacity .2s ease, background .15s ease; }
  button.next.show{ opacity:1; pointer-events:auto; }
  button.next:hover{ background:var(--navy-light); }

  .stats-panel{ background:var(--navy-light); border-radius:4px; padding:20px; color:var(--paper); font-family:'IBM Plex Mono', monospace; }
  .stats-panel h3{ margin:0 0 14px; font-family:'Fraunces', serif; font-weight:600; font-size:1rem; color:var(--amber); }
  .stat-row{ display:flex; justify-content:space-between; font-size:0.8rem; padding:7px 0; border-bottom:1px dashed rgba(247,243,234,0.15); }
  .stat-row:last-child{ border-bottom:none; }
  .stat-row .val{ color:#fff; font-weight:600; }
  .stat-row .val.good{ color:#8FCB9B; }
  .stat-row .val.bad{ color:#E39A96; }

  .result{ padding:40px 32px; text-align:center; }
  .result .big{ font-family:'Fraunces', serif; font-size:3.2rem; font-weight:700; color:var(--navy); margin:0; line-height:1; }
  .result .big span{ color:var(--amber-dark); }
  .result .verdict{ font-family:'IBM Plex Mono', monospace; font-size:0.85rem; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.06em; margin:10px 0 28px; }
  .result-actions{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .result-actions button{ font-family:'IBM Plex Mono', monospace; font-size:0.82rem; font-weight:600; padding:11px 18px; border-radius:4px; cursor:pointer; border:1.5px solid var(--navy); }
  .btn-primary{ background:var(--navy); color:var(--paper); }
  .btn-primary:hover{ background:var(--navy-light); }
  .btn-secondary{ background:transparent; color:var(--navy); }
  .btn-secondary:hover{ background:var(--paper-dim); }

  .review-list{ text-align:left; margin-top:30px; border-top:1px solid var(--rule); padding-top:20px; max-height:420px; overflow-y:auto; }
  .review-item{ padding:14px 0; border-bottom:1px solid var(--rule); font-size:0.88rem; }
  .review-item:last-child{ border-bottom:none; }
  .review-item .rq{ font-weight:600; color:var(--navy); margin-bottom:6px; }
  .review-item .ra-wrong{ color:var(--wrong); }
  .review-item .ra-correct{ color:var(--correct); }

  footer.credits{ text-align:center; color:rgba(247,243,234,0.4); font-family:'IBM Plex Mono', monospace; font-size:0.7rem; margin-top:26px; }

  .start-screen{ padding:40px 32px; text-align:center; }
  .start-screen h2{ font-family:'Fraunces', serif; font-size:1.6rem; color:var(--navy); margin:0 0 10px; }
  .start-screen p{ color:var(--ink-soft); font-size:0.95rem; max-width:560px; margin:0 auto 26px; line-height:1.55; }

  .back-row{ text-align:left; margin-bottom:16px; }
  .back-link{ font-family:'IBM Plex Mono', monospace; font-size:0.75rem; color:var(--amber-dark); background:none; border:none; cursor:pointer; text-decoration:underline; padding:0; }

  .subject-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; max-width:600px; margin:0 auto 10px; }
  @media (max-width:560px){ .subject-grid{ grid-template-columns:1fr; } }
  .subject-card{ font-family:'IBM Plex Sans', sans-serif; border:1.5px solid var(--rule); background:#fff; border-radius:10px; padding:18px 14px; cursor:pointer; text-align:center; transition:border-color .15s ease, transform .1s ease; }
  .subject-card:hover{ border-color:var(--amber-dark); transform:translateY(-2px); }
  .subject-icon{ display:block; font-size:1.9rem; margin-bottom:8px; }
  .subject-name{ display:block; font-family:'Fraunces', serif; font-weight:600; color:var(--navy); font-size:1rem; margin-bottom:4px; line-height:1.25; }
  .subject-count{ display:block; font-family:'IBM Plex Mono', monospace; font-size:0.68rem; color:var(--ink-soft); }

  .mode-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; max-width:520px; margin:0 auto 26px; }
  @media (max-width:520px){ .mode-grid{ grid-template-columns:1fr; } }
  .mode-btn{ font-family:'IBM Plex Mono', monospace; font-size:0.78rem; padding:14px 12px; border-radius:8px; border:1.5px solid var(--rule); background:#fff; cursor:pointer; color:var(--ink-soft); text-align:left; line-height:1.4; }
  .mode-btn b{ display:block; font-family:'IBM Plex Sans',sans-serif; font-size:0.92rem; color:var(--navy); margin-bottom:3px; }
  .mode-btn.active{ border-color:var(--amber-dark); background:var(--paper-dim); }
  .mode-btn.active b{ color:var(--amber-dark); }

  .diff-label{ font-family:'IBM Plex Mono', monospace; font-size:0.72rem; color:var(--ink-soft); max-width:520px; margin:0 auto 10px; text-align:left; line-height:1.5; }
  .diff-row{ display:flex; gap:8px; flex-wrap:wrap; justify-content:center; max-width:520px; margin:0 auto 26px; }
  .diff-btn{ font-family:'IBM Plex Mono', monospace; font-size:0.74rem; padding:8px 12px; border-radius:99px; border:1.5px solid var(--rule); background:#fff; cursor:pointer; color:var(--ink-soft); }
  .diff-btn.active{ border-color:var(--amber-dark); background:var(--amber); color:#fff; }

  .diff-badge{ padding:2px 8px; border-radius:99px; font-size:0.66rem; font-weight:600; }
  .diff-badge.diff-facile{ background:var(--correct-bg); color:var(--correct); }
  .diff-badge.diff-media{ background:#FCEFD9; color:var(--amber-dark); }
  .diff-badge.diff-difficile{ background:var(--wrong-bg); color:var(--wrong); }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">Quiz <em>Pegaso</em></div>
    <div class="subtitle" id="subtitleText">6 materie · banca fissa + esercizi generati</div>
  </header>

  <div class="layout">
    <div class="card" id="mainCard"></div>
    <aside class="stats-panel" id="statsPanel" style="display:none;">
      <h3>Riepilogo live</h3>
      <div class="stat-row"><span>Risposte date</span><span class="val" id="statAnswered">0</span></div>
      <div class="stat-row"><span>Corrette</span><span class="val good" id="statCorrect">0</span></div>
      <div class="stat-row"><span>Errate</span><span class="val bad" id="statWrong">0</span></div>
      <div class="stat-row"><span>Accuratezza</span><span class="val" id="statAccuracy">—</span></div>
      <div class="stat-row"><span>Serie corrente</span><span class="val" id="statStreak">0</span></div>
    </aside>
  </div>

  <footer class="credits">Materiale di autoesercitazione non ufficiale · verificare sempre sui testi/slide del corso</footer>
</div>

<script>
/* =========================================================
   HELPER NUMERICI E GENERICI
   ========================================================= */
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function randChoice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function fmt(v){ return (Math.round(v*100)/100).toString().replace(/\.0+$/,'').replace(/(\.\d*?)0+$/,'$1').replace(/\.$/,''); }

function buildOptions(correctValue, distractorFn, formatFn){
  formatFn = formatFn || fmt;
  const correctFormatted = formatFn(correctValue);
  const wrongs = [];
  let attempts = 0;
  while(wrongs.length < 3 && attempts < 60){
    attempts++;
    const cand = formatFn(distractorFn());
    if(cand !== correctFormatted && !wrongs.includes(cand)) wrongs.push(cand);
  }
  let pad = 1;
  while(wrongs.length < 3){
    const filler = formatFn(Number(correctValue) + pad * (Math.random()<0.5?-1:1) * (Math.abs(Number(correctValue))*0.15 + pad));
    if(filler !== correctFormatted && !wrongs.includes(filler)) wrongs.push(filler);
    pad++;
  }
  const all = shuffle([correctFormatted, ...wrongs]);
  return { options: all, correct: all.indexOf(correctFormatted) };
}

/* =========================================================
   GENERATORE PROCEDURALE — solo per Statistica
   ========================================================= */
const STAT_GENERATORS = [
  function genMean(){
    const n = randInt(5,7);
    const data = Array.from({length:n}, ()=>randInt(2,60));
    const sum = data.reduce((a,b)=>a+b,0);
    const mean = sum/n;
    const sorted = [...data].sort((a,b)=>a-b);
    const median = n%2 ? sorted[(n-1)/2] : (sorted[n/2-1]+sorted[n/2])/2;
    const {options, correct} = buildOptions(mean, ()=>{
      const c = Math.random();
      if(c<0.34) return median;
      if(c<0.67) return sum;
      return mean + (Math.random()<0.5?1:-1)*randInt(1,8);
    });
    return { topic:"Calcolo — Media", q:`Calcola la media aritmetica del seguente insieme di dati: {${data.join(", ")}}`,
      options, correct, explain:`Media = somma dei valori (${sum}) / numerosità (${n}) = ${fmt(mean)}.` };
  },
  function genMedian(){
    const n = randChoice([5,7]);
    const data = Array.from({length:n}, ()=>randInt(1,99));
    const sorted = [...data].sort((a,b)=>a-b);
    const median = sorted[(n-1)/2];
    const mean = data.reduce((a,b)=>a+b,0)/n;
    const {options, correct} = buildOptions(median, ()=>{
      const c = Math.random();
      if(c<0.4) return mean;
      if(c<0.7) return sorted[randInt(0,n-1)];
      return median + randInt(-10,10);
    });
    return { topic:"Calcolo — Mediana", q:`Dato il seguente insieme di dati (non ordinato): {${data.join(", ")}}, qual è la mediana?`,
      options, correct, explain:`Ordinando: {${sorted.join(", ")}}. Con n=${n} (dispari) la mediana è il valore centrale: ${median}.` };
  },
  function genMode(){
    const repeated = randInt(1,30);
    const poolSet = new Set();
    while(poolSet.size < 6){ const v = randInt(1,30); if(v!==repeated) poolSet.add(v); }
    const data = shuffle([...poolSet, repeated, repeated]);
    const {options, correct} = buildOptions(repeated, ()=>{
      const c = Math.random();
      if(c<0.5) return data[randInt(0,data.length-1)];
      return repeated + (Math.random()<0.5?1:-1)*randInt(1,5);
    });
    return { topic:"Calcolo — Moda", q:`Qual è la moda del seguente insieme di dati? {${data.join(", ")}}`,
      options, correct, explain:`Il valore ${repeated} compare 2 volte, più di ogni altro valore (1 volta ciascuno).` };
  },
  function genRange(){
    const n = randInt(6,8);
    const data = Array.from({length:n}, ()=>randInt(5,95));
    const max = Math.max(...data), min = Math.min(...data);
    const range = max-min;
    const {options, correct} = buildOptions(range, ()=>{
      const c = Math.random();
      if(c<0.4) return max+min;
      if(c<0.7) return range + (Math.random()<0.5?1:-1)*randInt(1,10);
      return max;
    });
    return { topic:"Calcolo — Range", q:`Calcola il campo di variazione (range) del seguente insieme di dati: {${data.join(", ")}}`,
      options, correct, explain:`Range = massimo (${max}) − minimo (${min}) = ${range}.` };
  },
  function genVariance(){
    const n = randInt(4,5);
    const data = Array.from({length:n}, ()=>randInt(2,20));
    const mean = data.reduce((a,b)=>a+b,0)/n;
    const sumSq = data.reduce((acc,v)=>acc+Math.pow(v-mean,2),0);
    const variance = sumSq/n;
    const {options, correct} = buildOptions(variance, ()=>{
      const c = Math.random();
      if(c<0.4) return sumSq/(n-1);
      if(c<0.7) return Math.sqrt(variance);
      return variance + (Math.random()*4-2);
    });
    return { topic:"Calcolo — Varianza", q:`Calcola la varianza di popolazione (denominatore N) del seguente insieme di dati: {${data.join(", ")}}`,
      options, correct, explain:`Media = ${fmt(mean)}. Varianza = Σ(xᵢ−media)² / N = ${fmt(sumSq)} / ${n} = ${fmt(variance)}.` };
  },
  function genUrn(){
    const palette = ["rosse","blu","verdi","gialle","nere"];
    const chosen = shuffle(palette).slice(0,3);
    const counts = chosen.map(()=>randInt(2,15));
    const total = counts.reduce((a,b)=>a+b,0);
    const idx = randInt(0,2);
    const pct = (counts[idx]/total)*100;
    const {options, correct} = buildOptions(pct, ()=>{
      const c = Math.random();
      if(c<0.4) return (counts[idx]/(total-counts[idx]))*100;
      if(c<0.7) return ((total-counts[idx])/total)*100;
      return pct + (Math.random()<0.5?1:-1)*randInt(3,15);
    }, v=>fmt(v)+"%");
    return { topic:"Probabilità", q:`Un'urna contiene ${counts[0]} palline ${chosen[0]}, ${counts[1]} palline ${chosen[1]} e ${counts[2]} palline ${chosen[2]}. Estraendo una pallina a caso, qual è la probabilità che sia ${chosen[idx]}?`,
      options, correct, explain:`Totale palline = ${total}. P(${chosen[idx]}) = ${counts[idx]}/${total} ≈ ${fmt(pct)}%.` };
  },
  function genDice(){
    const k = randInt(1,5);
    const pct = ((6-k)/6)*100;
    const {options, correct} = buildOptions(pct, ()=>{
      const c = Math.random();
      if(c<0.4) return (k/6)*100;
      if(c<0.7) return ((6-k+1)/6)*100;
      return pct + (Math.random()<0.5?1:-1)*randInt(3,15);
    }, v=>fmt(v)+"%");
    return { topic:"Probabilità", q:`Lanciando un dado equilibrato a 6 facce, qual è la probabilità di ottenere un numero maggiore di ${k}?`,
      options, correct, explain:`I valori maggiori di ${k} sono ${6-k} su 6: P = (6−${k})/6 ≈ ${fmt(pct)}%.` };
  },
  function genZ(){
    const mu = randInt(40,100);
    const sigma = randInt(5,20);
    const x = mu + randInt(-3,3)*sigma + randInt(-4,4);
    const z = (x-mu)/sigma;
    const {options, correct} = buildOptions(z, ()=>{
      const c = Math.random();
      if(c<0.4) return (mu-x)/sigma;
      if(c<0.7) return (x-mu)/mu;
      return z + (Math.random()*1.6-0.8);
    });
    return { topic:"Calcolo — Punteggio z", q:`Una variabile ha media μ = ${mu} e deviazione standard σ = ${sigma}. Qual è il punteggio z per x = ${x}?`,
      options, correct, explain:`z = (x − μ) / σ = (${x} − ${mu}) / ${sigma} = ${fmt(z)}.` };
  },
  function genEmpirical(){
    const mu = randInt(50,100);
    const sigma = randInt(5,15);
    const k = randChoice([1,2,3]);
    const pctMap = {1:68,2:95,3:99.7};
    const lower = mu-k*sigma, upper = mu+k*sigma;
    const correctVal = pctMap[k];
    const {options, correct} = buildOptions(correctVal, ()=>{
      const others = Object.values(pctMap).filter(v=>v!==correctVal).concat([50,75,90]);
      return randChoice(others);
    }, v=>v+"%");
    return { topic:"Distribuzione Normale", q:`In una Normale con μ = ${mu} e σ = ${sigma}, che percentuale di dati ricade in [${lower}, ${upper}] (μ ± ${k}σ)?`,
      options, correct, explain:`Per la regola empirica, circa il ${correctVal}% dei dati ricade entro μ ± ${k}σ.` };
  },
  function genRegression(){
    const a = randInt(1,20);
    const b = randInt(1,10) * (Math.random()<0.5?1:-1);
    const x = randInt(2,20);
    const y = a + b*x;
    const {options, correct} = buildOptions(y, ()=>{
      const c = Math.random();
      if(c<0.4) return a - b*x;
      if(c<0.7) return a*x + b;
      return y + (Math.random()<0.5?1:-1)*randInt(2,15);
    });
    const bStr = b>=0 ? `+ ${b}` : `− ${Math.abs(b)}`;
    return { topic:"Regressione lineare", q:`Data la retta di regressione ŷ = ${a} ${bStr}x, qual è il valore previsto per x = ${x}?`,
      options, correct, explain:`ŷ = ${a} + (${b})·(${x}) = ${a} + ${b*x} = ${y}.` };
  },
  function genCV(){
    const mean = randInt(20,100);
    const sd = randInt(2, Math.max(3,Math.round(mean*0.5)));
    const cv = (sd/mean)*100;
    const {options, correct} = buildOptions(cv, ()=>{
      const c = Math.random();
      if(c<0.4) return (mean/sd)*100;
      if(c<0.7) return sd/mean;
      return cv + (Math.random()<0.5?1:-1)*randInt(3,15);
    }, v=>fmt(v)+"%");
    return { topic:"Calcolo — Coeff. di variazione", q:`Una distribuzione ha media = ${mean} e deviazione standard = ${sd}. Calcola il coefficiente di variazione (CV).`,
      options, correct, explain:`CV = (deviazione standard / media) × 100 = (${sd} / ${mean}) × 100 ≈ ${fmt(cv)}%.` };
  },
  function genCI(){
    const mean = randInt(50,150);
    const sigma = randInt(5,25);
    const n = randChoice([25,36,49,64,100]);
    const z = 1.96;
    const margin = z*sigma/Math.sqrt(n);
    const {options, correct} = buildOptions(margin, ()=>{
      const c = Math.random();
      if(c<0.4) return z*sigma/n;
      if(c<0.7) return sigma/Math.sqrt(n);
      return margin + (Math.random()*2-1);
    });
    return { topic:"Intervallo di confidenza", q:`Da un campione di n = ${n}, con σ = ${sigma}, calcola il margine di errore per un IC al 95% (z = 1.96) attorno alla media campionaria (μ = ${mean}).`,
      options, correct, explain:`Margine di errore = z · σ/√n = 1.96 × ${sigma}/√${n} = 1.96 × ${fmt(sigma/Math.sqrt(n))} ≈ ${fmt(margin)}.` };
  },
  function genIQR(){
    const n = 8;
    const data = Array.from({length:n}, ()=>randInt(3,90));
    const sorted = [...data].sort((a,b)=>a-b);
    const lowerHalf = sorted.slice(0, n/2);
    const upperHalf = sorted.slice(n/2);
    const median = (a)=> a.length%2 ? a[(a.length-1)/2] : (a[a.length/2-1]+a[a.length/2])/2;
    const q1 = median(lowerHalf);
    const q3 = median(upperHalf);
    const iqr = q3 - q1;
    const {options, correct} = buildOptions(iqr, ()=>{
      const c = Math.random();
      if(c<0.35) return sorted[n-1]-sorted[0];
      if(c<0.6) return q1;
      if(c<0.8) return q3;
      return iqr + (Math.random()<0.5?1:-1)*randInt(1,8);
    });
    return { topic:"Calcolo — Scarto interquartile (IQR)", q:`Dato il seguente insieme di dati (non ordinato): {${data.join(", ")}}, calcola lo scarto interquartile (IQR = Q3 − Q1).`,
      options, correct, explain:`Ordinando i dati: {${sorted.join(", ")}}. Q1 (mediana della metà inferiore) = ${fmt(q1)}, Q3 (mediana della metà superiore) = ${fmt(q3)}. IQR = ${fmt(q3)} − ${fmt(q1)} = ${fmt(iqr)}.` };
  },
  function genSampleVariance(){
    const n = randInt(4,6);
    const data = Array.from({length:n}, ()=>randInt(2,25));
    const mean = data.reduce((a,b)=>a+b,0)/n;
    const sumSq = data.reduce((acc,v)=>acc+Math.pow(v-mean,2),0);
    const popVariance = sumSq/n;
    const sampleVariance = sumSq/(n-1);
    const {options, correct} = buildOptions(sampleVariance, ()=>{
      const c = Math.random();
      if(c<0.4) return popVariance;
      if(c<0.7) return Math.sqrt(sampleVariance);
      return sampleVariance + (Math.random()<0.5?1:-1)*randInt(1,4);
    });
    return { topic:"Calcolo — Varianza campionaria", q:`Calcola la varianza campionaria (denominatore n−1, stimatore corretto) del seguente insieme di dati: {${data.join(", ")}}`,
      options, correct, explain:`Media = ${fmt(mean)}. Somma degli scarti al quadrato = ${fmt(sumSq)}. Varianza campionaria = ${fmt(sumSq)} / (${n}−1) = ${fmt(sampleVariance)}.` };
  },
  function genWeightedMean(){
    const n = 3;
    const values = Array.from({length:n}, ()=>randInt(2,20));
    let weights = Array.from({length:n}, ()=>randInt(1,5));
    const weightSum = weights.reduce((a,b)=>a+b,0);
    const weightedSum = values.reduce((acc,v,i)=>acc+v*weights[i],0);
    const weightedMean = weightedSum/weightSum;
    const simpleMean = values.reduce((a,b)=>a+b,0)/n;
    const {options, correct} = buildOptions(weightedMean, ()=>{
      const c = Math.random();
      if(c<0.4) return simpleMean;
      if(c<0.7) return weightedSum;
      return weightedMean + (Math.random()<0.5?1:-1)*randInt(1,4);
    });
    const pairs = values.map((v,i)=>`${v} (peso ${weights[i]})`).join(", ");
    return { topic:"Calcolo — Media ponderata", q:`Calcola la media ponderata dei seguenti valori con i rispettivi pesi: ${pairs}`,
      options, correct, explain:`Media ponderata = Σ(valore·peso) / Σ(pesi) = ${fmt(weightedSum)} / ${weightSum} = ${fmt(weightedMean)}.` };
  }
];

  {topic:"Correlazione e regressione", q:"Un valore di r = 0 indica che tra due variabili:", options:["Non esiste alcuna relazione, nemmeno non lineare, un parametro stimato tramite il metodo dei momenti applicato al campione","Non c'è correlazione lineare (ma potrebbe esserci una relazione non lineare)","Esiste una relazione perfetta, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Una delle due variabili è costante, una grandezza calcolata sulla base della distribuzione marginale della variabile"], correct:1, explain:"r misura solo la relazione lineare: un valore nullo non esclude relazioni non lineari tra le variabili.", difficulty:"media"},
  {topic:"Correlazione e regressione", q:"Nella regressione lineare semplice y = a + bx, il coefficiente b rappresenta:", options:["Il valore di y quando x = 0, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","La variazione media di y per un'unità di variazione di x","La correlazione tra x e y, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","La varianza dei residui, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte"], correct:1, explain:"b è il coefficiente angolare: indica quanto cambia in media y all'aumentare di x di un'unità.", difficulty:"media"},
  {topic:"Correlazione e regressione", q:"Il metodo dei minimi quadrati stima i parametri della retta di regressione:", options:["Massimizzando la somma dei residui, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Minimizzando la somma dei quadrati dei residui","Massimizzando la varianza di x, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Minimizzando il numero di osservazioni, un parametro stimato tramite il metodo dei momenti applicato al campione"], correct:1, explain:"Il metodo OLS (minimi quadrati ordinari) sceglie i parametri che minimizzano la somma dei quadrati degli scarti tra valori osservati e stimati.", difficulty:"media"},
  {topic:"Correlazione e regressione", q:"Il coefficiente di determinazione R² indica:", options:["La percentuale di varianza di y spiegata dal modello di regressione","Il numero di variabili indipendenti nel modello, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","La correlazione tra i residui, una grandezza calcolata sulla base della distribuzione marginale della variabile","Il valore del coefficiente angolare della retta di regressione"], correct:0, explain:"R² esprime la proporzione di variabilità della variabile dipendente spiegata dalla relazione con la variabile indipendente.", difficulty:"difficile"},
  {topic:"Correlazione e regressione", q:"'Correlazione non implica causazione' significa che:", options:["Due variabili correlate si influenzano reciprocamente in modo diretto e automatico","Un'associazione statistica tra due variabili non prova un nesso causale diretto","La correlazione è un concetto privo di utilità pratica in statistica","La correlazione va interpretata come prova certa di causalità"], correct:1, explain:"Un'associazione osservata può derivare da causalità inversa, variabili confondenti o casualità, non necessariamente da un nesso causale diretto.", difficulty:"difficile"},
  {topic:"Concetti generali", q:"La differenza principale tra popolazione e campione è che:", options:["Sono due termini equivalenti usati in contesti accademici diversi, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","La popolazione è l'insieme completo di unità di interesse, il campione è un suo sottoinsieme","Il campione contiene tipicamente più unità della popolazione di riferimento, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","La popolazione è il gruppo scelto casualmente dal ricercatore per l'indagine, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate"], correct:1, explain:"La popolazione è l'universo di riferimento; il campione è un sottoinsieme selezionato per fare inferenza sulla popolazione.", difficulty:"difficile"},
  {topic:"Concetti generali", q:"Una variabile qualitativa (categoriale) ordinale si differenzia da una nominale perché:", options:["Ammette un ordinamento naturale delle categorie","Ammette il calcolo diretto della media aritmetica sulle sue modalità","Corrisponde a un carattere quantitativo continuo","Riguarda tipicamente variabili con due sole categorie, come nel caso binario"], correct:0, explain:"Le variabili ordinali hanno categorie che seguono un ordine logico (es. basso/medio/alto), a differenza delle nominali.", difficulty:"difficile"},
  {topic:"Concetti generali", q:"Un istogramma è un grafico adatto a rappresentare:", options:["La distribuzione di frequenza di una variabile quantitativa continua","L'evoluzione temporale di un singolo valore","La correlazione tra due variabili, un parametro stimato tramite il metodo dei momenti applicato al campione","La composizione percentuale di un totale in categorie"], correct:0, explain:"L'istogramma raggruppa i dati continui in classi e ne mostra la distribuzione di frequenza tramite barre adiacenti.", difficulty:"facile"},
  {topic:"Concetti generali", q:"Il diagramma a scatola (box-plot) è utile principalmente per:", options:["Mostrare la relazione causale tra due variabili, una grandezza calcolata sulla base della distribuzione marginale della variabile","Visualizzare quartili, mediana ed eventuali outlier di una distribuzione","Calcolare la media aritmetica, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Mostrare la relazione tra due variabili quantitative continue"], correct:1, explain:"Il box-plot sintetizza Q1, mediana, Q3, i baffi (whiskers) e gli eventuali valori anomali di una distribuzione.", difficulty:"media"},
  {topic:"Statistica descrittiva", q:"La frequenza relativa di una modalità si ottiene:", options:["Sottraendo la moda dalla mediana","Dividendo la frequenza assoluta per il totale delle osservazioni","Sommando tutte le frequenze assolute della distribuzione","Moltiplicando la frequenza assoluta per la media"], correct:1, explain:"La frequenza relativa è il rapporto tra la frequenza assoluta di una modalità e il numero totale di osservazioni; è sempre compresa tra 0 e 1.", difficulty:"facile"},
  {topic:"Statistica descrittiva", q:"I quartili di una distribuzione ordinata la suddividono in:", options:["Dieci decili consecutivi","Quattro parti di uguale numerosità","Due metà simmetriche rispetto alla moda","Tre gruppi di ampiezza uguale"], correct:1, explain:"I quartili (Q1, Q2, Q3) dividono i dati ordinati in quattro parti contenenti ciascuna circa il 25% delle osservazioni.", difficulty:"facile"},
  {topic:"Concetti generali", q:"Una variabile quantitativa discreta è tale perché può assumere:", options:["Esclusivamente valori compresi tra 0 e 1","Solo valori negativi o nulli","Solo un numero finito o numerabile di valori distinti","Qualunque valore reale in un intervallo continuo"], correct:2, explain:"Le variabili discrete assumono valori isolati e numerabili, come il numero di figli o di sinistri, a differenza delle continue.", difficulty:"facile"},
  {topic:"Probabilità", q:"Se due eventi A e B sono complementari, allora vale la relazione:", options:["P(A) · P(B) = 1","P(A∩B) = P(A) + P(B)","P(A) + P(B) = 1","P(A) − P(B) = 0"], correct:2, explain:"Gli eventi complementari esauriscono lo spazio campionario, quindi le loro probabilità sommano necessariamente a 1.", difficulty:"media"},
  {topic:"Variabili casuali", q:"La varianza di una variabile casuale Binomiale B(n,p) è espressa da:", options:["n·p·(1−p)","n² moltiplicato per p","p·(1−p) indipendentemente da n","p·(1−p), indipendentemente da n"], correct:0, explain:"Per la Binomiale la varianza è n·p·(1−p), mentre il valore atteso è semplicemente n·p.", difficulty:"media"},
  {topic:"Stima", q:"Tra due stimatori entrambi non distorti dello stesso parametro, si dice più efficiente quello con:", options:["Distribuzione più asimmetrica","Varianza minore","Media campionaria più elevata","Varianza maggiore"], correct:1, explain:"A parità di non distorsione, l'efficienza premia lo stimatore con varianza minore, perché più concentrato attorno al vero parametro.", difficulty:"media"},
  {topic:"Correlazione e regressione", q:"L'ipotesi di omoschedasticità in un modello di regressione lineare richiede che:", options:["I residui siano perfettamente correlati con la variabile indipendente","La varianza dei residui sia costante al variare di x","La variabile dipendente abbia varianza nulla","I residui siano fortemente correlati con la variabile indipendente"], correct:1, explain:"L'omoschedasticità implica che l'ampiezza della dispersione dei residui non cambi sistematicamente al variare del valore di x.", difficulty:"difficile"},
  {topic:"Test di ipotesi", q:"In un test a due code, rispetto a un test a una coda con lo stesso livello di significatività α, la regione di rifiuto:", options:["È ripartita simmetricamente in entrambe le code della distribuzione","Non dipende in alcun modo dal valore di α scelto, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","Si concentra interamente in una sola coda, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Coincide con l'intera area sottesa alla curva, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe"], correct:0, explain:"Nel test bilaterale α viene diviso a metà tra le due code, mentre nel test unilaterale è concentrato in una sola direzione.", difficulty:"difficile"},
  {topic:"Distribuzione Normale", q:"Rispetto alla Normale standard, la distribuzione t di Student con pochi gradi di libertà presenta:", options:["Una media diversa da zero anche nel caso standardizzato, un parametro stimato tramite il metodo dei momenti applicato al campione","Una forma identica alla Normale standard, indipendentemente dai gradi di libertà","Code più pesanti, che si assottigliano avvicinandosi alla Normale al crescere dei gradi di libertà","Una forma identica indipendentemente dal numero di osservazioni, una grandezza calcolata sulla base della distribuzione marginale della variabile"], correct:2, explain:"La t di Student ha code più spesse per compensare l'incertezza aggiuntiva dovuta alla stima della varianza; tende alla Normale quando i gradi di libertà aumentano.", difficulty:"difficile"},
  {topic:"Campionamento", q:"Il campionamento a grappoli (cluster sampling) si distingue dal campionamento stratificato perché:", options:["Esclude a priori qualunque elemento di casualità nella selezione","Richiede che ogni grappolo sia internamente omogeneo per definizione","Si estraggono interi gruppi (grappoli) e non singole unità da ogni strato","Richiede l'assenza di qualunque criterio di raggruppamento tra le unità"], correct:2, explain:"Nel campionamento a grappoli si selezionano casualmente interi gruppi preesistenti, anziché campionare individualmente all'interno di ciascuno strato.", difficulty:"difficile"},
  {topic:"Statistica descrittiva", q:"Il campo di variazione (range) di una distribuzione è dato da:", options:["Il valore che compare più frequentemente","La media dei valori estremi della distribuzione","La somma di tutti i valori osservati","La differenza tra il valore massimo e il valore minimo"], correct:3, explain:"Il range misura la dispersione totale dei dati come differenza tra il valore massimo e quello minimo osservati.", difficulty:"facile"},
  {topic:"Concetti generali", q:"Una variabile qualitativa ordinale, a differenza di una nominale, presenta modalità che:", options:["Non ammettono più di due categorie possibili","Non ammettono alcuna forma di gerarchia tra loro","Corrispondono a un carattere quantitativo discreto","Possono essere ordinate secondo una gerarchia naturale"], correct:3, explain:"Le variabili ordinali hanno modalità che ammettono un ordinamento (es. basso/medio/alto), a differenza delle nominali che sono solo categorie senza gerarchia.", difficulty:"facile"},
  {topic:"Statistica descrittiva", q:"Una distribuzione si dice simmetrica quando:", options:["Il numero di osservazioni è pari, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Tutti i valori osservati sono positivi, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","Il numero di osservazioni è pari","Media, mediana e moda coincidono (o sono molto vicine)"], correct:3, explain:"In una distribuzione perfettamente simmetrica, gli indici di posizione centrale (media, mediana, moda) tendono a coincidere.", difficulty:"facile"},
  {topic:"Probabilità", q:"La probabilità di un evento certo è sempre uguale a:", options:["0,5","Un valore che dipende dal numero di prove","1","0"], correct:2, explain:"Un evento certo si verifica sempre, quindi la sua probabilità, per definizione, è pari a 1.", difficulty:"facile"},
  {topic:"Probabilità", q:"Due eventi A e B si dicono indipendenti quando:", options:["La somma delle loro probabilità è pari a 1, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","La somma delle loro probabilità individuali è pari a 1","Il verificarsi di A non influenza la probabilità che si verifichi B","Sono entrambi eventi con probabilità superiore a 0,5"], correct:2, explain:"L'indipendenza stocastica implica P(A∩B) = P(A)·P(B), cioè il verificarsi di uno non altera la probabilità dell'altro.", difficulty:"facile"},
  {topic:"Rappresentazioni grafiche", q:"L'istogramma è un grafico particolarmente adatto a rappresentare:", options:["La composizione percentuale di una singola osservazione, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","La distribuzione di frequenza di una variabile quantitativa continua raggruppata in classi","Il legame causale tra due variabili qualitative, una grandezza calcolata sulla base della distribuzione marginale della variabile","La sola evoluzione di un fenomeno nel tempo, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi"], correct:1, explain:"L'istogramma mostra le frequenze di classi contigue di una variabile continua tramite rettangoli adiacenti di area proporzionale alla frequenza.", difficulty:"facile"},
  {topic:"Concetti generali", q:"La popolazione statistica, a differenza del campione, è:", options:["Definita in base al numero di variabili rilevate su ciascuna unità","L'insieme completo di tutte le unità oggetto di studio","Un sottoinsieme scelto per motivi di comodità","Un concetto che si riferisce a un sottoinsieme scelto per motivi di comodità"], correct:1, explain:"La popolazione è l'universo completo delle unità di interesse, mentre il campione è un suo sottoinsieme estratto per l'analisi.", difficulty:"facile"},
  {topic:"Statistica descrittiva", q:"Lo scarto quadratico medio (deviazione standard) si ottiene:", options:["Come radice quadrata della varianza","Come differenza tra massimo e minimo dei dati","Come rapporto tra moda e mediana","Come somma dei valori diviso il numero di osservazioni"], correct:0, explain:"La deviazione standard è la radice quadrata della varianza e si esprime nella stessa unità di misura dei dati originali.", difficulty:"facile"},
  {topic:"Rappresentazioni grafiche", q:"Il diagramma a scatola (boxplot) permette di visualizzare in particolare:", options:["Mediana, quartili ed eventuali valori anomali (outlier) di una distribuzione","La correlazione tra due variabili quantitative","La correlazione tra due variabili quantitative, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","L'andamento nel tempo di una singola grandezza"], correct:0, explain:"Il boxplot sintetizza mediana, primo e terzo quartile, whisker e outlier, offrendo una lettura rapida della dispersione e simmetria dei dati.", difficulty:"facile"},
  {topic:"Concetti generali", q:"Il coefficiente di variazione (CV) è utile principalmente per:", options:["Calcolare direttamente la mediana di una distribuzione, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Calcolare direttamente la mediana di una distribuzione","Confrontare la variabilità relativa di distribuzioni con medie diverse o unità di misura diverse","Sostituire il calcolo della moda in ogni circostanza, un indice che si ottiene dalla trasformazione logaritmica dei dati originari"], correct:2, explain:"Il CV, rapporto tra deviazione standard e media, è adimensionale e consente confronti tra distribuzioni non direttamente comparabili in valore assoluto.", difficulty:"media"},
  {topic:"Probabilità", q:"La probabilità condizionata P(A|B) rappresenta:", options:["La probabilità che A e B si verifichino contemporaneamente","La probabilità che si verifichi B, sapendo che si è già verificato A","La probabilità che si verifichi A, sapendo che si è già verificato B","La probabilità che né A né B si verifichino, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi"], correct:2, explain:"P(A|B) misura la probabilità di A aggiornata sulla base dell'informazione che l'evento B si è verificato; in generale P(A|B) ≠ P(B|A).", difficulty:"media"},
  {topic:"Variabili casuali", q:"Il valore atteso di una variabile casuale discreta si calcola come:", options:["Somma semplice di tutti i valori possibili della variabile, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","Somma dei valori possibili ciascuno moltiplicato per la propria probabilità","Differenza tra il valore massimo e quello minimo della variabile","Valore più frequente tra quelli osservati nel campione, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte"], correct:1, explain:"Il valore atteso E(X) è una media ponderata dei valori possibili, con pesi dati dalle rispettive probabilità.", difficulty:"media"},
  {topic:"Correlazione e regressione", q:"Un coefficiente di correlazione lineare pari a 0 indica che:", options:["Non esiste una relazione lineare tra le due variabili (potrebbero comunque esserci relazioni non lineari)","È impossibile costruire una retta di regressione tra le due variabili","È impossibile costruire una retta di regressione tra le due variabili, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Le due variabili sono perfettamente correlate in modo inverso, un parametro stimato tramite il metodo dei momenti applicato al campione"], correct:0, explain:"Un coefficiente di correlazione nullo indica assenza di relazione lineare, ma non esclude la presenza di relazioni non lineari tra le variabili.", difficulty:"media"},
  {topic:"Campionamento", q:"Il campionamento casuale semplice richiede che:", options:["Ogni unità della popolazione abbia la stessa probabilità di essere inclusa nel campione","Le unità vengano scelte in base alla loro disponibilità a partecipare","La popolazione venga preventivamente suddivisa in strati omogenei","Le unità vengano selezionate in base al giudizio soggettivo del ricercatore"], correct:0, explain:"Nel campionamento casuale semplice ogni unità della popolazione ha eguale probabilità di essere estratta, garantendo la rappresentatività del campione.", difficulty:"media"},
  {topic:"Test di ipotesi", q:"Il p-value in un test di ipotesi rappresenta:", options:["La percentuale di osservazioni corrette nel campione, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","La probabilità di osservare un risultato estremo quanto (o più estremo di) quello ottenuto, assumendo vera l'ipotesi nulla","La probabilità che l'ipotesi nulla sia vera in assoluto, una grandezza calcolata sulla base della distribuzione marginale della variabile","Il livello di significatività scelto a priori dal ricercatore, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi"], correct:1, explain:"Il p-value misura quanto sia compatibile il risultato osservato con l'ipotesi nulla; valori bassi portano a rifiutarla.", difficulty:"media"},
  {topic:"Distribuzione Normale", q:"Nella distribuzione Normale, la regola empirica prevede che circa il 95% dei dati ricada entro:", options:["Una deviazione standard dalla media","Metà deviazione standard dalla media","Due deviazioni standard dalla media","Tre deviazioni standard dalla media"], correct:2, explain:"Per la Normale, circa il 68% dei dati è entro 1 σ, circa il 95% entro 2 σ e circa il 99,7% entro 3 σ dalla media.", difficulty:"media"},
  {topic:"Stima", q:"Uno stimatore corretto (non distorto) di un parametro è tale se:", options:["Coincide con il valore osservato nel campione più numeroso disponibile","Presenta una varianza pari alla media del campione","Il suo valore atteso coincide con il vero valore del parametro","Richiede la conoscenza preventiva del vero valore del parametro"], correct:2, explain:"Uno stimatore è corretto (non distorto) quando E(stimatore) è uguale al parametro che si vuole stimare, in media su tutti i possibili campioni.", difficulty:"media"},
  {topic:"Correlazione e regressione", q:"Nel modello di regressione lineare semplice, il coefficiente angolare della retta stimata indica:", options:["Di quanto varia mediamente la variabile dipendente al variare di un'unità della variabile indipendente","Il valore della variabile dipendente quando x = 0, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","La percentuale di varianza spiegata dal modello, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","Il valore della variabile dipendente quando x è pari a zero"], correct:0, explain:"Il coefficiente angolare (pendenza) misura la variazione media attesa di Y per un incremento unitario di X, mentre l'intercetta è il valore di Y quando x = 0.", difficulty:"media"},
  {topic:"Concetti generali", q:"L'asimmetria (skewness) positiva di una distribuzione indica tipicamente che:", options:["La coda destra della distribuzione è più allungata, con media superiore alla mediana","La distribuzione è perfettamente simmetrica attorno alla media, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","La coda sinistra è più allungata, con media inferiore alla mediana, un parametro stimato tramite il metodo dei momenti applicato al campione","La varianza della distribuzione è pari a zero, un indice che si ottiene dalla trasformazione logaritmica dei dati originari"], correct:0, explain:"Con asimmetria positiva la coda destra è più estesa e la media tende a essere superiore alla mediana, trascinata dai valori estremi elevati.", difficulty:"difficile"},
  {topic:"Probabilità", q:"Il teorema di Bayes consente di:", options:["Determinare univocamente la varianza di una popolazione, una grandezza calcolata sulla base della distribuzione marginale della variabile","Aggiornare la probabilità di un evento alla luce di nuova informazione osservata","Determinare univocamente la varianza di una popolazione","Calcolare direttamente il valore atteso di una variabile casuale continua"], correct:1, explain:"Il teorema di Bayes permette di rivedere (aggiornare) la probabilità a priori di un evento sulla base di una nuova evidenza osservata.", difficulty:"difficile"},
  {topic:"Test di ipotesi", q:"L'errore di II tipo in un test di ipotesi consiste nel:", options:["Scegliere un livello di significatività troppo elevato","Non rifiutare l'ipotesi nulla quando in realtà essa è falsa","Rifiutare l'ipotesi nulla quando in realtà essa è vera","Utilizzare un campione di dimensione eccessiva"], correct:1, explain:"L'errore di secondo tipo (β) si verifica quando si accetta l'ipotesi nulla pur essendo falsa, a differenza dell'errore di primo tipo (α) che è il rifiuto di un'ipotesi nulla vera.", difficulty:"difficile"},
  {topic:"Variabili casuali", q:"La distribuzione di Poisson è particolarmente adatta a modellare:", options:["La proporzione di successi in un numero fissato di prove ripetute, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","Una variabile continua distribuita simmetricamente attorno alla media, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Il numero di eventi rari che si verificano in un intervallo di tempo o spazio fissato","Il valore centrale di un insieme di dati ordinati, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe"], correct:2, explain:"La Poisson descrive il numero di occorrenze di eventi rari e indipendenti in un intervallo definito, come il numero di chiamate ricevute in un'ora.", difficulty:"difficile"},
  {topic:"Correlazione e regressione", q:"Il coefficiente di determinazione R² in un modello di regressione lineare esprime:", options:["La probabilità che il modello sia corretto in assoluto, un parametro stimato tramite il metodo dei momenti applicato al campione","Il valore del coefficiente angolare della retta stimata, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Il numero di osservazioni utilizzate per stimare il modello, una grandezza calcolata sulla base della distribuzione marginale della variabile","La quota di variabilità della variabile dipendente spiegata dal modello di regressione"], correct:3, explain:"R² indica la proporzione di varianza della variabile dipendente spiegata dalla variabile indipendente attraverso il modello stimato, tra 0 e 1.", difficulty:"difficile"},
  {topic:"Campionamento", q:"L'errore standard della media campionaria diminuisce al crescere di n perché:", options:["Non ha alcuna relazione con la dimensione del campione","Non ha alcuna relazione con la dimensione del campione, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","Dipende dal valore assoluto della media della popolazione","È inversamente proporzionale alla radice quadrata della numerosità campionaria"], correct:3, explain:"L'errore standard della media è σ/√n: aumentando n il denominatore cresce, riducendo la variabilità attesa della media campionaria.", difficulty:"difficile"},
  {topic:"Test di ipotesi", q:"Il test del chi-quadrato di indipendenza viene utilizzato per verificare se:", options:["La media di una popolazione è uguale a un valore ipotizzato, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Esiste correlazione lineare perfetta tra due variabili continue, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","La varianza di due popolazioni è identica, un parametro stimato tramite il metodo dei momenti applicato al campione","Due variabili qualitative sono associate tra loro in una tabella di contingenza"], correct:3, explain:"Il test del chi-quadrato confronta le frequenze osservate con quelle attese sotto l'ipotesi di indipendenza tra due variabili categoriali.", difficulty:"difficile"},
  {topic:"Stima", q:"Un intervallo di confidenza al 95% per la media significa che:", options:["Il 95% delle osservazioni del campione rientra in quell'intervallo, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","La popolazione ha sicuramente una distribuzione Normale, una grandezza calcolata sulla base della distribuzione marginale della variabile","C'è il 95% di probabilità che la media campionaria sia esatta, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Ripetendo il campionamento molte volte, circa il 95% degli intervalli così costruiti conterrebbe il vero valore del parametro"], correct:3, explain:"L'interpretazione frequentista dell'intervallo di confidenza riguarda la procedura ripetuta di campionamento, non la singola stima ottenuta.", difficulty:"difficile"},
  {topic:"Concetti generali", q:"La covarianza tra due variabili X e Y misura:", options:["La distanza assoluta tra i valori massimi di X e Y, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","La distanza assoluta tra i valori massimi di X e Y","Il valore atteso del prodotto tra X e Y in termini assoluti","Il grado e la direzione (positiva o negativa) della relazione lineare congiunta tra le due variabili"], correct:3, explain:"La covarianza indica se due variabili tendono a variare nella stessa direzione (positiva) o in direzioni opposte (negativa), ma non è standardizzata come la correlazione.", difficulty:"difficile"},
  {topic:"Variabili casuali", q:"Per una variabile casuale continua, la probabilità che essa assuma esattamente un singolo valore puntuale è:", options:["Uguale alla frequenza assoluta osservata nel campione, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Sempre pari a 1, indipendentemente dal valore considerato, un parametro stimato tramite il metodo dei momenti applicato al campione","Pari al valore della funzione di densità in quel punto, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Sempre pari a zero, poiché la probabilità è definita su intervalli tramite la funzione di densità"], correct:3, explain:"Per le variabili continue la probabilità è associata ad aree sottese alla funzione di densità su intervalli; un singolo punto ha misura (probabilità) nulla.", difficulty:"difficile"},
  {topic:"Statistica descrittiva", q:"La moda di una distribuzione è definita come:", options:["La somma dei valori divisa per la loro numerosità","Il valore centrale della distribuzione ordinata","La differenza tra il valore massimo e il minimo","Il valore o la classe con la frequenza più elevata"], correct:3, explain:"La moda è il valore (o la classe, nel caso di dati raggruppati) che presenta la frequenza assoluta più alta nella distribuzione.", difficulty:"facile"},
  {topic:"Rappresentazioni grafiche", q:"Il diagramma a torta (grafico a settori) è indicato soprattutto per rappresentare:", options:["L'evoluzione temporale continua di una grandezza, una grandezza calcolata sulla base della distribuzione marginale della variabile","La dispersione dei dati attorno alla media, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","La relazione tra due variabili quantitative continue, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","La composizione percentuale di un totale suddiviso in categorie"], correct:3, explain:"Il grafico a torta mostra come un totale si ripartisce tra le diverse categorie, in termini di quote percentuali.", difficulty:"facile"},
  {topic:"Concetti generali", q:"Il termine 'unità statistica' indica:", options:["L'insieme di tutte le osservazioni raccolte in un'indagine, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","Il valore medio di una distribuzione di frequenza, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","La misura di sintesi calcolata su un gruppo di osservazioni, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Il singolo elemento su cui vengono rilevati i caratteri oggetto di studio"], correct:3, explain:"L'unità statistica è il singolo elemento (persona, impresa, evento) su cui si rilevano uno o più caratteri oggetto di indagine.", difficulty:"facile"},
  {topic:"Probabilità", q:"Lo spazio campionario di un esperimento aleatorio è:", options:["Il numero di prove ripetute dell'esperimento, un parametro stimato tramite il metodo dei momenti applicato al campione","La probabilità associata all'evento più frequente, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Il singolo risultato effettivamente osservato in una prova","L'insieme di tutti i possibili risultati elementari dell'esperimento"], correct:3, explain:"Lo spazio campionario raccoglie tutti i possibili esiti elementari di un esperimento aleatorio, base per il calcolo delle probabilità degli eventi.", difficulty:"facile"},
  {topic:"Statistica descrittiva", q:"La mediana di una distribuzione ordinata di dati rappresenta:", options:["Il valore che divide la distribuzione in due parti di uguale numerosità","La media aritmetica di tutti i valori osservati, una grandezza calcolata sulla base della distribuzione marginale della variabile","La somma dei quartili della distribuzione, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Il valore più frequente della distribuzione, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata"], correct:0, explain:"La mediana è il valore centrale che, in una serie ordinata, lascia il 50% delle osservazioni al di sotto e il 50% al di sopra.", difficulty:"facile"},
  {topic:"Concetti generali", q:"Una tabella di contingenza (o di doppia entrata) viene utilizzata per:", options:["Rappresentare la sola distribuzione marginale di una singola variabile","Descrivere l'andamento nel tempo di un singolo fenomeno, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Analizzare congiuntamente la distribuzione di due variabili qualitative o categoriali","Rappresentare la sola distribuzione marginale di una singola variabile, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe"], correct:2, explain:"La tabella di contingenza incrocia le modalità di due variabili categoriali, mostrando le frequenze congiunte di ciascuna combinazione.", difficulty:"media"},
  {topic:"Numeri indice", q:"Un numero indice a base fissa confronta il valore di ciascun periodo con:", options:["Il valore massimo registrato nell'intera serie storica","La media di tutti i periodi osservati nella serie","Un unico periodo di riferimento (base) mantenuto costante nel tempo","Il periodo immediatamente precedente, che cambia ogni volta"], correct:2, explain:"Negli indici a base fissa il periodo di riferimento (base = 100) resta lo stesso per tutto il confronto, a differenza degli indici a base mobile.", difficulty:"media"},
  {topic:"Concentrazione", q:"L'indice di concentrazione di Gini assume valore pari a 0 quando:", options:["La varianza del carattere è massima, un parametro stimato tramite il metodo dei momenti applicato al campione","La distribuzione del carattere (es. reddito) è perfettamente equidistribuita tra le unità","Il numero di osservazioni è molto elevato, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Un'unica unità possiede l'intero ammontare del carattere, una grandezza calcolata sulla base della distribuzione marginale della variabile"], correct:1, explain:"L'indice di Gini varia tra 0 (equidistribuzione perfetta) e 1 (massima concentrazione, un'unica unità detiene tutto il carattere).", difficulty:"media"},
  {topic:"Correlazione e regressione", q:"Il metodo dei minimi quadrati, nella stima della retta di regressione, individua i parametri che:", options:["Minimizzano la somma dei quadrati degli scarti tra valori osservati e valori stimati","Rendono nulla la correlazione tra le due variabili, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Massimizzano la somma dei valori osservati della variabile dipendente","Massimizzano la somma dei valori osservati della variabile dipendente, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte"], correct:0, explain:"I minimi quadrati ordinari scelgono i coefficienti della retta che minimizzano la somma dei quadrati dei residui (scarti tra valori osservati e stimati).", difficulty:"media"},
  {topic:"Probabilità", q:"Nella distribuzione uniforme discreta, la probabilità di ciascun esito possibile è:", options:["La stessa per ogni esito, pari all'inverso del numero totale di esiti possibili","Diversa per ciascun esito in base alla sua grandezza numerica, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Pari a zero per tutti gli esiti tranne uno, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Diversa per ciascun esito in base alla sua grandezza numerica"], correct:0, explain:"Nella distribuzione uniforme discreta, come nel lancio di un dado equo, ogni esito ha la stessa probabilità, pari a 1 diviso il numero di esiti possibili.", difficulty:"media"},
  {topic:"Campionamento", q:"Il campionamento stratificato prevede che la popolazione venga preventivamente suddivisa in:", options:["Un unico gruppo indistinto da cui estrarre casualmente le unità","Sottogruppi (strati) internamente omogenei, da cui si estraggono poi le unità campionarie","Coppie di osservazioni abbinate per caratteristiche identiche, una grandezza calcolata sulla base della distribuzione marginale della variabile","Un unico gruppo indistinto da cui estrarre casualmente le unità, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi"], correct:1, explain:"Nel campionamento stratificato la popolazione è divisa in strati omogenei al proprio interno, da cui si estraggono poi campioni proporzionali o meno.", difficulty:"media"},
  {topic:"Statistica descrittiva", q:"Lo scarto semplice medio si calcola come:", options:["Radice quadrata della varianza della distribuzione","Differenza tra il terzo e il primo quartile della distribuzione, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","Media dei valori assoluti degli scarti di ciascuna osservazione dalla media aritmetica","Radice quadrata della varianza della distribuzione, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate"], correct:2, explain:"Lo scarto semplice medio è la media dei valori assoluti degli scarti dalla media, utile perché la somma algebrica degli scarti dalla media è sempre pari a zero.", difficulty:"media"},
  {topic:"Test di ipotesi", q:"Nell'impostazione di un test di ipotesi, l'ipotesi nulla H0 rappresenta tipicamente:", options:["L'ipotesi che il ricercatore spera di confermare con il test, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Un'ipotesi priva di qualunque riscontro empirico possibile, un parametro stimato tramite il metodo dei momenti applicato al campione","L'ipotesi di assenza di effetto o di differenza, che si assume vera fino a prova contraria","L'ipotesi che riguarda il valore pari a zero di una media campionaria, un indice che si ottiene dalla trasformazione logaritmica dei dati originari"], correct:2, explain:"H0 rappresenta convenzionalmente l'ipotesi di assenza di effetto/differenza; il test valuta se i dati forniscono evidenza sufficiente per rifiutarla a favore dell'ipotesi alternativa.", difficulty:"media"},
  {topic:"Distribuzione Normale", q:"La curva Normale standardizzata (z) ha per definizione:", options:["Media pari a 0 e deviazione standard pari a 1","Media pari a 1 e deviazione standard pari a 0","Media e deviazione standard pari al valore della variabile originaria","Media e deviazione standard entrambe pari al valore osservato originale"], correct:0, explain:"La standardizzazione trasforma qualunque variabile Normale in una Normale standard, con media 0 e deviazione standard 1, tramite z = (x−μ)/σ.", difficulty:"media"},
  {topic:"Concentrazione", q:"La curva di Lorenz, utilizzata per analizzare la concentrazione, mette in relazione:", options:["La quota cumulata della popolazione con la quota cumulata del carattere posseduto (es. reddito)","Il tempo con il livello dei prezzi di un paniere di beni, una grandezza calcolata sulla base della distribuzione marginale della variabile","Il numero di classi con l'ampiezza di ciascuna classe, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","La media con la deviazione standard di una distribuzione, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata"], correct:0, explain:"La curva di Lorenz rappresenta graficamente quanta parte cumulata del carattere (es. reddito totale) è detenuta dalla quota cumulata crescente della popolazione, ordinata dal valore più basso al più alto.", difficulty:"difficile"},
  {topic:"Correlazione e regressione", q:"Un valore del coefficiente di correlazione di Pearson pari a -0,9 indica:", options:["L'impossibilità di stimare una retta di regressione tra le variabili","Una forte relazione lineare inversa tra le due variabili","Un'assenza pressoché totale di relazione tra le variabili","Una relazione lineare diretta molto forte tra le variabili"], correct:1, explain:"Un valore prossimo a -1 indica una relazione lineare inversa molto forte: al crescere di una variabile, l'altra tende a diminuire in modo marcato e sistematico.", difficulty:"difficile"},
  {topic:"Numeri indice", q:"Un numero indice dei prezzi al consumo maggiore di 100, rispetto all'anno base, segnala che:", options:["Non è possibile derivare alcuna informazione sul livello dei prezzi","Il livello generale dei prezzi è aumentato rispetto al periodo di riferimento","Il livello dei prezzi è diminuito rispetto al periodo di riferimento","I prezzi sono rimasti perfettamente invariati nel tempo"], correct:1, explain:"Un indice superiore a 100 (base = 100 nel periodo di riferimento) segnala un aumento del livello generale dei prezzi rispetto a quel periodo base.", difficulty:"difficile"},
  {topic:"Test di ipotesi", q:"Il livello di significatività α di un test corrisponde a:", options:["La probabilità che l'ipotesi alternativa sia sicuramente vera, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","Il valore critico della statistica test calcolato sul campione, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","La probabilità massima accettata di commettere un errore di primo tipo, cioè di rifiutare H0 quando è vera","La percentuale di osservazioni correttamente classificate dal modello, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe"], correct:2, explain:"Il livello α è la soglia di probabilità, fissata a priori dal ricercatore, entro cui si accetta il rischio di rifiutare erroneamente un'ipotesi nulla vera (errore di I tipo).", difficulty:"difficile"},
  {topic:"Variabili casuali", q:"La funzione di ripartizione (o funzione di distribuzione cumulata) di una variabile casuale X, calcolata in un punto x, esprime:", options:["Il valore atteso della variabile casuale X","La probabilità che X assuma esattamente il valore x","La probabilità che X assuma un valore minore o uguale a x","La varianza della variabile casuale X"], correct:2, explain:"La funzione di ripartizione F(x) = P(X ≤ x) cumula la probabilità di tutti i valori della variabile casuale fino al punto x incluso.", difficulty:"difficile"},
  {topic:"Stima", q:"La consistenza di uno stimatore indica che, al crescere della dimensione campionaria:", options:["Lo stimatore converge in probabilità verso il vero valore del parametro","Lo stimatore diventa sistematicamente distorto","La sua varianza tende ad aumentare indefinitamente","Il suo valore atteso si allontana progressivamente dal parametro vero"], correct:0, explain:"Uno stimatore consistente converge, al crescere di n, verso il vero valore del parametro con probabilità sempre più elevata, riducendo la propria variabilità.", difficulty:"difficile"},
  {topic:"Correlazione e regressione", q:"Il fenomeno della multicollinearità in un modello di regressione multipla si verifica quando:", options:["La variabile dipendente è perfettamente correlata con se stessa, un parametro stimato tramite il metodo dei momenti applicato al campione","Due o più variabili indipendenti sono fortemente correlate tra loro, rendendo instabile la stima dei coefficienti","I residui del modello hanno varianza costante, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","La variabile dipendente è perfettamente correlata con se stessa"], correct:1, explain:"La multicollinearità tra i regressori rende difficile distinguere l'effetto individuale di ciascuna variabile indipendente, aumentando la varianza delle stime dei coefficienti.", difficulty:"difficile"},
  {topic:"Correlazione e regressione", q:"Il residuo, in un modello di regressione, è definito come:", options:["La media aritmetica della variabile indipendente, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Il coefficiente angolare della retta di regressione stimata, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","La somma di tutti i valori osservati della variabile dipendente, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","La differenza tra il valore osservato e il valore stimato dal modello per una data osservazione"], correct:3, explain:"Il residuo (e_i = y_i − ŷ_i) misura lo scarto tra il valore effettivamente osservato e quello previsto dal modello per la medesima osservazione.", difficulty:"media"},
  {topic:"Concetti generali", q:"L'errore standard di una statistica campionaria misura:", options:["Il numero totale di osservazioni presenti nel campione, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","La differenza tra il valore massimo e minimo osservato nel campione, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","L'errore di misurazione dello strumento utilizzato per la rilevazione, un parametro stimato tramite il metodo dei momenti applicato al campione","La variabilità della statistica calcolata su campioni ripetuti estratti dalla stessa popolazione"], correct:3, explain:"L'errore standard esprime quanto ci si aspetta che una statistica (es. la media campionaria) vari da campione a campione, a parità di dimensione campionaria.", difficulty:"media"},
  {topic:"Statistica descrittiva", q:"Due distribuzioni con la stessa media possono comunque differire sensibilmente per:", options:["Il valore stesso della media aritmetica, che per ipotesi è identico, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","La definizione di popolazione statistica utilizzata, una grandezza calcolata sulla base della distribuzione marginale della variabile","Il numero di cifre decimali con cui si esprime la media, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Il grado di dispersione dei dati attorno alla media, misurato ad esempio dalla varianza"], correct:3, explain:"Due distribuzioni possono condividere la stessa media pur avendo dispersioni (varianza, deviazione standard) molto diverse attorno ad essa.", difficulty:"facile"},
  {topic:"Probabilità", q:"Nel lancio di due dadi equi, la probabilità di ottenere una somma pari a 7 è calcolabile contando:", options:["La somma dei valori attesi dei due dadi presi singolarmente","La somma dei valori attesi dei due dadi presi singolarmente, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","La differenza tra il valore massimo e minimo ottenibile, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Il numero di combinazioni favorevoli sul totale delle 36 combinazioni possibili"], correct:3, explain:"Con due dadi a 6 facce si hanno 36 esiti equiprobabili; la somma 7 si ottiene con 6 combinazioni favorevoli, da cui P = 6/36 = 1/6.", difficulty:"media"},
  {topic:"Statistica descrittiva", q:"La media aritmetica ponderata si differenzia dalla media aritmetica semplice perché:", options:["Si applica ai dati qualitativi nominali anziché a quelli quantitativi","Coincide concettualmente con la mediana della distribuzione","Risulta inapplicabile alle distribuzioni organizzate per classi di frequenza","Attribuisce a ciascun valore un peso proporzionale alla sua importanza o frequenza"], correct:3, explain:"Nella media ponderata ogni valore viene moltiplicato per un peso (es. la frequenza) prima di sommare e dividere per la somma dei pesi, a differenza della media semplice dove tutti i valori contano allo stesso modo.", difficulty:"facile"},
  {topic:"Rappresentazioni grafiche", q:"Un diagramma a dispersione (scatter plot) è utile principalmente per:", options:["Calcolare direttamente il valore della mediana di un insieme di dati","Rappresentare la sola distribuzione di frequenza di una variabile qualitativa","Rappresentare la distribuzione di frequenza di una variabile qualitativa","Visualizzare la relazione tra due variabili quantitative osservate congiuntamente"], correct:3, explain:"Lo scatter plot rappresenta ciascuna osservazione come un punto nel piano cartesiano, permettendo di individuare visivamente eventuali relazioni tra due variabili quantitative.", difficulty:"facile"},
  {topic:"Probabilità", q:"La regola della moltiplicazione per eventi indipendenti afferma che:", options:["P(A∩B) = P(A) · P(B)","P(A∩B) = P(A) + P(B)","P(A∩B) = P(A) − P(B)","P(A∩B) = P(A)/P(B)"], correct:0, explain:"Per due eventi indipendenti, la probabilità che si verifichino entrambi è data dal prodotto delle rispettive probabilità individuali.", difficulty:"media"},
  {topic:"Concetti generali", q:"Il carattere trasferibile (o mutabile), in statistica, è quello che:", options:["Non può in alcun modo essere rilevato su unità statistiche diverse","Può assumere modalità diverse da un'unità statistica all'altra","Dipende dal metodo di arrotondamento scelto dal ricercatore","Riguarda il modo in cui una singola osservazione viene arrotondata"], correct:1, explain:"Un carattere si dice mutabile (o trasferibile) quando può presentarsi con modalità differenti da un'unità all'altra della popolazione, a differenza di un carattere costante.", difficulty:"facile"},
  {topic:"Variabili casuali", q:"La deviazione standard di una variabile casuale è espressa:", options:["Come valore percentuale indipendentemente dal contesto","Nell'unità di misura al quadrato rispetto alla variabile originale","Nella stessa unità di misura della variabile originale","In una scala compresa tra 0 e 1 indipendentemente dai dati"], correct:2, explain:"A differenza della varianza (che è espressa al quadrato), la deviazione standard, essendo la sua radice quadrata, si esprime nella stessa unità di misura della variabile originale.", difficulty:"media"},
  {topic:"Campionamento", q:"L'errore di campionamento si verifica perché:", options:["La popolazione statistica non esiste realmente in alcun caso concreto, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","La popolazione statistica non esiste realmente in alcun caso concreto","Un campione, per quanto ben costruito, fornisce generalmente una stima e non il valore esatto del parametro di popolazione","Il calcolo della media aritmetica introduce sistematicamente un errore di arrotondamento"], correct:2, explain:"L'errore di campionamento deriva dal fatto che un campione, essendo un sottoinsieme della popolazione, fornisce una stima soggetta a variabilità rispetto al vero valore del parametro.", difficulty:"media"},
  {topic:"Correlazione e regressione", q:"L'intercetta della retta di regressione stimata rappresenta:", options:["Il valore atteso della variabile dipendente quando la variabile indipendente è pari a zero","La percentuale di variabilità spiegata dal modello","Il grado di correlazione lineare tra le due variabili","La variazione media della variabile dipendente per un aumento unitario di quella indipendente"], correct:0, explain:"L'intercetta è il valore stimato di Y quando X assume valore zero, mentre il coefficiente angolare misura la variazione media di Y per unità di X.", difficulty:"media"},
  {topic:"Test di ipotesi", q:"Aumentare il livello di significatività α di un test, a parità di altre condizioni, tende a:", options:["Aumentare la probabilità di rifiutare l'ipotesi nulla, incluso il rischio di errore di primo tipo","Eliminare completamente la necessità di formulare un'ipotesi alternativa, una grandezza calcolata sulla base della distribuzione marginale della variabile","Rendere il test del tutto insensibile ai dati osservati, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Ridurre automaticamente l'errore di secondo tipo a zero, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata"], correct:0, explain:"Un α più elevato amplia la regione di rifiuto, aumentando la probabilità di rifiutare H0 (anche quando è vera), cioè aumentando il rischio di errore di primo tipo.", difficulty:"difficile"},
  {topic:"Media aritmetica (dispensa)", q:"Un'azienda usa 3 mezzi di trasporto diversi. Il tempo medio per l'auto risulta 32,17 minuti su 12 giorni osservati. Come si ottiene questo valore secondo la definizione di media aritmetica vista a lezione?", options:["Prendendo il tempo osservato nella posizione centrale tra i 12 giorni","Calcolando la radice dodicesima del prodotto dei 12 tempi","Sommando i 12 tempi osservati e dividendo per 12","Individuando il tempo che compare più frequentemente tra i 12 giorni"], correct:2, explain:"La media aritmetica è la somma dei valori osservati divisa per il loro numero: nell'esempio della dispensa, 386/12 = 32,17 minuti per l'auto.", difficulty:"facile"},
  {topic:"Media aritmetica ponderata (dispensa)", q:"Un'industria produce copertoni di tipo A (45 min/pezzo, 400 pezzi), B (15 min/pezzo, 2.500 pezzi) e C (18 min/pezzo, 1.500 pezzi). Perché il tempo medio ponderato per copertone (18,75 min) risulta inferiore alla semplice media aritmetica dei tre tempi (26 min)?", options:["Perché la media ponderata ignora completamente il tempo di produzione del tipo A","Perché la media ponderata ignora completamente il tempo di produzione del tipo A, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Perché la media ponderata attribuisce più peso ai tipi B e C, prodotti in quantità molto maggiori e più rapidi da realizzare","Perché si tratta di un errore di arrotondamento ininfluente ai fini del confronto, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe"], correct:2, explain:"La media ponderata pesa ciascun tempo in base ai pezzi effettivamente prodotti: essendo B e C molto più numerosi e più veloci, abbassano la media rispetto alla semplice media aritmetica dei tre tempi.", difficulty:"media"},
