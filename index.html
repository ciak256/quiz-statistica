  {topic:"Organizzazione", q:"Tra le funzioni aziendali tipiche rientrano:", options:["La produzione e la manutenzione degli impianti","Produzione, marketing, finanza e risorse umane","La contabilità e la logistica di magazzino","La funzione legale e quella di relazioni sindacali"], correct:1, explain:"Un'impresa si articola tipicamente in più funzioni (produzione, marketing, finanza, risorse umane, ecc.) che collaborano al perseguimento degli obiettivi.", difficulty:"facile"},
  {topic:"Marketing", q:"Il marketing mix è tradizionalmente composto dalle cosiddette '4P':", options:["Persone, Processo, Prova, Prezzo, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Prodotto, Prezzo, Distribuzione (Place), Comunicazione (Promotion)","Produzione, Profitto, Personale, Pianificazione, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Prodotto, Pubblicità, Politica, Programmazione, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale"], correct:1, explain:"Le 4P classiche del marketing mix sono Product, Price, Place, Promotion.", difficulty:"difficile"},
  {topic:"Marketing", q:"Il ciclo di vita del prodotto comprende tipicamente le fasi di:", options:["Introduzione, sviluppo, maturità, declino","Nascita, fallimento, rilancio, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Produzione, vendita, reso, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Progettazione, brevetto, quotazione"], correct:0, explain:"Il ciclo di vita del prodotto descrive l'evoluzione delle vendite nelle fasi di introduzione, crescita/sviluppo, maturità e declino.", difficulty:"media"},
  {topic:"Finanza aziendale", q:"Il cash flow (flusso di cassa) rappresenta:", options:["Il fatturato lordo dell'impresa, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","La variazione delle disponibilità liquide in un determinato periodo","Il valore del magazzino a fine anno, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","L'utile netto di bilancio, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati"], correct:1, explain:"Il cash flow misura le entrate e le uscite monetarie effettive, distinto dal risultato economico di competenza.", difficulty:"media"},
  {topic:"Finanza aziendale", q:"Il budget aziendale è principalmente:", options:["Un documento consuntivo redatto a fine esercizio","Uno strumento di programmazione e controllo economico-finanziario","Il bilancio consolidato di gruppo, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Un contratto con i fornitori, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale"], correct:1, explain:"Il budget traduce in termini economico-finanziari gli obiettivi e i programmi dell'impresa per un periodo futuro, permettendone il controllo.", difficulty:"media"},
  {topic:"Finanza aziendale", q:"Il bilancio consolidato è:", options:["Il bilancio di una singola impresa individuale, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Il bilancio che rappresenta la situazione economico-patrimoniale di un gruppo di imprese","Un prospetto che riguarda una singola società priva di partecipazioni","Un documento facoltativo privo di rilevanza per i creditori sociali"], correct:1, explain:"Il bilancio consolidato aggrega le situazioni contabili delle imprese appartenenti a un gruppo, eliminando le partite infragruppo.", difficulty:"media"},
  {topic:"Lavoro", q:"Il TFR (Trattamento di Fine Rapporto) è:", options:["Un premio di produzione mensile, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Una quota di retribuzione accantonata annualmente e liquidata al termine del rapporto di lavoro","Un'imposta sui redditi da lavoro, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Una componente del capitale sociale versato dai soci"], correct:1, explain:"Il TFR è una somma che il datore di lavoro accantona ogni anno e corrisponde al lavoratore alla cessazione del rapporto.", difficulty:"difficile"},
  {topic:"Principi contabili", q:"I principi contabili (nazionali OIC o internazionali IAS/IFRS) servono a:", options:["Stabilire le aliquote fiscali, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Definire regole e criteri per la corretta redazione del bilancio","Fissare il prezzo delle azioni in borsa, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Determinare l'aliquota fiscale applicabile all'impresa"], correct:1, explain:"I principi contabili forniscono i criteri di rilevazione, valutazione ed esposizione delle voci di bilancio.", difficulty:"difficile"},
  {topic:"Principi contabili", q:"Il principio della competenza economica prevede che:", options:["Costi e ricavi vengano rilevati nell'esercizio successivo a quello di manifestazione","Costi e ricavi siano attribuiti all'esercizio in cui economicamente maturano, indipendentemente dal momento dell'incasso/pagamento","Si escludano dal bilancio i costi di natura stimata","Si escludano dal bilancio le imposte, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)"], correct:1, explain:"Il principio di competenza economica impone di imputare costi e ricavi all'esercizio in cui si manifestano economicamente, non a quello dei movimenti di cassa.", difficulty:"difficile"},
  {topic:"Contabilità", q:"Il libro giornale registra le operazioni aziendali:", options:["A fine esercizio, in forma riepilogativa e non dettagliata","In ordine cronologico, secondo la data in cui avvengono","Raggruppate per tipologia di conto anziché in ordine temporale","Limitatamente alle operazioni di acquisto di beni e servizi"], correct:1, explain:"Il libro giornale è il registro cronologico in cui si annotano man mano tutte le operazioni di gestione dell'impresa.", difficulty:"facile"},
  {topic:"Bilancio", q:"La Nota Integrativa ha la funzione principale di:", options:["Sostituire integralmente lo Stato Patrimoniale, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Illustrare e commentare i dati numerici dello Stato Patrimoniale e del Conto Economico","Calcolare automaticamente gli indici di bilancio, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Registrare le sole operazioni di cassa, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità"], correct:1, explain:"La Nota Integrativa fornisce informazioni qualitative e di dettaglio che completano la lettura dei prospetti quantitativi del bilancio.", difficulty:"facile"},
  {topic:"Analisi dei costi", q:"I costi semivariabili (o misti) sono quelli che:", options:["Contengono una componente fissa e una variabile al variare della produzione","Coincidono concettualmente con i costi diretti di produzione, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Restano costanti indipendentemente dal volume prodotto, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Variano in base al prezzo di vendita anziché al volume prodotto, un dato che deriva dalla riclassificazione del conto economico a costo del venduto"], correct:0, explain:"I costi semivariabili, come le utenze con quota fissa e consumo, combinano una parte indipendente dai volumi e una parte proporzionale ad essi.", difficulty:"media"},
  {topic:"Indici di bilancio", q:"Il rapporto tra ROI e ROE, nella scomposizione della leva finanziaria, mette in evidenza:", options:["L'effetto moltiplicativo dell'indebitamento sulla redditività del capitale proprio","La quota di ammortamento annua degli impianti, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","La quota di ammortamento annua degli impianti","Il valore nominale delle azioni in circolazione, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati"], correct:0, explain:"La leva finanziaria mostra come il ricorso al debito possa amplificare, in positivo o in negativo, il ROE rispetto al ROI operativo.", difficulty:"media"},
  {topic:"Contabilità", q:"Il principio di competenza economica prevede che costi e ricavi siano imputati:", options:["Nell'esercizio in cui avviene il relativo movimento di cassa, indipendentemente dalla competenza","Nell'esercizio successivo a quello di manifestazione economica","All'esercizio a cui si riferiscono economicamente, indipendentemente dal momento dell'incasso o del pagamento","In base alla data di emissione della fattura di vendita"], correct:2, explain:"Il principio di competenza impone di rilevare costi e ricavi nel periodo a cui si riferiscono economicamente, a prescindere dai flussi di cassa.", difficulty:"media"},
  {topic:"Forme giuridiche", q:"Nella Società in Accomandita Semplice (SAS) coesistono:", options:["Un unico socio che risponde con il proprio patrimonio personale","Due categorie di soci, entrambe con responsabilità limitata al capitale versato","Soci accomandatari con responsabilità illimitata e soci accomandanti con responsabilità limitata","Un unico socio che risponde con il proprio patrimonio personale, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale"], correct:2, explain:"La SAS prevede due categorie di soci: accomandatari (gestione e responsabilità illimitata) e accomandanti (responsabilità limitata al capitale conferito).", difficulty:"media"},
  {topic:"Analisi dei costi", q:"Il costo opportunità di una scelta gestionale rappresenta:", options:["Il costo storico effettivamente sostenuto per un bene, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Il valore della migliore alternativa a cui si rinuncia scegliendo una determinata opzione","La somma dei soli costi variabili di produzione, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","L'ammortamento residuo di un cespite, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi"], correct:1, explain:"Il costo opportunità non compare in contabilità ma esprime il beneficio a cui si rinuncia scegliendo un'alternativa rispetto a un'altra.", difficulty:"difficile"},
  {topic:"Indici di bilancio", q:"Un current ratio (attivo circolante / passività correnti) inferiore a 1 segnala tipicamente:", options:["Una possibile difficoltà a coprire gli impegni a breve termine con le attività correnti","Una redditività del capitale proprio molto elevata, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Un livello di ammortamento eccessivo, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Una redditività del capitale proprio molto elevata"], correct:0, explain:"Un current ratio sotto 1 indica che le attività a breve non coprono interamente le passività correnti, segnalando tensioni di liquidità.", difficulty:"difficile"},
  {topic:"Bilancio", q:"Il Rendiconto Finanziario, a differenza del Conto Economico, evidenzia principalmente:", options:["Le variazioni delle disponibilità liquide generate dalla gestione operativa, di investimento e finanziaria","Il valore delle immobilizzazioni immateriali, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Il valore delle immobilizzazioni immateriali","La composizione del patrimonio netto, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti"], correct:0, explain:"Il Rendiconto Finanziario riclassifica i flussi di cassa per area (operativa, investimento, finanziaria), offrendo una lettura complementare al Conto Economico.", difficulty:"difficile"},
  {topic:"Efficienza e strategia", q:"Il vantaggio competitivo di costo, secondo l'impostazione di Porter, si realizza quando l'impresa:", options:["Aumenta il prezzo di vendita senza modificare i costi, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Riduce la qualità percepita del prodotto per ridurre i ricavi, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Aumenta il prezzo di vendita senza modificare i costi","Riesce a offrire un prodotto comparabile sostenendo costi inferiori rispetto ai concorrenti"], correct:3, explain:"Il vantaggio di costo consiste nel produrre a costi inferiori a parità di valore offerto, permettendo margini più ampi o prezzi più competitivi.", difficulty:"difficile"},
  {topic:"Concetti generali", q:"L'azienda, in senso economico-aziendale, può essere definita come:", options:["Un insieme di soli beni materiali privo di organizzazione","Un istituto economico che opera per il soddisfacimento dei bisogni umani attraverso la produzione o lo scambio di beni e servizi","Un ente gestito direttamente da un'autorità amministrativa statale","Un insieme di soli beni materiali privi di organizzazione, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità"], correct:1, explain:"L'azienda è un istituto economico durevole che, attraverso un'organizzazione di persone e mezzi, soddisfa bisogni umani mediante produzione o scambio.", difficulty:"facile"},
  {topic:"Contabilità", q:"Il piano dei conti è lo strumento che:", options:["Sostituisce integralmente il bilancio d'esercizio","Elenca in modo sistematico e codificato tutti i conti utilizzati dall'impresa nella rilevazione contabile","Contiene le sole aliquote fiscali applicabili all'impresa","Sostituisce integralmente il bilancio d'esercizio, un dato che deriva dalla riclassificazione del conto economico a costo del venduto"], correct:1, explain:"Il piano dei conti organizza in modo sistematico e codificato l'insieme dei conti che l'impresa utilizza per registrare le proprie operazioni.", difficulty:"facile"},
  {topic:"Forme giuridiche", q:"L'impresa individuale si caratterizza per il fatto che:", options:["Un unico soggetto è titolare dell'attività e risponde con tutto il proprio patrimonio delle obbligazioni assunte","Il capitale è suddiviso tra un numero minimo di due soci fondatori","Deve obbligatoriamente avere almeno due soci fondatori, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Deve obbligatoriamente adottare la contabilità semplificata"], correct:0, explain:"Nell'impresa individuale l'imprenditore è l'unico titolare e risponde illimitatamente con il proprio patrimonio personale delle obbligazioni assunte.", difficulty:"facile"},
  {topic:"Bilancio", q:"L'attivo dello Stato Patrimoniale accoglie, tra l'altro:", options:["Le immobilizzazioni e l'attivo circolante dell'impresa","Il patrimonio netto e le passività a lungo termine","I costi di competenza e i ricavi dell'esercizio","I debiti verso banche e fornitori"], correct:0, explain:"L'attivo dello Stato Patrimoniale comprende le immobilizzazioni (materiali, immateriali, finanziarie) e l'attivo circolante (rimanenze, crediti, liquidità).", difficulty:"facile"},
  {topic:"Analisi dei costi", q:"I costi diretti di produzione sono quelli che:", options:["Non possono in alcun modo essere attribuiti a un prodotto specifico","Vengono ripartiti tra i prodotti tramite una base di allocazione convenzionale","Possono essere attribuiti in modo univoco e certo a uno specifico prodotto o commessa","Non possono in alcun modo essere attribuiti a un prodotto specifico, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale"], correct:2, explain:"I costi diretti sono imputabili con certezza a un determinato oggetto di costo (prodotto, commessa), a differenza di quelli indiretti che richiedono un criterio di ripartizione.", difficulty:"facile"},
  {topic:"Concetti generali", q:"La gestione aziendale si suddivide tradizionalmente in:", options:["Un'unica area indistinta priva di suddivisioni interne","Gestione ordinaria e gestione tributaria, con esclusione di quella finanziaria","Gestione caratteristica, gestione finanziaria, gestione straordinaria e gestione tributaria","Un'unica area indistinta priva di suddivisioni interne, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi"], correct:2, explain:"La gestione aziendale viene generalmente scomposta in area caratteristica, finanziaria, straordinaria (accessoria) e tributaria, ciascuna con proprie dinamiche economiche.", difficulty:"facile"},
  {topic:"Bilancio", q:"Il postulato della chiarezza nella redazione del bilancio richiede che:", options:["I dati contabili possano essere presentati in modo ambiguo se necessario","Il bilancio sia redatto in modo comprensibile e trasparente per i suoi destinatari","Le voci di bilancio possano essere omesse liberamente dall'amministratore","Il bilancio venga redatto senza rispettare schemi predefiniti dalla legge"], correct:1, explain:"Il principio di chiarezza (art. 2423 c.c.) impone che il bilancio sia redatto in modo da consentire una lettura trasparente e comprensibile della situazione aziendale.", difficulty:"media"},
  {topic:"Indici di bilancio", q:"L'indice di indebitamento (rapporto tra capitale di terzi e capitale proprio) fornisce indicazioni su:", options:["Il grado di dipendenza finanziaria dell'impresa dal capitale di debito rispetto ai mezzi propri","La sola redditività del capitale investito nell'attività caratteristica, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","La quantità di rimanenze di magazzino a fine esercizio, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Il valore di mercato delle azioni dell'impresa quotata, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa"], correct:0, explain:"Questo indice misura quanto l'impresa fa ricorso a capitale di terzi rispetto al capitale proprio, evidenziando il grado di leva finanziaria adottato.", difficulty:"media"},
  {topic:"Analisi dei costi", q:"Il full costing, a differenza del direct costing, imputa al prodotto:", options:["Sia i costi diretti sia una quota dei costi indiretti (fissi) di produzione","Nessun costo relativo alla struttura produttiva, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Nessun costo relativo alla struttura produttiva","I ricavi di vendita al netto delle imposte dirette"], correct:0, explain:"Il full costing (costo pieno) attribuisce al prodotto anche una quota dei costi fissi/indiretti, mentre il direct costing considera solo i costi variabili.", difficulty:"media"},
  {topic:"Contabilità", q:"Le scritture di assestamento vengono effettuate:", options:["Alla fine dell'esercizio, per rendere i valori contabili conformi al principio di competenza economica","Ogni giorno, per registrare le operazioni di cassa correnti","Ogni giorno, per registrare le operazioni di cassa correnti, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Contestualmente alla dichiarazione dei redditi annuale"], correct:0, explain:"Le scritture di assestamento (ammortamenti, ratei, risconti, rimanenze) adeguano i saldi contabili al principio di competenza in chiusura d'esercizio.", difficulty:"media"},
  {topic:"Governance e organizzazione", q:"La struttura organizzativa gerarchico-funzionale si basa su:", options:["L'assenza totale di livelli gerarchici all'interno dell'impresa","Un'unica funzione aziendale priva di suddivisioni interne","Un'unica linea di comando affiancata da funzioni specializzate di staff e di line","Divisioni completamente autonome per ciascun prodotto realizzato"], correct:2, explain:"Nella struttura gerarchico-funzionale convivono una linea di comando (line) e funzioni specialistiche di supporto (staff), tipiche di molte medie e grandi imprese.", difficulty:"media"},
  {topic:"Marketing", q:"Il marketing mix comprende tradizionalmente le cosiddette 4P, ovvero:", options:["Produzione, Personale, Profitto e Pianificazione","Prodotto, Progetto, Programma e Previsione","Prodotto, Prezzo, Punto vendita (distribuzione) e Promozione","Persone, Processo, Fisicità e Partnership"], correct:2, explain:"Le 4P del marketing mix classico sono Product, Price, Place e Promotion, ovvero prodotto, prezzo, distribuzione e promozione.", difficulty:"media"},
  {topic:"Bilancio", q:"Il criterio del costo storico, nella valutazione delle immobilizzazioni, prevede che il bene sia iscritto:", options:["Al costo sostenuto per il suo acquisto o la sua produzione, salvo rettifiche previste dalla normativa","Al valore stabilito discrezionalmente dal Collegio Sindacale","A un valore convenzionale fissato liberamente dall'amministratore","A un valore convenzionale fissato liberamente dall'amministratore, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità"], correct:0, explain:"Il criterio del costo storico impone di iscrivere il bene al costo di acquisizione, rettificato da ammortamenti ed eventuali svalutazioni.", difficulty:"media"},
  {topic:"Indici di bilancio", q:"Un miglioramento del margine di struttura (patrimonio netto meno immobilizzazioni) indica generalmente:", options:["Una maggiore capacità dei mezzi propri di coprire gli investimenti durevoli dell'impresa","Un peggioramento della solidità patrimoniale dell'impresa, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Una diminuzione della liquidità immediata disponibile, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","L'aumento automatico del fatturato dell'esercizio, un dato che deriva dalla riclassificazione del conto economico a costo del venduto"], correct:0, explain:"Un margine di struttura positivo e crescente segnala che il patrimonio netto copre adeguatamente le immobilizzazioni, indice di solidità patrimoniale.", difficulty:"difficile"},
  {topic:"Analisi dei costi", q:"Nel calcolo del break-even point, il margine di contribuzione unitario è dato da:", options:["Prezzo di vendita unitario meno costo variabile unitario","Costo variabile unitario meno costo fisso unitario","Prezzo di vendita unitario meno costo fisso totale","Ricavo totale diviso il numero di unità prodotte"], correct:0, explain:"Il margine di contribuzione unitario (prezzo meno costo variabile unitario) indica quanto ogni unità venduta contribuisce a coprire i costi fissi e generare utile.", difficulty:"difficile"},
  {topic:"Governance e organizzazione", q:"L'esternalizzazione (outsourcing) di un'attività aziendale consiste nel:", options:["Assumere internamente nuovo personale specializzato in modo permanente, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Affidare a soggetti esterni lo svolgimento di attività prima gestite internamente all'impresa","Integrare verticalmente a monte una nuova fase produttiva, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Fondersi con un'impresa concorrente operante nello stesso settore, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati"], correct:1, explain:"L'outsourcing consiste nell'affidare a terzi la gestione di attività o processi, spesso non core, prima svolti internamente, per ridurre costi o aumentare flessibilità.", difficulty:"difficile"},
  {topic:"Bilancio", q:"La rivalutazione dei beni d'impresa, quando consentita dalla normativa, comporta tipicamente:", options:["La riduzione automatica degli ammortamenti futuri a zero, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","L'obbligo di vendita immediata del bene rivalutato, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","L'iscrizione di un maggior valore del bene in contropartita di una riserva di patrimonio netto","La cancellazione del bene dall'attivo dello Stato Patrimoniale, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale"], correct:2, explain:"La rivalutazione, ove ammessa da leggi speciali, adegua il valore contabile del bene al suo maggior valore, generando una riserva di rivalutazione nel patrimonio netto.", difficulty:"difficile"},
  {topic:"Analisi dei costi", q:"L'activity based costing (ABC) si distingue dai metodi tradizionali di calcolo dei costi perché:", options:["Ignora completamente i costi indiretti nell'attribuzione al prodotto, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Ignora completamente i costi indiretti nell'attribuzione al prodotto","Attribuisce i costi indiretti sulla base delle attività che effettivamente li generano, anziché di basi di ripartizione generiche","Coincide concettualmente con il metodo del direct costing"], correct:2, explain:"L'ABC ripartisce i costi indiretti in base alle attività (cost driver) che li originano, offrendo un'attribuzione più precisa rispetto ai criteri tradizionali generici.", difficulty:"difficile"},
  {topic:"Marketing", q:"Il posizionamento di un prodotto sul mercato riguarda principalmente:", options:["La quantità fisica di prodotto immagazzinata, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","L'ammontare del prezzo di listino stabilito dall'impresa","L'ammontare del prezzo di listino stabilito dall'impresa, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Il modo in cui il prodotto viene percepito dai consumatori rispetto alla concorrenza"], correct:3, explain:"Il posizionamento riguarda la percezione del prodotto nella mente del consumatore rispetto alle alternative concorrenti, costruita attraverso attributi distintivi e comunicazione.", difficulty:"difficile"},
  {topic:"Governance e organizzazione", q:"La responsabilità limitata dei soci in una società di capitali implica che:", options:["I soci rispondono sempre illimitatamente con il proprio patrimonio personale","I creditori sociali possono sempre aggredire direttamente il patrimonio dei singoli soci","La società non ha mai un proprio patrimonio distinto da quello dei soci","I soci rispondono delle obbligazioni sociali solo nei limiti del capitale conferito"], correct:3, explain:"Nelle società di capitali (SPA, SRL) i soci rispondono, salvo eccezioni, limitatamente al capitale conferito, mentre delle obbligazioni sociali risponde la società con il proprio patrimonio.", difficulty:"difficile"},
  {topic:"Concetti generali", q:"Il patrimonio aziendale, in un dato momento, è rappresentato da:", options:["La differenza tra ricavi e costi di un singolo mese, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","L'insieme dei beni, dei crediti e dei debiti riferibili all'impresa in quel momento","La differenza tra ricavi e costi di un singolo mese","L'importo del capitale sociale sottoscritto dai soci, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti"], correct:1, explain:"Il patrimonio è l'insieme di attività (beni e crediti) e passività (debiti) riferibili all'azienda in un determinato istante, la cui differenza dà il patrimonio netto.", difficulty:"facile"},
  {topic:"Contabilità", q:"Il conto economico riclassificato a valore aggiunto evidenzia in particolare:", options:["La composizione dettagliata dell'attivo circolante","Il valore creato dall'impresa al netto dei costi per materie e servizi esterni","Il valore nominale delle azioni in circolazione","La composizione dettagliata dell'attivo circolante, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)"], correct:1, explain:"Il valore aggiunto misura la ricchezza generata dall'impresa al netto dei costi per beni e servizi acquistati da terzi, prima di remunerare lavoro, capitale e Stato.", difficulty:"facile"},
  {topic:"Forme giuridiche", q:"Nella Società in Nome Collettivo (SNC), i soci rispondono delle obbligazioni sociali:", options:["In misura limitata, essendo la responsabilità principalmente della società","Nei limiti della quota di capitale conferita da ciascun socio","In base a quanto stabilito da un'apposita clausola statutaria facoltativa","Solidalmente e illimitatamente con il proprio patrimonio personale"], correct:3, explain:"Nella SNC tutti i soci rispondono solidalmente e illimitatamente delle obbligazioni sociali, anche con il proprio patrimonio personale.", difficulty:"facile"},
  {topic:"Analisi dei costi", q:"I costi fissi di un'impresa sono quelli che:", options:["Variano in proporzione diretta con le quantità prodotte","Variano in proporzione diretta con le quantità prodotte, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Si annullano progressivamente al crescere della produzione","Non variano al variare del volume di produzione, entro un certo intervallo di attività"], correct:3, explain:"I costi fissi restano costanti al variare della produzione entro un dato intervallo di capacità produttiva, a differenza dei costi variabili.", difficulty:"facile"},
  {topic:"Bilancio", q:"Il Conto Economico ha la funzione di rappresentare:", options:["La situazione patrimoniale dell'impresa in un dato istante, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Il valore di mercato delle azioni della società, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","La situazione patrimoniale dell'impresa in un dato istante","Il risultato economico dell'esercizio attraverso il confronto tra costi e ricavi di competenza"], correct:3, explain:"Il Conto Economico espone costi e ricavi di competenza dell'esercizio, il cui saldo determina l'utile o la perdita del periodo.", difficulty:"facile"},
  {topic:"Concetti generali", q:"L'imprenditore commerciale, secondo il codice civile, è soggetto tra l'altro:", options:["Al divieto assoluto di assumere dipendenti","All'esonero permanente dalla tenuta delle scritture contabili","Al divieto assoluto di assumere dipendenti, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","All'obbligo di iscrizione nel registro delle imprese e alla tenuta delle scritture contabili"], correct:3, explain:"L'imprenditore commerciale è soggetto, tra gli altri obblighi, all'iscrizione nel registro delle imprese e alla tenuta di scritture contabili obbligatorie (artt. 2195 e ss. c.c.).", difficulty:"media"},
  {topic:"Indici di bilancio", q:"Il ROS (Return on Sales) esprime:", options:["La quota di indebitamento complessivo dell'impresa, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Il tempo medio di incasso dei crediti verso clienti, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Il rapporto tra utile netto e patrimonio netto dell'impresa, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Il rapporto tra reddito operativo e ricavi di vendita, misurando la redditività delle vendite"], correct:3, explain:"Il ROS misura quanta parte dei ricavi di vendita si traduce in reddito operativo, esprimendo l'efficienza reddituale della gestione caratteristica.", difficulty:"media"},
  {topic:"Analisi dei costi", q:"Il costo standard di un prodotto rappresenta:", options:["Il costo variabile medio di lungo periodo, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Il prezzo di vendita minimo imposto dalla legge, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Il costo storico effettivamente sostenuto e già consuntivato, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Un costo predeterminato, calcolato in condizioni di efficienza normale, usato come parametro di confronto con i costi effettivi"], correct:3, explain:"Il costo standard è un valore-obiettivo definito ex ante in condizioni di efficienza attesa, utilizzato per confrontarlo con i costi consuntivi ed evidenziare eventuali scostamenti.", difficulty:"media"},
  {topic:"Governance e organizzazione", q:"La struttura organizzativa a matrice combina:", options:["Un unico livello gerarchico privo di qualunque specializzazione","Nessuna forma di coordinamento tra le diverse funzioni aziendali, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Un criterio di specializzazione funzionale con uno orientato ai progetti o ai prodotti","Un unico livello gerarchico privo di qualunque specializzazione, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa"], correct:2, explain:"La struttura a matrice incrocia la logica funzionale (per competenze) con quella per progetto o prodotto, richiedendo un doppio riporto gerarchico.", difficulty:"media"},
  {topic:"Bilancio", q:"Le immobilizzazioni finanziarie, nello Stato Patrimoniale, comprendono in particolare:", options:["La cassa e le disponibilità liquide immediate, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","I crediti commerciali verso clienti con scadenza a breve termine, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Partecipazioni, crediti finanziari e titoli destinati a permanere durevolmente nel patrimonio dell'impresa","Le sole rimanenze di magazzino a fine esercizio, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti"], correct:2, explain:"Le immobilizzazioni finanziarie includono partecipazioni, crediti e titoli destinati a restare durevolmente nel patrimonio, distinte dall'attivo circolante di breve periodo.", difficulty:"media"},
  {topic:"Marketing", q:"La marca (brand) di un prodotto assolve, tra le altre, la funzione di:", options:["Eliminare completamente la necessità di comunicazione pubblicitaria, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Differenziare l'offerta dell'impresa rispetto a quella dei concorrenti agli occhi del consumatore","Sostituire integralmente la rete di distribuzione fisica, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Sostituire integralmente la rete di distribuzione fisica"], correct:1, explain:"Il brand contribuisce a differenziare il prodotto dai concorrenti, veicolando valori, qualità percepita e fiducia presso il consumatore.", difficulty:"media"},
  {topic:"Analisi dei costi", q:"Nel calcolo del punto di equilibrio (break-even point) espresso in quantità, si utilizza la formula:", options:["Costi fissi totali diviso il margine di contribuzione unitario","Prezzo di vendita unitario diviso i costi fissi totali","Ricavi totali diviso i costi fissi totali","Costi variabili totali diviso il prezzo di vendita unitario"], correct:0, explain:"Il break-even point in quantità si ottiene dividendo i costi fissi totali per il margine di contribuzione unitario (prezzo meno costo variabile unitario).", difficulty:"difficile"},
  {topic:"Indici di bilancio", q:"Un peggioramento del quick ratio (o acid test), calcolato escludendo le rimanenze dall'attivo circolante, può segnalare:", options:["Una minore capacità dell'impresa di far fronte agli impegni a breve senza contare sulle scorte di magazzino","Una riduzione dell'indebitamento complessivo dell'impresa, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Un miglioramento della solidità patrimoniale di lungo periodo, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Un aumento della redditività operativa dell'impresa, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità"], correct:0, explain:"Il quick ratio, escludendo le rimanenze (meno liquide), offre una misura più prudente della liquidità a breve; un suo peggioramento segnala minore capacità di far fronte agli impegni correnti.", difficulty:"difficile"},
  {topic:"Governance e organizzazione", q:"Le operazioni di fusione tra imprese comportano tipicamente:", options:["L'unificazione di due o più società in un unico soggetto giuridico","L'apertura di una nuova sede secondaria priva di autonomia giuridica","Un semplice accordo di collaborazione commerciale temporaneo tra le parti","La cessione di un singolo ramo d'azienda mantenendo distinte le società coinvolte"], correct:0, explain:"La fusione realizza l'unificazione giuridica ed economica di due o più società preesistenti in un unico soggetto, per incorporazione o per unione.", difficulty:"difficile"},
  {topic:"Bilancio", q:"Il criterio del patrimonio netto per la valutazione delle partecipazioni prevede che il valore della partecipazione sia adeguato:", options:["Al fatturato complessivo della società partecipata, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Al valore nominale delle azioni risultante dallo statuto, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Alla quota di patrimonio netto della partecipata di competenza della società partecipante","Al valore nominale delle azioni risultante dallo statuto"], correct:2, explain:"Il metodo del patrimonio netto rettifica il valore della partecipazione in base alla quota di patrimonio netto della partecipata spettante alla partecipante, riflettendone i risultati economici.", difficulty:"difficile"},
  {topic:"Concetti generali", q:"L'economicità della gestione aziendale si realizza quando l'impresa è in grado di:", options:["Massimizzare il fatturato indipendentemente dal livello dei costi sostenuti, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Remunerare durevolmente tutti i fattori produttivi impiegati, incluso il capitale proprio, con le risorse generate dalla propria attività","Ridurre sistematicamente il numero di dipendenti ogni esercizio, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Massimizzare il fatturato indipendentemente dal livello dei costi sostenuti"], correct:1, explain:"L'economicità indica la capacità dell'impresa di remunerare durevolmente, con le proprie risorse, tutti i fattori produttivi impiegati, incluso il capitale di rischio.", difficulty:"media"},
  {topic:"Bilancio", q:"Le rimanenze finali di magazzino, nello Stato Patrimoniale, sono classificate all'interno:", options:["Dei debiti a breve termine","Dell'attivo circolante","Delle immobilizzazioni materiali","Del patrimonio netto"], correct:1, explain:"Le rimanenze di magazzino (materie prime, prodotti in corso, prodotti finiti) fanno parte dell'attivo circolante, in quanto destinate a trasformarsi in liquidità nel breve periodo.", difficulty:"facile"},
  {topic:"Analisi dei costi", q:"Il costo medio unitario di produzione si ottiene:", options:["Sottraendo i costi variabili dai ricavi totali di vendita","Moltiplicando il costo variabile unitario per il numero di unità prodotte","Dividendo il costo totale di produzione per il numero di unità prodotte","Sommando costi fissi e costi variabili senza alcuna divisione"], correct:2, explain:"Il costo medio unitario è il costo totale di produzione diviso per il numero di unità realizzate, e tende a diminuire al crescere dei volumi per effetto dei costi fissi.", difficulty:"facile"},
  {topic:"Concetti generali", q:"I soggetti che compongono l'ambiente esterno di un'impresa comprendono, tra gli altri:", options:["I creditori finanziari e gli amministratori interni","Gli azionisti di maggioranza e i dirigenti apicali","Clienti, fornitori, concorrenti e istituzioni pubbliche","I dipendenti assunti a tempo indeterminato e il management interno"], correct:2, explain:"L'ambiente esterno dell'impresa comprende una pluralità di soggetti (clienti, fornitori, concorrenti, istituzioni, comunità) con cui essa interagisce nello svolgimento della propria attività.", difficulty:"facile"},
  {topic:"Contabilità", q:"Il conto 'Cassa' in contabilità generale registra:", options:["Le entrate e le uscite di denaro contante dell'impresa","I debiti verso i fornitori e le banche","Il capitale sociale sottoscritto e le riserve statutarie","Il valore delle immobilizzazioni materiali e immateriali"], correct:0, explain:"Il conto Cassa rileva i movimenti di denaro contante in entrata e in uscita, rientrando tra le disponibilità liquide dell'attivo circolante.", difficulty:"facile"},
  {topic:"Indici di bilancio", q:"L'indice di autonomia finanziaria (patrimonio netto su totale delle fonti di finanziamento) segnala:", options:["Il livello assoluto dell'utile netto conseguito nell'esercizio, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Quanta parte degli investimenti dell'impresa è finanziata con mezzi propri anziché con capitale di terzi","Il numero di dipendenti impiegati nell'attività produttiva, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","La quantità fisica di rimanenze di magazzino a fine periodo, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale"], correct:1, explain:"L'indice di autonomia finanziaria misura il peso del patrimonio netto sul totale delle fonti di finanziamento, esprimendo il grado di indipendenza dell'impresa dal capitale di terzi.", difficulty:"media"},
  {topic:"Governance e organizzazione", q:"Il decentramento decisionale in un'organizzazione aziendale comporta che:", options:["Le funzioni aziendali vengano eliminate a vantaggio di un'unica struttura indifferenziata","Un maggior numero di decisioni venga delegato a livelli gerarchici inferiori rispetto al vertice","L'impresa rinunci del tutto a qualunque forma di controllo di gestione","Il vertice aziendale acquisisca il controllo esclusivo di ogni decisione"], correct:1, explain:"Il decentramento attribuisce maggiore autonomia decisionale ai livelli intermedi e operativi, riducendo l'accentramento delle decisioni al solo vertice aziendale.", difficulty:"media"},
  {topic:"Balanced Scorecard (paniere)", q:"La Balanced Scorecard:", options:["Prevede almeno 4 prospettive","Si basa esclusivamente su indicatori economico-finanziari","Sostituisce integralmente il budget aziendale","Misura solo la soddisfazione del cliente"], correct:0, explain:"La Balanced Scorecard integra almeno quattro prospettive: economico-finanziaria, clienti, processi interni e apprendimento/crescita.", difficulty:"facile"},
  {topic:"Balanced Scorecard (paniere)", q:"Un esempio di obiettivo della prospettiva clienti della balanced scorecard:", options:["Aumentare la quota di mercato","Ridurre i costi di produzione","Migliorare il rendimento del capitale investito","Aumentare la produttività del personale"], correct:0, explain:"La prospettiva clienti riguarda obiettivi come l'aumento della quota di mercato, la soddisfazione e la fidelizzazione della clientela.", difficulty:"facile"},
  {topic:"Balanced Scorecard (paniere)", q:"E' un vantaggio della BSC:", options:["Semplicità","La necessità di ingenti investimenti in tecnologia","L'esclusiva focalizzazione sul breve periodo","L'indipendenza dalla strategia aziendale"], correct:0, explain:"Tra i vantaggi della BSC vi è la relativa semplicità di applicazione e comunicazione rispetto ad altri sistemi di misurazione delle performance.", difficulty:"media"},
  {topic:"Balanced Scorecard (paniere)", q:"E' uno svantaggio della BSC:", options:["Non sempre le relazioni causa-effetto sono evidenti e/o precise","Considera esclusivamente indicatori finanziari, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Non prevede indicatori di performance non finanziari, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Si applica solo alle imprese di grandi dimensioni, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti"], correct:0, explain:"Un limite della BSC è che le relazioni causa-effetto tra le diverse prospettive non sono sempre facilmente dimostrabili o precise.", difficulty:"media"},
  {topic:"Balanced Scorecard (paniere)", q:"E' un esempio di misurazione dell'obiettivo qualità:", options:["% difetti","Fatturato per dipendente","Quota di mercato","Tasso di rotazione del personale"], correct:0, explain:"La percentuale di difetti è un tipico indicatore utilizzato per misurare la qualità di un prodotto o processo.", difficulty:"facile"},
  {topic:"Balanced Scorecard (paniere)", q:"La prospettiva Economico-finanziaria all'interno della balanced scorecard:", options:["Misura i risultati economico-finanziari ottenuti dall'impresa","Individua i segmenti della clientela e del mercato e le misure della performance","Riguarda l'efficienza dei processi produttivi interni","Riguarda le competenze e la formazione del personale"], correct:0, explain:"La prospettiva economico-finanziaria misura i risultati ottenuti in termini di redditività, crescita e valore per gli azionisti.", difficulty:"media"},
  {topic:"Balanced Scorecard (paniere)", q:"La prospettiva clienti all'interno della balanced scorecard:", options:["Individua i segmenti della clientela e del mercato e le misure della performance","Misura esclusivamente il fatturato complessivo dell'impresa, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Riguarda l'efficienza dei processi produttivi interni, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Riguarda le competenze e la formazione del personale, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)"], correct:0, explain:"La prospettiva clienti si concentra sull'identificazione dei segmenti di clientela e di mercato e sulle relative misure di performance.", difficulty:"media"},
  {topic:"Balanced Scorecard (paniere)", q:"Per ciascuna delle 4 dimensioni della balanced scorecard quale non è una variabile da rendicontare:", options:["Ore macchina","Soddisfazione del cliente","Redditività del capitale investito","Tempo di sviluppo di un nuovo prodotto"], correct:0, explain:"Le ore macchina sono un dato operativo di dettaglio, non una delle variabili tipicamente rendicontate nelle quattro dimensioni della BSC.", difficulty:"difficile"},
  {topic:"Balanced Scorecard (paniere)", q:"Per ciascuna delle 4 dimensioni della balanced scorecard quale non è una variabile da rendicontare (2):", options:["Ore uomo","Quota di mercato","Tasso di innovazione di prodotto","Margine operativo"], correct:0, explain:"Le ore uomo, come le ore macchina, sono un dettaglio operativo che non rientra tra le variabili tipiche rendicontate nella BSC.", difficulty:"difficile"},
  {topic:"Financial e Sustainability Report (paniere)", q:"E' un limite del financial report:", options:["La complessità","L'eccessiva sinteticità dei dati","Il riferimento esclusivo al futuro dell'impresa","L'assenza di dati quantitativi"], correct:0, explain:"Uno dei limiti riconosciuti del financial report tradizionale è la sua complessità, che ne rende difficile la lettura per un pubblico non specializzato.", difficulty:"media"},
  {topic:"Financial e Sustainability Report (paniere)", q:"Quale delle seguenti è una motivazione alla redazione del report di sostenibilità:", options:["Motivazione strategica","L'obbligo di sostituire il bilancio d'esercizio","La riduzione degli obblighi informativi verso gli azionisti","L'eliminazione della relazione sulla gestione"], correct:0, explain:"Tra le motivazioni alla redazione del report di sostenibilità vi è quella strategica, oltre a quelle etica e normativa.", difficulty:"media"},
  {topic:"Financial e Sustainability Report (paniere)", q:"I contenuti di un report di sostenibilità sono stabiliti:", options:["Da standard e regolamentazioni","Liberamente da ciascuna impresa senza alcun riferimento esterno","Esclusivamente dal Collegio Sindacale","Dalle sole associazioni di categoria del settore"], correct:0, explain:"I contenuti del report di sostenibilità sono definiti da standard riconosciuti (come il GRI) e da regolamentazioni normative.", difficulty:"media"},
  {topic:"Financial e Sustainability Report (paniere)", q:"E' una motivazione alla base della sostenibilità in azienda:", options:["Crescenti pressioni da parte degli stakeholder e dell'ambiente","La riduzione degli obblighi di trasparenza verso il mercato","La sostituzione del bilancio d'esercizio","L'eliminazione dei controlli interni"], correct:0, explain:"Le crescenti pressioni provenienti da stakeholder e ambiente esterno sono tra le principali motivazioni che spingono le aziende verso la sostenibilità.", difficulty:"facile"},
  {topic:"Financial e Sustainability Report (paniere)", q:"Le dimensioni della sostenibilità sono:", options:["3","2","5","4"], correct:0, explain:"Le dimensioni della sostenibilità sono tradizionalmente tre: economica, ambientale e sociale.", difficulty:"facile"},
  {topic:"Financial e Sustainability Report (paniere)", q:"Il Sustainability report è:", options:["Obbligatorio solo per le aziende che ricadono all'interno della direttiva 2013/34/EU","Obbligatorio per tutte le imprese senza eccezione, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Un documento facoltativo privo di qualunque riferimento normativo, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Sostitutivo del bilancio d'esercizio per tutte le società, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità"], correct:0, explain:"L'obbligo di redazione del Sustainability report riguarda le aziende rientranti nell'ambito della direttiva 2013/34/EU, non la generalità delle imprese.", difficulty:"media"},
  {topic:"Financial e Sustainability Report (paniere)", q:"Il Sustainability report è idealmente indirizzato:", options:["A tutti gli stakeholder","Ai soli azionisti di maggioranza","Al solo Collegio Sindacale","Esclusivamente all'Agenzia delle Entrate"], correct:0, explain:"Il report di sostenibilità è pensato per rispondere alle esigenze informative di tutti gli stakeholder dell'impresa, non solo degli azionisti.", difficulty:"facile"},
  {topic:"Financial e Sustainability Report (paniere)", q:"E' un limite del financial report (2):", options:["L'orientamento al passato","L'eccessiva proiezione verso il futuro","La scarsa attendibilità dei dati contabili","L'assenza di indicatori economico-finanziari"], correct:0, explain:"Un limite tipico del financial report è l'orientamento al passato (dati consuntivi), a differenza di report più orientati al futuro come quelli di sostenibilità.", difficulty:"media"},
  {topic:"Financial e Sustainability Report (paniere)", q:"Quale delle seguenti è una motivazione alla redazione del report di sostenibilità (2):", options:["Motivazione etica","L'obbligo di ridurre la trasparenza informativa","La sostituzione del Consiglio di Amministrazione","L'eliminazione degli obblighi fiscali"], correct:0, explain:"La motivazione etica, insieme a quella strategica e normativa, è tra le ragioni principali alla base della redazione del report di sostenibilità.", difficulty:"media"},
  {topic:"Financial e Sustainability Report (paniere)", q:"La direttiva 2013/34/EU è rivolta:", options:["Alle aziende con oltre 500 dipendenti e di interesse pubblico","A tutte le imprese individuali senza eccezione, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Alle sole microimprese non quotate, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Esclusivamente alle pubbliche amministrazioni, un dato che deriva dalla riclassificazione del conto economico a costo del venduto"], correct:0, explain:"La direttiva 2013/34/EU si applica alle aziende di grandi dimensioni con oltre 500 dipendenti e di interesse pubblico.", difficulty:"media"},
  {topic:"ESG e CSR (paniere)", q:"Nell'ambito dei criteri ESG, il criterio E (Environmental):", options:["Fa riferimento a diversi parametri relativi all'ambiente","Riguarda le relazioni con i dipendenti e i sindacati","Attiene alla struttura di governance societaria e al CdA","Misura la redditività complessiva dell'impresa"], correct:0, explain:"Il criterio E (Environmental) dei criteri ESG riguarda i parametri ambientali, come emissioni, uso di risorse e impatto ecologico.", difficulty:"facile"},
  {topic:"ESG e CSR (paniere)", q:"Le origini del concetto di Corporate Social Responsibility risalgono:", options:["Ai secoli XVIII e XIX","Agli anni 2000","Al secondo dopoguerra","Al XXI secolo"], correct:0, explain:"Le radici storiche del concetto di CSR sono fatte risalire ai secoli XVIII e XIX, con successivi sviluppi nel corso del Novecento.", difficulty:"difficile"},
  {topic:"ESG e CSR (paniere)", q:"Nell'Agenda 2030, le Nazioni Unite definiscono:", options:["17 Sustainable Development Goals (SDG)","10 Sustainable Development Goals (SDG)","25 Sustainable Development Goals (SDG)","5 Sustainable Development Goals (SDG)"], correct:0, explain:"L'Agenda 2030 delle Nazioni Unite individua 17 Obiettivi di Sviluppo Sostenibile (SDG).", difficulty:"facile"},
  {topic:"ESG e CSR (paniere)", q:"L'espressione \"Triple Bottom Line\" è stata coniata da:", options:["John Elkington","Howard R. Bowen","Gino Zappa","Michael Porter"], correct:0, explain:"L'espressione \"Triple Bottom Line\" (persone, pianeta, profitto) è stata coniata da John Elkington negli anni '90.", difficulty:"media"},
  {topic:"ESG e CSR (paniere)", q:"Le tre dimensioni in cui si articola il concetto di sostenibilità sono:", options:["Economica, Ambientale, Sociale","Economica, Politica, Sociale","Ambientale, Politica, Finanziaria","Sociale, Finanziaria, Tecnologica"], correct:0, explain:"Il concetto di sostenibilità si articola tradizionalmente in tre dimensioni: economica, ambientale e sociale.", difficulty:"facile"},
  {topic:"ESG e CSR (paniere)", q:"Nell'ambito dei criteri ESG, il criterio S (Sociale):", options:["Prende in considerazione le relazioni delle imprese","Riguarda gli aspetti ambientali e il consumo energetico","Misura la redditività del capitale investito","Attiene agli assetti proprietari e al CdA"], correct:0, explain:"Il criterio S (Sociale) valuta le relazioni dell'impresa con dipendenti, fornitori, clienti e comunità di riferimento.", difficulty:"facile"},
  {topic:"ESG e CSR (paniere)", q:"Attualmente, lo standard di riferimento per la rendicontazione delle informazioni non finanziarie è:", options:["Il GRI (Global Reporting Initiative)","Lo IASB, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Il principio OIC 12, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Il Testo Unico della Finanza, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati"], correct:0, explain:"Il GRI (Global Reporting Initiative) rappresenta lo standard di riferimento più diffuso per la rendicontazione non finanziaria.", difficulty:"media"},
  {topic:"ESG e CSR (paniere)", q:"Il concetto di sostenibilità affiancato a quello di sviluppo sostenibile è richiamato per la prima volta nel:", options:["Brundtland Report","Trattato di Maastricht","Protocollo di Kyoto","Accordo di Parigi"], correct:0, explain:"Il Brundtland Report (1987) ha introdotto per primo il concetto di sviluppo sostenibile affiancato a quello di sostenibilità.", difficulty:"media"},
  {topic:"ESG e CSR (paniere)", q:"La Non-Financial Reporting Directive (NFRD):", options:["Fornisce regole sul reporting non finanziario","Disciplina esclusivamente il bilancio consolidato","Riguarda solo le microimprese","Sostituisce integralmente i principi contabili IAS/IFRS"], correct:0, explain:"La NFRD stabilisce le regole per la rendicontazione delle informazioni non finanziarie da parte delle grandi imprese di interesse pubblico.", difficulty:"media"},
  {topic:"ESG e CSR (paniere)", q:"Il primo accademico a parlare di CSR è stato:", options:["Howard R. Bowen","John Elkington","Gino Zappa","Milton Friedman"], correct:0, explain:"Howard R. Bowen è considerato il primo accademico ad aver sistematicamente trattato il tema della responsabilità sociale d'impresa.", difficulty:"difficile"},
  {topic:"Analisi dei costi (paniere)", q:"Gli steps costs (costi a gradini):", options:["Sono molto simili ai costi variabili se i \"gradini\" sono ridotti","Rimangono sempre costanti indipendentemente dai volumi prodotti","Coincidono sempre con i costi diretti di produzione","Non hanno alcuna relazione con la capacità produttiva"], correct:0, explain:"Se l'ampiezza dei gradini è ridotta, i costi a gradini si comportano in modo molto simile ai costi variabili, aumentando quasi in proporzione ai volumi.", difficulty:"media"},
  {topic:"Analisi dei costi (paniere)", q:"I costi variabili totali:", options:["Variano in modo direttamente proporzionale al variare del volume","Rimangono inalterati al variare del volume produttivo, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Diminuiscono all'aumentare del volume di produzione, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Dipendono unicamente dal prezzo di vendita del prodotto"], correct:0, explain:"I costi variabili totali crescono in proporzione diretta al volume di produzione o vendita.", difficulty:"facile"},
  {topic:"Analisi dei costi (paniere)", q:"I costi fissi totali:", options:["Rimangono inalterati al variare del volume","Variano in proporzione diretta al volume di produzione","Si annullano quando la produzione è pari a zero","Coincidono sempre con i costi variabili unitari"], correct:0, explain:"I costi fissi totali non variano al variare del volume di produzione, entro un dato intervallo di capacità produttiva.", difficulty:"facile"},
  {topic:"Analisi dei costi (paniere)", q:"Rappresenta un esempio di oggetto di costo:", options:["Una specifica linea di prodotto sviluppata all'interno dell'azienda","Il bilancio consolidato di un gruppo di imprese, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Il tasso di interesse applicato da una banca, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","La normativa fiscale applicabile all'impresa, un dato che deriva dalla riclassificazione del conto economico a costo del venduto"], correct:0, explain:"Una linea di prodotto è un tipico esempio di oggetto di costo, cioè di entità per cui si desidera una misurazione separata dei costi.", difficulty:"facile"},
  {topic:"Analisi dei costi (paniere)", q:"L'oggetto di costo:", options:["È identificabile in tutto ciò per cui si desidera una misurazione di costo separata","Coincide con l'intera azienda considerata nel suo complesso","Riguarda i costi di natura esclusivamente finanziaria","È un concetto applicabile alle sole aziende manifatturiere"], correct:0, explain:"L'oggetto di costo è qualunque elemento (prodotto, commessa, reparto) per cui si vuole misurare separatamente il costo.", difficulty:"media"},
  {topic:"Analisi dei costi (paniere)", q:"Si definisce costo:", options:["Il valore monetario delle risorse sacrificate per uno specifico obiettivo","Il prezzo di vendita di un bene o servizio, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","La somma dei ricavi conseguiti in un esercizio, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Il valore di mercato di un'immobilizzazione, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale"], correct:0, explain:"Il costo è definito come il valore monetario delle risorse impiegate (sacrificate) per il raggiungimento di uno specifico obiettivo.", difficulty:"facile"},
  {topic:"Analisi dei costi (paniere)", q:"Se il costo variabile unitario è pari a 5:", options:["Non varierà al diminuire della produzione","Aumenterà proporzionalmente al diminuire della produzione","Diventerà nullo se la produzione si riduce della metà","Si trasformerà automaticamente in un costo fisso"], correct:0, explain:"Il costo variabile UNITARIO resta costante al variare della produzione; è il costo variabile TOTALE a variare in proporzione ai volumi.", difficulty:"media"},
  {topic:"Analisi dei costi (paniere)", q:"Il determinante di costo:", options:["È il fattore che più di ogni altro esprime il risultato di una data attività e che genera costi","Coincide con il prezzo di vendita del prodotto","Riguarda i costi di natura fissa dell'impresa","È un concetto applicabile al settore dei servizi"], correct:0, explain:"Il determinante di costo (cost driver) è il fattore che meglio esprime il legame causale tra un'attività e i costi da essa generati.", difficulty:"media"},
  {topic:"Analisi dei costi (paniere)", q:"E' un esempio di costo variabile:", options:["Costo della manodopera diretta","Canone di locazione dello stabilimento","Stipendio del direttore generale","Premio assicurativo annuale sull'immobile"], correct:0, explain:"Il costo della manodopera diretta varia in genere in proporzione ai volumi produttivi, rientrando tra i costi variabili.", difficulty:"facile"},
  {topic:"Analisi Costi-Volumi-Risultati (paniere)", q:"L'incidenza del margine di contribuzione:", options:["È dato dal rapporto tra il margine di contribuzione totale e i ricavi di vendita totali","È dato dal rapporto tra i costi fissi e i costi variabili, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Coincide sempre con il tasso di indebitamento dell'impresa, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","È dato dal rapporto tra il reddito operativo e il capitale investito, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa"], correct:0, explain:"L'incidenza del margine di contribuzione è il rapporto tra il margine di contribuzione totale e i ricavi di vendita totali.", difficulty:"media"},
  {topic:"Analisi Costi-Volumi-Risultati (paniere)", q:"Un'azienda ha costi fissi per 240.000,00, un margine di contribuzione unitario di 60,00 e prezzo unitario pari ad 80,00; se produce e vende una quantità pari a n. 6.000 pezzi, consegue:", options:["Un utile","Una perdita","Un pareggio esatto tra costi e ricavi","Un risultato indeterminabile con questi dati"], correct:0, explain:"Il BEP in quantità è 240.000/60=4.000 pezzi; vendendone 6.000 (oltre il pareggio) l'azienda consegue un utile.", difficulty:"difficile"},
  {topic:"Analisi Costi-Volumi-Risultati (paniere)", q:"Il margine di sicurezza:", options:["È dato dalle vendite previste o effettive in eccesso rispetto al volume di vendita di pareggio","È dato dalla differenza tra costi fissi e costi variabili, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Coincide sempre con il margine di contribuzione unitario, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Misura il rapporto tra debiti e patrimonio netto, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti"], correct:0, explain:"Il margine di sicurezza misura di quanto le vendite effettive o previste superano il volume di pareggio (break-even point).", difficulty:"media"},
  {topic:"Analisi Costi-Volumi-Risultati (paniere)", q:"Il punto di pareggio in termini di quantità (Q):", options:["È il punto in cui i ricavi totali sono uguali ai costi totali","È il punto in cui i costi fissi sono pari a zero","È il punto in cui il margine di contribuzione è negativo","Coincide sempre con la capacità produttiva massima dell'impianto"], correct:0, explain:"Il punto di pareggio (break-even point) è il livello di produzione/vendita in cui i ricavi totali eguagliano i costi totali.", difficulty:"facile"},
  {topic:"Analisi Costi-Volumi-Risultati (paniere)", q:"Se un'azienda ha un prezzo di vendita unitario pari a 10 euro, costo variabile unitario pari a 7 e volumi di vendita pari a 250, il margine di contribuzione totale è pari a:", options:["750","1750","2500","250"], correct:0, explain:"Il margine di contribuzione unitario è 10−7=3; moltiplicato per 250 unità dà un margine di contribuzione totale di 750.", difficulty:"media"},
  {topic:"Analisi Costi-Volumi-Risultati (paniere)", q:"Se un'azienda ha costi fissi per 60.000, un margine di contribuzione unitario pari a 10 e un profitto desiderato di 40.000 le quantità da vendere per raggiungere il profitto obiettivo saranno pari a:", options:["10.000","6.000","4.000","100.000"], correct:0, explain:"Quantità = (Costi fissi + Profitto desiderato) / margine di contribuzione unitario = (60.000+40.000)/10 = 10.000 unità.", difficulty:"difficile"},
  {topic:"Analisi Costi-Volumi-Risultati (paniere)", q:"Il punto di pareggio in vendite totali (a valore):", options:["È dato dal rapporto tra i costi fissi e l'incidenza del margine di contribuzione","È dato dal rapporto tra i costi variabili e il prezzo di vendita","Coincide sempre con il fatturato dell'esercizio precedente","È dato dal prodotto tra costi fissi e margine di contribuzione unitario"], correct:0, explain:"Il BEP in valore si ottiene dividendo i costi fissi per l'incidenza del margine di contribuzione (margine di contribuzione/ricavi).", difficulty:"media"},
  {topic:"Analisi Costi-Volumi-Risultati (paniere)", q:"Il Risultato Operativo:", options:["È dato dalla differenza tra il margine di contribuzione totale e i costi fissi totali","È dato dalla somma tra ricavi totali e costi variabili totali, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Coincide sempre con il fatturato complessivo dell'esercizio, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","È dato dal rapporto tra costi fissi e costi variabili, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)"], correct:0, explain:"Il Risultato Operativo si ottiene sottraendo i costi fissi totali dal margine di contribuzione totale.", difficulty:"media"},
  {topic:"Analisi Costi-Volumi-Risultati (paniere)", q:"Se un'azienda ha costi fissi per 60.000 e un margine di contribuzione unitario pari a 10 il BEP sarà pari a:", options:["6000 unità","600 unità","60.000 unità","10 unità"], correct:0, explain:"BEP in quantità = costi fissi / margine di contribuzione unitario = 60.000/10 = 6.000 unità.", difficulty:"media"},
  {topic:"Analisi Costi-Volumi-Risultati (paniere)", q:"Il punto di pareggio in unità vendute:", options:["È dato dal rapporto tra i costi fissi e il margine di contribuzione unitario (mdc)","È dato dal rapporto tra i costi variabili e il prezzo di vendita unitario","Coincide sempre con la quantità massima producibile","È dato dalla differenza tra ricavi totali e costi fissi"], correct:0, explain:"Il BEP in unità vendute è il rapporto tra i costi fissi totali e il margine di contribuzione unitario.", difficulty:"facile"},
  {topic:"Strategia - Modello di Porter (paniere)", q:"Secondo il modello delle 5 forze competitive di Porter l'intensità della concorrenza analizza:", options:["Il tasso di crescita del settore","Il potere contrattuale dei soli fornitori","La sola minaccia di nuovi entranti nel mercato","Il livello di tassazione applicato al settore"], correct:0, explain:"L'intensità della concorrenza tra i competitor esistenti, secondo Porter, dipende tra l'altro dal tasso di crescita del settore.", difficulty:"media"},
  {topic:"Strategia - Modello di Porter (paniere)", q:"Secondo il modello delle 5 forze competitive di Porter il potere contrattuale dei fornitori:", options:["È maggiore in un mercato con poche imprese e un prodotto molto differenziato","È maggiore quando i fornitori sono numerosi e il prodotto è standardizzato","Non dipende in alcun modo dal numero di fornitori presenti sul mercato","È sempre trascurabile nell'analisi settoriale di Porter"], correct:0, explain:"Il potere contrattuale dei fornitori aumenta quando sono pochi e offrono un prodotto differenziato, difficilmente sostituibile.", difficulty:"media"},
  {topic:"Strategia - Modello di Porter (paniere)", q:"Secondo il modello delle 5 forze competitive di Porter il potere contrattuale dei clienti:", options:["È maggiore se il cliente compra elevati volumi di prodotto","È maggiore quando il cliente acquista piccole quantità occasionali","Non ha alcuna influenza sulla redditività del settore","Dipende esclusivamente dal prezzo di vendita del prodotto"], correct:0, explain:"Il potere contrattuale dei clienti cresce quando essi acquistano elevati volumi, potendo negoziare condizioni più favorevoli.", difficulty:"media"},
  {topic:"Leva operativa (paniere)", q:"Se un'azienda ha un margine di contribuzione pari a 40 e reddito operativo pari a 15 la leva operativa sarà pari a:", options:["2,67","1,50","0,375","55"], correct:0, explain:"La leva operativa è il rapporto tra margine di contribuzione e reddito operativo: 40/15 ≈ 2,67.", difficulty:"difficile"},
  {topic:"Leva operativa (paniere)", q:"Affermare che un'azienda ha una leva operativa bassa significa che:", options:["Presenta bassi costi fissi ed elevati costi variabili","Presenta alti costi fissi e bassi costi variabili","Non ha alcun costo variabile in bilancio","Ha un margine di contribuzione negativo"], correct:0, explain:"Una leva operativa bassa è tipica di aziende con struttura di costo prevalentemente variabile e bassi costi fissi.", difficulty:"media"},
  {topic:"Leva operativa (paniere)", q:"Affermare che un'azienda ha una leva operativa elevata significa che:", options:["Presenta alti costi fissi e bassi costi variabili","Presenta bassi costi fissi ed elevati costi variabili","Non ha alcun costo fisso in bilancio","Ha un margine di contribuzione nullo"], correct:0, explain:"Una leva operativa elevata è tipica di aziende con elevati costi fissi e una struttura di costo poco variabile.", difficulty:"media"},
  {topic:"Leva operativa (paniere)", q:"Una leva operativa bassa conduce le aziende ad applicare strategie di vendita con focus su:", options:["Margini","Volumi elevati a scapito dei margini","Riduzione sistematica dei prezzi di vendita","Aumento indiscriminato della capacità produttiva"], correct:0, explain:"Con leva operativa bassa, le aziende tendono a puntare su strategie orientate al margine più che ai grandi volumi.", difficulty:"difficile"},
  {topic:"Leva operativa (paniere)", q:"La leva operativa è data dal rapporto tra:", options:["Il margine di contribuzione e il reddito operativo","I costi fissi e i costi variabili, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Il capitale proprio e il capitale di debito","Il fatturato e il capitale investito, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa"], correct:0, explain:"La leva operativa è definita come il rapporto tra margine di contribuzione e reddito operativo.", difficulty:"media"},
  {topic:"Leva operativa (paniere)", q:"La leva operativa:", options:["Misura la sensibilità del Reddito Operativo alla variazione dei ricavi di vendita","Misura la sensibilità del capitale proprio alle variazioni del tasso di interesse","Coincide sempre con il rapporto tra debiti e patrimonio netto","Misura esclusivamente la redditività del capitale investito"], correct:0, explain:"La leva operativa misura quanto il Reddito Operativo sia sensibile a una variazione dei ricavi di vendita.", difficulty:"media"},
  {topic:"Leva operativa (paniere)", q:"Nelle aziende con una leva operativa elevata:", options:["Piccoli cambiamenti nei volumi di vendita si traducono in rilevanti variazioni nel Risultato operativo","Il Risultato operativo resta invariato al variare dei volumi di vendita, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","I costi variabili superano sempre quelli fissi, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","La redditività del capitale investito è sempre negativa, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti"], correct:0, explain:"Con leva operativa elevata (alti costi fissi), anche piccole variazioni dei volumi si amplificano notevolmente sul Risultato operativo.", difficulty:"media"},
  {topic:"Cost management (paniere)", q:"Le aziende manifatturiere:", options:["Acquistano materie prime","Acquistano solo prodotti finiti da rivendere","Non sostengono costi di trasformazione","Operano esclusivamente nel settore dei servizi"], correct:0, explain:"Le aziende manifatturiere acquistano materie prime e le trasformano in prodotti finiti attraverso il processo produttivo.", difficulty:"facile"},
  {topic:"Cost management (paniere)", q:"Il full cost corrisponde:", options:["Alla somma dei costi diretti e della quota di costi indiretti calcolata attraverso una base di ripartizione","Alla sola somma dei costi diretti di produzione, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Al solo costo variabile unitario di prodotto, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Alla differenza tra ricavi e costi variabili totali, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)"], correct:0, explain:"Il full cost (costo pieno) somma i costi diretti e una quota di costi indiretti ripartiti secondo un criterio (base di ripartizione).", difficulty:"media"},
  {topic:"Cost management (paniere)", q:"I costi indiretti:", options:["Non possono essere ricondotti ad un'unità di prodotto in modo specifico","Sono sempre proporzionali al volume di produzione, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Coincidono con i costi di manodopera diretta, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Vengono esclusi dal calcolo del costo pieno, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità"], correct:0, explain:"I costi indiretti riguardano più oggetti di costo contemporaneamente e richiedono un criterio di ripartizione per essere attribuiti a un prodotto specifico.", difficulty:"media"},
  {topic:"Cost management (paniere)", q:"I costi di periodo:", options:["Non vengono inclusi nei costi di prodotto","Sono sempre variabili rispetto al volume produttivo","Coincidono con i costi diretti di produzione","Vengono capitalizzati nel valore delle rimanenze"], correct:0, explain:"I costi di periodo (es. spese amministrative e commerciali) sono spesati nel conto economico del periodo, senza essere inclusi nel costo di prodotto.", difficulty:"media"},
  {topic:"Cost management (paniere)", q:"E' un esempio di costo non di produzione:", options:["Amministrazione e direzione d'impresa","Manodopera diretta di fabbrica","Materie prime impiegate nel processo produttivo","Ammortamento degli impianti produttivi"], correct:0, explain:"I costi di amministrazione e direzione sono costi di periodo, non direttamente legati al processo produttivo.", difficulty:"facile"},
  {topic:"Cost management (paniere)", q:"Le aziende commerciali:", options:["Acquistano prodotti finiti","Trasformano materie prime in prodotti finiti","Non effettuano alcuna attività di vendita","Producono internamente tutti i beni che rivendono"], correct:0, explain:"Le aziende commerciali acquistano prodotti già finiti per poi rivenderli, senza svolgere attività di trasformazione produttiva.", difficulty:"facile"},
  {topic:"Cost management (paniere)", q:"I costi non allocati:", options:["Sono costi per i quali non è possibile identificare alcuna relazione con un oggetto di costo","Sono sempre attribuibili con precisione a un singolo prodotto, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Coincidono con i costi diretti di manodopera, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Vengono esclusi dal conto economico, un dato che deriva dalla riclassificazione del conto economico a costo del venduto"], correct:0, explain:"I costi non allocati non presentano alcuna relazione identificabile con uno specifico oggetto di costo.", difficulty:"media"},
  {topic:"Cost management (paniere)", q:"I costi diretti:", options:["Possono essere ricondotti ad un'unità di prodotto in modo specifico ed esclusivo","Richiedono sempre una base di ripartizione per essere attribuiti al prodotto","Coincidono con i costi di struttura generale dell'impresa","Non possono mai essere calcolati con precisione"], correct:0, explain:"I costi diretti sono attribuibili in modo specifico ed esclusivo a un'unità di prodotto, senza necessità di ripartizione.", difficulty:"facile"},
  {topic:"Cost management (paniere)", q:"E' una finalità del Cost Management System quella di:", options:["Fornire informazioni sui costi per supportare le decisioni manageriali strategiche","Sostituire integralmente la contabilità generale d'impresa, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Determinare esclusivamente il carico fiscale dell'impresa, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Redigere il bilancio consolidato di gruppo, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati"], correct:0, explain:"Il Cost Management System fornisce informazioni sui costi utili al supporto delle decisioni manageriali e strategiche.", difficulty:"media"},

  {topic:"Budget (paniere)", q:"Il budget:", options:["È il processo formale con cui periodicamente i diversi organi di impresa raggiungono un accordo sull'impiego e sull'allocazione delle risorse disponibili","È un documento redatto una sola volta nella vita dell'impresa, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Riguarda esclusivamente la contabilità fiscale dell'impresa, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Sostituisce il piano strategico di lungo periodo, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale"], correct:0, explain:"Il budget è il processo formale periodico con cui gli organi d'impresa concordano l'allocazione delle risorse disponibili.", difficulty:"media"},
