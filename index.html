  {topic:"Analisi strategica", q:"Il vantaggio competitivo di costo si ottiene quando l'impresa:", options:["Offre un prodotto percepito come unico dal mercato, un'impostazione che confonde livelli decisionali distinti tra loro","Riesce a produrre a costi inferiori rispetto ai concorrenti, mantenendo un livello di qualità accettabile","Aumenta sistematicamente i prezzi, una semplificazione che non coglie la complessità della governance","Riduce la qualità del prodotto senza ridurne i costi, una visione superata dagli sviluppi più recenti della disciplina"], correct:1, explain:"Il vantaggio di costo consiste nel raggiungere una struttura di costi inferiore rispetto ai concorrenti, a parità di valore offerto al cliente.", difficulty:"media"},
  {topic:"Analisi strategica", q:"Il vantaggio competitivo di differenziazione si ottiene quando l'impresa:", options:["Produce esattamente come i concorrenti, un'interpretazione che non tiene conto degli interessi degli stakeholder","Offre un prodotto o servizio percepito come unico o superiore dal mercato","Riduce sempre il prezzo di vendita, un criterio non allineato ai principi di corporate governance","Elimina ogni investimento in innovazione, un approccio poco coerente con le teorie manageriali più accreditate"], correct:1, explain:"La differenziazione punta a rendere il prodotto/servizio percepito come unico, giustificando un prezzo premium agli occhi del cliente.", difficulty:"media"},
  {topic:"Analisi strategica", q:"L'analisi SWOT valuta:", options:["Solo i fattori esterni all'impresa, una lettura che trascura il ruolo degli organi di governo societario","Punti di forza e debolezza (fattori interni), opportunità e minacce (fattori esterni)","Solo il bilancio dell'impresa, un criterio che la prassi aziendale più recente non adotta","Solo la concorrenza diretta, un'impostazione che confonde livelli decisionali distinti tra loro"], correct:1, explain:"La SWOT analysis combina l'analisi interna (Strengths, Weaknesses) con quella dell'ambiente esterno (Opportunities, Threats).", difficulty:"facile"},
  {topic:"Strategia e organizzazione", q:"La mission aziendale definisce principalmente:", options:["Il bilancio annuale dell'impresa, una semplificazione che non coglie la complessità della governance","La ragion d'essere e lo scopo fondamentale dell'impresa","L'organigramma dettagliato, una visione superata dagli sviluppi più recenti della disciplina","Le sole politiche di prezzo, un'interpretazione che non tiene conto degli interessi degli stakeholder"], correct:1, explain:"La mission esprime l'identità e lo scopo di fondo dell'impresa, ossia perché essa esiste.", difficulty:"facile"},
  {topic:"Strategia e organizzazione", q:"La vision aziendale rappresenta:", options:["L'aspirazione futura di lungo periodo dell'impresa","Il fatturato dell'anno in corso, un criterio non allineato ai principi di corporate governance","Il codice etico interno, un approccio poco coerente con le teorie manageriali più accreditate","Il piano di smaltimento rifiuti, una lettura che trascura il ruolo degli organi di governo societario"], correct:0, explain:"La vision descrive dove l'impresa aspira ad arrivare nel lungo periodo, orientando le scelte strategiche.", difficulty:"facile"},
  {topic:"Strategia e organizzazione", q:"Le strategie di diversificazione consistono in:", options:["La riduzione delle attività dell'impresa a un solo prodotto, un criterio che la prassi aziendale più recente non adotta","L'espansione dell'impresa in nuovi settori o mercati rispetto a quello originario","La chiusura di tutte le filiali estere, un'impostazione che confonde livelli decisionali distinti tra loro","L'eliminazione della gamma di prodotti, una semplificazione che non coglie la complessità della governance"], correct:1, explain:"La diversificazione consiste nell'ampliare il raggio d'azione dell'impresa verso nuovi business, correlati o non correlati a quello di origine.", difficulty:"media"},
  {topic:"Strategia e organizzazione", q:"Le strategie di integrazione verticale comportano:", options:["L'acquisizione di fasi della filiera produttiva a monte (fornitori) o a valle (distribuzione)","L'uscita totale dal mercato, una visione superata dagli sviluppi più recenti della disciplina","La vendita di tutti gli asset produttivi, un'interpretazione che non tiene conto degli interessi degli stakeholder","La fusione con un concorrente diretto nello stesso stadio della filiera, un criterio non allineato ai principi di corporate governance"], correct:0, explain:"L'integrazione verticale consiste nell'internalizzare fasi della filiera situate a monte o a valle rispetto all'attività originaria dell'impresa.", difficulty:"media"},
  {topic:"Strategia e organizzazione", q:"Le alleanze strategiche (es. joint venture) permettono alle imprese di:", options:["Eliminare completamente il rischio d'impresa, un approccio poco coerente con le teorie manageriali più accreditate","Condividere risorse, competenze e rischi con altre imprese per il raggiungimento di obiettivi comuni","Evitare qualsiasi forma di collaborazione, una lettura che trascura il ruolo degli organi di governo societario","Ottenere automaticamente il monopolio di settore, un criterio che la prassi aziendale più recente non adotta"], correct:1, explain:"Le alleanze strategiche consentono di condividere risorse e rischi con partner esterni per perseguire obiettivi comuni, senza ricorrere a una fusione completa.", difficulty:"difficile"},
  {topic:"Ciclo di vita e conoscenza", q:"Il ciclo di vita dell'impresa comprende tipicamente le fasi di:", options:["Solo nascita e morte, un'impostazione che confonde livelli decisionali distinti tra loro","Nascita, sviluppo, maturità e declino (o eventuale rilancio)","Solo maturità, una semplificazione che non coglie la complessità della governance","Introduzione e crescita infinita, una visione superata dagli sviluppi più recenti della disciplina"], correct:1, explain:"Analogamente al prodotto, anche l'impresa attraversa un ciclo di vita che comprende nascita, sviluppo, maturità ed eventuale declino o rilancio.", difficulty:"facile"},
  {topic:"Ciclo di vita e conoscenza", q:"Il capitale intellettuale di un'impresa include tipicamente:", options:["Solo il capitale finanziario, un'interpretazione che non tiene conto degli interessi degli stakeholder","Capitale umano, capitale organizzativo e capitale relazionale","Solo gli immobili aziendali, un criterio non allineato ai principi di corporate governance","Solo il marchio registrato, un approccio poco coerente con le teorie manageriali più accreditate"], correct:1, explain:"Il capitale intellettuale comprende le risorse immateriali legate alle persone (umano), ai processi/sistemi interni (organizzativo) e alle relazioni esterne (relazionale).", difficulty:"facile"},
  {topic:"Ciclo di vita e conoscenza", q:"Il knowledge management in un'impresa riguarda:", options:["La sola gestione dei documenti cartacei, una lettura che trascura il ruolo degli organi di governo societario","La gestione della conoscenza come risorsa strategica dell'impresa","Esclusivamente la gestione del magazzino, un criterio che la prassi aziendale più recente non adotta","La gestione dei soli brevetti, un'impostazione che confonde livelli decisionali distinti tra loro"], correct:1, explain:"Il knowledge management si occupa di creare, condividere e valorizzare la conoscenza (esplicita e tacita) presente in azienda come risorsa strategica.", difficulty:"facile"},
  {topic:"Governance e mercati", q:"Un'OPA (Offerta Pubblica di Acquisto) è:", options:["Un'imposta sulle plusvalenze azionarie, una semplificazione che non coglie la complessità della governance","Una proposta di acquisto di azioni rivolta a tutti gli azionisti di una società quotata","Un tipo di bilancio consolidato, una visione superata dagli sviluppi più recenti della disciplina","Un contratto di lavoro dirigenziale, un'interpretazione che non tiene conto degli interessi degli stakeholder"], correct:1, explain:"L'OPA è un'offerta rivolta pubblicamente a tutti gli azionisti di una società quotata per l'acquisto delle loro azioni, spesso finalizzata ad acquisirne il controllo.", difficulty:"media"},
  {topic:"Governance e mercati", q:"La governance delle imprese familiari si distingue tipicamente per:", options:["La totale assenza di legami tra proprietà e gestione","Una sovrapposizione tra proprietà, gestione e famiglia","L'obbligo di quotazione in borsa","L'assenza di un fondatore identificabile"], correct:1, explain:"Nelle imprese familiari, i ruoli di proprietario, gestore e membro della famiglia tendono a sovrapporsi, generando dinamiche di governance peculiari.", difficulty:"difficile"},
  {topic:"Governance e mercati", q:"Gli indici di bilancio (es. ROE, ROI, indici di liquidità) sono utilizzati nella valutazione strategica dell'impresa per:", options:["Sostituire completamente l'analisi qualitativa della strategia, un criterio non allineato ai principi di corporate governance","Misurare in modo sintetico redditività, solidità e liquidità dell'impresa, a supporto delle decisioni strategiche","Calcolare esclusivamente le imposte dovute, un approccio poco coerente con le teorie manageriali più accreditate","Redigere il solo rendiconto ambientale, una lettura che trascura il ruolo degli organi di governo societario"], correct:1, explain:"Gli indici di bilancio forniscono una sintesi quantitativa della performance economico-finanziaria, utile a supportare (non sostituire) le valutazioni strategiche.", difficulty:"difficile"},
  {topic:"Responsabilità sociale", q:"La Responsabilità Sociale d'Impresa (CSR) consiste in:", options:["L'obbligo di legge di pagare le tasse, un criterio che la prassi aziendale più recente non adotta, una visione superata dagli sviluppi più recenti della disciplina","L'integrazione volontaria di preoccupazioni sociali e ambientali nelle attività e nelle relazioni dell'impresa con gli stakeholder","La sola beneficenza occasionale, un'impostazione che confonde livelli decisionali distinti tra loro, un'interpretazione che non tiene conto degli interessi degli stakeholder","Un sinonimo di bilancio consolidato, una semplificazione che non coglie la complessità della governance, un criterio non allineato ai principi di corporate governance"], correct:1, explain:"La CSR indica l'impegno volontario dell'impresa a integrare considerazioni sociali e ambientali nella propria strategia e operatività, oltre agli obblighi di legge.", difficulty:"difficile"},
  {topic:"Teoria dell'impresa", q:"Nella teoria neoclassica, l'obiettivo tipico attribuito all'impresa è:", options:["La minimizzazione sistematica della qualità del prodotto","L'eliminazione totale della concorrenza dal mercato","La massimizzazione esclusiva del fatturato","La massimizzazione del profitto"], correct:3, explain:"Nel modello neoclassico l'impresa è vista come un soggetto razionale che sceglie la combinazione produttiva che massimizza il profitto.", difficulty:"facile"},
  {topic:"Governance", q:"Il Consiglio di Amministrazione in una società per azioni ha, tra i suoi compiti principali, quello di:", options:["Sostituire integralmente l'assemblea dei soci in ogni decisione","Occuparsi soltanto della tenuta della contabilità ordinaria","Definire gli indirizzi strategici e supervisionare la gestione dell'impresa","Svolgere esclusivamente mansioni operative di produzione quotidiana"], correct:2, explain:"Il Consiglio di Amministrazione ha funzioni di indirizzo strategico e di supervisione sulla gestione, distinte dalle mansioni operative quotidiane.", difficulty:"facile"},
  {topic:"Teoria dell'impresa", q:"La teoria dei costi di transazione, associata a Coase e Williamson, spiega l'esistenza dell'impresa come:", options:["Una struttura utile solo per ridurre le imposte societarie, una semplificazione che non coglie la complessità della governance","Uno strumento esclusivamente finanziario per emettere azioni, una visione superata dagli sviluppi più recenti della disciplina","Un meccanismo che riduce i costi di ricorso continuo al mercato per coordinare le transazioni","Un'entità priva di qualunque relazione con i costi di mercato, un'interpretazione che non tiene conto degli interessi degli stakeholder"], correct:2, explain:"Secondo Coase, l'impresa nasce per internalizzare transazioni quando i costi di utilizzo del mercato (ricerca, negoziazione, controllo) risultano troppo elevati.", difficulty:"media"},
  {topic:"Governance", q:"Il problema di agenzia tra proprietà e management sorge principalmente perché:", options:["Gli interessi dei manager possono non coincidere pienamente con quelli degli azionisti","I manager sono sempre proprietari della maggioranza delle azioni, un criterio non allineato ai principi di corporate governance","Non esiste alcuna asimmetria informativa tra le parti coinvolte, un approccio poco coerente con le teorie manageriali più accreditate","Gli azionisti gestiscono sempre personalmente l'impresa senza alcun manager, una lettura che trascura il ruolo degli organi di governo societario"], correct:0, explain:"Il problema di agenzia nasce dalla separazione tra proprietà e controllo e dalla possibile divergenza di interessi e informazioni tra azionisti e manager.", difficulty:"media"},
  {topic:"Strategia d'impresa", q:"L'analisi SWOT è uno strumento utilizzato per valutare congiuntamente:", options:["Unicamente la struttura giuridica dell'impresa, un criterio che la prassi aziendale più recente non adotta","Punti di forza e debolezza interni all'impresa insieme a opportunità e minacce esterne","Esclusivamente gli indici di bilancio dell'ultimo esercizio, un'impostazione che confonde livelli decisionali distinti tra loro","Solo i costi fissi e variabili di produzione, una semplificazione che non coglie la complessità della governance"], correct:1, explain:"La SWOT incrocia fattori interni (punti di forza/debolezza) con fattori esterni (opportunità/minacce) per orientare le scelte strategiche.", difficulty:"media"},
  {topic:"Teoria dell'impresa", q:"Nella visione manageriale dell'impresa (Baumol, Marris), gli obiettivi perseguiti dai manager possono discostarsi dalla massimizzazione del profitto a favore, ad esempio, di:", options:["L'aumento incondizionato dei dividendi distribuiti agli azionisti","La crescita dimensionale o del fatturato dell'impresa","La chiusura anticipata e volontaria dell'attività","Una riduzione sistematica e continua delle vendite"], correct:1, explain:"I modelli manageriali ipotizzano che i dirigenti, godendo di discrezionalità, possano privilegiare obiettivi di crescita (fatturato, dimensione) rispetto al puro profitto.", difficulty:"difficile"},
  {topic:"Governance", q:"Gli amministratori indipendenti in un Consiglio di Amministrazione hanno la funzione di:", options:["Garantire un controllo più imparziale sulle decisioni, non essendo legati a interessi di gestione o di maggioranza","Sostituire l'assemblea dei soci nelle decisioni straordinarie, una visione superata dagli sviluppi più recenti della disciplina","Occuparsi soltanto della gestione operativa quotidiana dell'impresa, un'interpretazione che non tiene conto degli interessi degli stakeholder","Rappresentare esclusivamente gli interessi del management esecutivo, un criterio non allineato ai principi di corporate governance"], correct:0, explain:"Gli amministratori indipendenti, privi di legami significativi con la società o gli azionisti di controllo, dovrebbero assicurare un giudizio più imparziale nel board.", difficulty:"difficile"},
  {topic:"Strategia d'impresa", q:"Una strategia di diversificazione correlata consiste nell'espandersi in nuovi business che:", options:["Comportano l'abbandono totale del settore di origine","Non hanno alcun legame produttivo, commerciale o tecnologico con il core business","Condividono competenze, risorse o mercati con l'attività originaria dell'impresa","Riducono sempre e comunque il fatturato complessivo dell'impresa"], correct:2, explain:"La diversificazione correlata sfrutta sinergie di competenze, tecnologie o canali distributivi comuni con l'attività di partenza, a differenza di quella conglomerale.", difficulty:"difficile"},
  {topic:"Teoria dell'impresa", q:"Il concetto di 'razionalità limitata' introdotto da Herbert Simon evidenzia che i decisori d'impresa:", options:["Dispongono sempre di informazione perfetta su ogni possibile alternativa, un approccio poco coerente con le teorie manageriali più accreditate","Non prendono mai decisioni in condizioni di incertezza, una lettura che trascura il ruolo degli organi di governo societario","Non dispongono di informazioni e capacità cognitive illimitate, per cui spesso si accontentano di soluzioni soddisfacenti","Massimizzano sempre in modo esatto ogni funzione di profitto disponibile, un criterio che la prassi aziendale più recente non adotta"], correct:2, explain:"Simon evidenziò i limiti cognitivi e informativi dei decisori, che tendono a cercare soluzioni 'soddisfacenti' (satisficing) più che l'ottimo assoluto.", difficulty:"difficile"},
  {topic:"Governance", q:"La responsabilità sociale d'impresa (CSR) riguarda l'impegno dell'impresa a:", options:["Massimizzare esclusivamente il profitto di breve periodo per gli azionisti, un'impostazione che confonde livelli decisionali distinti tra loro","Tenere conto degli interessi di stakeholder più ampi oltre ai soli azionisti, in ambito sociale e ambientale","Evitare qualunque forma di rendicontazione non finanziaria, una semplificazione che non coglie la complessità della governance","Ridurre al minimo la trasparenza verso l'esterno, una visione superata dagli sviluppi più recenti della disciplina"], correct:1, explain:"La CSR implica l'assunzione volontaria di responsabilità verso stakeholder ambientali e sociali, non solo verso gli azionisti, oltre agli obblighi di legge.", difficulty:"difficile"},
  {topic:"Teoria dell'impresa", q:"Secondo la teoria classica dell'impresa, l'imprenditore assume principalmente il ruolo di:", options:["Soggetto che organizza i fattori produttivi assumendosi il rischio d'impresa in vista del profitto","Semplice esecutore di ordini impartiti da un'autorità pubblica esterna, un approccio poco coerente con le teorie manageriali più accreditate","Lavoratore dipendente privo di potere decisionale sull'attività, una lettura che trascura il ruolo degli organi di governo societario","Soggetto la cui unica funzione è la vendita diretta al consumatore finale, un criterio che la prassi aziendale più recente non adotta"], correct:0, explain:"Nella visione classica l'imprenditore organizza capitale e lavoro, assumendosi il rischio economico dell'attività in cambio della prospettiva di un profitto.", difficulty:"facile"},
  {topic:"Governance", q:"L'assemblea dei soci in una società di capitali ha, tra le sue funzioni principali, quella di:", options:["Sostituire integralmente il Consiglio di Amministrazione nella gestione ordinaria","Approvare il bilancio d'esercizio e nominare gli organi sociali","Gestire quotidianamente le operazioni produttive dell'impresa","Redigere direttamente le scritture contabili dell'impresa"], correct:1, explain:"L'assemblea dei soci delibera tipicamente sull'approvazione del bilancio, sulla nomina/revoca degli organi sociali e sulle operazioni straordinarie, mentre la gestione ordinaria spetta agli amministratori.", difficulty:"facile"},
  {topic:"Strategia d'impresa", q:"Le cinque forze di Porter analizzano l'attrattività di un settore considerando, tra l'altro:", options:["Solo il livello delle imposte pagate dalle imprese operanti nel settore, un'impostazione che confonde livelli decisionali distinti tra loro","La rivalità tra i concorrenti esistenti e il potere contrattuale di fornitori e clienti","Esclusivamente il numero di dipendenti impiegati dalle imprese del settore, una semplificazione che non coglie la complessità della governance","Unicamente la localizzazione geografica delle sedi aziendali, una visione superata dagli sviluppi più recenti della disciplina"], correct:1, explain:"Il modello di Porter individua cinque forze competitive: rivalità tra concorrenti, potere di fornitori e clienti, minaccia di nuovi entranti e di prodotti sostitutivi.", difficulty:"facile"},
  {topic:"Teoria dell'impresa", q:"L'impresa, in un'ottica sistemica, può essere descritta come:", options:["Un'entità completamente isolata e indipendente dall'ambiente circostante, un'interpretazione che non tiene conto degli interessi degli stakeholder","Una struttura priva di qualunque relazione con clienti e fornitori, un criterio non allineato ai principi di corporate governance","Un sistema aperto che interagisce costantemente con l'ambiente esterno scambiando risorse e informazioni","Un insieme di beni materiali privo di relazioni organizzative interne, un approccio poco coerente con le teorie manageriali più accreditate"], correct:2, explain:"La visione sistemica considera l'impresa un sistema aperto, in continuo scambio di risorse, informazioni e influenze con l'ambiente esterno in cui opera.", difficulty:"facile"},
  {topic:"Governance", q:"Il Collegio Sindacale in una società per azioni svolge principalmente una funzione di:", options:["Rappresentanza esclusiva degli interessi dei lavoratori dipendenti","Gestione operativa diretta delle attività produttive quotidiane","Controllo sulla legalità e sulla corretta amministrazione della società","Definizione delle strategie di marketing dell'impresa"], correct:2, explain:"Il Collegio Sindacale vigila sull'osservanza della legge e dello statuto e sulla corretta amministrazione, senza intervenire nella gestione operativa diretta.", difficulty:"media"},
  {topic:"Strategia d'impresa", q:"Una strategia di integrazione verticale a monte consiste nell'espandere l'attività dell'impresa verso:", options:["Le fasi produttive relative ai propri fornitori, come l'approvvigionamento di materie prime","Le fasi di distribuzione e vendita al consumatore finale, una lettura che trascura il ruolo degli organi di governo societario","Settori completamente estranei alla propria attività originaria, un criterio che la prassi aziendale più recente non adotta","La sola attività di comunicazione pubblicitaria dell'impresa, un'impostazione che confonde livelli decisionali distinti tra loro"], correct:0, explain:"L'integrazione verticale a monte (backward) espande l'impresa verso le fasi precedenti della filiera produttiva, come l'approvvigionamento di materie prime dai fornitori.", difficulty:"media"},
  {topic:"Teoria dell'impresa", q:"La teoria dei contratti incompleti evidenzia che, nella pratica, i contratti tra le parti:", options:["Riescono sempre a disciplinare perfettamente ogni possibile evento futuro, una semplificazione che non coglie la complessità della governance","Escludono per definizione qualunque forma di rinegoziazione futura, una visione superata dagli sviluppi più recenti della disciplina","Sono validi solo se redatti in forma scritta e notarile, un'interpretazione che non tiene conto degli interessi degli stakeholder","Non possono prevedere in anticipo tutte le contingenze future possibili, lasciando margini di discrezionalità"], correct:3, explain:"I contratti incompleti non possono anticipare tutte le contingenze future, lasciando margini di discrezionalità e potenziali comportamenti opportunistici tra le parti.", difficulty:"media"},
  {topic:"Governance", q:"Il principio comply or explain, tipico dei codici di autodisciplina della corporate governance, prevede che le società quotate:", options:["Possano ignorare liberamente il codice senza fornire alcuna motivazione, un criterio non allineato ai principi di corporate governance","Debbano applicare il codice esclusivamente se quotate su mercati esteri, un approccio poco coerente con le teorie manageriali più accreditate","Siano obbligate per legge a rispettare in modo rigido ogni singola raccomandazione, una lettura che trascura il ruolo degli organi di governo societario","Si adeguino alle raccomandazioni del codice oppure spieghino pubblicamente le ragioni del mancato adeguamento"], correct:3, explain:"Il principio comply or explain lascia alle società la scelta di adeguarsi alle raccomandazioni del codice o di motivarne pubblicamente il mancato rispetto, senza un obbligo di legge rigido.", difficulty:"difficile"},
  {topic:"Strategia d'impresa", q:"Una strategia di focalizzazione, secondo Porter, consiste nel:", options:["Ridurre sistematicamente la qualità del prodotto per abbattere i costi in ogni mercato, un criterio che la prassi aziendale più recente non adotta","Abbandonare qualunque forma di vantaggio competitivo rispetto ai concorrenti, un'impostazione che confonde livelli decisionali distinti tra loro","Diversificare l'offerta su tutti i segmenti di mercato disponibili contemporaneamente, una semplificazione che non coglie la complessità della governance","Concentrare le risorse dell'impresa su un segmento di mercato specifico, perseguendo costo o differenziazione al suo interno"], correct:3, explain:"La focalizzazione concentra le risorse dell'impresa su uno specifico segmento di mercato (di nicchia), perseguendo al suo interno un vantaggio di costo o di differenziazione.", difficulty:"difficile"},
  {topic:"Teoria dell'impresa", q:"Il concetto di 'asimmetria informativa' tra le parti di un rapporto contrattuale indica che:", options:["Il contratto risulta automaticamente nullo per mancanza di causa, una visione superata dagli sviluppi più recenti della disciplina","Entrambe le parti dispongono sempre delle medesime informazioni complete, un'interpretazione che non tiene conto degli interessi degli stakeholder","Non esiste alcuna possibilità di comportamento opportunistico tra le parti, un criterio non allineato ai principi di corporate governance","Una delle parti dispone di informazioni rilevanti che l'altra non possiede, con possibili conseguenze su selezione avversa e azzardo morale"], correct:3, explain:"L'asimmetria informativa si verifica quando una parte possiede informazioni che l'altra non ha, generando possibili fenomeni di selezione avversa (ex ante) e azzardo morale (ex post).", difficulty:"difficile"},
  {topic:"Governance", q:"La separazione tra proprietà e controllo, tipica delle grandi società ad azionariato diffuso, comporta principalmente che:", options:["Non esista alcun organo di controllo sull'operato degli amministratori, un approccio poco coerente con le teorie manageriali più accreditate","Gli azionisti gestiscano sempre personalmente e direttamente l'attività operativa dell'impresa, una lettura che trascura il ruolo degli organi di governo societario","Il capitale sociale sia detenuto da un unico socio di maggioranza assoluta, un criterio che la prassi aziendale più recente non adotta","Il potere di gestione effettiva sia esercitato dai manager anche in assenza di una quota di proprietà rilevante"], correct:3, explain:"Nelle grandi società ad azionariato diffuso il controllo gestionale è spesso esercitato dai manager, anche senza una quota di proprietà rilevante, dando origine al problema di agenzia.", difficulty:"difficile"},
  {topic:"Teoria dell'impresa", q:"La funzione di produzione di un'impresa descrive la relazione tra:", options:["Il capitale sociale versato e il numero di dipendenti assunti","Il prezzo di vendita del prodotto e il volume delle vendite realizzate","La struttura giuridica dell'impresa e la sua forma di governance","I fattori produttivi impiegati e la quantità massima di output ottenibile"], correct:3, explain:"La funzione di produzione esprime la relazione tecnica tra le quantità di fattori produttivi impiegati (lavoro, capitale) e la massima quantità di output ottenibile.", difficulty:"facile"},
  {topic:"Governance", q:"L'amministratore delegato in una società per azioni riceve solitamente i propri poteri gestionali da:", options:["Un'attribuzione diretta e automatica prevista dalla legge per ogni società","Un accordo diretto stipulato con i singoli dipendenti dell'impresa","Una nomina esclusiva da parte del Collegio Sindacale","Una delega conferita dal Consiglio di Amministrazione"], correct:3, explain:"L'amministratore delegato riceve specifici poteri gestionali tramite delega conferita dal Consiglio di Amministrazione, che ne definisce l'ampiezza e i limiti.", difficulty:"facile"},
  {topic:"Strategia d'impresa", q:"Il ciclo di vita del prodotto descrive tipicamente le fasi di:", options:["Progettazione, brevettazione, produzione e smaltimento","Reclutamento, selezione, formazione e valutazione del personale","Acquisizione, fusione, scissione e liquidazione","Introduzione, crescita, maturità e declino"], correct:3, explain:"Il ciclo di vita del prodotto descrive l'evoluzione delle vendite nelle fasi di introduzione, crescita, maturità e declino, ciascuna con proprie implicazioni strategiche.", difficulty:"facile"},
  {topic:"Teoria dell'impresa", q:"Le economie di scopo (economies of scope) si realizzano quando:", options:["Si verifica un aumento del prezzo di vendita senza variazioni nei costi, una semplificazione che non coglie la complessità della governance","L'impresa riduce il numero di prodotti offerti per concentrarsi su un'unica linea, una visione superata dagli sviluppi più recenti della disciplina","Il costo medio unitario diminuisce esclusivamente all'aumentare della quantità di un singolo bene prodotto, un'interpretazione che non tiene conto degli interessi degli stakeholder","Risulta più conveniente produrre congiuntamente più beni diversi piuttosto che produrli separatamente in imprese distinte"], correct:3, explain:"Le economie di scopo emergono quando produrre più beni congiuntamente in un'unica impresa costa meno rispetto a produrli separatamente in imprese distinte, grazie alla condivisione di risorse comuni.", difficulty:"media"},
  {topic:"Governance", q:"Il principio della centralità dell'azionista (shareholder primacy) sostiene che l'obiettivo primario dell'impresa debba essere:", options:["La minimizzazione assoluta dei ricavi di vendita","L'annullamento sistematico di ogni forma di profitto distribuibile","La massimizzazione esclusiva del benessere dei soli dipendenti","La massimizzazione del valore per gli azionisti"], correct:3, explain:"L'approccio shareholder primacy, tradizionalmente associato a Milton Friedman, individua nella massimizzazione del valore per gli azionisti l'obiettivo prioritario della gestione d'impresa, in contrapposizione alla visione stakeholder.", difficulty:"media"},

  {topic:"Teoria dell'impresa", q:"Il concetto di 'competenze distintive' di un'impresa fa riferimento a:", options:["Le sole risorse finanziarie disponibili in bilancio, un criterio non allineato ai principi di corporate governance","Gli obblighi di legge a cui l'impresa deve conformarsi, un approccio poco coerente con le teorie manageriali più accreditate","Il numero di brevetti registrati indipendentemente dal loro effettivo utilizzo, una lettura che trascura il ruolo degli organi di governo societario","Risorse e capacità difficilmente imitabili dai concorrenti, alla base di un vantaggio competitivo duraturo"], correct:3, explain:"Le competenze distintive sono risorse e capacità rare, di valore e difficilmente imitabili dai concorrenti, che costituiscono la base per un vantaggio competitivo sostenibile nel tempo.", difficulty:"media"},
  {topic:"Governance", q:"Il say on pay, previsto in molti ordinamenti di corporate governance, consiste nel:", options:["Divieto assoluto di corrispondere bonus o incentivi variabili agli amministratori, un criterio che la prassi aziendale più recente non adotta","Diritto degli azionisti di esprimersi, tramite voto in assemblea, sulle politiche di remunerazione degli amministratori","Potere esclusivo del Collegio Sindacale di fissare gli stipendi dei dirigenti, un'impostazione che confonde livelli decisionali distinti tra loro","Obbligo per i dipendenti di approvare preventivamente ogni aumento salariale aziendale, una semplificazione che non coglie la complessità della governance"], correct:1, explain:"Il say on pay attribuisce agli azionisti il diritto di esprimere un voto (consultivo o vincolante, a seconda degli ordinamenti) sulle politiche di remunerazione degli amministratori e dei dirigenti.", difficulty:"difficile"},
  {topic:"Strategia d'impresa", q:"Una strategia di 'oceano blu', secondo l'omonimo approccio strategico, mira a:", options:["Creare nuovi spazi di mercato non ancora contesi dalla concorrenza, anziché competere sui mercati esistenti","Uscire progressivamente da tutti i mercati in cui l'impresa opera attualmente, una visione superata dagli sviluppi più recenti della disciplina","Ridurre drasticamente la qualità del prodotto per abbattere i costi in mercati saturi, un'interpretazione che non tiene conto degli interessi degli stakeholder","Massimizzare la competizione diretta sui prezzi nei mercati maturi già esistenti, un criterio non allineato ai principi di corporate governance"], correct:0, explain:"La strategia 'oceano blu' punta a creare nuovi spazi di mercato non ancora sfruttati dalla concorrenza, rendendo la competizione diretta meno rilevante, a differenza dell''oceano rosso' dei mercati già contesi.", difficulty:"difficile"},
  {topic:"Teoria dell'impresa", q:"Il modello dei 'gruppi di interesse' (stakeholder theory), proposto tra gli altri da Freeman, sostiene che l'impresa debba:", options:["Bilanciare gli interessi di tutti i soggetti coinvolti nella sua attività, non solo quelli degli azionisti","Perseguire esclusivamente la massimizzazione del profitto di breve periodo per gli azionisti, un approccio poco coerente con le teorie manageriali più accreditate","Operare senza alcun vincolo di natura etica o sociale nella propria attività, una lettura che trascura il ruolo degli organi di governo societario","Ignorare sistematicamente gli interessi di dipendenti, fornitori e comunità locali, un criterio che la prassi aziendale più recente non adotta"], correct:0, explain:"La stakeholder theory di Freeman sostiene che l'impresa debba considerare e bilanciare gli interessi di una pluralità di portatori di interesse (dipendenti, clienti, fornitori, comunità), non solo quelli degli azionisti.", difficulty:"difficile"},
  {topic:"Strategia d'impresa", q:"L'analisi PESTEL, utilizzata nella pianificazione strategica, considera fattori:", options:["Politici, Economici, Sociali, Tecnologici, Ecologici e Legali dell'ambiente esterno","Unicamente relativi ai concorrenti diretti dell'impresa, un approccio poco coerente con le teorie manageriali più accreditate","Solo interni all'organizzazione, come struttura e cultura aziendale, una lettura che trascura il ruolo degli organi di governo societario","Esclusivamente finanziari relativi al bilancio dell'impresa, un criterio che la prassi aziendale più recente non adotta"], correct:0, explain:"L'analisi PESTEL esamina fattori Politici, Economici, Sociali, Tecnologici, Ecologici e Legali del macroambiente in cui l'impresa opera, utili per la pianificazione strategica.", difficulty:"media"},
  {topic:"Governance", q:"Il conflitto di interessi degli amministratori, disciplinato dal codice civile, si configura quando:", options:["Il Collegio Sindacale sostituisce integralmente gli amministratori in ogni decisione, un'impostazione che confonde livelli decisionali distinti tra loro","Un amministratore ha, per conto proprio o di terzi, un interesse in una determinata operazione della società, con obbligo di darne notizia agli altri amministratori","La società non può in alcun caso stipulare contratti con i propri amministratori, una semplificazione che non coglie la complessità della governance","Gli amministratori agiscono sempre esclusivamente nell'interesse della società senza alcuna eccezione possibile, una visione superata dagli sviluppi più recenti della disciplina"], correct:1, explain:"L'art. 2391 c.c. impone all'amministratore in conflitto di interessi di darne notizia agli altri amministratori e al collegio sindacale, motivando le ragioni e la convenienza dell'operazione per la società.", difficulty:"difficile"},

  {topic:"Strategia d'impresa", q:"Un vantaggio competitivo si definisce sostenibile quando l'impresa è in grado di:", options:["Conseguirlo indipendentemente da qualunque risorsa o competenza distintiva","Mantenerlo nel tempo nonostante i tentativi di imitazione da parte dei concorrenti","Ottenerlo una tantum in un singolo esercizio, senza necessità di mantenerlo","Realizzarlo esclusivamente attraverso una riduzione temporanea dei prezzi"], correct:1, explain:"Un vantaggio competitivo sostenibile permane nel tempo perché difficilmente imitabile o sostituibile da parte dei concorrenti, grazie a risorse e competenze distintive dell'impresa.", difficulty:"media"}

  {term:"Controllo di gestione", definition:"insieme di strumenti e procedure volti a verificare che la gestione aziendale si svolga in coerenza con gli obiettivi programmati"},
  {term:"Struttura divisionale", definition:"modello organizzativo che suddivide l'impresa in unità autonome per prodotto, area geografica o cliente"},
  {term:"Struttura funzionale", definition:"modello organizzativo che raggruppa le attività aziendali per funzione omogenea, come produzione, marketing e finanza"},
  {term:"Stakeholder", definition:"qualsiasi soggetto o gruppo che abbia un interesse legittimo, diretto o indiretto, nell'attività e nei risultati dell'impresa"},
  {term:"Shareholder", definition:"azionista, cioè il soggetto titolare di una quota del capitale sociale di un'impresa"},
  {term:"Sostenibilità d'impresa", definition:"capacità dell'impresa di creare valore economico nel tempo tenendo conto degli impatti sociali e ambientali della propria attività"},
  {term:"Whistleblowing", definition:"segnalazione, da parte di un dipendente o collaboratore, di condotte illecite o irregolari di cui sia venuto a conoscenza nell'ambito lavorativo"},
  {term:"Family business", definition:"impresa in cui la proprietà e/o il controllo gestionale sono detenuti in misura significativa da una o più famiglie"},
  {term:"Governance multistakeholder", definition:"modello di governo dell'impresa che coinvolge nelle decisioni strategiche una pluralità di portatori di interesse oltre ai soli azionisti"},
];

/* Generatore infinito basato su termine/definizione: pesca un concetto e
   costruisce 3 distrattori casuali dallo stesso glossario, alternando la
   direzione della domanda (dal termine alla definizione o viceversa). */
function genGlossaryQuestion(glossary){
  const idx = randInt(0, glossary.length - 1);
  const item = glossary[idx];
  const direction = Math.random() < 0.5 ? 'term2def' : 'def2term';

  const distractorIdxs = new Set();
  while(distractorIdxs.size < 3){
    const j = randInt(0, glossary.length - 1);
    if(j !== idx) distractorIdxs.add(j);
  }
  const distractorItems = [...distractorIdxs].map(j => glossary[j]);

  let q, correctText, optionTexts;
  if(direction === 'term2def'){
    q = `Che cosa si intende, in questa materia, per "${item.term}"?`;
    correctText = item.definition;
    optionTexts = distractorItems.map(d => d.definition);
  } else {
    const defCapitalized = item.definition.charAt(0).toUpperCase() + item.definition.slice(1);
    q = `A quale concetto corrisponde questa definizione? "${defCapitalized}"`;
    correctText = item.term;
    optionTexts = distractorItems.map(d => d.term);
  }

  const all = shuffle([correctText, ...optionTexts]);
  const correct = all.indexOf(correctText);
  return {
    topic: "Glossario",
    q, options: all, correct,
    explain: `${item.term}: ${item.definition}.`
  };
}

function makeGlossaryGenerator(glossary){
  return function(){ return genGlossaryQuestion(glossary); };
}

/* =========================================================
   CONFIGURAZIONE MATERIE
   ========================================================= */
const SUBJECTS = {
  statistica: { name:"Statistica", icon:"📊", questions:Q_STATISTICA, generatorKind:"numeric", generators:STAT_GENERATORS },
  economia_aziendale: { name:"Economia Aziendale", icon:"🏢", questions:Q_ECONOMIA_AZIENDALE, generatorKind:"glossary", generators:[makeGlossaryGenerator(GLOSSARY_ECONOMIA_AZIENDALE)] },
  diritto_privato: { name:"Diritto Privato", icon:"⚖️", questions:Q_DIRITTO_PRIVATO, generatorKind:"glossary", generators:[makeGlossaryGenerator(GLOSSARY_DIRITTO_PRIVATO)] },
  economia_politica: { name:"Economia Politica", icon:"📈", questions:Q_ECONOMIA_POLITICA, generatorKind:"glossary", generators:[makeGlossaryGenerator(GLOSSARY_ECONOMIA_POLITICA)] },
  storia_economica: { name:"Storia Economica", icon:"📜", questions:Q_STORIA_ECONOMICA, generatorKind:"glossary", generators:[makeGlossaryGenerator(GLOSSARY_STORIA_ECONOMICA)] },
  teoria_governo_impresa: { name:"Teoria e Governo dell'Impresa", icon:"🏛️", questions:Q_TEORIA_GOVERNO_IMPRESA, generatorKind:"glossary", generators:[makeGlossaryGenerator(GLOSSARY_TEORIA_GOVERNO_IMPRESA)] }
};

/* =========================================================
   STATO E LOGICA APP
   ========================================================= */
let currentSubjectKey = null;
let subject = null;
let mode = 'all';
let isInfinite = false;
let order = [];
let current = 0;
let questionNumber = 1;
let answered = 0, correctCount = 0, wrongCount = 0, streak = 0;
let wrongLog = [];
let selectedMode = "all";
let selectedDifficulty = "tutte";
let fixedCycleOrder = [];
let fixedCyclePos = 0;
let currentQ = null;

const DIFF_ORDER = { facile:0, media:1, difficile:2 };
const DIFF_LABEL = { facile:"🟢 Facile", media:"🟡 Media", difficile:"🔴 Difficile" };

function getFilteredQuestions(){
  if(selectedDifficulty === 'tutte') return subject.questions;
  return subject.questions.filter(q => q.difficulty === selectedDifficulty);
}

// Mescola le opzioni di una domanda a banca fissa ogni volta che viene mostrata,
// così l'ordine (e non solo il contenuto) cambia ad ogni tentativo.
function withShuffledOptions(item){
  const idxs = [0,1,2,3].map((_,i)=>i);
  for(let i=idxs.length-1;i>0;i--){
    const j = Math.floor(Math.random()*(i+1));
    [idxs[i],idxs[j]] = [idxs[j],idxs[i]];
  }
  return Object.assign({}, item, {
    options: idxs.map(i=>item.options[i]),
    correct: idxs.indexOf(item.correct)
  });
}

const mainCard = document.getElementById('mainCard');
const statsPanel = document.getElementById('statsPanel');
const subtitleEl = document.getElementById('subtitleText');

function setSubtitle(text){ subtitleEl.textContent = text; }

function renderSubjectSelect(){
  statsPanel.style.display = 'none';
  setSubtitle("6 materie · banca fissa + esercizi generati (Statistica)");
  const cards = Object.entries(SUBJECTS).map(([key,s])=>`
    <button class="subject-card" data-key="${key}">
      <span class="subject-icon">${s.icon}</span>
      <span class="subject-name">${s.name}</span>
      <span class="subject-count">${s.questions.length} domande + infiniti</span>
    </button>
  `).join('');
  mainCard.innerHTML = `
    <div class="start-screen">
      <h2>Scegli la materia</h2>
      <p>Quiz di autoesercitazione a risposta multipla per gli esami universitari Pegaso. Seleziona una materia per iniziare.</p>
      <div class="subject-grid">${cards}</div>
    </div>
  `;
  document.querySelectorAll('.subject-card').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      currentSubjectKey = btn.dataset.key;
      subject = SUBJECTS[currentSubjectKey];
      renderModeSelect();
    });
  });
}

function renderModeSelect(){
  statsPanel.style.display = 'none';
  selectedMode = 'all';
  selectedDifficulty = 'tutte';
  setSubtitle(`${subject.name} · ${subject.questions.length} domande + generatore infinito`);

  const isNumeric = subject.generatorKind === 'numeric';
  const genLabel = isNumeric ? "solo calcolo, generati al volo" : "definizioni generate al volo, con distrattori casuali";
  const mixLabel = isNumeric ? "teoria + calcolo, senza fine" : "banca fissa + definizioni generate, senza fine";

  const counts = { facile:0, media:0, difficile:0 };
  subject.questions.forEach(q => { if(q.difficulty) counts[q.difficulty]++; });

  let modesHtml = `
    <button class="mode-btn active" data-mode="all"><b>Test completo</b>${subject.questions.length} domande teoriche</button>
    <button class="mode-btn" data-mode="15"><b>Prova rapida</b>15 domande teoriche</button>
    <button class="mode-btn" data-mode="progressiva"><b>Modalità progressiva</b>dalle più facili alle più difficili</button>
    <button class="mode-btn" data-mode="gen"><b>Esercizi infiniti</b>${genLabel}</button>
    <button class="mode-btn" data-mode="mix"><b>Sessione mista infinita</b>${mixLabel}</button>
  `;

  let diffHtml = `
    <div class="diff-row" id="diffRow">
      <button class="diff-btn active" data-diff="tutte">Tutte le difficoltà</button>
      <button class="diff-btn" data-diff="facile">🟢 Facile (${counts.facile})</button>
      <button class="diff-btn" data-diff="media">🟡 Media (${counts.media})</button>
      <button class="diff-btn" data-diff="difficile">🔴 Difficile (${counts.difficile})</button>
    </div>
  `;

  mainCard.innerHTML = `
    <div class="start-screen">
      <div class="back-row"><button class="back-link" id="backToSubjects">← Cambia materia</button></div>
      <h2>${subject.icon} ${subject.name}</h2>
      <p>Scegli come vuoi esercitarti su questa materia.</p>
      <div class="mode-grid">${modesHtml}</div>
      <p class="diff-label">Filtra per difficoltà (vale per Test completo, Prova rapida e Sessione mista/infinita; la Modalità progressiva usa sempre tutte le difficoltà in ordine crescente):</p>
      ${diffHtml}
      <div class="result-actions"><button class="btn-primary" id="startBtn">Inizia →</button></div>
    </div>
  `;

  document.querySelectorAll('.mode-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      selectedMode = btn.dataset.mode;
    });
  });
  document.querySelectorAll('.diff-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.diff-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      selectedDifficulty = btn.dataset.diff;
    });
  });
  document.getElementById('backToSubjects').addEventListener('click', renderSubjectSelect);
  document.getElementById('startBtn').addEventListener('click', startQuiz);
}

function generateProceduralQuestion(){
  return randChoice(subject.generators)();
}

function pickNextQuestion(){
  if(!isInfinite) return withShuffledOptions(order[current]);
  if(mode === 'gen') return generateProceduralQuestion();
  if(mode === 'mix'){
    if(Math.random() < 0.5){
      if(fixedCyclePos >= fixedCycleOrder.length){ fixedCycleOrder = shuffle(getFilteredQuestions()); fixedCyclePos = 0; }
      return withShuffledOptions(fixedCycleOrder[fixedCyclePos++]);
    }
    return generateProceduralQuestion();
  }
  // mode === 'infinite' (ciclo continuo sulla banca fissa, senza generatore)
  if(fixedCyclePos >= fixedCycleOrder.length){ fixedCycleOrder = shuffle(getFilteredQuestions()); fixedCyclePos = 0; }
  return withShuffledOptions(fixedCycleOrder[fixedCyclePos++]);
}

function startQuiz(){
  mode = selectedMode;
  isInfinite = (mode === 'gen' || mode === 'mix' || mode === 'infinite');
  current = 0; questionNumber = 1; answered = 0; correctCount = 0; wrongCount = 0; streak = 0; wrongLog = [];

  if(mode === 'progressiva'){
    // Ordina l'intera banca fissa per difficoltà crescente, mescolando all'interno di ogni livello
    const byDiff = { facile:[], media:[], difficile:[] };
    subject.questions.forEach(q => { (byDiff[q.difficulty] || byDiff.media).push(q); });
    order = [...shuffle(byDiff.facile), ...shuffle(byDiff.media), ...shuffle(byDiff.difficile)];
  } else if(!isInfinite){
    let pool = shuffle(getFilteredQuestions());
    if(mode !== 'all') pool = pool.slice(0, parseInt(mode,10));
    order = pool;
  } else {
    fixedCycleOrder = shuffle(getFilteredQuestions());
    fixedCyclePos = 0;
  }

  statsPanel.style.display = 'block';
  updateStats();
  currentQ = pickNextQuestion();
  renderQuestion();
}

function updateStats(){
  document.getElementById('statAnswered').textContent = isInfinite ? answered : (answered + " / " + order.length);
  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent = wrongCount;
  const acc = answered ? Math.round((correctCount/answered)*100) : 0;
  document.getElementById('statAccuracy').textContent = answered ? acc + "%" : "—";
  document.getElementById('statStreak').textContent = streak;
}

function renderQuestion(){
  const item = currentQ;
  const letters = ['A','B','C','D'];
  const optionsHtml = item.options.map((opt, idx)=>`
    <button class="option" data-idx="${idx}">
      <span class="box">${letters[idx]}</span>
      <span>${opt}</span>
    </button>
  `).join('');

  let progressHtml;
  if(!isInfinite){
    const pct = Math.round((current/order.length)*100);
    progressHtml = `
      <div class="progress-top-row">
        <span class="progress-label">Domanda ${current+1} di ${order.length}</span>
        <span class="progress-label">${pct}%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    `;
  } else {
    progressHtml = `
      <div class="progress-top-row">
        <span class="progress-label">Sessione infinita · domanda #${questionNumber}</span>
        <button class="stop-link" id="stopBtn">Termina e vedi il punteggio</button>
      </div>
      <div class="progress-track"><div class="progress-fill infinite"></div></div>
    `;
  }

  mainCard.innerHTML = `
    <div class="progress-wrap">${progressHtml}</div>
    <div class="question-area">
      <div class="q-eyebrow"><span class="topic">${item.topic}</span>${item.difficulty ? `<span class="diff-badge diff-${item.difficulty}">${DIFF_LABEL[item.difficulty]}</span>` : ''}<span class="subj">${subject.icon} ${subject.name}</span></div>
      <p class="q-text">${item.q}</p>
      <div class="options">${optionsHtml}</div>
      <div class="explain" id="explainBox"><strong>Spiegazione —</strong> <span id="explainText"></span></div>
      <div class="controls"><button class="next" id="nextBtn">Prossima domanda →</button></div>
    </div>
  `;

  document.querySelectorAll('.option').forEach(btn=>{
    btn.addEventListener('click', ()=> selectAnswer(parseInt(btn.dataset.idx,10)));
  });
  const stopBtn = document.getElementById('stopBtn');
  if(stopBtn) stopBtn.addEventListener('click', renderResult);
}

function selectAnswer(idx){
  const item = currentQ;
  const opts = document.querySelectorAll('.option');
  opts.forEach(o=>o.disabled = true);

  const isCorrect = idx === item.correct;
  opts[idx].classList.add(isCorrect ? 'correct' : 'wrong');
  if(!isCorrect){
    opts[item.correct].classList.add('correct');
    wrongLog.push({q:item.q, given:item.options[idx], correct:item.options[item.correct]});
  }

  answered++;
  if(isCorrect){ correctCount++; streak++; } else { wrongCount++; streak = 0; }
  updateStats();

  const explainBox = document.getElementById('explainBox');
  document.getElementById('explainText').textContent = item.explain;
  explainBox.classList.add('show');

  const nextBtn = document.getElementById('nextBtn');
  nextBtn.classList.add('show');
  const isLastFinite = (!isInfinite) && (current === order.length - 1);
  nextBtn.textContent = isLastFinite ? "Vedi risultato →" : "Prossima domanda →";
  nextBtn.addEventListener('click', ()=>{
    if(isLastFinite){ renderResult(); return; }
    current++;
    questionNumber++;
    currentQ = pickNextQuestion();
    renderQuestion();
  }, {once:true});
}

function renderResult(){
  const totalAsked = answered;
  const pct = totalAsked ? Math.round((correctCount/totalAsked)*100) : 0;
  let verdict = "Continua a esercitarti";
  if(pct >= 90) verdict = "Eccellente preparazione";
  else if(pct >= 75) verdict = "Buon livello, ripassa i punti deboli";
  else if(pct >= 60) verdict = "Sufficiente, serve più ripasso";

  const reviewHtml = wrongLog.length ? `
    <div class="review-list">
      <div class="q-eyebrow"><span class="topic">Da ripassare</span></div>
      ${wrongLog.map(w=>`
        <div class="review-item">
          <div class="rq">${w.q}</div>
          <div class="ra-wrong">La tua risposta: ${w.given}</div>
          <div class="ra-correct">Risposta corretta: ${w.correct}</div>
        </div>
      `).join('')}
    </div>
  ` : `<div class="review-list"><div class="rq" style="text-align:center;">Nessun errore. Ottimo lavoro! 🎓</div></div>`;

  mainCard.innerHTML = `
    <div class="result">
      <p class="big">${correctCount}<span>/${totalAsked}</span></p>
      <p class="verdict">${subject.icon} ${subject.name} · ${verdict} · ${pct}% di accuratezza</p>
      <div class="result-actions">
        <button class="btn-primary" id="retryBtn">Rifai (stessa modalità)</button>
        <button class="btn-secondary" id="modeBtn">Cambia modalità</button>
        <button class="btn-secondary" id="subjectBtn">Cambia materia</button>
      </div>
      ${reviewHtml}
    </div>
  `;
  document.getElementById('retryBtn').addEventListener('click', startQuiz);
  document.getElementById('modeBtn').addEventListener('click', renderModeSelect);
  document.getElementById('subjectBtn').addEventListener('click', renderSubjectSelect);
}

renderSubjectSelect();
</script>
