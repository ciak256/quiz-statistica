<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quiz Pegaso — Preparazione Esami</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --navy:#1B2A4A; --navy-light:#2C3E63;
    --paper:#F7F3EA; --paper-dim:#EFE9DA;
    --amber:#E8A33D; --amber-dark:#C7822A;
    --ink:#232323; --ink-soft:#5A5A52;
    --correct:#5E8C6A; --correct-bg:#E4EEE2;
    --wrong:#B85450; --wrong-bg:#F5E3E0;
    --rule: rgba(27,42,74,0.15);
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--navy);
    background-image:
      radial-gradient(circle at 10% 0%, rgba(232,163,61,0.08), transparent 40%),
      repeating-linear-gradient(0deg, rgba(255,255,255,0.02) 0px, rgba(255,255,255,0.02) 1px, transparent 1px, transparent 32px);
    color:var(--ink); font-family:'IBM Plex Sans', sans-serif;
    min-height:100vh; display:flex; justify-content:center; padding:32px 16px 60px;
  }
  .app{ width:100%; max-width:940px; }
  header.top{ display:flex; align-items:baseline; justify-content:space-between; color:var(--paper); margin-bottom:22px; flex-wrap:wrap; gap:8px; }
  header.top .brand{ font-family:'Fraunces', serif; font-weight:600; font-size:1.7rem; letter-spacing:-0.01em; }
  header.top .brand em{ color:var(--amber); font-style:normal; }
  header.top .subtitle{ font-family:'IBM Plex Mono', monospace; font-size:0.75rem; color:rgba(247,243,234,0.65); letter-spacing:0.02em; }

  .layout{ display:grid; grid-template-columns: 1fr 220px; gap:20px; align-items:start; }
  @media (max-width: 720px){ .layout{ grid-template-columns: 1fr; } .stats-panel{ order:2; } }

  .card{ background:var(--paper); border-radius:4px; box-shadow: 0 1px 0 rgba(0,0,0,0.02), 0 12px 28px rgba(0,0,0,0.28); position:relative; overflow:hidden; }
  .card::before{ content:""; position:absolute; top:0; left:0; right:0; height:5px; background:linear-gradient(90deg, var(--amber), var(--amber-dark)); }

  .progress-wrap{ padding:20px 28px 0; }
  .progress-top-row{ display:flex; justify-content:space-between; align-items:center; gap:10px; flex-wrap:wrap; }
  .progress-track{ position:relative; height:8px; background:var(--paper-dim); border-radius:99px; margin-top:6px; overflow:hidden; }
  .progress-fill{ position:absolute; top:0; left:0; bottom:0; background:var(--navy); border-radius:99px; transition:width 0.35s ease; }
  .progress-fill.infinite{ width:35% !important; background:linear-gradient(90deg, transparent, var(--amber), transparent); animation: slide 1.4s linear infinite; }
  @keyframes slide{ 0%{ transform:translateX(-120%);} 100%{ transform:translateX(340%);} }
  .progress-label{ font-family:'IBM Plex Mono', monospace; font-size:0.72rem; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.06em; }
  .stop-link{ font-family:'IBM Plex Mono', monospace; font-size:0.7rem; color:var(--amber-dark); background:none; border:none; cursor:pointer; text-decoration:underline; letter-spacing:0.03em; padding:0; }

  .question-area{ padding:26px 28px 28px; }
  .q-eyebrow{ font-family:'IBM Plex Mono', monospace; font-size:0.72rem; color:var(--amber-dark); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:10px; display:flex; gap:8px; align-items:center; flex-wrap:wrap; }
  .q-eyebrow .topic{ background:var(--navy); color:var(--paper); padding:2px 8px; border-radius:99px; font-size:0.68rem; }
  .q-eyebrow .subj{ color:var(--ink-soft); }
  .q-text{ font-family:'Fraunces', serif; font-weight:600; font-size:1.26rem; line-height:1.45; color:var(--navy); margin:0 0 22px; }

  .options{ display:flex; flex-direction:column; gap:10px; }
  .option{ display:flex; align-items:flex-start; gap:12px; text-align:left; padding:13px 16px; border-radius:6px; border:1.5px solid var(--rule); background:#fff; cursor:pointer; font-family:'IBM Plex Sans', sans-serif; font-size:0.98rem; color:var(--ink); transition: border-color .15s ease, background .15s ease; }
  .option:hover:not(:disabled){ border-color:var(--amber); background:#FFFCF5; }
  .option:disabled{ cursor:default; }
  .option .box{ flex:0 0 22px; width:22px; height:22px; border:1.5px solid var(--navy); border-radius:4px; display:flex; align-items:center; justify-content:center; font-family:'IBM Plex Mono', monospace; font-size:0.72rem; font-weight:600; color:var(--navy); margin-top:1px; flex-shrink:0; }
  .option.correct{ background:var(--correct-bg); border-color:var(--correct); }
  .option.correct .box{ background:var(--correct); border-color:var(--correct); color:#fff; }
  .option.wrong{ background:var(--wrong-bg); border-color:var(--wrong); }
  .option.wrong .box{ background:var(--wrong); border-color:var(--wrong); color:#fff; }

  .explain{ margin-top:18px; padding:14px 16px; background:var(--paper-dim); border-left:3px solid var(--amber-dark); border-radius:0 4px 4px 0; font-size:0.9rem; color:var(--ink-soft); display:none; }
  .explain.show{ display:block; }
  .explain strong{ color:var(--navy); }

  .controls{ display:flex; justify-content:flex-end; margin-top:22px; }
  button.next{ font-family:'IBM Plex Mono', monospace; font-size:0.85rem; font-weight:600; letter-spacing:0.02em; background:var(--navy); color:var(--paper); border:none; padding:11px 22px; border-radius:4px; cursor:pointer; opacity:0; pointer-events:none; transition:opacity .2s ease, background .15s ease; }
  button.next.show{ opacity:1; pointer-events:auto; }
  button.next:hover{ background:var(--navy-light); }

  .stats-panel{ background:var(--navy-light); border-radius:4px; padding:20px; color:var(--paper); font-family:'IBM Plex Mono', monospace; }
  .stats-panel h3{ margin:0 0 14px; font-family:'Fraunces', serif; font-weight:600; font-size:1rem; color:var(--amber); }
  .stat-row{ display:flex; justify-content:space-between; font-size:0.8rem; padding:7px 0; border-bottom:1px dashed rgba(247,243,234,0.15); }
  .stat-row:last-child{ border-bottom:none; }
  .stat-row .val{ color:#fff; font-weight:600; }
  .stat-row .val.good{ color:#8FCB9B; }
  .stat-row .val.bad{ color:#E39A96; }

  .result{ padding:40px 32px; text-align:center; }
  .result .big{ font-family:'Fraunces', serif; font-size:3.2rem; font-weight:700; color:var(--navy); margin:0; line-height:1; }
  .result .big span{ color:var(--amber-dark); }
  .result .verdict{ font-family:'IBM Plex Mono', monospace; font-size:0.85rem; color:var(--ink-soft); text-transform:uppercase; letter-spacing:0.06em; margin:10px 0 28px; }
  .result-actions{ display:flex; gap:10px; justify-content:center; flex-wrap:wrap; }
  .result-actions button{ font-family:'IBM Plex Mono', monospace; font-size:0.82rem; font-weight:600; padding:11px 18px; border-radius:4px; cursor:pointer; border:1.5px solid var(--navy); }
  .btn-primary{ background:var(--navy); color:var(--paper); }
  .btn-primary:hover{ background:var(--navy-light); }
  .btn-secondary{ background:transparent; color:var(--navy); }
  .btn-secondary:hover{ background:var(--paper-dim); }

  .review-list{ text-align:left; margin-top:30px; border-top:1px solid var(--rule); padding-top:20px; max-height:420px; overflow-y:auto; }
  .review-item{ padding:14px 0; border-bottom:1px solid var(--rule); font-size:0.88rem; }
  .review-item:last-child{ border-bottom:none; }
  .review-item .rq{ font-weight:600; color:var(--navy); margin-bottom:6px; }
  .review-item .ra-wrong{ color:var(--wrong); }
  .review-item .ra-correct{ color:var(--correct); }

  footer.credits{ text-align:center; color:rgba(247,243,234,0.4); font-family:'IBM Plex Mono', monospace; font-size:0.7rem; margin-top:26px; }

  .start-screen{ padding:40px 32px; text-align:center; }
  .start-screen h2{ font-family:'Fraunces', serif; font-size:1.6rem; color:var(--navy); margin:0 0 10px; }
  .start-screen p{ color:var(--ink-soft); font-size:0.95rem; max-width:560px; margin:0 auto 26px; line-height:1.55; }

  .back-row{ text-align:left; margin-bottom:16px; }
  .back-link{ font-family:'IBM Plex Mono', monospace; font-size:0.75rem; color:var(--amber-dark); background:none; border:none; cursor:pointer; text-decoration:underline; padding:0; }

  .subject-grid{ display:grid; grid-template-columns:1fr 1fr; gap:12px; max-width:600px; margin:0 auto 10px; }
  @media (max-width:560px){ .subject-grid{ grid-template-columns:1fr; } }
  .subject-card{ font-family:'IBM Plex Sans', sans-serif; border:1.5px solid var(--rule); background:#fff; border-radius:10px; padding:18px 14px; cursor:pointer; text-align:center; transition:border-color .15s ease, transform .1s ease; }
  .subject-card:hover{ border-color:var(--amber-dark); transform:translateY(-2px); }
  .subject-icon{ display:block; font-size:1.9rem; margin-bottom:8px; }
  .subject-name{ display:block; font-family:'Fraunces', serif; font-weight:600; color:var(--navy); font-size:1rem; margin-bottom:4px; line-height:1.25; }
  .subject-count{ display:block; font-family:'IBM Plex Mono', monospace; font-size:0.68rem; color:var(--ink-soft); }

  .mode-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; max-width:520px; margin:0 auto 26px; }
  @media (max-width:520px){ .mode-grid{ grid-template-columns:1fr; } }
  .mode-btn{ font-family:'IBM Plex Mono', monospace; font-size:0.78rem; padding:14px 12px; border-radius:8px; border:1.5px solid var(--rule); background:#fff; cursor:pointer; color:var(--ink-soft); text-align:left; line-height:1.4; }
  .mode-btn b{ display:block; font-family:'IBM Plex Sans',sans-serif; font-size:0.92rem; color:var(--navy); margin-bottom:3px; }
  .mode-btn.active{ border-color:var(--amber-dark); background:var(--paper-dim); }
  .mode-btn.active b{ color:var(--amber-dark); }
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="brand">Quiz <em>Pegaso</em></div>
    <div class="subtitle" id="subtitleText">6 materie · banca fissa + esercizi generati</div>
  </header>

  <div class="layout">
    <div class="card" id="mainCard"></div>
    <aside class="stats-panel" id="statsPanel" style="display:none;">
      <h3>Riepilogo live</h3>
      <div class="stat-row"><span>Risposte date</span><span class="val" id="statAnswered">0</span></div>
      <div class="stat-row"><span>Corrette</span><span class="val good" id="statCorrect">0</span></div>
      <div class="stat-row"><span>Errate</span><span class="val bad" id="statWrong">0</span></div>
      <div class="stat-row"><span>Accuratezza</span><span class="val" id="statAccuracy">—</span></div>
      <div class="stat-row"><span>Serie corrente</span><span class="val" id="statStreak">0</span></div>
    </aside>
  </div>

  <footer class="credits">Materiale di autoesercitazione non ufficiale · verificare sempre sui testi/slide del corso</footer>
</div>

<script>
/* =========================================================
   HELPER NUMERICI E GENERICI
   ========================================================= */
function randInt(min,max){ return Math.floor(Math.random()*(max-min+1))+min; }
function randChoice(arr){ return arr[Math.floor(Math.random()*arr.length)]; }
function shuffle(arr){
  const a = arr.slice();
  for(let i=a.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; }
  return a;
}
function fmt(v){ return (Math.round(v*100)/100).toString().replace(/\.0+$/,'').replace(/(\.\d*?)0+$/,'$1').replace(/\.$/,''); }

function buildOptions(correctValue, distractorFn, formatFn){
  formatFn = formatFn || fmt;
  const correctFormatted = formatFn(correctValue);
  const wrongs = [];
  let attempts = 0;
  while(wrongs.length < 3 && attempts < 60){
    attempts++;
    const cand = formatFn(distractorFn());
    if(cand !== correctFormatted && !wrongs.includes(cand)) wrongs.push(cand);
  }
  let pad = 1;
  while(wrongs.length < 3){
    const filler = formatFn(Number(correctValue) + pad * (Math.random()<0.5?-1:1) * (Math.abs(Number(correctValue))*0.15 + pad));
    if(filler !== correctFormatted && !wrongs.includes(filler)) wrongs.push(filler);
    pad++;
  }
  const all = shuffle([correctFormatted, ...wrongs]);
  return { options: all, correct: all.indexOf(correctFormatted) };
}

/* =========================================================
   GENERATORE PROCEDURALE — solo per Statistica
   ========================================================= */
const STAT_GENERATORS = [
  function genMean(){
    const n = randInt(5,7);
    const data = Array.from({length:n}, ()=>randInt(2,60));
    const sum = data.reduce((a,b)=>a+b,0);
    const mean = sum/n;
    const sorted = [...data].sort((a,b)=>a-b);
    const median = n%2 ? sorted[(n-1)/2] : (sorted[n/2-1]+sorted[n/2])/2;
    const {options, correct} = buildOptions(mean, ()=>{
      const c = Math.random();
      if(c<0.34) return median;
      if(c<0.67) return sum;
      return mean + (Math.random()<0.5?1:-1)*randInt(1,8);
    });
    return { topic:"Calcolo — Media", q:`Calcola la media aritmetica del seguente insieme di dati: {${data.join(", ")}}`,
      options, correct, explain:`Media = somma dei valori (${sum}) / numerosità (${n}) = ${fmt(mean)}.` };
  },
  function genMedian(){
    const n = randChoice([5,7]);
    const data = Array.from({length:n}, ()=>randInt(1,99));
    const sorted = [...data].sort((a,b)=>a-b);
    const median = sorted[(n-1)/2];
    const mean = data.reduce((a,b)=>a+b,0)/n;
    const {options, correct} = buildOptions(median, ()=>{
      const c = Math.random();
      if(c<0.4) return mean;
      if(c<0.7) return sorted[randInt(0,n-1)];
      return median + randInt(-10,10);
    });
    return { topic:"Calcolo — Mediana", q:`Dato il seguente insieme di dati (non ordinato): {${data.join(", ")}}, qual è la mediana?`,
      options, correct, explain:`Ordinando: {${sorted.join(", ")}}. Con n=${n} (dispari) la mediana è il valore centrale: ${median}.` };
  },
  function genMode(){
    const repeated = randInt(1,30);
    const poolSet = new Set();
    while(poolSet.size < 6){ const v = randInt(1,30); if(v!==repeated) poolSet.add(v); }
    const data = shuffle([...poolSet, repeated, repeated]);
    const {options, correct} = buildOptions(repeated, ()=>{
      const c = Math.random();
      if(c<0.5) return data[randInt(0,data.length-1)];
      return repeated + (Math.random()<0.5?1:-1)*randInt(1,5);
    });
    return { topic:"Calcolo — Moda", q:`Qual è la moda del seguente insieme di dati? {${data.join(", ")}}`,
      options, correct, explain:`Il valore ${repeated} compare 2 volte, più di ogni altro valore (1 volta ciascuno).` };
  },
  function genRange(){
    const n = randInt(6,8);
    const data = Array.from({length:n}, ()=>randInt(5,95));
    const max = Math.max(...data), min = Math.min(...data);
    const range = max-min;
    const {options, correct} = buildOptions(range, ()=>{
      const c = Math.random();
      if(c<0.4) return max+min;
      if(c<0.7) return range + (Math.random()<0.5?1:-1)*randInt(1,10);
      return max;
    });
    return { topic:"Calcolo — Range", q:`Calcola il campo di variazione (range) del seguente insieme di dati: {${data.join(", ")}}`,
      options, correct, explain:`Range = massimo (${max}) − minimo (${min}) = ${range}.` };
  },
  function genVariance(){
    const n = randInt(4,5);
    const data = Array.from({length:n}, ()=>randInt(2,20));
    const mean = data.reduce((a,b)=>a+b,0)/n;
    const sumSq = data.reduce((acc,v)=>acc+Math.pow(v-mean,2),0);
    const variance = sumSq/n;
    const {options, correct} = buildOptions(variance, ()=>{
      const c = Math.random();
      if(c<0.4) return sumSq/(n-1);
      if(c<0.7) return Math.sqrt(variance);
      return variance + (Math.random()*4-2);
    });
    return { topic:"Calcolo — Varianza", q:`Calcola la varianza di popolazione (denominatore N) del seguente insieme di dati: {${data.join(", ")}}`,
      options, correct, explain:`Media = ${fmt(mean)}. Varianza = Σ(xᵢ−media)² / N = ${fmt(sumSq)} / ${n} = ${fmt(variance)}.` };
  },
  function genUrn(){
    const palette = ["rosse","blu","verdi","gialle","nere"];
    const chosen = shuffle(palette).slice(0,3);
    const counts = chosen.map(()=>randInt(2,15));
    const total = counts.reduce((a,b)=>a+b,0);
    const idx = randInt(0,2);
    const pct = (counts[idx]/total)*100;
    const {options, correct} = buildOptions(pct, ()=>{
      const c = Math.random();
      if(c<0.4) return (counts[idx]/(total-counts[idx]))*100;
      if(c<0.7) return ((total-counts[idx])/total)*100;
      return pct + (Math.random()<0.5?1:-1)*randInt(3,15);
    }, v=>fmt(v)+"%");
    return { topic:"Probabilità", q:`Un'urna contiene ${counts[0]} palline ${chosen[0]}, ${counts[1]} palline ${chosen[1]} e ${counts[2]} palline ${chosen[2]}. Estraendo una pallina a caso, qual è la probabilità che sia ${chosen[idx]}?`,
      options, correct, explain:`Totale palline = ${total}. P(${chosen[idx]}) = ${counts[idx]}/${total} ≈ ${fmt(pct)}%.` };
  },
  function genDice(){
    const k = randInt(1,5);
    const pct = ((6-k)/6)*100;
    const {options, correct} = buildOptions(pct, ()=>{
      const c = Math.random();
      if(c<0.4) return (k/6)*100;
      if(c<0.7) return ((6-k+1)/6)*100;
      return pct + (Math.random()<0.5?1:-1)*randInt(3,15);
    }, v=>fmt(v)+"%");
    return { topic:"Probabilità", q:`Lanciando un dado equilibrato a 6 facce, qual è la probabilità di ottenere un numero maggiore di ${k}?`,
      options, correct, explain:`I valori maggiori di ${k} sono ${6-k} su 6: P = (6−${k})/6 ≈ ${fmt(pct)}%.` };
  },
  function genZ(){
    const mu = randInt(40,100);
    const sigma = randInt(5,20);
    const x = mu + randInt(-3,3)*sigma + randInt(-4,4);
    const z = (x-mu)/sigma;
    const {options, correct} = buildOptions(z, ()=>{
      const c = Math.random();
      if(c<0.4) return (mu-x)/sigma;
      if(c<0.7) return (x-mu)/mu;
      return z + (Math.random()*1.6-0.8);
    });
    return { topic:"Calcolo — Punteggio z", q:`Una variabile ha media μ = ${mu} e deviazione standard σ = ${sigma}. Qual è il punteggio z per x = ${x}?`,
      options, correct, explain:`z = (x − μ) / σ = (${x} − ${mu}) / ${sigma} = ${fmt(z)}.` };
  },
  function genEmpirical(){
    const mu = randInt(50,100);
    const sigma = randInt(5,15);
    const k = randChoice([1,2,3]);
    const pctMap = {1:68,2:95,3:99.7};
    const lower = mu-k*sigma, upper = mu+k*sigma;
    const correctVal = pctMap[k];
    const {options, correct} = buildOptions(correctVal, ()=>{
      const others = Object.values(pctMap).filter(v=>v!==correctVal).concat([50,75,90]);
      return randChoice(others);
    }, v=>v+"%");
    return { topic:"Distribuzione Normale", q:`In una Normale con μ = ${mu} e σ = ${sigma}, che percentuale di dati ricade in [${lower}, ${upper}] (μ ± ${k}σ)?`,
      options, correct, explain:`Per la regola empirica, circa il ${correctVal}% dei dati ricade entro μ ± ${k}σ.` };
  },
  function genRegression(){
    const a = randInt(1,20);
    const b = randInt(1,10) * (Math.random()<0.5?1:-1);
    const x = randInt(2,20);
    const y = a + b*x;
    const {options, correct} = buildOptions(y, ()=>{
      const c = Math.random();
      if(c<0.4) return a - b*x;
      if(c<0.7) return a*x + b;
      return y + (Math.random()<0.5?1:-1)*randInt(2,15);
    });
    const bStr = b>=0 ? `+ ${b}` : `− ${Math.abs(b)}`;
    return { topic:"Regressione lineare", q:`Data la retta di regressione ŷ = ${a} ${bStr}x, qual è il valore previsto per x = ${x}?`,
      options, correct, explain:`ŷ = ${a} + (${b})·(${x}) = ${a} + ${b*x} = ${y}.` };
  },
  function genCV(){
    const mean = randInt(20,100);
    const sd = randInt(2, Math.max(3,Math.round(mean*0.5)));
    const cv = (sd/mean)*100;
    const {options, correct} = buildOptions(cv, ()=>{
      const c = Math.random();
      if(c<0.4) return (mean/sd)*100;
      if(c<0.7) return sd/mean;
      return cv + (Math.random()<0.5?1:-1)*randInt(3,15);
    }, v=>fmt(v)+"%");
    return { topic:"Calcolo — Coeff. di variazione", q:`Una distribuzione ha media = ${mean} e deviazione standard = ${sd}. Calcola il coefficiente di variazione (CV).`,
      options, correct, explain:`CV = (deviazione standard / media) × 100 = (${sd} / ${mean}) × 100 ≈ ${fmt(cv)}%.` };
  },
  function genCI(){
    const mean = randInt(50,150);
    const sigma = randInt(5,25);
    const n = randChoice([25,36,49,64,100]);
    const z = 1.96;
    const margin = z*sigma/Math.sqrt(n);
    const {options, correct} = buildOptions(margin, ()=>{
      const c = Math.random();
      if(c<0.4) return z*sigma/n;
      if(c<0.7) return sigma/Math.sqrt(n);
      return margin + (Math.random()*2-1);
    });
    return { topic:"Intervallo di confidenza", q:`Da un campione di n = ${n}, con σ = ${sigma}, calcola il margine di errore per un IC al 95% (z = 1.96) attorno alla media campionaria (μ = ${mean}).`,
      options, correct, explain:`Margine di errore = z · σ/√n = 1.96 × ${sigma}/√${n} = 1.96 × ${fmt(sigma/Math.sqrt(n))} ≈ ${fmt(margin)}.` };
  }
];

/* =========================================================
   BANCHE DOMANDE FISSE PER MATERIA
   ========================================================= */

  {topic:"Analisi dei costi", q:"Il margine di contribuzione è calcolato come:", options:["Ricavi meno costi variabili","Ricavi meno costi fissi","Ricavi meno costi totali","Costi fissi più costi variabili"], correct:0, explain:"Il margine di contribuzione (ricavi − costi variabili) indica quanto residua per coprire i costi fissi e generare utile."},
  {topic:"Analisi dei costi", q:"Il punto di pareggio (break-even point) è il livello di produzione/vendita in cui:", options:["I ricavi superano sempre i costi","I ricavi totali eguagliano i costi totali","I costi fissi sono pari a zero","L'utile è massimo"], correct:1, explain:"Nel punto di pareggio l'impresa non realizza né utile né perdita: ricavi totali = costi totali."},
  {topic:"Efficienza e strategia", q:"L'efficacia aziendale si riferisce a:", options:["Il rapporto tra risorse impiegate e risultati ottenuti","La capacità di raggiungere gli obiettivi prefissati","Il costo unitario di produzione","La velocità di rotazione del magazzino"], correct:1, explain:"L'efficacia misura il grado di raggiungimento degli obiettivi, indipendentemente dalle risorse impiegate."},
  {topic:"Efficienza e strategia", q:"L'efficienza aziendale si riferisce a:", options:["Il raggiungimento degli obiettivi a qualunque costo","Il miglior rapporto possibile tra risorse impiegate e risultati ottenuti","La quantità di debiti contratti","Il livello del fatturato"], correct:1, explain:"L'efficienza valuta quanto bene vengono utilizzate le risorse per ottenere un dato risultato."},
  {topic:"Efficienza e strategia", q:"L'economicità aziendale indica:", options:["La capacità dell'impresa di operare in equilibrio economico duraturo nel tempo","Il valore di mercato delle azioni","Il numero di filiali dell'impresa","La quota di mercato detenuta"], correct:0, explain:"L'economicità è la condizione di equilibrio economico che consente all'impresa di sopravvivere e svilupparsi nel tempo."},
  {topic:"Forme giuridiche", q:"La Società per Azioni (SPA) è caratterizzata da:", options:["Responsabilità illimitata dei soci","Responsabilità limitata dei soci e capitale diviso in azioni","Assenza di personalità giuridica","Capitale diviso in quote non trasferibili"], correct:1, explain:"Nella SPA i soci rispondono limitatamente al capitale conferito e la partecipazione è rappresentata da azioni."},
  {topic:"Forme giuridiche", q:"La Società a Responsabilità Limitata (SRL) si distingue per:", options:["Responsabilità illimitata dei soci","Capitale diviso in quote e responsabilità limitata dei soci","Obbligo di quotazione in borsa","Assenza di un capitale sociale minimo in ogni caso"], correct:1, explain:"Nella SRL il capitale è diviso in quote e i soci rispondono limitatamente al capitale sottoscritto."},
  {topic:"Forme giuridiche", q:"Nelle società di persone (es. Società in Nome Collettivo):", options:["I soci rispondono limitatamente al capitale conferito","I soci rispondono illimitatamente e solidalmente per le obbligazioni sociali","Non esiste alcuna forma di responsabilità","Il capitale è sempre diviso in azioni"], correct:1, explain:"Nelle società di persone la responsabilità dei soci è, di norma, illimitata e solidale verso i creditori sociali."},
  {topic:"Forme giuridiche", q:"Il capitale sociale rappresenta:", options:["L'utile distribuito ai soci","Il valore nominale complessivo dei conferimenti effettuati dai soci","Il totale dei debiti verso banche","Il fatturato annuo dell'impresa"], correct:1, explain:"Il capitale sociale è il valore, fissato nello statuto, dei conferimenti apportati dai soci al momento della costituzione (o di successivi aumenti)."},
  {topic:"Organizzazione", q:"L'organigramma aziendale rappresenta:", options:["Il bilancio dell'impresa","La struttura organizzativa formale dell'impresa","Il piano di marketing","Il rendiconto finanziario"], correct:1, explain:"L'organigramma illustra graficamente ruoli, funzioni e linee gerarchiche all'interno dell'organizzazione."},
  {topic:"Organizzazione", q:"Tra le funzioni aziendali tipiche rientrano:", options:["Solo la produzione","Produzione, marketing, finanza e risorse umane","Solo la contabilità","Solo la funzione legale"], correct:1, explain:"Un'impresa si articola tipicamente in più funzioni (produzione, marketing, finanza, risorse umane, ecc.) che collaborano al perseguimento degli obiettivi."},
  {topic:"Marketing", q:"Il marketing mix è tradizionalmente composto dalle cosiddette '4P':", options:["Persone, Processo, Prova, Prezzo","Prodotto, Prezzo, Distribuzione (Place), Comunicazione (Promotion)","Produzione, Profitto, Personale, Pianificazione","Prodotto, Pubblicità, Politica, Programmazione"], correct:1, explain:"Le 4P classiche del marketing mix sono Product, Price, Place, Promotion."},
  {topic:"Marketing", q:"Il ciclo di vita del prodotto comprende tipicamente le fasi di:", options:["Introduzione, sviluppo, maturità, declino","Nascita, fallimento, rilancio","Produzione, vendita, reso","Progettazione, brevetto, quotazione"], correct:0, explain:"Il ciclo di vita del prodotto descrive l'evoluzione delle vendite nelle fasi di introduzione, crescita/sviluppo, maturità e declino."},
  {topic:"Finanza aziendale", q:"Il cash flow (flusso di cassa) rappresenta:", options:["Il fatturato lordo dell'impresa","La variazione delle disponibilità liquide in un determinato periodo","Il valore del magazzino a fine anno","L'utile netto di bilancio"], correct:1, explain:"Il cash flow misura le entrate e le uscite monetarie effettive, distinto dal risultato economico di competenza."},
  {topic:"Finanza aziendale", q:"Il budget aziendale è principalmente:", options:["Un documento di natura solo fiscale","Uno strumento di programmazione e controllo economico-finanziario","Il bilancio consolidato di gruppo","Un contratto con i fornitori"], correct:1, explain:"Il budget traduce in termini economico-finanziari gli obiettivi e i programmi dell'impresa per un periodo futuro, permettendone il controllo."},
  {topic:"Finanza aziendale", q:"Il bilancio consolidato è:", options:["Il bilancio di una singola impresa individuale","Il bilancio che rappresenta la situazione economico-patrimoniale di un gruppo di imprese","Un bilancio solo previsionale","Il bilancio richiesto solo alle ditte individuali"], correct:1, explain:"Il bilancio consolidato aggrega le situazioni contabili delle imprese appartenenti a un gruppo, eliminando le partite infragruppo."},
  {topic:"Lavoro", q:"Il TFR (Trattamento di Fine Rapporto) è:", options:["Un premio di produzione mensile","Una quota di retribuzione accantonata annualmente e liquidata al termine del rapporto di lavoro","Un'imposta sui redditi da lavoro","Un contributo versato solo dal lavoratore"], correct:1, explain:"Il TFR è una somma che il datore di lavoro accantona ogni anno e corrisponde al lavoratore alla cessazione del rapporto."},
  {topic:"Principi contabili", q:"I principi contabili (nazionali OIC o internazionali IAS/IFRS) servono a:", options:["Stabilire le aliquote fiscali","Definire regole e criteri per la corretta redazione del bilancio","Fissare il prezzo delle azioni in borsa","Regolare solo i rapporti di lavoro"], correct:1, explain:"I principi contabili forniscono i criteri di rilevazione, valutazione ed esposizione delle voci di bilancio."},
  {topic:"Principi contabili", q:"Il principio della competenza economica prevede che:", options:["Costi e ricavi siano rilevati solo quando avviene l'incasso o il pagamento","Costi e ricavi siano attribuiti all'esercizio in cui economicamente maturano, indipendentemente dal momento dell'incasso/pagamento","Si contabilizzino solo i costi certi","Si escludano dal bilancio le imposte"], correct:1, explain:"Il principio di competenza economica impone di imputare costi e ricavi all'esercizio in cui si manifestano economicamente, non a quello dei movimenti di cassa."}

const Q_DIRITTO_PRIVATO = [

  {topic:"Contratto", q:"Gli elementi essenziali del contratto secondo l'art. 1325 c.c. sono:", options:["Accordo, causa, oggetto e forma (se prescritta dalla legge)","Solo l'accordo delle parti","Solo il prezzo pattuito","Testimoni e notaio in ogni caso"], correct:0, explain:"L'art. 1325 c.c. indica come requisiti essenziali: l'accordo delle parti, la causa, l'oggetto e, quando richiesta, la forma."},
  {topic:"Contratto", q:"La causa del contratto rappresenta:", options:["La firma apposta in calce al documento","La funzione economico-sociale che il contratto persegue","Il nome delle parti contraenti","La data di stipulazione"], correct:1, explain:"La causa è la ragione giustificativa, riconosciuta dall'ordinamento, dello spostamento patrimoniale operato dal contratto."},

  {topic:"Contratto", q:"Un contratto annullabile è:", options:["Sempre nullo dall'origine e insanabile","Efficace fino a quando non venga annullato su richiesta della parte tutelata","Un contratto già estinto per prescrizione","Impossibile da sanare in ogni caso"], correct:1, explain:"Il contratto annullabile (es. per incapacità, errore, dolo, violenza) produce i suoi effetti fino alla pronuncia di annullamento, azionabile solo dalla parte a tutela della quale la legge prevede il rimedio."},
  {topic:"Contratto", q:"Il dolo, come vizio del consenso, consiste in:", options:["Un semplice errore di calcolo","Un raggiro che induce la controparte a stipulare un contratto che altrimenti non avrebbe concluso","Una minaccia fisica","Un'offerta al pubblico"], correct:1, explain:"Il dolo è costituito da artifici o raggiri che traggono in inganno la controparte, viziandone la volontà contrattuale."},

  {topic:"Obbligazioni", q:"Secondo l'art. 1173 c.c., le obbligazioni derivano da:", options:["Solo dal contratto","Contratto, fatto illecito o altro atto/fatto idoneo a produrle secondo l'ordinamento","Solo da sentenze del giudice","Solo da leggi speciali"], correct:1, explain:"L'art. 1173 c.c. individua tre fonti delle obbligazioni: il contratto, il fatto illecito e ogni altro atto o fatto idoneo a produrle in conformità dell'ordinamento."},
  {topic:"Obbligazioni", q:"L'adempimento dell'obbligazione consiste in:", options:["La rinuncia del creditore al proprio diritto","L'esatta esecuzione della prestazione dovuta","La cessione del contratto a un terzo","L'estinzione automatica del debito per decorso del tempo"], correct:1, explain:"L'adempimento è la corretta e puntuale esecuzione della prestazione dovuta dal debitore, che estingue l'obbligazione."},
  {topic:"Obbligazioni", q:"L'inadempimento dell'obbligazione consiste in:", options:["L'esatta esecuzione della prestazione","La mancata o inesatta esecuzione della prestazione dovuta","La rinuncia del debitore al credito","Un accordo tra le parti"], correct:1, explain:"Si ha inadempimento quando il debitore non esegue, esegue solo in parte, o esegue in modo difforme la prestazione dovuta."},
  {topic:"Responsabilità civile", q:"La responsabilità contrattuale nasce da:", options:["La violazione di un obbligo derivante da un contratto o da un rapporto obbligatorio preesistente","Un fatto illecito senza alcun rapporto preesistente","Un provvedimento amministrativo","Una legge penale"], correct:0, explain:"La responsabilità contrattuale presuppone l'esistenza di un vincolo obbligatorio preesistente, la cui violazione genera l'obbligo di risarcire il danno."},
  {topic:"Responsabilità civile", q:"La responsabilità extracontrattuale (aquiliana, art. 2043 c.c.) sorge quando:", options:["Esiste sempre un contratto tra le parti","Un fatto doloso o colposo cagiona ad altri un danno ingiusto, in assenza di un preesistente rapporto obbligatorio","Le parti concordano preventivamente le conseguenze del danno","Si tratta solo di danni patrimoniali da inadempimento contrattuale"], correct:1, explain:"L'art. 2043 c.c. impone di risarcire il danno ingiusto arrecato ad altri con dolo o colpa, a prescindere da un rapporto contrattuale preesistente."},
  {topic:"Responsabilità civile", q:"Il risarcimento del danno patrimoniale comprende tipicamente:", options:["Solo il danno emergente","Danno emergente e lucro cessante","Solo il lucro cessante","Nessuna delle due voci"], correct:1, explain:"Il risarcimento copre sia il danno emergente (perdita subita) sia il lucro cessante (mancato guadagno)."},
  {topic:"Diritti reali", q:"Il diritto di proprietà (art. 832 c.c.) attribuisce al titolare il diritto di:", options:["Godere e disporre della cosa in modo pieno ed esclusivo, nei limiti di legge","Usare la cosa solo con il consenso di terzi","Cedere la cosa solo a titolo gratuito","Utilizzare la cosa solo per fini pubblici"], correct:0, explain:"La proprietà è il diritto reale più ampio, che consente al titolare di godere e disporre del bene in modo pieno ed esclusivo, entro i limiti dell'ordinamento."},

  {topic:"Successioni", q:"La successione testamentaria si fonda su:", options:["Un testamento validamente redatto dal defunto (de cuius)","Una decisione del giudice","Un accordo tra gli eredi","Una legge speciale regionale"], correct:0, explain:"La successione testamentaria attua le disposizioni di ultima volontà espresse dal defunto in un testamento valido."},
  {topic:"Successioni", q:"I legittimari sono:", options:["Tutti i creditori del defunto","I soggetti (coniuge, figli, in mancanza ascendenti) ai quali la legge riserva una quota di eredità","Solo gli amici del defunto nominati in un testamento","Gli esecutori testamentari"], correct:1, explain:"I legittimari hanno diritto a una quota di eredità (quota di legittima) che il testatore non può loro sottrarre, salvo diseredazione per giusta causa nei casi previsti."},

  {topic:"Macroeconomia", q:"Il PIL (Prodotto Interno Lordo) misura:", options:["Il valore di mercato di tutti i beni e servizi finali prodotti in un paese in un periodo","Solo le esportazioni di un paese","Il debito pubblico complessivo","Il numero di imprese attive in un paese"], correct:0, explain:"Il PIL è il principale indicatore della produzione aggregata di un'economia in un dato periodo di tempo."},

  {topic:"Macroeconomia", q:"L'inflazione è definita come:", options:["Una diminuzione generale e persistente dei prezzi","Un aumento generale e persistente del livello dei prezzi","La crescita del PIL reale","Una diminuzione della disoccupazione"], correct:1, explain:"L'inflazione indica un aumento diffuso e continuativo del livello generale dei prezzi in un'economia."},
  {topic:"Macroeconomia", q:"La deflazione è definita come:", options:["Un aumento generale dei prezzi","Una diminuzione generale e persistente del livello dei prezzi","Una fase di forte crescita economica","Un aumento dei salari reali"], correct:1, explain:"La deflazione è l'opposto dell'inflazione: un calo continuativo del livello generale dei prezzi."},

  {topic:"Teorie di governance", q:"La teoria degli stakeholder sostiene che l'impresa debba:", options:["Considerare esclusivamente l'interesse degli azionisti","Considerare gli interessi di tutti i portatori di interesse (dipendenti, clienti, fornitori, comunità, ecc.)","Ignorare completamente l'ambiente esterno","Massimizzare solo il fatturato di breve periodo"], correct:1, explain:"Secondo la stakeholder theory, l'impresa deve bilanciare gli interessi di tutti i soggetti coinvolti nella sua attività, non solo quelli degli azionisti."},

  {topic:"Teorie di governance", q:"La separazione tra proprietà e controllo è un fenomeno tipico:", options:["Delle piccole imprese familiari","Delle grandi società ad azionariato diffuso","Delle sole imprese pubbliche","Delle imprese individuali"], correct:1, explain:"Nelle grandi società quotate ad azionariato diffuso, spesso la proprietà (azionisti) è separata dal controllo effettivo (management)."},
  {topic:"Analisi strategica", q:"Il modello delle 5 forze di Porter analizza:", options:["Solo la concorrenza diretta tra imprese esistenti","L'intensità competitiva di un settore, considerando concorrenti, nuovi entranti, prodotti sostitutivi e potere contrattuale di fornitori e clienti","Solo il potere dei fornitori","Solo le barriere normative"], correct:1, explain:"Il modello di Porter valuta l'attrattività di un settore analizzando cinque forze competitive: rivalità interna, minaccia di nuovi entranti, prodotti sostitutivi, potere di fornitori e clienti."},
  {topic:"Analisi strategica", q:"La catena del valore di Porter scompone l'impresa in:", options:["Solo attività di marketing","Attività primarie e attività di supporto, per individuare le fonti del vantaggio competitivo","Solo attività finanziarie","Un unico processo indivisibile"], correct:1, explain:"La catena del valore distingue attività primarie (es. logistica, produzione, vendite) e di supporto (es. approvvigionamenti, risorse umane) per analizzare dove si crea valore."},

/* Generatore infinito basato su termine/definizione: pesca un concetto e
   costruisce 3 distrattori casuali dallo stesso glossario, alternando la
   direzione della domanda (dal termine alla definizione o viceversa). */
function genGlossaryQuestion(glossary){
  const idx = randInt(0, glossary.length - 1);
  const item = glossary[idx];
  const direction = Math.random() < 0.5 ? 'term2def' : 'def2term';

  const distractorIdxs = new Set();
  while(distractorIdxs.size < 3){
    const j = randInt(0, glossary.length - 1);
    if(j !== idx) distractorIdxs.add(j);
  }
  const distractorItems = [...distractorIdxs].map(j => glossary[j]);

  let q, correctText, optionTexts;
  if(direction === 'term2def'){
    q = `Che cosa si intende, in questa materia, per "${item.term}"?`;
    correctText = item.definition;
    optionTexts = distractorItems.map(d => d.definition);
  } else {
    const defCapitalized = item.definition.charAt(0).toUpperCase() + item.definition.slice(1);
    q = `A quale concetto corrisponde questa definizione? "${defCapitalized}"`;
    correctText = item.term;
    optionTexts = distractorItems.map(d => d.term);
  }

  const all = shuffle([correctText, ...optionTexts]);
  const correct = all.indexOf(correctText);
  return {
    topic: "Glossario",
    q, options: all, correct,
    explain: `${item.term}: ${item.definition}.`
  };
}

function makeGlossaryGenerator(glossary){
  return function(){ return genGlossaryQuestion(glossary); };
}

      <span class="subject-icon">${s.icon}</span>
      <span class="subject-name">${s.name}</span>
      <span class="subject-count">${s.questions.length} domande + infiniti</span>
    </button>
  `).join('');
  mainCard.innerHTML = `
    <div class="start-screen">
      <h2>Scegli la materia</h2>
      <p>Quiz di autoesercitazione a risposta multipla per gli esami universitari Pegaso. Seleziona una materia per iniziare.</p>
      <div class="subject-grid">${cards}</div>
    </div>
  `;
  document.querySelectorAll('.subject-card').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      currentSubjectKey = btn.dataset.key;
      subject = SUBJECTS[currentSubjectKey];
      renderModeSelect();
    });
  });
}

function renderModeSelect(){
  statsPanel.style.display = 'none';
  selectedMode = 'all';
  setSubtitle(`${subject.name} · ${subject.questions.length} domande + generatore infinito`);

  const isNumeric = subject.generatorKind === 'numeric';
  const genLabel = isNumeric ? "solo calcolo, generati al volo" : "definizioni generate al volo, con distrattori casuali";
  const mixLabel = isNumeric ? "teoria + calcolo, senza fine" : "banca fissa + definizioni generate, senza fine";

  let modesHtml = `
    <button class="mode-btn active" data-mode="all"><b>Test completo</b>${subject.questions.length} domande teoriche</button>
    <button class="mode-btn" data-mode="15"><b>Prova rapida</b>15 domande teoriche</button>
    <button class="mode-btn" data-mode="gen"><b>Esercizi infiniti</b>${genLabel}</button>
    <button class="mode-btn" data-mode="mix"><b>Sessione mista infinita</b>${mixLabel}</button>
  `;

  mainCard.innerHTML = `
    <div class="start-screen">
      <div class="back-row"><button class="back-link" id="backToSubjects">← Cambia materia</button></div>
      <h2>${subject.icon} ${subject.name}</h2>
      <p>Scegli come vuoi esercitarti su questa materia.</p>
      <div class="mode-grid">${modesHtml}</div>
      <div class="result-actions"><button class="btn-primary" id="startBtn">Inizia →</button></div>
    </div>
  `;

  document.querySelectorAll('.mode-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      document.querySelectorAll('.mode-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      selectedMode = btn.dataset.mode;
    });
  });
  document.getElementById('backToSubjects').addEventListener('click', renderSubjectSelect);
  document.getElementById('startBtn').addEventListener('click', startQuiz);
}

function generateProceduralQuestion(){
  return randChoice(subject.generators)();
}

function pickNextQuestion(){
  if(!isInfinite) return order[current];
  if(mode === 'gen') return generateProceduralQuestion();
  if(mode === 'mix'){
    if(Math.random() < 0.5){
      if(fixedCyclePos >= fixedCycleOrder.length){ fixedCycleOrder = shuffle(subject.questions); fixedCyclePos = 0; }
      return fixedCycleOrder[fixedCyclePos++];
    }
    return generateProceduralQuestion();
  }
  // mode === 'infinite' (ciclo continuo sulla banca fissa, senza generatore)
  if(fixedCyclePos >= fixedCycleOrder.length){ fixedCycleOrder = shuffle(subject.questions); fixedCyclePos = 0; }
  return fixedCycleOrder[fixedCyclePos++];
}

function startQuiz(){
  mode = selectedMode;
  isInfinite = (mode === 'gen' || mode === 'mix' || mode === 'infinite');
  current = 0; questionNumber = 1; answered = 0; correctCount = 0; wrongCount = 0; streak = 0; wrongLog = [];

  if(!isInfinite){
    let pool = shuffle(subject.questions);
    if(mode !== 'all') pool = pool.slice(0, parseInt(mode,10));
    order = pool;
  } else {
    fixedCycleOrder = shuffle(subject.questions);
    fixedCyclePos = 0;
  }

  statsPanel.style.display = 'block';
  updateStats();
  currentQ = pickNextQuestion();
  renderQuestion();
}

function updateStats(){
  document.getElementById('statAnswered').textContent = isInfinite ? answered : (answered + " / " + order.length);
  document.getElementById('statCorrect').textContent = correctCount;
  document.getElementById('statWrong').textContent = wrongCount;
  const acc = answered ? Math.round((correctCount/answered)*100) : 0;
  document.getElementById('statAccuracy').textContent = answered ? acc + "%" : "—";
  document.getElementById('statStreak').textContent = streak;
}

function renderQuestion(){
  const item = currentQ;
  const letters = ['A','B','C','D'];
  const optionsHtml = item.options.map((opt, idx)=>`
    <button class="option" data-idx="${idx}">
      <span class="box">${letters[idx]}</span>
      <span>${opt}</span>
    </button>
  `).join('');

  let progressHtml;
  if(!isInfinite){
    const pct = Math.round((current/order.length)*100);
    progressHtml = `
      <div class="progress-top-row">
        <span class="progress-label">Domanda ${current+1} di ${order.length}</span>
        <span class="progress-label">${pct}%</span>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
    `;
  } else {
    progressHtml = `
      <div class="progress-top-row">
        <span class="progress-label">Sessione infinita · domanda #${questionNumber}</span>
        <button class="stop-link" id="stopBtn">Termina e vedi il punteggio</button>
      </div>
      <div class="progress-track"><div class="progress-fill infinite"></div></div>
    `;
  }

  mainCard.innerHTML = `
    <div class="progress-wrap">${progressHtml}</div>
    <div class="question-area">
      <div class="q-eyebrow"><span class="topic">${item.topic}</span><span class="subj">${subject.icon} ${subject.name}</span></div>
      <p class="q-text">${item.q}</p>
      <div class="options">${optionsHtml}</div>
      <div class="explain" id="explainBox"><strong>Spiegazione —</strong> <span id="explainText"></span></div>
      <div class="controls"><button class="next" id="nextBtn">Prossima domanda →</button></div>
    </div>
  `;

  document.querySelectorAll('.option').forEach(btn=>{
    btn.addEventListener('click', ()=> selectAnswer(parseInt(btn.dataset.idx,10)));
  });
  const stopBtn = document.getElementById('stopBtn');
  if(stopBtn) stopBtn.addEventListener('click', renderResult);
}

function selectAnswer(idx){
  const item = currentQ;
  const opts = document.querySelectorAll('.option');
  opts.forEach(o=>o.disabled = true);

  const isCorrect = idx === item.correct;
  opts[idx].classList.add(isCorrect ? 'correct' : 'wrong');
  if(!isCorrect){
    opts[item.correct].classList.add('correct');
    wrongLog.push({q:item.q, given:item.options[idx], correct:item.options[item.correct]});
  }

  answered++;
  if(isCorrect){ correctCount++; streak++; } else { wrongCount++; streak = 0; }
  updateStats();

  const explainBox = document.getElementById('explainBox');
  document.getElementById('explainText').textContent = item.explain;
  explainBox.classList.add('show');

  const nextBtn = document.getElementById('nextBtn');
  nextBtn.classList.add('show');
  const isLastFinite = (!isInfinite) && (current === order.length - 1);
  nextBtn.textContent = isLastFinite ? "Vedi risultato →" : "Prossima domanda →";
  nextBtn.addEventListener('click', ()=>{
    if(isLastFinite){ renderResult(); return; }
    current++;
    questionNumber++;
    currentQ = pickNextQuestion();
    renderQuestion();
  }, {once:true});
}

function renderResult(){
  const totalAsked = answered;
  const pct = totalAsked ? Math.round((correctCount/totalAsked)*100) : 0;
  let verdict = "Continua a esercitarti";
  if(pct >= 90) verdict = "Eccellente preparazione";
  else if(pct >= 75) verdict = "Buon livello, ripassa i punti deboli";
  else if(pct >= 60) verdict = "Sufficiente, serve più ripasso";

  const reviewHtml = wrongLog.length ? `
    <div class="review-list">
      <div class="q-eyebrow"><span class="topic">Da ripassare</span></div>
      ${wrongLog.map(w=>`
        <div class="review-item">
          <div class="rq">${w.q}</div>
          <div class="ra-wrong">La tua risposta: ${w.given}</div>
          <div class="ra-correct">Risposta corretta: ${w.correct}</div>
        </div>
      `).join('')}
    </div>
  ` : `<div class="review-list"><div class="rq" style="text-align:center;">Nessun errore. Ottimo lavoro! 🎓</div></div>`;

  mainCard.innerHTML = `
    <div class="result">
      <p class="big">${correctCount}<span>/${totalAsked}</span></p>
      <p class="verdict">${subject.icon} ${subject.name} · ${verdict} · ${pct}% di accuratezza</p>
      <div class="result-actions">
        <button class="btn-primary" id="retryBtn">Rifai (stessa modalità)</button>
        <button class="btn-secondary" id="modeBtn">Cambia modalità</button>
        <button class="btn-secondary" id="subjectBtn">Cambia materia</button>
      </div>
      ${reviewHtml}
    </div>
  `;
  document.getElementById('retryBtn').addEventListener('click', startQuiz);
  document.getElementById('modeBtn').addEventListener('click', renderModeSelect);
  document.getElementById('subjectBtn').addEventListener('click', renderSubjectSelect);
}

renderSubjectSelect();
</script>
</body>
</html>
