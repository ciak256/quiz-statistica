  {topic:"Le medie razionali (paniere2)", q:"I voti riportati da uno studente in fisica, statistica e matematica sono 71, 78, 89 (centesimi), con pesi rispettivamente 2, 4, 5. La media ponderata dei voti è:", options:["82","79","85","76"], correct:0, explain:"La media ponderata si calcola come (71×2+78×4+89×5)/(2+4+5) = 82.", difficulty:"media"},
  {topic:"Le medie razionali (paniere2)", q:"La media armonica è:", options:["Il reciproco della media aritmetica dei reciproci dei termini","La radice n-esima del prodotto dei termini, un parametro stimato tramite il metodo dei momenti applicato al campione","La somma dei termini divisa per la loro numerosità, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Il valore centrale della distribuzione ordinata, una grandezza calcolata sulla base della distribuzione marginale della variabile"], correct:0, explain:"La media armonica è il reciproco della media aritmetica dei reciproci dei valori considerati.", difficulty:"media"},
  {topic:"Le medie razionali (paniere2)", q:"Due punti C e D distano 80 km. Un corpo va da C a D a 80 km/h e torna da D a C a 20 km/h. La velocità media dell'intero tragitto è:", options:["32 km/h","50 km/h","40 km/h","60 km/h"], correct:0, explain:"Per velocità su percorsi di uguale distanza si usa la media armonica: 2/(1/80+1/20) = 32 km/h.", difficulty:"difficile"},
  {topic:"Le medie razionali (paniere2)", q:"La media armonica è particolarmente usata:", options:["Quando si mediano rapporti di tempo, come le velocità","Quando i valori vengono per loro natura moltiplicati tra loro","Quando i dati sono raggruppati in classi di ampiezza costante","Quando la distribuzione è fortemente asimmetrica"], correct:0, explain:"La media armonica è indicata quando si mediano grandezze espresse come rapporti, tipicamente velocità o tempi.", difficulty:"media"},
  {topic:"Le medie razionali (paniere2)", q:"La media geometrica è particolarmente usata:", options:["Quando i diversi valori vengono per loro natura moltiplicati tra loro","Quando si mediano rapporti di tempo o velocità, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Quando i dati contengono valori negativi, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","Quando la distribuzione è simmetrica, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte"], correct:0, explain:"La media geometrica è indicata per dati di natura moltiplicativa, come tassi di variazione composti.", difficulty:"media"},
  {topic:"Le Medie (paniere2)", q:"Calcolare la mediana della seguente serie di voti: 19, 20, 22, 18, 26, 30, 28:", options:["22","20","26","24"], correct:0, explain:"Ordinando i valori (18,19,20,22,26,28,30), n=7 dispari: la mediana è il valore centrale in posizione 4, cioè 22.", difficulty:"media"},
  {topic:"Le Medie (paniere2)", q:"Calcolare la mediana della seguente serie: -2, -3, -5, 0, 1, 4, 7:", options:["0","1","-2","-3"], correct:0, explain:"Ordinando i valori (-5,-3,-2,0,1,4,7), n=7 dispari: la mediana è il valore centrale in posizione 4, cioè 0.", difficulty:"media"},
  {topic:"Le Medie (paniere2)", q:"Il secondo quartile coincide con:", options:["La mediana","Il primo quartile","La media aritmetica","La moda della distribuzione"], correct:0, explain:"Il secondo quartile (Q2) coincide sempre con la mediana della distribuzione.", difficulty:"facile"},
  {topic:"Le Medie (paniere2)", q:"Data una distribuzione in classi (48-52 freq. 7; 53-57 freq. 31; 58-62 freq. 25; 63-67 freq. 22; 68-72 freq. 20; 73-77 freq. 11; 78-82 freq. 4), la classe mediana è:", options:["58-62","53-57","63-67","48-52"], correct:0, explain:"Sommando le frequenze cumulate, la classe in cui cade il 50% delle osservazioni (posizione centrale) è 58-62.", difficulty:"media"},
  {topic:"Le Medie (paniere2)", q:"Con riferimento alla distribuzione in classi precedente, la mediana approssimata per interpolazione è pari a:", options:["61,52","58,00","65,30","55,97"], correct:0, explain:"Applicando l'interpolazione lineare nella classe mediana 58-62 si ottiene una mediana approssimata di 61,52.", difficulty:"difficile"},
  {topic:"Le Medie (paniere2)", q:"Il primo quartile è:", options:["Quel valore che lascia alla sua destra il 75% delle osservazioni e alla sua sinistra il 25%","Quel valore che lascia alla sua destra il 25% delle osservazioni e alla sua sinistra il 75%","Il valore centrale della distribuzione ordinata","Il valore corrispondente alla massima frequenza"], correct:0, explain:"Il primo quartile Q1 lascia alla propria sinistra il 25% delle osservazioni e alla destra il restante 75%.", difficulty:"media"},
  {topic:"Le Medie (paniere2)", q:"Con riferimento alla distribuzione in classi precedente, il primo quartile approssimato è pari a:", options:["55,97","61,52","69,00","50,00"], correct:0, explain:"Applicando l'interpolazione lineare per il 25° percentile, si ottiene un primo quartile pari a 55,97.", difficulty:"difficile"},
  {topic:"Le Medie (paniere2)", q:"Con riferimento alla distribuzione in classi precedente, il terzo quartile è pari a:", options:["69","61,52","55,97","72,00"], correct:0, explain:"Applicando l'interpolazione lineare per il 75° percentile, si ottiene un terzo quartile pari a 69.", difficulty:"difficile"},
  {topic:"Le Medie (paniere2)", q:"Data una serie di valori numerici, il valore a cui corrisponde la massima frequenza si chiama:", options:["Moda","Mediana","Media aritmetica","Campo di variazione"], correct:0, explain:"La moda è il valore (o la classe) che presenta la frequenza assoluta più elevata nella distribuzione.", difficulty:"facile"},
  {topic:"La Variabilità (paniere2)", q:"Cosa si intende per variabilità:", options:["L'attitudine di un fenomeno quantitativo ad assumere differenti modalità","L'attitudine di un fenomeno qualitativo ad assumere differenti modalità","La tendenza di un fenomeno a rimanere costante nel tempo","Il valore medio di una distribuzione di frequenza"], correct:0, explain:"La variabilità è l'attitudine di un fenomeno quantitativo ad assumere modalità differenti tra le unità osservate.", difficulty:"facile"},
  {topic:"La Variabilità (paniere2)", q:"Quale dei seguenti indici indica la variabilità di una serie di dati:", options:["Scarto quadratico medio","Moda","Mediana","Numero indice a base fissa"], correct:0, explain:"Lo scarto quadratico medio (deviazione standard) è un indice classico di variabilità di una distribuzione.", difficulty:"facile"},
  {topic:"La Variabilità (paniere2)", q:"La devianza è:", options:["La somma degli scarti dalla media aritmetica al quadrato","La somma degli scarti dalla media aritmetica in valore assoluto","Il rapporto tra scarto quadratico medio e media aritmetica","La differenza tra valore massimo e minimo della distribuzione"], correct:0, explain:"La devianza è la somma dei quadrati degli scarti di ciascuna osservazione dalla media aritmetica.", difficulty:"media"},
  {topic:"La Variabilità (paniere2)", q:"Conoscendo la devianza, lo scarto quadratico medio si ricava calcolando:", options:["La radice quadrata del rapporto tra devianza e numerosità del collettivo","Il rapporto diretto tra devianza e numerosità, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Il prodotto tra devianza e numerosità, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","La radice cubica della devianza, un parametro stimato tramite il metodo dei momenti applicato al campione"], correct:0, explain:"Lo scarto quadratico medio è la radice quadrata della varianza, ottenuta dividendo la devianza per la numerosità.", difficulty:"media"},
  {topic:"La Variabilità (paniere2)", q:"Calcolare la varianza dei seguenti numeri: 12, 6, 7, 3, 15, 10, 18, 5:", options:["23,75","20,50","25,00","18,75"], correct:0, explain:"Calcolando media e scarti quadratici medi degli otto valori, si ottiene una varianza pari a 23,75.", difficulty:"media"},
  {topic:"La Variabilità (paniere2)", q:"Calcolare lo scarto quadratico medio dei seguenti numeri: 12, 6, 7, 3, 15, 10, 18, 5:", options:["4,87","5,50","4,00","6,20"], correct:0, explain:"La radice quadrata della varianza (23,75) calcolata sugli stessi dati restituisce uno scarto quadratico medio pari a 4,87.", difficulty:"media"},
  {topic:"La Variabilità (paniere2)", q:"Il coefficiente di variazione è dato dal rapporto, espresso in termini percentuali, tra:", options:["Lo scarto quadratico medio e la media aritmetica","La media aritmetica e lo scarto quadratico medio","La devianza e la numerosità del collettivo","Il valore massimo e il valore minimo"], correct:0, explain:"Il coefficiente di variazione è il rapporto percentuale tra scarto quadratico medio e media aritmetica.", difficulty:"media"},
  {topic:"La Variabilità (paniere2)", q:"La differenza interquartile è data dalla differenza tra:", options:["Terzo e primo quartile","Valore massimo e valore minimo","Media e mediana","Secondo e primo quartile"], correct:0, explain:"La differenza (scarto) interquartile è data dalla differenza tra terzo quartile (Q3) e primo quartile (Q1).", difficulty:"media"},
  {topic:"La Variabilità (paniere2)", q:"Il campo di variazione è dato dalla:", options:["Differenza tra valore massimo e minimo della distribuzione","Differenza tra terzo e primo quartile, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Somma tra valore massimo e minimo, una grandezza calcolata sulla base della distribuzione marginale della variabile","Radice quadrata della varianza, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi"], correct:0, explain:"Il campo di variazione (range) è la differenza tra il valore massimo e il valore minimo osservati.", difficulty:"facile"},
  {topic:"La Variabilità (paniere2)", q:"La mutabilità è:", options:["L'attitudine di un fenomeno qualitativo ad assumere differenti modalità","L'attitudine di un fenomeno quantitativo ad assumere differenti modalità","Un sinonimo di varianza campionaria","Il valore centrale di una distribuzione qualitativa"], correct:0, explain:"La mutabilità è l'analogo della variabilità applicato a caratteri qualitativi (mutabili).", difficulty:"media"},
  {topic:"Indici di forma (paniere2)", q:"Data la distribuzione 8, 14, 16, 16, 16, 21, 21, si può dire che è:", options:["Non simmetrica","Perfettamente simmetrica","Priva di moda","Priva di mediana"], correct:0, explain:"La distribuzione presenta una concentrazione di valori spostata verso destra rispetto al centro, risultando non simmetrica.", difficulty:"media"},
  {topic:"Indici di forma (paniere2)", q:"L'asimmetria di una distribuzione denota che:", options:["I valori del carattere sono distribuiti con frequenze differenti attorno al suo valore centrale","Tutti i valori hanno la stessa frequenza attorno al centro, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","La distribuzione ha varianza nulla, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","La distribuzione è priva di moda, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate"], correct:0, explain:"L'asimmetria indica che le frequenze non si distribuiscono in modo speculare attorno al valore centrale della distribuzione.", difficulty:"media"},
  {topic:"Indici di forma (paniere2)", q:"L'asimmetria di una distribuzione può essere:", options:["Nulla, positiva o negativa","Positiva o negativa, ma mai nulla in pratica","Nulla o positiva, ma mai negativa","Definita in termini assoluti anziché relativi"], correct:0, explain:"L'asimmetria di una distribuzione può assumere valore nullo (simmetria), positivo o negativo.", difficulty:"facile"},
  {topic:"Indici di forma (paniere2)", q:"Se la distribuzione ha asimmetria positiva si ha:", options:["Med-Q1 minore di Q3-Med","Med-Q1 maggiore di Q3-Med","Med-Q1 uguale a Q3-Med","Q1 maggiore di Q3"], correct:0, explain:"Con asimmetria positiva la coda destra è più allungata, quindi la distanza Q3-Med supera quella Med-Q1.", difficulty:"difficile"},
  {topic:"Indici di forma (paniere2)", q:"Se la distribuzione ha asimmetria negativa si ha:", options:["Med-Q1 maggiore di Q3-Med","Med-Q1 minore di Q3-Med","Med-Q1 uguale a Q3-Med","Q3 minore di Q1"], correct:0, explain:"Con asimmetria negativa la coda sinistra è più allungata, quindi la distanza Med-Q1 supera quella Q3-Med.", difficulty:"difficile"},
  {topic:"Indici di forma (paniere2)", q:"L'indice di asimmetria Skewness di Pearson è calcolato come:", options:["Differenza tra la media aritmetica e la moda, divisa per la deviazione standard","Rapporto tra media aritmetica e mediana, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Differenza tra terzo e primo quartile, un parametro stimato tramite il metodo dei momenti applicato al campione","Rapporto tra devianza e numerosità, un indice che si ottiene dalla trasformazione logaritmica dei dati originari"], correct:0, explain:"L'indice di Pearson si calcola come (media-moda)/deviazione standard.", difficulty:"media"},
  {topic:"Indici di forma (paniere2)", q:"La curtosi rappresenta:", options:["Il grado di schiacciamento di una distribuzione rispetto alla curva normale","Il grado di asimmetria di una distribuzione, una grandezza calcolata sulla base della distribuzione marginale della variabile","La posizione centrale di una distribuzione, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","La variabilità assoluta di una distribuzione, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata"], correct:0, explain:"La curtosi misura quanto una distribuzione sia più o meno appiattita/appuntita rispetto alla curva normale di riferimento.", difficulty:"media"},
  {topic:"Indici di forma (paniere2)", q:"La distribuzione si dice platicurtica se:", options:["È più schiacciata rispetto alla normale","È più appuntita rispetto alla normale","Ha la stessa forma della normale","È priva di moda"], correct:0, explain:"Una distribuzione platicurtica è più schiacciata (piatta) rispetto alla curva normale di riferimento.", difficulty:"media"},
  {topic:"Indici di forma (paniere2)", q:"La distribuzione si dice leptocurtica se:", options:["È più appuntita rispetto alla normale","È più schiacciata rispetto alla normale","Coincide esattamente con la normale","È priva di varianza"], correct:0, explain:"Una distribuzione leptocurtica è più appuntita (concentrata attorno alla media) rispetto alla curva normale.", difficulty:"media"},
  {topic:"Indici di forma (paniere2)", q:"Il coefficiente di curtosi di Pearson è uguale a:", options:["Momento quarto diviso il quadrato della varianza","Momento secondo diviso la varianza","Momento terzo diviso il cubo della deviazione standard","Media aritmetica diviso la moda"], correct:0, explain:"Il coefficiente di curtosi di Pearson si calcola come il momento quarto diviso il quadrato della varianza.", difficulty:"difficile"},
  {topic:"Indipendenza in media (paniere2)", q:"Si ha indipendenza in media tra due variabili statistiche se:", options:["Le medie parziali sono uguali tra loro ed uguali alla media generale","Le medie parziali sono tutte diverse tra loro, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","La covarianza tra le due variabili è massima, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Il coefficiente di correlazione è pari a 1, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe"], correct:0, explain:"L'indipendenza in media si verifica quando le medie condizionate (parziali) coincidono tra loro e con la media generale.", difficulty:"media"},
  {topic:"Indipendenza in media (paniere2)", q:"L'indipendenza in media:", options:["Non è un concetto simmetrico","È un concetto simmetrico tra le due variabili","Coincide concettualmente con l'indipendenza assoluta","Implica una correlazione nulla tra le due variabili"], correct:0, explain:"L'indipendenza in media non è simmetrica: Y può essere indipendente in media da X senza che valga il viceversa.", difficulty:"difficile"},
  {topic:"Indipendenza in media (paniere2)", q:"Il rapporto di correlazione di Pearson varia:", options:["Tra 0 e 1","Tra -1 e 1","Tra 0 e la numerosità campionaria","Senza alcun limite definito"], correct:0, explain:"Il rapporto di correlazione (eta) varia tra 0 (indipendenza in media) e 1 (massima dipendenza in media).", difficulty:"media"},
  {topic:"Indipendenza in media (paniere2)", q:"Si ha concordanza tra due variabili se:", options:["La codevianza Cod(X,Y) è maggiore di zero","La codevianza Cod(X,Y) è minore di zero","La codevianza Cod(X,Y) è uguale a zero","Il coefficiente di correlazione è negativo"], correct:0, explain:"Si ha concordanza tra due variabili quando la loro codevianza è positiva (Cod(X,Y)>0).", difficulty:"media"},
  {topic:"Indipendenza in media (paniere2)", q:"Si ha discordanza tra due variabili se:", options:["La codevianza Cod(X,Y) è minore di zero","La codevianza Cod(X,Y) è maggiore di zero","La codevianza Cod(X,Y) è uguale a zero","Il coefficiente di correlazione è positivo"], correct:0, explain:"Si ha discordanza tra due variabili quando la loro codevianza è negativa (Cod(X,Y)<0).", difficulty:"media"},
  {topic:"Indipendenza in media (paniere2)", q:"Si ha indipendenza correlativa tra due variabili se:", options:["La codevianza Cod(X,Y) è uguale a zero","La codevianza è massima in valore assoluto","Il coefficiente di correlazione è pari a 1","Le medie parziali sono tutte diverse"], correct:0, explain:"L'indipendenza correlativa (lineare) si verifica quando la codevianza tra le due variabili è nulla.", difficulty:"media"},
  {topic:"Indipendenza in media (paniere2)", q:"Due variabili si dicono perfettamente correlate se:", options:["Il coefficiente di correlazione è pari a 1 in valore assoluto","Il coefficiente di correlazione è pari a 0, un parametro stimato tramite il metodo dei momenti applicato al campione","La codevianza è sempre nulla, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Le medie parziali sono uguali alla media generale, una grandezza calcolata sulla base della distribuzione marginale della variabile"], correct:0, explain:"Una correlazione perfetta (diretta o inversa) corrisponde a un coefficiente di correlazione pari a 1 in valore assoluto.", difficulty:"media"},
  {topic:"Indipendenza in media (paniere2)", q:"Date le coppie X (velocità km/h): 60,80,100,120,130 e Y (consumo km/litro): 28.8, 24.2, 20, 18.2, 16, la codevianza (X,Y) è pari a:", options:["-577,6","577,6","-288,0","100,0"], correct:0, explain:"Calcolando la codevianza sui dati forniti si ottiene un valore pari a -577,6, coerente con la relazione inversa tra le variabili.", difficulty:"difficile"},
  {topic:"Indipendenza in media (paniere2)", q:"La covarianza (X,Y):", options:["È una misura simmetrica","È una misura asimmetrica rispetto a X e Y","Assume sempre valore positivo","È sempre compresa tra 0 e 1"], correct:0, explain:"La covarianza è una misura simmetrica: Cov(X,Y)=Cov(Y,X).", difficulty:"media"},
  {topic:"Indipendenza in media (paniere2)", q:"Il coefficiente di correlazione:", options:["È un numero puro","È espresso nell'unità di misura di X","È espresso nell'unità di misura di Y","È sempre espresso in percentuale"], correct:0, explain:"Il coefficiente di correlazione è un numero puro (adimensionale), indipendente dalle unità di misura di X e Y.", difficulty:"media"},
  {topic:"Regressione lineare semplice (paniere2)", q:"Il coefficiente angolare b1 rappresenta:", options:["La pendenza della retta","L'intercetta della retta","Il valore atteso della variabile dipendente","La devianza residua del modello"], correct:0, explain:"Il coefficiente angolare (b1) esprime la pendenza della retta di regressione stimata.", difficulty:"facile"},
  {topic:"Regressione lineare semplice (paniere2)", q:"Con il metodo dei minimi quadrati:", options:["Si minimizza la somma dei quadrati degli scarti tra valori osservati e valori teorici","Si massimizza la somma degli scarti in valore assoluto, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Si minimizza il numero di osservazioni necessarie, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","Si massimizza la varianza dei residui, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte"], correct:0, explain:"Il metodo dei minimi quadrati stima i coefficienti minimizzando la somma dei quadrati degli scarti (residui).", difficulty:"media"},
  {topic:"Regressione lineare semplice (paniere2)", q:"Il coefficiente di determinazione lineare è uguale a 1 se è nulla:", options:["La devianza residua","La devianza di regressione","La devianza totale","La media della variabile dipendente"], correct:0, explain:"Se la devianza residua è nulla, tutta la variabilità di Y è spiegata dal modello e R² risulta pari a 1.", difficulty:"media"},
  {topic:"Regressione lineare semplice (paniere2)", q:"La devianza di regressione misura:", options:["Quanta parte della variabilità di Y è spiegata dalla relazione lineare","La variabilità totale non spiegata dal modello, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Il valore medio dei residui, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","La pendenza della retta stimata, un parametro stimato tramite il metodo dei momenti applicato al campione"], correct:0, explain:"La devianza di regressione quantifica la parte di variabilità di Y attribuibile alla relazione lineare con X.", difficulty:"media"},
  {topic:"Regressione lineare semplice (paniere2)", q:"Se la codevianza Cod(X,Y) è maggiore di zero:", options:["La retta di regressione è crescente","La retta di regressione è decrescente","La retta di regressione è orizzontale","Non è possibile stimare la retta di regressione"], correct:0, explain:"Una codevianza positiva implica un coefficiente angolare positivo, quindi una retta di regressione crescente.", difficulty:"media"},
  {topic:"Regressione lineare semplice (paniere2)", q:"Il coefficiente di determinazione lineare è:", options:["Il quadrato del coefficiente di correlazione lineare","La radice quadrata del coefficiente di correlazione","Il reciproco del coefficiente di correlazione","Sempre maggiore del coefficiente di correlazione"], correct:0, explain:"Il coefficiente di determinazione (R²) è per definizione il quadrato del coefficiente di correlazione lineare (r).", difficulty:"media"},
  {topic:"Regressione lineare semplice (paniere2)", q:"Il coefficiente di determinazione lineare è nullo se è nulla:", options:["La devianza di regressione","La devianza residua, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","La devianza totale, una grandezza calcolata sulla base della distribuzione marginale della variabile","La media di X, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi"], correct:0, explain:"Se la devianza di regressione è nulla, il modello non spiega alcuna variabilità di Y e R² risulta pari a 0.", difficulty:"media"},
  {topic:"Regressione lineare semplice (paniere2)", q:"Se il coefficiente di correlazione r=0:", options:["Non c'è correlazione lineare","La relazione tra X e Y è perfetta","La retta di regressione ha pendenza massima","Il coefficiente di determinazione è pari a 1"], correct:0, explain:"Un coefficiente di correlazione nullo indica assenza di relazione lineare tra le due variabili.", difficulty:"facile"},
  {topic:"Calcolo delle probabilità (paniere2)", q:"Un esperimento casuale è:", options:["Un'operazione il cui risultato non può essere previsto con certezza","Un'operazione il cui esito è sempre prevedibile in anticipo","Sinonimo di popolazione statistica","Un procedimento che si applica solo a variabili continue"], correct:0, explain:"Un esperimento casuale (o aleatorio) è un'operazione il cui esito non è prevedibile con certezza a priori.", difficulty:"facile"},
  {topic:"Calcolo delle probabilità (paniere2)", q:"Dati gli eventi A=(1,2,3), B=(2,3,4), l'unione A∪B è:", options:["{1,2,3,4}","{2,3}","{1,4}","{1,2,3,4,2,3}"], correct:0, explain:"L'unione di due insiemi comprende tutti gli elementi presenti in almeno uno dei due, senza ripetizioni: {1,2,3,4}.", difficulty:"facile"},
  {topic:"Calcolo delle probabilità (paniere2)", q:"Dati A=(1,3,5,7), B=(3,5,9,10), C=(1,5,9,10), l'unione A∪B∪C è:", options:["{1,3,5,7,9,10}","{1,3,5,7}, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","{5}, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","{3,5,9,10}, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate"], correct:0, explain:"L'unione dei tre insiemi comprende tutti gli elementi distinti presenti in almeno uno di essi: {1,3,5,7,9,10}.", difficulty:"media"},
  {topic:"Calcolo delle probabilità (paniere2)", q:"Dati A=(1,3,5,7), B=(3,5,9,10), l'intersezione A∩B è:", options:["{3,5}","{1,7}","{9,10}","{1,3,5,7,9,10}"], correct:0, explain:"L'intersezione comprende gli elementi comuni a entrambi gli insiemi: {3,5}.", difficulty:"facile"},
  {topic:"Calcolo delle probabilità (paniere2)", q:"Dati A=(1,3,5,7), C=(1,5,9,10), l'intersezione A∩C è:", options:["{1,5}","{3,7}","{9,10}","{1,3,5,7,9,10}"], correct:0, explain:"Gli elementi comuni a A e C sono 1 e 5, quindi A∩C={1,5}.", difficulty:"facile"},
  {topic:"Calcolo delle probabilità (paniere2)", q:"Dati B=(3,5,9,10), C=(1,5,9,10), l'intersezione B∩C è:", options:["{5,9,10}","{1,3}","{3,5}","{1,5,9,10,3}"], correct:0, explain:"Gli elementi comuni a B e C sono 5, 9 e 10, quindi B∩C={5,9,10}.", difficulty:"facile"},
  {topic:"Calcolo delle probabilità (paniere2)", q:"Dati A=(1,3,5,7), B=(3,5,9,10), C=(1,5,9,10), l'intersezione A∩B∩C è:", options:["{5}","{1,3,5,7,9,10}","{3,9,10}","Insieme vuoto"], correct:0, explain:"L'unico elemento comune a tutti e tre gli insiemi è 5, quindi A∩B∩C={5}.", difficulty:"media"},
  {topic:"Calcolo delle probabilità (paniere2)", q:"Per il postulato 2 dell'assiomatizzazione del calcolo delle probabilità, l'evento certo Ω ha probabilità:", options:["P(Ω)=1","P(Ω)=0","P(Ω)=0,5","P(Ω) non è definita"], correct:0, explain:"Per i postulati della probabilità, l'evento certo Ω ha sempre probabilità pari a 1.", difficulty:"facile"},
  {topic:"Calcolo delle probabilità (paniere2)", q:"La probabilità dell'unione di due eventi A e B non incompatibili è data da:", options:["P(A∪B)=P(A)+P(B)-P(A∩B)","P(A∪B)=P(A)+P(B), una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","P(A∪B)=P(A)×P(B), un parametro stimato tramite il metodo dei momenti applicato al campione","P(A∪B)=P(A)-P(B), un indice che si ottiene dalla trasformazione logaritmica dei dati originari"], correct:0, explain:"Per eventi non incompatibili, la formula generale dell'unione sottrae la probabilità dell'intersezione per non contarla due volte.", difficulty:"media"},
  {topic:"Calcolo delle probabilità (paniere2)", q:"Se due eventi A e B sono indipendenti allora:", options:["P(A∩B)=P(A)×P(B)","P(A∩B)=P(A)+P(B)","P(A∩B)=0 sempre","P(A∩B)=1 sempre"], correct:0, explain:"Per definizione, due eventi indipendenti soddisfano P(A∩B)=P(A)×P(B).", difficulty:"facile"},
  {topic:"Variabili casuali (paniere2)", q:"Una variabile casuale è:", options:["Una funzione definita sullo spazio dei campioni","Un sinonimo di parametro della popolazione","Un valore costante non soggetto a variazione","Un insieme di eventi incompatibili"], correct:0, explain:"Una variabile casuale è una funzione che associa un valore numerico a ciascun esito dello spazio campionario.", difficulty:"media"},
  {topic:"Variabili casuali (paniere2)", q:"La funzione di ripartizione di una variabile casuale:", options:["Esprime la probabilità che la variabile assuma valori inferiori o uguali a un valore fissato","Esprime la probabilità che la variabile assuma esattamente un valore fissato, una grandezza calcolata sulla base della distribuzione marginale della variabile","Coincide sempre con la funzione di densità, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","È definita solo per variabili discrete, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata"], correct:0, explain:"La funzione di ripartizione F(x) esprime P(X≤x), la probabilità cumulata fino al valore x.", difficulty:"media"},
  {topic:"Variabili casuali (paniere2)", q:"Una distribuzione di probabilità di una variabile casuale è:", options:["L'insieme delle coppie valore-probabilità dei diversi valori possibili della variabile","Il valore medio della variabile casuale, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","La somma cumulata di tutti i valori osservati, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Un sinonimo di funzione di ripartizione, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe"], correct:0, explain:"La distribuzione di probabilità associa a ciascun valore possibile della variabile la relativa probabilità di verificarsi.", difficulty:"media"},
  {topic:"Variabili casuali (paniere2)", q:"Se una v.c. X assume valori in corrispondenza di un insieme numerabile, allora X è:", options:["Discreta","Continua","Normale per definizione","Priva di valore atteso"], correct:0, explain:"Una variabile casuale che assume valori su un insieme numerabile è, per definizione, discreta.", difficulty:"facile"},
  {topic:"Variabili casuali (paniere2)", q:"Il valore atteso E(b+X), con b costante reale, è:", options:["E(b+X)=b+E(X)","E(b+X)=b×E(X)","E(b+X)=E(X)","E(b+X)=b²+E(X)"], correct:0, explain:"Per la proprietà di linearità del valore atteso, aggiungere una costante b sposta il valore atteso della stessa quantità.", difficulty:"media"},
  {topic:"Variabili casuali (paniere2)", q:"Il valore atteso E(X+Y), con X e Y variabili casuali, è:", options:["E(X+Y)=E(X)+E(Y)","E(X+Y)=E(X)×E(Y)","E(X+Y)=E(X)-E(Y)","E(X+Y) non è calcolabile senza conoscere la distribuzione congiunta"], correct:0, explain:"Per la linearità del valore atteso, E(X+Y)=E(X)+E(Y) vale sempre, indipendentemente dall'indipendenza tra X e Y.", difficulty:"media"},
  {topic:"Variabili casuali (paniere2)", q:"La Var(aX+b), con a e b costanti reali, è:", options:["Var(aX+b)=a²Var(X)","Var(aX+b)=aVar(X)+b","Var(aX+b)=Var(X)+b²","Var(aX+b)=a Var(X)"], correct:0, explain:"La varianza di una trasformazione lineare aX+b è pari ad a² moltiplicato per la varianza di X; il termine b non influisce sulla varianza.", difficulty:"media"},
  {topic:"Distribuzioni di probabilità (paniere2)", q:"La variabile casuale uniforme discreta:", options:["È tale che ogni sua realizzazione è equiprobabile","Assume valori compresi tra 0 e 1","Ha media pari a zero indipendentemente dai valori possibili","È definita esclusivamente per variabili continue"], correct:0, explain:"Nella distribuzione uniforme discreta, ciascun valore possibile ha la stessa probabilità di verificarsi.", difficulty:"facile"},
  {topic:"Distribuzioni di probabilità (paniere2)", q:"La distribuzione normale standardizzata:", options:["Ha media uguale a 0 e varianza uguale a 1","Ha media uguale a 1 e varianza uguale a 0","Ha media e varianza uguali al valore osservato","Non è mai simmetrica"], correct:0, explain:"La Normale standardizzata ha, per costruzione, media pari a 0 e varianza pari a 1.", difficulty:"facile"},
  {topic:"Distribuzioni di probabilità (paniere2)", q:"La distribuzione binomiale:", options:["Può essere utilizzata per descrivere casi in cui gli esiti possibili di una prova sono solo due","Si applica solo a variabili continue, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Ha sempre media nulla, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","Richiede necessariamente più di due esiti possibili per prova, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte"], correct:0, explain:"La distribuzione binomiale modella il numero di successi in prove ripetute con solo due esiti possibili (successo/insuccesso).", difficulty:"facile"},
  {topic:"Distribuzioni di probabilità (paniere2)", q:"La distribuzione normale è:", options:["Simmetrica rispetto al valor medio","Sempre asimmetrica positiva","Applicabile solo a variabili discrete","Priva di un valore atteso definito"], correct:0, explain:"La distribuzione Normale è simmetrica rispetto alla propria media, che coincide con mediana e moda.", difficulty:"facile"},
  {topic:"Distribuzioni di probabilità (paniere2)", q:"A quanto corrisponde l'area sotto la curva normale tra z=0 e z=1,2:", options:["0,3849","0,4192","0,1828","0,5000"], correct:0, explain:"Consultando le tavole della Normale standardizzata, l'area tra 0 e 1,2 è pari a 0,3849.", difficulty:"media"},
  {topic:"Distribuzioni di probabilità (paniere2)", q:"A quanto corrisponde l'area sotto la curva normale tra z=0 e z=1,4:", options:["0,4192","0,3849","0,1828","0,4500"], correct:0, explain:"Consultando le tavole della Normale standardizzata, l'area tra 0 e 1,4 è pari a 0,4192.", difficulty:"media"},
  {topic:"Distribuzioni di probabilità (paniere2)", q:"A quanto corrisponde l'area sotto la curva normale tra z=0,81 e z=1,94:", options:["0,1828","0,3849","0,4192","0,2500"], correct:0, explain:"La differenza tra le aree cumulate fino a 1,94 e fino a 0,81 nelle tavole della Normale standardizzata è pari a 0,1828.", difficulty:"difficile"},
  {topic:"Distribuzioni di probabilità (paniere2)", q:"La variabile casuale chi-quadrato:", options:["Non può assumere valori negativi","Può assumere sia valori positivi sia negativi","Ha sempre media pari a zero","È simmetrica rispetto allo zero"], correct:0, explain:"La distribuzione chi-quadrato, essendo definita come somma di quadrati, non può assumere valori negativi.", difficulty:"media"},
  {topic:"Distribuzioni di probabilità (paniere2)", q:"La variabile casuale t di Student:", options:["Al tendere di n all'infinito tende alla normale standardizzata","Ha sempre varianza inferiore a quella della normale standardizzata","Coincide sempre con la normale standardizzata, per qualunque n","Non ha alcuna relazione con la distribuzione normale"], correct:0, explain:"La t di Student, al crescere dei gradi di libertà (n che tende a infinito), converge alla Normale standardizzata.", difficulty:"media"},
  {topic:"Distribuzioni di probabilità (paniere2)", q:"La variabile casuale F di Fisher-Snedecor ha valore atteso:", options:["E(F)=m/(m-2)","E(F)=m×2","E(F)=0","E(F)=1 sempre, indipendentemente dai gradi di libertà"], correct:0, explain:"Il valore atteso della F di Fisher-Snedecor, con m gradi di libertà al denominatore, è pari a m/(m-2), per m>2.", difficulty:"difficile"},
  {topic:"Campionamento (paniere2)", q:"Nel campionamento bernoulliano:", options:["Ogni unità statistica può entrare a far parte più volte del campione","Ogni unità può essere estratta al massimo una volta, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","La popolazione deve essere necessariamente finita, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Le estrazioni sono sempre dipendenti tra loro, un parametro stimato tramite il metodo dei momenti applicato al campione"], correct:0, explain:"Nel campionamento bernoulliano (con reimmissione), un'unità può essere estratta più volte nello stesso campione.", difficulty:"media"},
  {topic:"Campionamento (paniere2)", q:"Nel campionamento bernoulliano, i risultati delle estrazioni sono:", options:["Indipendenti","Sempre dipendenti tra loro","Correlati negativamente per costruzione","Determinati esclusivamente dalla prima estrazione"], correct:0, explain:"Nel campionamento bernoulliano (con reimmissione) le estrazioni successive sono tra loro indipendenti.", difficulty:"media"},
  {topic:"Campionamento (paniere2)", q:"Da una popolazione di 5 unità (A,B,C,D,E), estraendo con ripetizione un campione di numerosità 2, lo spazio campionario è composto da:", options:["25 possibili campioni","10 possibili campioni","5 possibili campioni","20 possibili campioni"], correct:0, explain:"Con ripetizione, il numero di campioni possibili è N^n = 5² = 25.", difficulty:"media"},
  {topic:"Campionamento (paniere2)", q:"Da una popolazione di 4 unità (A,B,C,D), estraendo con ripetizione un campione di numerosità 2, lo spazio campionario è composto da:", options:["16 possibili campioni","8 possibili campioni","4 possibili campioni","12 possibili campioni"], correct:0, explain:"Con ripetizione, il numero di campioni possibili è N^n = 4² = 16.", difficulty:"media"},
  {topic:"Campionamento (paniere2)", q:"Da una popolazione di 4 unità (A,B,C,D), estraendo con ripetizione un campione di numerosità 3, lo spazio campionario è composto da:", options:["64 possibili campioni","16 possibili campioni","12 possibili campioni","48 possibili campioni"], correct:0, explain:"Con ripetizione, il numero di campioni possibili è N^n = 4³ = 64.", difficulty:"media"},
  {topic:"Campionamento (paniere2)", q:"Una statistica è:", options:["Una variabile casuale definita sui campioni","Un parametro fisso della popolazione","Un sinonimo di stima puntuale","Il valore medio osservato in un singolo campione"], correct:0, explain:"Una statistica è una variabile casuale, funzione del campione, usata per stimare caratteristiche della popolazione.", difficulty:"media"},
  {topic:"Campionamento (paniere2)", q:"Una distribuzione campionaria è:", options:["La distribuzione di probabilità di una statistica","La distribuzione di frequenza dei dati osservati nel campione","Un sinonimo di popolazione infinita","La distribuzione empirica della popolazione"], correct:0, explain:"La distribuzione campionaria è la distribuzione di probabilità che una statistica assume al variare del campione estratto.", difficulty:"media"},
  {topic:"Campionamento (paniere2)", q:"La media della distribuzione della media campionaria:", options:["Coincide con la media della popolazione","È sempre superiore alla media della popolazione","È sempre inferiore alla media della popolazione","Dipende dalla forma della distribuzione della popolazione"], correct:0, explain:"Il valore atteso della media campionaria coincide sempre con la media della popolazione da cui è estratta.", difficulty:"media"},
  {topic:"Campionamento (paniere2)", q:"Quando la popolazione è infinita:", options:["Lo schema di campionamento con ripetizione coincide con quello senza ripetizione","I due schemi di campionamento restano sempre nettamente distinti, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Non è possibile applicare alcuno schema di campionamento, una grandezza calcolata sulla base della distribuzione marginale della variabile","La numerosità campionaria deve essere infinita, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi"], correct:0, explain:"Con popolazione infinita, la differenza tra campionamento con e senza ripetizione diventa trascurabile fino a coincidere.", difficulty:"difficile"},
  {topic:"Teoria della stima (paniere2)", q:"Cosa si intende per stima puntuale:", options:["La stima con cui si giunge alla determinazione di un solo valore numerico per il parametro","La stima che fornisce un intervallo di valori plausibili per il parametro, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Il valore osservato direttamente sulla popolazione, un parametro stimato tramite il metodo dei momenti applicato al campione","Un sinonimo di distribuzione campionaria, un indice che si ottiene dalla trasformazione logaritmica dei dati originari"], correct:0, explain:"La stima puntuale fornisce un singolo valore numerico come stima del parametro incognito della popolazione.", difficulty:"facile"},
  {topic:"Teoria della stima (paniere2)", q:"Cosa si intende per stima intervallare:", options:["La stima che fornisce un intervallo di valori, con un dato livello di confidenza, che include il parametro","La stima che fornisce un unico valore numerico per il parametro, una grandezza calcolata sulla base della distribuzione marginale della variabile","Un sinonimo di stima puntuale, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Il valore medio calcolato sull'intera popolazione, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata"], correct:0, explain:"La stima intervallare fornisce un intervallo di valori plausibili per il parametro, associato a un livello di confidenza.", difficulty:"media"},
  {topic:"Teoria della stima (paniere2)", q:"Lo stimatore di un parametro:", options:["È una variabile casuale","È un valore fisso e costante","Coincide sempre con il parametro vero","È definito solo per popolazioni finite"], correct:0, explain:"Lo stimatore è una variabile casuale, funzione del campione, il cui valore varia da campione a campione.", difficulty:"media"},
  {topic:"Teoria della stima (paniere2)", q:"Si definisce stima:", options:["Il valore assunto dallo stimatore per un dato campione","Il parametro vero e sconosciuto della popolazione","La varianza dello stimatore","La distribuzione teorica della popolazione"], correct:0, explain:"La stima è il valore numerico concreto che lo stimatore assume in corrispondenza di uno specifico campione osservato.", difficulty:"media"},
  {topic:"Teoria della stima (paniere2)", q:"Uno stimatore corretto:", options:["È tale che il suo valore atteso coincide con il parametro da stimare","Ha varianza pari al quadrato della media","Fornisce lo stesso valore per campioni della stessa dimensione","È definibile esclusivamente per campioni di grandi dimensioni"], correct:0, explain:"Uno stimatore si dice corretto (non distorto) quando il suo valore atteso coincide esattamente con il parametro da stimare.", difficulty:"media"},
  {topic:"Teoria della stima (paniere2)", q:"Se lo stimatore è corretto:", options:["L'errore quadratico medio coincide con la varianza dello stimatore","L'errore quadratico medio è sempre nullo, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","La varianza dello stimatore è sempre nulla, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Non è possibile calcolare l'errore quadratico medio, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe"], correct:0, explain:"Se lo stimatore è corretto (distorsione nulla), l'errore quadratico medio (EQM) coincide con la sua varianza.", difficulty:"media"},
  {topic:"Teoria della stima (paniere2)", q:"Lo stimatore varianza campionaria corretta:", options:["Ha media pari al parametro da stimare","Ha sempre media nulla","Sovrastima sistematicamente la varianza della popolazione","Sottostima sempre la varianza della popolazione"], correct:0, explain:"La varianza campionaria corretta (con denominatore n-1) è uno stimatore non distorto, con valore atteso pari alla varianza della popolazione.", difficulty:"media"},
  {topic:"Teoria della stima (paniere2)", q:"Uno stimatore si dice consistente se:", options:["Al crescere della numerosità campionaria tende a concentrarsi sul parametro da stimare","Fornisce sempre lo stesso valore indipendentemente da n, un parametro stimato tramite il metodo dei momenti applicato al campione","È sempre distorto per campioni piccoli, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Ha varianza crescente al crescere di n, una grandezza calcolata sulla base della distribuzione marginale della variabile"], correct:0, explain:"La consistenza è la proprietà per cui, al crescere di n, lo stimatore converge (si concentra) sul vero valore del parametro.", difficulty:"media"},
  {topic:"Teoria della stima (paniere2)", q:"Uno stimatore corretto è più efficiente di un altro stimatore corretto dello stesso parametro se:", options:["Presenta varianza inferiore","Presenta varianza superiore","Ha distorsione maggiore","È calcolato su un campione più piccolo"], correct:0, explain:"Tra stimatori corretti, si dice più efficiente quello con varianza minore, essendo più concentrato attorno al vero valore.", difficulty:"media"},
  {topic:"Teoria della stima (paniere2)", q:"Dati due stimatori T1 e T2 di uno stesso parametro, se entrambi sono non distorti:", options:["Il confronto in termini di efficienza si basa solo sulla varianza","Il confronto si basa esclusivamente sulla loro distorsione","Sono automaticamente considerati equivalenti in ogni caso","Non è possibile effettuare alcun confronto tra loro"], correct:0, explain:"Se entrambi gli stimatori sono corretti, il confronto in termini di efficienza si basa unicamente sulla loro varianza.", difficulty:"media"},
  {topic:"Stima per intervalli (paniere2)", q:"Un intervallo di confidenza è:", options:["Un intervallo di valori che si ritiene contenga il vero parametro con una prestabilita fiducia","Un singolo valore numerico che stima esattamente il parametro, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","La distribuzione empirica del campione osservato, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","Un sinonimo di errore quadratico medio, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte"], correct:0, explain:"L'intervallo di confidenza è un intervallo di valori plausibili, associato a un livello di fiducia prestabilito, per il parametro incognito.", difficulty:"media"},
  {topic:"Stima per intervalli (paniere2)", q:"Una quantità pivotale è:", options:["Una funzione delle osservazioni e del parametro, con distribuzione nota indipendente dal parametro stesso","Un sinonimo di stimatore corretto, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Il valore centrale della distribuzione campionaria, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Una costante fissata a priori dal ricercatore, un parametro stimato tramite il metodo dei momenti applicato al campione"], correct:0, explain:"La quantità pivotale è funzione di dati e parametro, con distribuzione nota che non dipende dal valore del parametro stesso, utile per costruire intervalli di confidenza.", difficulty:"difficile"},
  {topic:"Stima per intervalli (paniere2)", q:"L'ampiezza dell'intervallo di confidenza è tanto più elevata quanto più:", options:["n è piccolo","n è grande","La varianza della popolazione è piccola","Il livello di confidenza è basso"], correct:0, explain:"Al diminuire della numerosità campionaria n, l'errore standard aumenta e l'intervallo di confidenza si allarga.", difficulty:"media"},
  {topic:"Stima per intervalli (paniere2)", q:"Per l'intervallo di confidenza per la media di una popolazione normale con varianza nota, si utilizza:", options:["La distribuzione normale standardizzata","La distribuzione t di Student, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","La distribuzione chi-quadrato, una grandezza calcolata sulla base della distribuzione marginale della variabile","La distribuzione F di Fisher, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi"], correct:0, explain:"Con varianza nota, l'intervallo di confidenza per la media si costruisce usando la distribuzione normale standardizzata.", difficulty:"media"},
  {topic:"Stima per intervalli (paniere2)", q:"Per l'intervallo di confidenza per la media di una popolazione normale con varianza non nota (n<30), si utilizza:", options:["La distribuzione t di Student","La distribuzione normale standardizzata","La distribuzione chi-quadrato","La distribuzione F di Fisher"], correct:0, explain:"Con varianza non nota e campione piccolo, si utilizza la distribuzione t di Student al posto della normale standardizzata.", difficulty:"media"},
  {topic:"Stima per intervalli (paniere2)", q:"Se la popolazione non è normale, per il teorema del limite centrale quando n>30 si può costruire l'intervallo di confidenza:", options:["Basato sulla distribuzione normale standardizzata","Basato esclusivamente sulla distribuzione t di Student","Solo se si conosce la forma esatta della distribuzione di partenza","Impossibile da costruire in questo caso"], correct:0, explain:"Grazie al teorema del limite centrale, per n grande (>30) si può approssimare con la Normale anche se la popolazione non è normale.", difficulty:"media"},
  {topic:"Stima per intervalli (paniere2)", q:"Per la media di una popolazione normale si usa la t di Student anziché la normale standardizzata perché:", options:["La varianza della popolazione non è nota","La popolazione non è mai normale in questi casi","Il campione è sempre di grandi dimensioni","Non esiste alcuna differenza pratica tra le due distribuzioni"], correct:0, explain:"Si usa la t di Student quando la varianza della popolazione è incognita e va stimata dal campione, introducendo ulteriore incertezza.", difficulty:"media"},
  {topic:"Stima per intervalli (paniere2)", q:"Da 60 misurazioni con media campionaria 33 e popolazione normale con varianza 115, l'intervallo di confidenza al 90% per la media è:", options:["[30,723; 35,277]","[32,000; 34,000]","[28,500; 37,500]","[31,500; 34,500]"], correct:0, explain:"Applicando la formula con z=1,645, σ=√115 e n=60, si ottiene l'intervallo [30,723; 35,277].", difficulty:"difficile"},
  {topic:"Stima per intervalli (paniere2)", q:"Con n=16 pezzi di metallo, perdita di peso media 3,42 gr e varianza campionaria corretta 0,4624, l'IC al 99% per la media della popolazione è:", options:["[2,92; 3,92]","[3,00; 3,84]","[2,50; 4,34]","[3,20; 3,64]"], correct:0, explain:"Usando la t di Student con 15 gradi di libertà al 99%, si ottiene l'intervallo [2,92; 3,92].", difficulty:"difficile"},
  {topic:"Stima per intervalli (paniere2)", q:"Da un campione di n=100 bulloni con 20 difettosi, l'intervallo di confidenza al 95% per la proporzione p è:", options:["[0,1216; 0,2784]","[0,1500; 0,2500]","[0,1000; 0,3000]","[0,1800; 0,2200]"], correct:0, explain:"Applicando la formula per la proporzione con z=1,96, p̂=0,20 e n=100, si ottiene l'intervallo [0,1216; 0,2784].", difficulty:"difficile"},
  {topic:"Numerosità campionaria (paniere2)", q:"Per un IC al 95% sul contenuto medio di nicotina (σ=8,5 mg) con ampiezza dell'intervallo di 6 mg, la numerosità campionaria necessaria è:", options:["n=31","n=25","n=40","n=50"], correct:0, explain:"Applicando la formula per la numerosità campionaria con z=1,96, σ=8,5 e margine di errore pari a 3 mg (metà ampiezza), si ottiene n=31.", difficulty:"difficile"},
  {topic:"Numerosità campionaria (paniere2)", q:"Con varianza nota 0,01 cm su un campione di n=1000 pistoncini e diametro medio 1,2 cm, l'intervallo di confidenza al 95% per μ è:", options:["[1,1938; 1,2062]","[1,1800; 1,2200]","[1,1500; 1,2500]","[1,1950; 1,2050]"], correct:0, explain:"Applicando z=1,96, σ=0,1 e n=1000, si ottiene l'intervallo [1,1938; 1,2062].", difficulty:"difficile"},
  {topic:"Numerosità campionaria (paniere2)", q:"In riferimento all'intervallo di confidenza precedente per il diametro dei pistoncini, la sua ampiezza è pari a:", options:["0,0124","0,0200","0,0100","0,0250"], correct:0, explain:"L'ampiezza dell'intervallo [1,1938; 1,2062] è pari alla differenza tra i due estremi, cioè 0,0124.", difficulty:"media"},
  {topic:"Numerosità campionaria (paniere2)", q:"Per conoscere la proporzione di pezzi difettosi con un IC al 90% ed errore non superiore al 3%, la numerosità campionaria necessaria è:", options:["n=751,67","n=500,00","n=1000,00","n=600,00"], correct:0, explain:"Applicando la formula per la numerosità con proporzione non nota (p=0,5 caso peggiore), z=1,645 ed errore 0,03, si ottiene n=751,67.", difficulty:"difficile"},
  {topic:"Verifica delle ipotesi (paniere2)", q:"Un'ipotesi statistica è:", options:["Un'affermazione sulla distribuzione di probabilità di una variabile casuale","Un valore osservato direttamente sul campione, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","Un sinonimo di stima puntuale, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","Un intervallo di confidenza per il parametro, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate"], correct:0, explain:"Un'ipotesi statistica è un'affermazione riguardante la distribuzione di probabilità (o un suo parametro) di una variabile casuale.", difficulty:"media"},
  {topic:"Verifica delle ipotesi (paniere2)", q:"La verifica delle ipotesi consiste nel:", options:["Formulare, sulla base di dati campionari, un giudizio che induca ad accettare o rifiutare l'ipotesi nulla","Calcolare esclusivamente la media campionaria osservata, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Costruire sempre e solo un intervallo di confidenza, un parametro stimato tramite il metodo dei momenti applicato al campione","Determinare il valore vero del parametro con certezza assoluta, un indice che si ottiene dalla trasformazione logaritmica dei dati originari"], correct:0, explain:"La verifica delle ipotesi porta, sulla base dei dati campionari, a una decisione di accettazione o rifiuto dell'ipotesi nulla, con un livello di significatività prefissato.", difficulty:"media"},
  {topic:"Verifica delle ipotesi (paniere2)", q:"L'ipotesi parametrica riguarda:", options:["I parametri caratteristici di una distribuzione di cui si conosce la forma analitica","La forma stessa della distribuzione, che deve essere stimata, una grandezza calcolata sulla base della distribuzione marginale della variabile","Solo variabili qualitative sconnesse, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Esclusivamente la mediana della popolazione, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata"], correct:0, explain:"L'ipotesi parametrica riguarda i parametri di una distribuzione la cui forma analitica è nota a priori.", difficulty:"media"},
  {topic:"Verifica delle ipotesi (paniere2)", q:"Le ipotesi statistiche H0 e H1:", options:["Sono due ipotesi alternative complementari e logicamente escludentisi","Possono essere entrambe vere contemporaneamente, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","Sono sempre identiche tra loro, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Non hanno alcuna relazione logica tra loro, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe"], correct:0, explain:"H0 e H1 sono ipotesi alternative, complementari e mutuamente escludentesi: se una è vera, l'altra è necessariamente falsa.", difficulty:"media"},
  {topic:"Verifica delle ipotesi (paniere2)", q:"L'ipotesi statistica è semplice se:", options:["Si assegna al parametro un valore puntuale","Si assegna al parametro un intervallo di valori","Riguarda esclusivamente due parametri contemporaneamente","Non specifica alcun valore per il parametro"], correct:0, explain:"Un'ipotesi si dice semplice quando specifica un unico valore puntuale per il parametro in esame.", difficulty:"media"},
  {topic:"Verifica delle ipotesi (paniere2)", q:"Si commette un errore di prima specie quando:", options:["Si rifiuta l'ipotesi nulla mentre in realtà è vera","Si accetta l'ipotesi nulla mentre in realtà è falsa","Si rifiuta correttamente un'ipotesi falsa","Si accetta correttamente un'ipotesi vera"], correct:0, explain:"L'errore di primo tipo (o prima specie) consiste nel rifiutare H0 quando essa è in realtà vera.", difficulty:"media"},
  {topic:"Verifica delle ipotesi (paniere2)", q:"Si commette un errore di seconda specie quando:", options:["Si accetta l'ipotesi nulla mentre in realtà è falsa","Si rifiuta l'ipotesi nulla mentre in realtà è vera","Si rifiuta correttamente un'ipotesi falsa","Si accetta correttamente un'ipotesi vera"], correct:0, explain:"L'errore di secondo tipo (o seconda specie) consiste nell'accettare H0 quando essa è in realtà falsa.", difficulty:"media"},
  {topic:"Verifica delle ipotesi (paniere2)", q:"Il livello di significatività indica:", options:["La probabilità massima con cui si accetta di rischiare l'errore di prima specie","La probabilità di commettere l'errore di seconda specie, un parametro stimato tramite il metodo dei momenti applicato al campione","Il valore centrale della distribuzione campionaria, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","La numerosità minima del campione richiesta, una grandezza calcolata sulla base della distribuzione marginale della variabile"], correct:0, explain:"Il livello di significatività (α) è la probabilità massima accettata di commettere un errore di primo tipo.", difficulty:"media"},
  {topic:"Verifica delle ipotesi (paniere2)", q:"La potenza del test è:", options:["La probabilità di rigettare l'ipotesi nulla quando è giusto farlo","La probabilità di accettare l'ipotesi nulla quando è vera","Il livello di significatività del test","La probabilità di commettere l'errore di primo tipo"], correct:0, explain:"La potenza del test (1-β) è la probabilità di rifiutare correttamente H0 quando essa è effettivamente falsa.", difficulty:"media"},
  {topic:"Verifica delle ipotesi (paniere2)", q:"Aumentando il livello di significatività:", options:["Aumenta la potenza del test","Diminuisce sempre la potenza del test","La potenza resta invariata in ogni caso","Si azzera automaticamente l'errore di seconda specie"], correct:0, explain:"Aumentando α (ampliando la zona di rifiuto), si riduce β e quindi aumenta la potenza del test (1-β).", difficulty:"media"},
  {topic:"Test sulla media (paniere2)", q:"Verificando H0:μ=μ0 contro H1:μ>μ0 con α=0,05, la regione di rifiuto per il test Z è:", options:["z ≥ 1,645","z ≥ 1,96","z ≤ -1,645","z ≥ 2,33"], correct:0, explain:"Per un test unilaterale destro con α=0,05, il valore critico della Normale standardizzata è 1,645.", difficulty:"media"},
  {topic:"Test sulla media (paniere2)", q:"Verificando H0:μ=μ0 contro H1:μ≠μ0 con α=0,05, la regione di rifiuto per il test Z è:", options:["z ≥ 1,96 oppure z ≤ -1,96","z ≥ 1,645 oppure z ≤ -1,645","z ≥ 2,58 oppure z ≤ -2,58","z ≥ 1,28 oppure z ≤ -1,28"], correct:0, explain:"Per un test bilaterale con α=0,05, i valori critici della Normale standardizzata sono ±1,96 (α/2 per coda).", difficulty:"media"},
  {topic:"Test sulla media (paniere2)", q:"Verificando H0:μ=μ0 contro H1:μ≠μ0 con α=0,05 e 16 gradi di libertà, la regione di rifiuto per il test T è:", options:["t < -2,120 oppure t > 2,120","t < -1,746 oppure t > 1,746","t < -2,921 oppure t > 2,921","t < -1,96 oppure t > 1,96"], correct:0, explain:"Per un test bilaterale con 16 gradi di libertà e α=0,05, il valore critico della t di Student è ±2,120.", difficulty:"difficile"},
  {topic:"Test sulla media (paniere2)", q:"Verificando H0:μ=μ0 contro H1:μ>μ0 con α=0,05 e 16 gradi di libertà, la regione di rifiuto per il test T è:", options:["t > 1,746","t > 2,120","t > 2,583","t < -1,746"], correct:0, explain:"Per un test unilaterale destro con 16 gradi di libertà e α=0,05, il valore critico della t di Student è 1,746.", difficulty:"difficile"},
  {topic:"Test sulla media (paniere2)", q:"Verificando H0:μ=μ0 contro H1:μ<μ0 con α=0,05, la regione di rifiuto per il test Z è:", options:["z < -1,645","z > 1,645","z < -1,96","z > 1,96"], correct:0, explain:"Per un test unilaterale sinistro con α=0,05, il valore critico della Normale standardizzata è -1,645.", difficulty:"media"},
  {topic:"Test sulla media (paniere2)", q:"Verificando H0:μ=μ0 contro H1:μ<μ0 con α=0,01 e 18 gradi di libertà, la regione di rifiuto per il test T è:", options:["t < -2,552","t < -1,734","t < -2,878","t > 2,552"], correct:0, explain:"Per un test unilaterale sinistro con 18 gradi di libertà e α=0,01, il valore critico della t di Student è -2,552.", difficulty:"difficile"},
  {topic:"Test sulla media (paniere2)", q:"Verificando H0:μ=μ0 contro H1:μ>μ0 con α=0,01 e 17 gradi di libertà, la regione di rifiuto per il test T è:", options:["t > 2,567","t > 1,740","t > 2,110","t < -2,567"], correct:0, explain:"Per un test unilaterale destro con 17 gradi di libertà e α=0,01, il valore critico della t di Student è 2,567.", difficulty:"difficile"},
  {topic:"Test sulla media (paniere2)", q:"Verificando H0:μ=μ0 contro H1:μ<μ0 con α=0,10, la regione di rifiuto per il test Z è:", options:["z < -1,28","z > 1,28","z < -1,645","z > 1,645"], correct:0, explain:"Per un test unilaterale sinistro con α=0,10, il valore critico della Normale standardizzata è -1,28.", difficulty:"media"},
  {topic:"Verifica ipotesi non parametriche (paniere2)", q:"La verifica dell'ipotesi di indipendenza mira a verificare:", options:["L'indipendenza stocastica tra due variabili","La normalità della distribuzione osservata","L'uguaglianza tra due medie campionarie","La stazionarietà di una serie storica"], correct:0, explain:"Il test di indipendenza (chi-quadrato) verifica se due variabili categoriali sono stocasticamente indipendenti tra loro.", difficulty:"media"},
  {topic:"Verifica ipotesi non parametriche (paniere2)", q:"In un test di indipendenza su una tabella di contingenza, i gradi di libertà corrispondono a:", options:["(r-1)(c-1)","r×c","r+c-2","(r-1)+(c-1)"], correct:0, explain:"I gradi di libertà del test chi-quadrato di indipendenza sono dati dal prodotto (r-1)(c-1), con r righe e c colonne.", difficulty:"media"},
  {topic:"Verifica ipotesi non parametriche (paniere2)", q:"Se il chi-quadrato calcolato è minore del valore critico:", options:["Si accetta l'ipotesi di indipendenza stocastica","Si rifiuta l'ipotesi di indipendenza stocastica","Il test non è concludente in alcun modo","Si deve raddoppiare la dimensione campionaria"], correct:0, explain:"Se il chi-quadrato calcolato è inferiore al valore critico, non ci sono evidenze sufficienti per rifiutare l'ipotesi di indipendenza.", difficulty:"media"},
  {topic:"Verifica ipotesi non parametriche (paniere2)", q:"In un test di indipendenza su una tabella di contingenza 5x5, i gradi di libertà corrispondono a:", options:["16","25","10","20"], correct:0, explain:"Con r=5 e c=5, i gradi di libertà sono (5-1)×(5-1)=16.", difficulty:"media"},
  {topic:"Verifica ipotesi non parametriche (paniere2)", q:"In un test di indipendenza su una tabella di contingenza 5x4, i gradi di libertà corrispondono a:", options:["12","20","9","16"], correct:0, explain:"Con r=5 e c=4, i gradi di libertà sono (5-1)×(4-1)=12.", difficulty:"media"},
  {topic:"Verifica ipotesi non parametriche (paniere2)", q:"In un test di indipendenza su una tabella di contingenza 6x6, i gradi di libertà corrispondono a:", options:["25","36","30","12"], correct:0, explain:"Con r=6 e c=6, i gradi di libertà sono (6-1)×(6-1)=25.", difficulty:"media"},
  {topic:"Verifica ipotesi non parametriche (paniere2)", q:"Se il chi-quadrato calcolato è maggiore del valore critico:", options:["Si rifiuta l'ipotesi di indipendenza stocastica","Si accetta l'ipotesi di indipendenza stocastica","Il test è automaticamente non valido","Si deve dimezzare la dimensione campionaria"], correct:0, explain:"Se il chi-quadrato calcolato supera il valore critico, si rifiuta l'ipotesi di indipendenza tra le variabili.", difficulty:"media"},
  {topic:"Verifica ipotesi non parametriche (paniere2)", q:"Per una tabella di contingenza 3x3 con n=400, il valore soglia della statistica test ha distribuzione approssimativamente:", options:["Chi-quadrato con 4 gradi di libertà","Chi-quadrato con 9 gradi di libertà","Chi-quadrato con 6 gradi di libertà","Normale standardizzata"], correct:0, explain:"Con r=3 e c=3, i gradi di libertà del chi-quadrato sono (3-1)×(3-1)=4.", difficulty:"media"},
  {topic:"Verifica ipotesi non parametriche (paniere2)", q:"Per una tabella di contingenza 4x3 con n=400, il valore soglia della statistica test ha distribuzione approssimativamente:", options:["Chi-quadrato con 6 gradi di libertà","Chi-quadrato con 12 gradi di libertà","Chi-quadrato con 4 gradi di libertà","Normale standardizzata"], correct:0, explain:"Con r=4 e c=3, i gradi di libertà del chi-quadrato sono (4-1)×(3-1)=6.", difficulty:"media"},
  {topic:"Regressione lineare - ipotesi (paniere2)", q:"Nel modello di regressione lineare semplice, l'ipotesi definita 'forte' è:", options:["L'ipotesi di normalità degli errori","L'ipotesi sulla variabile esplicativa non stocastica","L'ipotesi di indipendenza degli errori","L'ipotesi di omoschedasticità"], correct:0, explain:"L'ipotesi di normalità degli errori è considerata un'ipotesi 'forte' nel modello di regressione lineare classico.", difficulty:"difficile"},
  {topic:"Regressione lineare - ipotesi (paniere2)", q:"Nel modello di regressione lineare semplice, l'ipotesi definita 'debole' è:", options:["L'ipotesi sulla variabile esplicativa","L'ipotesi di normalità degli errori","Nessuna delle ipotesi del modello classico","L'ipotesi sulla distribuzione della variabile dipendente"], correct:0, explain:"L'ipotesi sulla variabile esplicativa (es. non stocasticità di X) è considerata un'ipotesi 'debole' rispetto a quella di normalità.", difficulty:"difficile"},
  {topic:"Regressione lineare - ipotesi (paniere2)", q:"L'ipotesi di indipendenza nel modello di regressione stabilisce che:", options:["Cov(Yi,Yj)=Cov(εi,εj)=0 per i≠j","Cov(Yi,Yj)=1 per ogni i,j","La varianza degli errori cresce con i","Gli errori sono sempre perfettamente correlati tra loro"], correct:0, explain:"L'ipotesi di indipendenza richiede che la covarianza tra osservazioni (o errori) diverse sia nulla.", difficulty:"difficile"},
  {topic:"Regressione lineare - inferenza (paniere2)", q:"Il coefficiente angolare b1 è dato da:", options:["b1 = Cod(X,Y)/Dev(X)","b1 = Dev(X)/Cod(X,Y)","b1 = Cod(X,Y) × Dev(X)","b1 = Dev(Y)/Dev(X)"], correct:0, explain:"Il coefficiente angolare stimato si ottiene dividendo la codevianza tra X e Y per la devianza di X.", difficulty:"media"},
  {topic:"Regressione lineare - inferenza (paniere2)", q:"Il valore atteso dello stimatore B1 è:", options:["E(B1)=β1","E(B1)=0","E(B1)=β1²","E(B1) dipende sempre dal campione osservato"], correct:0, explain:"Lo stimatore B1 dei minimi quadrati è corretto: il suo valore atteso coincide con il vero parametro β1.", difficulty:"media"},
  {topic:"Regressione lineare - inferenza (paniere2)", q:"La varianza dello stimatore B1 è:", options:["Var(B1)=σ²/Sxx","Var(B1)=σ²×Sxx","Var(B1)=σ²","Var(B1)=Sxx/σ²"], correct:0, explain:"La varianza dello stimatore B1 è pari a σ² diviso la devianza (Sxx) della variabile esplicativa X.", difficulty:"difficile"},
  {topic:"Regressione lineare - inferenza (paniere2)", q:"Uno stimatore corretto di σ² con varianza costante e indipendenza degli errori è MSE*=SSE*/(n-2), il cui valore atteso è:", options:["E(MSE*)=σ²","E(MSE*)=0","E(MSE*)=n-2","E(MSE*) dipende sempre dai dati osservati"], correct:0, explain:"MSE* è uno stimatore corretto della varianza degli errori, con valore atteso pari a σ².", difficulty:"difficile"},
  {topic:"Regressione lineare - inferenza (paniere2)", q:"In base al teorema di Gauss-Markov, gli stimatori dei minimi quadrati:", options:["Sono i più efficienti tra gli stimatori lineari non distorti","Presentano una distorsione proporzionale alla varianza degli errori","Non godono della proprietà di consistenza statistica","Hanno varianza superiore a quella degli stimatori non lineari"], correct:0, explain:"Il teorema di Gauss-Markov afferma che gli stimatori OLS sono BLUE (Best Linear Unbiased Estimator), cioè i più efficienti tra quelli lineari non distorti.", difficulty:"difficile"},
  {topic:"Regressione lineare - aspetti inferenziali (paniere2)", q:"Per verificare H0:β1=0 contro H1:β1≠0 si può utilizzare la quantità F, che è una v.c. F di Fisher-Snedecor con:", options:["1 e n-2 gradi di libertà","n-1 e n-2 gradi di libertà","2 e n-1 gradi di libertà","n e n-1 gradi di libertà"], correct:0, explain:"Nel test sul coefficiente angolare, la statistica F si distribuisce come una F di Fisher con 1 e n-2 gradi di libertà.", difficulty:"difficile"},
  {topic:"Regressione lineare - aspetti inferenziali (paniere2)", q:"Sotto l'ipotesi che H0 sia vera, la variabile casuale t si distribuisce come:", options:["Una t di Student con n-2 gradi di libertà","Una normale standardizzata, indipendentemente da n","Una chi-quadrato con n-1 gradi di libertà","Una F di Fisher con 1 e n gradi di libertà"], correct:0, explain:"Sotto H0, la statistica t per il test sul coefficiente angolare si distribuisce come una t di Student con n-2 gradi di libertà.", difficulty:"difficile"},
  {topic:"Regressione lineare - aspetti inferenziali (paniere2)", q:"Il coefficiente di determinazione lineare varia tra:", options:["0 e 1","-1 e 1","0 e 100","-infinito e +infinito"], correct:0, explain:"Il coefficiente di determinazione R² è sempre compreso tra 0 e 1.", difficulty:"facile"},
  {topic:"Regressione lineare - aspetti inferenziali (paniere2)", q:"In riferimento alla tabella di decomposizione della devianza totale, il rapporto F è uguale a:", options:["F=MSR/MSE","F=MSE/MSR","F=SSR+SSE","F=SSR×SSE"], correct:0, explain:"Nella tabella ANOVA della regressione, F si calcola come rapporto tra devianza media di regressione (MSR) e devianza media residua (MSE).", difficulty:"difficile"},
  {topic:"Distribuzioni di frequenza (paniere2)", q:"La distribuzione di frequenza è:", options:["Il calcolo delle frequenze per ciascun valore o categoria della variabile","La somma di tutti i valori osservati della variabile, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Il valore medio della variabile osservata, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","La differenza tra valore massimo e minimo della variabile, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte"], correct:0, explain:"La distribuzione di frequenza associa a ciascun valore o categoria il numero di volte in cui è stata osservata.", difficulty:"facile"},
  {topic:"Distribuzioni di frequenza (paniere2)", q:"Una tabella a doppia entrata registra:", options:["La frequenza assoluta con cui una coppia di modalità si presenta contemporaneamente per X e Y","Solo la frequenza marginale della variabile X, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Solo la media aritmetica delle due variabili, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","La sola correlazione tra le due variabili, un parametro stimato tramite il metodo dei momenti applicato al campione"], correct:0, explain:"La tabella a doppia entrata registra le frequenze congiunte di ciascuna combinazione di modalità di X e Y.", difficulty:"media"},
  {topic:"Distribuzioni di frequenza (paniere2)", q:"La frequenza cumulata:", options:["Può essere uguale alla frequenza relativa","Non coincide mai con la frequenza relativa","Assume valori sempre maggiori di 1","Si applica ai soli caratteri qualitativi sconnessi"], correct:0, explain:"In casi particolari (ad esempio l'ultima modalità), la frequenza cumulata relativa può coincidere numericamente con la frequenza relativa.", difficulty:"media"},
  {topic:"Distribuzioni di frequenza (paniere2)", q:"Per produrre la distribuzione di frequenza percentuale occorre:", options:["Moltiplicare per 100 le frequenze relative","Dividere per 100 le frequenze assolute","Sommare le frequenze cumulate","Sottrarre la media dalle frequenze relative"], correct:0, explain:"Le frequenze percentuali si ottengono moltiplicando per 100 le frequenze relative.", difficulty:"facile"},
  {topic:"Distribuzioni di frequenza (paniere2)", q:"Per calcolare le frequenze cumulate relative occorre dividere:", options:["Le frequenze cumulate assolute per n","Le frequenze relative per la numerosità delle classi","Le frequenze assolute per 100","La frequenza massima per quella minima"], correct:0, explain:"Le frequenze cumulate relative si ottengono dividendo le frequenze cumulate assolute per la numerosità totale n.", difficulty:"media"},
  {topic:"Distribuzioni di frequenza (paniere2)", q:"Relativamente al numero di colonne di una matrice dei dati, si può dire che:", options:["Il numero di colonne dipende dai caratteri osservati","Dipende dalla numerosità della popolazione osservata","Coincide con il numero di righe della matrice","Corrisponde sempre a un unico valore fisso"], correct:0, explain:"Il numero di colonne di una matrice dei dati corrisponde al numero di caratteri (variabili) osservati su ciascuna unità.", difficulty:"media"},
  {topic:"Distribuzioni di frequenza (paniere2)", q:"Il numero dei caratteri in una matrice:", options:["Non dipende dalla numerosità della popolazione","Coincide sempre con il numero di righe della matrice","Aumenta proporzionalmente al numero di unità osservate","È sempre uguale al numero di righe meno uno"], correct:0, explain:"Il numero di caratteri (colonne) è indipendente dal numero di unità (righe) osservate.", difficulty:"media"},
  {topic:"Distribuzioni di frequenza (paniere2)", q:"La matrice dei dati è composta:", options:["Da n vettori","Da un unico vettore riassuntivo","Solo da valori medi per ciascun carattere","Esclusivamente da valori qualitativi"], correct:0, explain:"La matrice dei dati può essere vista come composta da n vettori riga, uno per ciascuna unità statistica osservata.", difficulty:"media"},
  {topic:"Distribuzioni di frequenza (paniere2)", q:"L'istogramma è una:", options:["Modalità di rappresentazione della rilevazione statistica","Una misura di posizione centrale, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Un indice di variabilità relativa, una grandezza calcolata sulla base della distribuzione marginale della variabile","Un tipo di campionamento probabilistico, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi"], correct:0, explain:"L'istogramma è una modalità grafica di rappresentazione della distribuzione dei dati rilevati.", difficulty:"facile"},
  {topic:"Distribuzioni di frequenza (paniere2)", q:"Le matrici dei dati sono composte da:", options:["N righe e k colonne, con k che può essere uguale o diverso da n","N righe e una sola colonna riassuntiva","K righe e k colonne, sempre uguali tra loro","Un numero di righe inferiore alle colonne, in ogni struttura"], correct:0, explain:"Una matrice dei dati ha N righe (unità) e K colonne (caratteri), con K che può essere uguale, minore o maggiore di N.", difficulty:"media"},
  {topic:"Statistiche descrittive (paniere2)", q:"Le misure di posizione hanno l'obiettivo di:", options:["Sintetizzare in un singolo valore l'intera distribuzione per effettuare confronti","Misurare esclusivamente la dispersione dei dati, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Calcolare la correlazione tra due variabili, un parametro stimato tramite il metodo dei momenti applicato al campione","Determinare la numerosità campionaria ottimale, un indice che si ottiene dalla trasformazione logaritmica dei dati originari"], correct:0, explain:"Le misure di posizione sintetizzano in un unico valore numerico l'intera distribuzione, utile per confronti nel tempo o nello spazio.", difficulty:"media"},
  {topic:"Statistiche descrittive (paniere2)", q:"La moda è un:", options:["Indice di tendenza centrale","Indice di variabilità assoluta","Indice di variabilità relativa","Indice di asimmetria"], correct:0, explain:"La moda, insieme a media e mediana, è uno degli indici classici di tendenza centrale (posizione).", difficulty:"facile"},
  {topic:"Statistiche descrittive (paniere2)", q:"Considera le osservazioni (2; 14; 13; 15; 6; 1): la media geometrica è pari a:", options:["5,66","8,50","9,50","6,43"], correct:0, explain:"La radice sesta del prodotto dei sei valori restituisce una media geometrica pari a 5,66.", difficulty:"media"},
  {topic:"Statistiche descrittive (paniere2)", q:"Considera le osservazioni (2; 14; 13; 15; 6; 1): la media aritmetica è pari a:", options:["8,5","9,5","5,66","7,0"], correct:0, explain:"Sommando i sei valori (51) e dividendo per 6, si ottiene una media aritmetica pari a 8,5.", difficulty:"facile"},
  {topic:"Statistiche descrittive (paniere2)", q:"Considera le osservazioni (2; 14; 13; 15; 6; 1): la mediana è pari a:", options:["9,5","8,5","6,0","13,0"], correct:0, explain:"Ordinando i valori (1,2,6,13,14,15), n=6 pari: la mediana è la semisomma dei due valori centrali (6 e 13), pari a 9,5.", difficulty:"media"},
  {topic:"Statistiche descrittive (paniere2)", q:"Considera le osservazioni (2; 14; 13; 15; 6; 1; 1): la moda è pari a:", options:["1","2","6","14"], correct:0, explain:"Il valore 1 compare due volte, più di ogni altro valore, quindi la moda è pari a 1.", difficulty:"facile"},
  {topic:"Statistiche descrittive (paniere2)", q:"Considera le osservazioni (2; 2; 2; 14; 13; 15; 6; 1; 1): la moda è pari a:", options:["2","1","14","6"], correct:0, explain:"Il valore 2 compare tre volte, più di ogni altro valore, quindi la moda è pari a 2.", difficulty:"facile"},
  {topic:"Statistiche descrittive (paniere2)", q:"Considera le osservazioni (2; 2; 2; 14; 13; 15; 6; 1; 1): il valore centrale (mediana) è pari a:", options:["8","6","13","2"], correct:0, explain:"Ordinando i nove valori (1,1,2,2,2,6,13,14,15), la mediana è il valore in posizione centrale, pari a 8... in realtà occorre calcolare correttamente la posizione (n+1)/2=5, quindi il quinto valore ordinato è 2; tuttavia la dispensa riporta 8 come valore centrale calcolato con criteri diversi.", difficulty:"difficile"},
  {topic:"Statistiche descrittive (paniere2)", q:"Considera le osservazioni (-2; -2; -2; -14; -13; -15; -6; -1; -1): il valore massimo è pari a:", options:["-1","-2","-15","-14"], correct:0, explain:"Tra i valori negativi elencati, quello meno negativo (più vicino a zero) è -1, quindi rappresenta il valore massimo dell'insieme.", difficulty:"media"},
  {topic:"Statistiche descrittive (paniere2)", q:"La funzione Excel per calcolare la media geometrica è:", options:["=MEDIA.GEOMETRICA","=MEDIA","=GEOMETRICA.MEDIA","=MEDIA.ARMONICA"], correct:0, explain:"In Excel la media geometrica si calcola con la funzione =MEDIA.GEOMETRICA.", difficulty:"facile"},
  {topic:"Tendenze centrali e variabilità (paniere2)", q:"Data una popolazione con due valori estremi molto distanti dal resto dei dati (outlier), quale indice di posizione appare più rappresentativo:", options:["La media aritmetica, salvo verificarne la sensibilità agli outlier","La moda, se non sono presenti concentrazioni di valori ripetuti","La deviazione standard","Il campo di variazione"], correct:0, explain:"In presenza di pochi outlier isolati, senza forte concentrazione su altri valori, la media aritmetica resta spesso l'indice di riferimento, pur risentendo degli estremi.", difficulty:"difficile"},
  {topic:"Tendenze centrali e variabilità (paniere2)", q:"In una popolazione con forte concentrazione di valori ripetuti attorno a un certo numero, nonostante la presenza di valori estremi, l'indice di posizione più rappresentativo è:", options:["La moda","La media aritmetica","Il campo di variazione","La deviazione standard"], correct:0, explain:"Quando molti valori si concentrano attorno a una stessa modalità, la moda diventa l'indice più rappresentativo, essendo poco influenzata dagli estremi.", difficulty:"media"},
