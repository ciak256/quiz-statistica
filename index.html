  {topic:"Funzioni aziendali (paniere)", q:"In una azienda, le funzioni volitive sono quelle che:", options:["Interessano ogni ramo di attività e rappresentano il supremo governo amministrativo","Riguardano esclusivamente l'esecuzione materiale dei compiti operativi, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Sono limitate al solo controllo contabile, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Coincidono con le sole funzioni di vendita, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi"], correct:0, explain:"Le funzioni volitive rappresentano il supremo governo amministrativo, interessando ogni ramo dell'attività aziendale.", difficulty:"difficile"},
  {topic:"Forme giuridiche (paniere)", q:"Di norma, si decide di utilizzare come veste giuridica da assegnare al sistema-azienda quella di società in nome collettivo quando:", options:["I soci sono in grado di procurarsi i mezzi e i capitali necessari, assumendosi i rischi della conduzione in modo illimitato e solidale","I soci non dispongono di alcun capitale proprio da conferire, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Si desidera limitare la responsabilità di tutti i soci al capitale conferito, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","È richiesto un capitale sociale minimo elevato per legge, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa"], correct:0, explain:"La SNC si sceglie quando i soci possono procurarsi i mezzi necessari assumendosi una responsabilità illimitata e solidale.", difficulty:"media"},
  {topic:"Forme giuridiche (paniere)", q:"Di norma, si decide di utilizzare come veste giuridica da assegnare al sistema-azienda quella di società in accomandita semplice quando:", options:["Alcuni soci, disposti ad assumere la responsabilità illimitata per la loro ingerenza negli affari dell'impresa, non possiedono i capitali necessari, per cui si uniscono ad altri soci che conferiscono i mezzi occorrenti acquisendo la responsabilità limitata","Tutti i soci intendono avere responsabilità limitata al capitale conferito, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","È necessario emettere azioni negoziabili sul mercato, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Non è previsto alcun conferimento di capitale da parte dei soci, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)"], correct:0, explain:"La SAS nasce quando alcuni soci (accomandatari) assumono responsabilità illimitata mentre altri (accomandanti) apportano capitale con responsabilità limitata.", difficulty:"media"},
  {topic:"Sub-sistemi aziendali (paniere)", q:"Di quale dei seguenti sub-sistemi si occupa la ragioneria:", options:["Subsistema del controllo","Subsistema organizzativo","Subsistema ambientale generale","Subsistema tecnologico"], correct:0, explain:"La ragioneria si occupa specificamente del sub-sistema del controllo (rilevazioni e verifiche quantitative).", difficulty:"media"},
  {topic:"Funzioni aziendali (paniere)", q:"In una azienda, le funzioni direttive sono quelle che:", options:["Svolgono un'azione di coordinamento e di accentramento ma in linea subordinata sia a quelle amministrative che a quelle tecniche","Rappresentano il supremo governo amministrativo dell'impresa, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Riguardano esclusivamente l'esecuzione operativa dei compiti, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Coincidono sempre con le funzioni volitive, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità"], correct:0, explain:"Le funzioni direttive coordinano e accentrano l'attività, ma restano subordinate alle funzioni amministrative e tecniche superiori.", difficulty:"difficile"},
  {topic:"Forme giuridiche (paniere)", q:"Di norma, si decide di utilizzare come veste giuridica da assegnare al sistema-azienda quella di società per azioni quando:", options:["I soci promotori non sono in possesso dell'intero capitale sociale e non intendono assumere una responsabilità illimitata, ricorrendo pertanto al capitale dei risparmiatori disposti a effettuare sottoscrizioni","Un unico socio dispone dell'intero capitale necessario, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","I soci intendono assumere responsabilità illimitata e solidale, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Non è previsto alcun organo di controllo interno, un dato che deriva dalla riclassificazione del conto economico a costo del venduto, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati"], correct:0, explain:"La SPA si sceglie quando i promotori, non disponendo dell'intero capitale e volendo responsabilità limitata, ricorrono al capitale di risparmiatori esterni.", difficulty:"media"},
  {topic:"Funzioni aziendali (paniere)", q:"In una azienda, le funzioni esecutive sono quelle che:", options:["Possono avere carattere più o meno qualificato o specializzato e richiedere personale più o meno specificamente preparato","Rappresentano il supremo governo amministrativo","Coincidono con le funzioni di controllo contabile","Riguardano il personale dirigenziale apicale"], correct:0, explain:"Le funzioni esecutive possono avere gradi diversi di qualificazione e specializzazione, a seconda del compito operativo svolto.", difficulty:"difficile"},
  {topic:"Forme giuridiche (paniere)", q:"Di norma, si decide di utilizzare come veste giuridica da assegnare al sistema-azienda quella di società a responsabilità limitata quando:", options:["I promotori si rivolgono a una ristretta cerchia di soggetti per integrare il proprio capitale di apporto","È necessario ricorrere al pubblico risparmio con emissione di azioni, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Tutti i soci intendono assumere responsabilità illimitata, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Non è richiesta alcuna forma di atto costitutivo, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi"], correct:0, explain:"La SRL si sceglie quando i promotori si rivolgono a una ristretta cerchia di soggetti per integrare il capitale, senza ricorrere al pubblico risparmio.", difficulty:"media"},
  {topic:"Sub-sistema organizzativo (paniere)", q:"Quale tra i seguenti elementi che definiscono il subsistema organizzativo non attengono all'intera sfera aziendale:", options:["La componente del personale","La struttura gerarchica","I meccanismi di coordinamento","Le procedure operative"], correct:0, explain:"La componente del personale riguarda specifiche unità organizzative, non l'intera sfera aziendale nel suo complesso strutturale.", difficulty:"difficile"},
  {topic:"Sub-sistemi aziendali (paniere)", q:"Quale dei seguenti sub-sistemi è oggetto di studio dell'economia aziendale:", options:["Subsistema organizzativo","Solo il subsistema politico-istituzionale esterno","Solo il subsistema tecnologico esterno","Nessun sub-sistema aziendale specifico"], correct:0, explain:"Il subsistema organizzativo è uno dei sub-sistemi aziendali oggetto di studio dell'economia aziendale.", difficulty:"media"},
  {topic:"Circuiti della gestione (paniere)", q:"Lo schema del circuito dei finanziamenti attinti con il vincolo del prestito:", options:["Ha inizio con l'accensione del debito e termina con la estinzione del debito","Ha inizio con la vendita dei prodotti e termina con l'incasso","Ha inizio con il conferimento di capitale proprio e termina con la sua restituzione","Non prevede alcuna fase di chiusura del circuito"], correct:0, explain:"Il circuito dei finanziamenti a titolo di prestito inizia con l'accensione del debito e termina con la sua estinzione.", difficulty:"media"},
  {topic:"Circuito della produzione (paniere)", q:"Il circuito della produzione:", options:["Ha inizio con l'acquisizione dei fattori produttivi e termina con la vendita dei prodotti","Ha inizio con la vendita e termina con l'acquisizione dei fattori, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Riguarda esclusivamente le operazioni di finanziamento, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Non ha alcuna fase di chiusura definita, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa"], correct:0, explain:"Il circuito della produzione inizia con l'acquisizione dei fattori produttivi e si chiude con la vendita dei prodotti ottenuti.", difficulty:"media"},
  {topic:"Gestione economica (paniere)", q:"La gestione economica tipica:", options:["Conduce al collegamento interattivo tra il sistema aziendale e quello ambientale","Riguarda esclusivamente operazioni prive di rilevanza esterna, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità","Coincide sempre con la gestione straordinaria, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Esclude qualunque relazione con il mercato, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti"], correct:0, explain:"La gestione economica tipica (caratteristica) collega interattivamente il sistema aziendale con l'ambiente esterno.", difficulty:"media"},
  {topic:"Circuiti della gestione (paniere)", q:"Lo schema del circuito dei finanziamenti attinti con il vincolo della proprietà:", options:["Ha inizio con il conferimento del capitale di proprietà e termina con la restituzione del capitale proprio","Ha inizio con l'accensione di un debito bancario, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Ha inizio con la vendita di prodotti finiti, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Non prevede alcuna fase di chiusura, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)"], correct:0, explain:"Il circuito dei finanziamenti a titolo di proprietà inizia con il conferimento di capitale e termina con la sua restituzione ai soci.", difficulty:"media"},
  {topic:"Gestione accessoria (paniere)", q:"La gestione economica accessoria:", options:["Riguarda l'impiego di risorse finanziarie momentaneamente eccedenti rispetto alle esigenze del normale funzionamento del sistema","Coincide sempre con la gestione caratteristica principale, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Riguarda esclusivamente operazioni di natura straordinaria, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Esclude qualunque forma di investimento finanziario, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità"], correct:0, explain:"La gestione accessoria riguarda l'impiego di risorse finanziarie eccedenti rispetto alle esigenze della gestione corrente.", difficulty:"media"},
  {topic:"Circuiti della gestione (paniere)", q:"Lo schema del circuito dei finanziamenti concessi:", options:["Ha inizio con la concessione del finanziamento e termina con la riscossione del finanziamento","Ha inizio con l'acquisto di materie prime, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Riguarda esclusivamente i debiti verso fornitori, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Non prevede alcuna fase di riscossione, un dato che deriva dalla riclassificazione del conto economico a costo del venduto"], correct:0, explain:"Il circuito dei finanziamenti concessi (a terzi) inizia con la concessione e termina con la riscossione del credito.", difficulty:"media"},
  {topic:"Gestione straordinaria (paniere)", q:"La gestione economica straordinaria:", options:["Comprende tutte le operazioni estranee ai normali accadimenti aziendali","Coincide sempre con la gestione caratteristica, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Riguarda esclusivamente le operazioni di produzione ordinaria","Esclude qualunque evento non ricorrente, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)"], correct:0, explain:"La gestione straordinaria comprende operazioni non ricorrenti ed estranee ai normali accadimenti della gestione tipica.", difficulty:"media"},
  {topic:"Crediti e debiti di finanziamento (paniere)", q:"I crediti e i debiti di finanziamento:", options:["Sorgono da operazioni di prestito concesso a terzi o ricevuto da terzi","Sorgono esclusivamente da operazioni di compravendita di beni","Coincidono sempre con i crediti verso clienti","Non generano alcun interesse finanziario"], correct:0, explain:"I crediti e debiti di finanziamento derivano da operazioni di prestito, concesso o ricevuto, distinte da quelle di compravendita.", difficulty:"media"},
  {topic:"Gestione monetaria (paniere)", q:"La gestione monetaria:", options:["È volta a sincronizzare le entrate e le uscite monetarie generate dalle altre gestioni","Coincide sempre con la gestione caratteristica dell'impresa, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Riguarda esclusivamente le operazioni di finanziamento a titolo di credito","Non ha alcuna relazione con le altre gestioni aziendali, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa"], correct:0, explain:"La gestione monetaria sincronizza entrate e uscite generate dalle altre gestioni (caratteristica, accessoria, straordinaria, finanziaria).", difficulty:"media"},
  {topic:"Gestione economica (paniere)", q:"Quale tra le seguenti attività non attiene alla gestione economica:", options:["Monetaria","Caratteristica","Accessoria","Straordinaria"], correct:0, explain:"La gestione monetaria è un aspetto distinto (finanziario/monetario), non una componente della gestione economica in senso stretto.", difficulty:"difficile"},
  {topic:"Sistema informativo (paniere)", q:"Il contenuto del sistema informativo risulta essere:", options:["Più ampio di quello del subsistema delle rilevazioni aziendali","Più ristretto di quello del subsistema delle rilevazioni","Esattamente coincidente con la sola contabilità generale","Limitato ai soli dati di natura fiscale"], correct:0, explain:"Il sistema informativo ha un contenuto più ampio rispetto al subsistema delle rilevazioni aziendali, comprendendo anche altre fonti informative.", difficulty:"difficile"},
  {topic:"Sistema informativo (paniere)", q:"I requisiti di un sistema informativo, che sanciscono la sua idoneità a supportare il processo decisione-azione sono:", options:["Selettività, elasticità, affidabilità, convenienza e accettabilità","La rapidità di elaborazione dei dati, isolatamente considerata","Il basso costo di implementazione, isolatamente considerato","La compatibilità con i sistemi concorrenti, isolatamente considerata"], correct:0, explain:"I requisiti classici del sistema informativo sono selettività, elasticità, affidabilità, convenienza e accettabilità.", difficulty:"difficile"},
  {topic:"Sistema informativo (paniere)", q:"Il subsistema informativo viene anche definito:", options:["Subsistema di controllo","Subsistema operativo","Subsistema organizzativo","Subsistema ambientale"], correct:0, explain:"Il subsistema informativo viene anche definito subsistema di controllo, per la sua funzione di supporto alle decisioni.", difficulty:"media"},
  {topic:"Sistema informativo (paniere)", q:"Un sistema informativo può definirsi progredito quando:", options:["Trasmette i dati raccolti utilizzando appropriati e moderni mezzi di trasmissione e di elaborazione","Si basa esclusivamente su registrazioni manuali cartacee, un dato che deriva dalla riclassificazione del conto economico a costo del venduto","Non prevede alcuna forma di elaborazione dei dati, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Utilizza solo strumenti di comunicazione verbale interna, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)"], correct:0, explain:"Un sistema informativo progredito utilizza mezzi moderni ed efficaci di trasmissione ed elaborazione dei dati.", difficulty:"media"},
  {topic:"Sistema informativo (paniere)", q:"Il sistema informativo integrato concerne:", options:["I flussi informativi sia verticali che orizzontali","I flussi informativi verticali gerarchici, isolatamente considerati","I flussi informativi orizzontali tra pari livello, isolatamente considerati","I flussi informativi verso l'esterno, isolatamente considerati"], correct:0, explain:"Il sistema informativo integrato concerne sia i flussi verticali (gerarchici) sia orizzontali (tra funzioni) dell'impresa.", difficulty:"media"},
  {topic:"Sistema informativo (paniere)", q:"Nel passaggio dalla raccolta dei dati grezzi alla produzione di informazioni grezze è possibile individuare il seguente percorso logico:", options:["Selezione dei dati-elaborazione dei dati-inserimento dei dati in procedimenti-trattamento dei dati","Solo la raccolta casuale dei dati senza alcuna elaborazione, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Solo l'archiviazione dei dati senza trattamento, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa","Un percorso privo di fasi logiche distinte, una voce riclassificata secondo il criterio finanziario di liquidità/esigibilità"], correct:0, explain:"Il percorso logico prevede selezione, elaborazione, inserimento in procedimenti e trattamento dei dati.", difficulty:"difficile"},
  {topic:"Sistema informativo (paniere)", q:"Per sistema informativo si intende:", options:["Quell'insieme di procedure contabili e matematico-statistiche, attuate con strumenti elettronici autoregolanti, che contengano gli aspetti qualitativi e quantitativi dell'analisi di fenomeni conoscitivi dell'andamento aziendale","L'insieme dei documenti contabili obbligatori per legge","Il software gestionale utilizzato dall'impresa","L'archivio cartaceo delle fatture emesse e ricevute"], correct:0, explain:"Il sistema informativo è l'insieme di procedure contabili e matematico-statistiche che analizzano qualitativamente e quantitativamente l'andamento aziendale.", difficulty:"difficile"},
  {topic:"Sistema informativo (paniere)", q:"Il sistema informativo può essere definito come:", options:["L'insieme coordinato di flussi informativi, ottenibili dall'applicazione di varie metodologie al processo di trasformazione di dati, miranti a supportare il sistema delle decisioni aziendali e a esercitare la funzione di comunicazione all'esterno","L'insieme dei dati contabili obbligatori per legge","Lo strumento di comunicazione pubblicitaria esterna","L'archivio delle operazioni bancarie dell'impresa"], correct:0, explain:"Il sistema informativo è l'insieme coordinato di flussi informativi a supporto delle decisioni e della comunicazione esterna.", difficulty:"difficile"},
  {topic:"Sistema informativo (paniere)", q:"Nell'attività di analisi e di progettazione del sistema informativo non è possibile individuare la seguente fase:", options:["Astrazione dai complessi fenomeni che influenzano una decisione","Definizione degli obiettivi informativi, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Identificazione delle fonti dei dati, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati","Progettazione dei flussi informativi, una grandezza che dipende dalla politica di ammortamento scelta dall'impresa"], correct:0, explain:"L'astrazione dai fenomeni complessi non è una fase della progettazione del sistema informativo, che al contrario richiede di considerarli concretamente.", difficulty:"difficile"},

  {topic:"Fine ultimo del sistema aziendale (paniere)", q:"Il fine ultimo del sistema aziendale è:", options:["Quello di conoscere il valore economico di una data entità produttiva riferito sia ai tempi attuali sia a quelli futuri","Quello di massimizzare esclusivamente il fatturato annuo, un valore che emerge dal confronto tra bilancio consuntivo e budget previsionale","Quello di ridurre a zero ogni forma di rischio d'impresa, una grandezza calcolata al netto degli ammortamenti e degli accantonamenti","Quello di eliminare qualunque relazione con l'ambiente esterno, un dato che deriva dalla riclassificazione del conto economico a costo del venduto"], correct:0, explain:"Il fine ultimo del sistema aziendale è conoscere il valore economico dell'entità produttiva, sia attuale sia prospettico.", difficulty:"difficile"},
  {topic:"Principio della conoscenza (paniere)", q:"Il 'principio della conoscenza profonda e della capacità di apprendimento':", options:["È connesso a un lento e graduale processo cognitivo di accumulazione delle potenzialità che conduce alla 'competenza'","Si acquisisce istantaneamente senza alcun processo di apprendimento, un indicatore che si ottiene dall'analisi degli scostamenti tra costi standard e consuntivi","Riguarda esclusivamente le competenze tecniche di produzione, una misura legata al ciclo monetario dell'impresa (incasso crediti/pagamento debiti)","Non ha alcuna relazione con la capacità di adattamento dell'impresa, un valore ricavato dalla nota integrativa relativa ai criteri di valutazione adottati"], correct:0, explain:"Questo principio è connesso a un processo graduale di accumulazione di conoscenza che conduce alla competenza.", difficulty:"difficile"},

  {topic:"Diritti reali", q:"I diritti reali minori (es. usufrutto, servitù, superficie) sono definiti anche:", options:["Diritti di credito, una disciplina che riguarda un istituto giuridico affine ma concettualmente distinto","Diritti su cosa altrui","Diritti di famiglia","Diritti d'autore, una fattispecie disciplinata da una norma speciale, distinta da quella generale richiamata qui"], correct:1, explain:"I diritti reali minori (o di godimento) attribuiscono facoltà limitate su un bene di proprietà altrui.", difficulty:"facile"},
  {topic:"Diritti reali", q:"Il possesso è definito come:", options:["Il diritto di proprietà pieno su un bene, un istituto che presuppone comunque un accordo formalizzato tra le parti interessate","Il potere di fatto su una cosa esercitato in modo corrispondente al diritto di proprietà o ad altro diritto reale","Un contratto di locazione, una previsione che opera in via residuale rispetto alla disciplina codicistica generale","Un diritto di credito verso terzi, un effetto giuridico che si produce previa autorizzazione di un'autorità giudiziaria"], correct:1, explain:"Il possesso è una situazione di fatto, tutelata dall'ordinamento, indipendente dalla titolarità formale del diritto.", difficulty:"difficile"},
  {topic:"Diritti reali", q:"L'usucapione consente di:", options:["Acquistare la proprietà di un bene tramite il possesso continuato per il tempo stabilito dalla legge","Vendere un bene senza contratto scritto, una regola che trova applicazione nei rapporti tra imprenditori commerciali","Ottenere un mutuo bancario, una previsione richiamata da una norma di rinvio contenuta in una legge speciale","Estinguere un debito per decorso del tempo, un principio elaborato dalla giurisprudenza in una fattispecie parzialmente diversa"], correct:0, explain:"L'usucapione è un modo di acquisto della proprietà (o di altri diritti reali) a titolo originario, basato sul possesso protratto per il periodo previsto dalla legge.", difficulty:"media"},
  {topic:"Prescrizione e decadenza", q:"La prescrizione comporta:", options:["L'acquisto automatico di un diritto, una disciplina che riguarda un istituto giuridico affine ma concettualmente distinto","L'estinzione di un diritto per il mancato esercizio protratto nel tempo","La nullità automatica del contratto, una fattispecie disciplinata da una norma speciale, distinta da quella generale richiamata qui","L'annullamento di una sentenza, un istituto che presuppone comunque un accordo formalizzato tra le parti interessate"], correct:1, explain:"La prescrizione estingue il diritto (salvo eccezioni) quando il titolare non lo esercita per il periodo di tempo stabilito dalla legge.", difficulty:"facile"},
  {topic:"Prescrizione e decadenza", q:"La decadenza si differenzia dalla prescrizione perché:", options:["Comporta la perdita di un diritto per il mancato esercizio entro un termine perentorio, non soggetto a interruzione","Può essere rinunciata dalle parti in via preventiva, una previsione che opera in via residuale rispetto alla disciplina codicistica generale","Riguarda i diritti reali di garanzia, escludendo ogni altro diritto, un effetto giuridico che si produce previa autorizzazione di un'autorità giudiziaria","Non trova fondamento in alcuna disposizione di legge vigente, una regola che trova applicazione nei rapporti tra imprenditori commerciali"], correct:0, explain:"La decadenza impone l'esercizio del diritto entro un termine fisso e perentorio, generalmente non suscettibile di sospensione o interruzione, a differenza della prescrizione.", difficulty:"difficile"},
  {topic:"Famiglia", q:"Il matrimonio civile produce effetti:", options:["Limitati alla sfera fiscale dei coniugi","Sia personali sia patrimoniali tra i coniugi","Limitati al regime successorio dei nonni","Nessun effetto giuridico, una disciplina che riguarda un istituto giuridico affine ma concettualmente distinto"], correct:1, explain:"Il matrimonio genera diritti e doveri reciproci di natura personale (es. fedeltà, assistenza) e patrimoniale (es. regime dei beni) tra i coniugi.", difficulty:"facile"},
  {topic:"Famiglia", q:"La comunione legale dei beni, regime patrimoniale automatico in mancanza di diversa convenzione, comporta che:", options:["Tutti i beni dei coniugi, anche quelli anteriori al matrimonio, diventano comuni, una fattispecie disciplinata da una norma speciale, distinta da quella generale richiamata qui","I beni acquistati durante il matrimonio (salvo eccezioni) diventano comuni ad entrambi i coniugi","Tutti i beni posseduti prima del matrimonio rientrano nella comunione","È l'unico regime patrimoniale ammesso dalla legge, una previsione che opera in via residuale rispetto alla disciplina codicistica generale"], correct:1, explain:"Nella comunione legale, gli acquisti compiuti durante il matrimonio (con le eccezioni previste dalla legge, es. beni personali) cadono in comunione tra i coniugi.", difficulty:"difficile"},
  {topic:"Successioni", q:"La successione legittima si apre quando:", options:["Esiste un testamento valido ed efficace per l'intera eredità","Manca un testamento, oppure il testamento non dispone di tutti i beni","Il defunto era ancora in vita","Gli eredi rinunciano preventivamente all'eredità"], correct:1, explain:"La successione legittima (disciplinata dalla legge) si applica in assenza di testamento o per la parte di eredità non disposta testamentariamente.", difficulty:"media"},
  {topic:"Successioni", q:"La successione testamentaria si fonda su:", options:["Un testamento validamente redatto dal defunto (de cuius)","Una decisione del giudice, un effetto giuridico che si produce previa autorizzazione di un'autorità giudiziaria","Un accordo tra gli eredi, una regola che trova applicazione nei rapporti tra imprenditori commerciali","Una legge speciale regionale, una previsione richiamata da una norma di rinvio contenuta in una legge speciale"], correct:0, explain:"La successione testamentaria attua le disposizioni di ultima volontà espresse dal defunto in un testamento valido.", difficulty:"facile"},
  {topic:"Successioni", q:"I legittimari sono:", options:["Tutti i creditori del defunto, un principio elaborato dalla giurisprudenza in una fattispecie parzialmente diversa","I soggetti (coniuge, figli, in mancanza ascendenti) ai quali la legge riserva una quota di eredità","I creditori del defunto indicati nell'inventario ereditario","Gli esecutori testamentari, una fattispecie disciplinata da una norma speciale, distinta da quella generale richiamata qui"], correct:1, explain:"I legittimari hanno diritto a una quota di eredità (quota di legittima) che il testatore non può loro sottrarre, salvo diseredazione per giusta causa nei casi previsti.", difficulty:"media"},
  {topic:"Fonti del diritto", q:"Nella gerarchia delle fonti del diritto italiano, al vertice si colloca:", options:["I regolamenti amministrativi, un istituto che presuppone comunque un accordo formalizzato tra le parti interessate","La Costituzione e le leggi costituzionali","Gli usi e le consuetudini, una previsione che opera in via residuale rispetto alla disciplina codicistica generale","I contratti collettivi, un effetto giuridico che si produce previa autorizzazione di un'autorità giudiziaria"], correct:1, explain:"La Costituzione e le leggi costituzionali rappresentano le fonti di rango più elevato, cui devono conformarsi le leggi ordinarie e le altre fonti.", difficulty:"facile"},
  {topic:"Storia del diritto civile", q:"Il Codice Civile italiano attualmente vigente è entrato in vigore nel:", options:["1865","1942","1990","1948"], correct:1, explain:"Il vigente Codice Civile italiano è stato approvato ed è entrato in vigore nel 1942.", difficulty:"facile"},
  {topic:"Negozio giuridico", q:"Il negozio giuridico è definito come:", options:["Un fatto naturale privo di rilevanza giuridica, una regola che trova applicazione nei rapporti tra imprenditori commerciali","Una manifestazione di volontà diretta a produrre effetti giuridici","Un provvedimento del giudice, una previsione richiamata da una norma di rinvio contenuta in una legge speciale","Un atto amministrativo emanato da un pubblico ufficiale"], correct:1, explain:"Il negozio giuridico è l'atto con cui un soggetto manifesta la propria volontà per realizzare un determinato assetto di interessi con rilevanza giuridica.", difficulty:"media"},
  {topic:"Rappresentanza e contratti tipici", q:"La rappresentanza è:", options:["Il potere di agire in nome e per conto di un altro soggetto (rappresentato)","Un tipo di responsabilità penale, una disciplina che riguarda un istituto giuridico affine ma concettualmente distinto","Un diritto reale di godimento, una fattispecie disciplinata da una norma speciale, distinta da quella generale richiamata qui","Una forma di prescrizione, un istituto che presuppone comunque un accordo formalizzato tra le parti interessate"], correct:0, explain:"Chi agisce in rappresentanza compie atti giuridici i cui effetti si producono direttamente nella sfera giuridica del rappresentato.", difficulty:"facile"},
  {topic:"Rappresentanza e contratti tipici", q:"Il mandato è il contratto con cui:", options:["Una parte trasferisce la proprietà di un bene a un'altra, una previsione che opera in via residuale rispetto alla disciplina codicistica generale","Una parte si obbliga a compiere uno o più atti giuridici per conto dell'altra","Si costituisce una società di persone, un effetto giuridico che si produce previa autorizzazione di un'autorità giudiziaria","Si concede in godimento un immobile, una regola che trova applicazione nei rapporti tra imprenditori commerciali"], correct:1, explain:"Con il mandato, il mandatario si obbliga a compiere atti giuridici per conto del mandante, con o senza rappresentanza.", difficulty:"difficile"},
  {topic:"Rappresentanza e contratti tipici", q:"La donazione è il contratto con cui:", options:["Un soggetto vende un bene a un prezzo simbolico, una previsione richiamata da una norma di rinvio contenuta in una legge speciale","Un soggetto arricchisce un altro per spirito di liberalità, senza ricevere un corrispettivo","Si costituisce un'ipoteca, un principio elaborato dalla giurisprudenza in una fattispecie parzialmente diversa","Si stipula un contratto di lavoro, una disciplina che riguarda un istituto giuridico affine ma concettualmente distinto"], correct:1, explain:"La donazione è un atto di liberalità con cui il donante attribuisce un vantaggio patrimoniale al donatario senza corrispettivo.", difficulty:"media"},
  {topic:"Diritti reali", q:"Il diritto di proprietà, secondo il codice civile, attribuisce al titolare:", options:["Un potere limitato alla sola alienazione del bene","La facoltà di costituire ipoteca senza poter godere del bene","Un potere limitato alla sola alienazione del bene, una previsione che opera in via residuale rispetto alla disciplina codicistica generale","Il diritto di godere e disporre della cosa in modo pieno ed esclusivo, nei limiti dell'ordinamento"], correct:3, explain:"L'art. 832 c.c. definisce la proprietà come diritto di godere e disporre delle cose in modo pieno ed esclusivo, entro i limiti previsti dall'ordinamento.", difficulty:"facile"},
  {topic:"Obbligazioni", q:"Un'obbligazione si definisce solidale quando:", options:["Il creditore non può richiedere la prestazione a nessuno dei debitori","Il creditore non può richiedere la prestazione a nessuno dei debitori, una regola che trova applicazione nei rapporti tra imprenditori commerciali","Si estingue automaticamente alla morte di uno dei condebitori","Ciascun debitore può essere tenuto per l'intero e il pagamento di uno libera gli altri"], correct:3, explain:"Nella solidarietà passiva ciascun condebitore può essere chiamato a pagare l'intero, salvo poi rivalersi sugli altri condebitori in via di regresso.", difficulty:"media"},
  {topic:"Contratti", q:"La clausola risolutiva espressa consente a una parte di:", options:["Rinunciare automaticamente al proprio credito, un principio elaborato dalla giurisprudenza in una fattispecie parzialmente diversa","Modificare unilateralmente il prezzo pattuito in ogni momento, una disciplina che riguarda un istituto giuridico affine ma concettualmente distinto","Recedere dal contratto senza alcuna motivazione, una fattispecie disciplinata da una norma speciale, distinta da quella generale richiamata qui","Risolvere il contratto di diritto quando l'altra parte non adempie all'obbligazione specificamente indicata"], correct:3, explain:"La clausola risolutiva espressa (art. 1456 c.c.) permette la risoluzione di diritto in caso di inadempimento della specifica obbligazione dedotta in clausola.", difficulty:"media"},
  {topic:"Diritto di famiglia", q:"Nel regime di comunione legale tra coniugi rientrano, salvo eccezioni previste dalla legge:", options:["I beni intestati a entrambi i coniugi e i beni ricevuti in eredità, un istituto che presuppone comunque un accordo formalizzato tra le parti interessate","I beni posseduti da ciascun coniuge prima del matrimonio, una previsione che opera in via residuale rispetto alla disciplina codicistica generale","I beni ricevuti per donazione e quelli ereditati da terzi, un effetto giuridico che si produce previa autorizzazione di un'autorità giudiziaria","Gli acquisti compiuti dai coniugi insieme o separatamente durante il matrimonio, esclusi i beni personali"], correct:3, explain:"La comunione legale comprende, salvo i beni personali elencati dall'art. 179 c.c., gli acquisti effettuati dai coniugi anche separatamente durante il matrimonio.", difficulty:"media"},
  {topic:"Fatto illecito", q:"La responsabilità extracontrattuale (art. 2043 c.c.) sorge in presenza di:", options:["Un obbligo di legge indipendente da qualunque danno, una regola che trova applicazione nei rapporti tra imprenditori commerciali","Un semplice accordo verbale privo di effetti giuridici, una previsione richiamata da una norma di rinvio contenuta in una legge speciale","Un contratto validamente concluso tra le parti, un principio elaborato dalla giurisprudenza in una fattispecie parzialmente diversa","Un fatto doloso o colposo che cagiona ad altri un danno ingiusto"], correct:3, explain:"L'art. 2043 c.c. impone a chi commette un fatto doloso o colposo, cagionando danno ingiusto, l'obbligo di risarcire il danneggiato.", difficulty:"difficile"},
  {topic:"Contratti", q:"La differenza tra condizione sospensiva e condizione risolutiva riguarda il momento in cui:", options:["Viene versata la caparra confirmatoria, una disciplina che riguarda un istituto giuridico affine ma concettualmente distinto","Le parti firmano materialmente il documento contrattuale, una fattispecie disciplinata da una norma speciale, distinta da quella generale richiamata qui","Producono o fanno cessare gli effetti del contratto al verificarsi dell'evento dedotto in condizione","Il contratto viene stipulato dalle parti, un istituto che presuppone comunque un accordo formalizzato tra le parti interessate"], correct:2, explain:"La condizione sospensiva subordina l'efficacia del contratto al verificarsi dell'evento, mentre quella risolutiva ne determina la cessazione al verificarsi dell'evento.", difficulty:"difficile"},
  {topic:"Diritti reali", q:"L'usufrutto si distingue dalla proprietà perché l'usufruttuario:", options:["Non ha alcun diritto di utilizzare il bene altrui, una previsione che opera in via residuale rispetto alla disciplina codicistica generale","Può alienare liberamente la piena proprietà del bene, un effetto giuridico che si produce previa autorizzazione di un'autorità giudiziaria","Può godere del bene e percepirne i frutti, ma non disporne come farebbe il proprietario","Diventa proprietario del bene al termine dell'usufrutto, una regola che trova applicazione nei rapporti tra imprenditori commerciali"], correct:2, explain:"L'usufrutto (art. 978 c.c.) attribuisce il diritto di godimento e di percezione dei frutti, ma la nuda proprietà resta in capo al proprietario.", difficulty:"difficile"},
  {topic:"Obbligazioni", q:"La prescrizione di un diritto di credito comporta che:", options:["Il diritto si estingue per l'inerzia del titolare protratta per il tempo stabilito dalla legge","Il contratto originario diventi automaticamente nullo, una previsione richiamata da una norma di rinvio contenuta in una legge speciale","Il creditore acquisti un nuovo diritto reale sul bene del debitore, un principio elaborato dalla giurisprudenza in una fattispecie parzialmente diversa","Il debito venga automaticamente raddoppiato, una disciplina che riguarda un istituto giuridico affine ma concettualmente distinto"], correct:0, explain:"La prescrizione estingue il diritto quando il titolare non lo esercita per il periodo di tempo previsto dalla legge, salvo cause di sospensione o interruzione.", difficulty:"difficile"},
  {topic:"Persone giuridiche", q:"L'associazione riconosciuta si distingue da quella non riconosciuta principalmente per:", options:["Il divieto assoluto di possedere beni immobili, una fattispecie disciplinata da una norma speciale, distinta da quella generale richiamata qui","L'acquisizione della personalità giuridica e l'autonomia patrimoniale perfetta rispetto agli associati","L'impossibilità di perseguire scopi ideali o culturali, un istituto che presuppone comunque un accordo formalizzato tra le parti interessate","L'obbligo di avere un unico associato fondatore, una previsione che opera in via residuale rispetto alla disciplina codicistica generale"], correct:1, explain:"Con il riconoscimento l'associazione acquista personalità giuridica e autonomia patrimoniale perfetta, separando il proprio patrimonio da quello degli associati.", difficulty:"difficile"},
  {topic:"Concetti generali", q:"Il diritto privato disciplina principalmente:", options:["Il funzionamento interno degli organi costituzionali dello Stato","I rapporti tributari tra cittadino e amministrazione finanziaria","I rapporti tra Stato e cittadino nell'esercizio di poteri autoritativi","I rapporti giuridici tra soggetti privati posti su un piano di parità"], correct:3, explain:"Il diritto privato regola i rapporti tra soggetti (persone fisiche e giuridiche) posti in posizione di parità, a differenza del diritto pubblico che coinvolge l'esercizio di poteri autoritativi.", difficulty:"facile"},
  {topic:"Fonti delle obbligazioni", q:"Le obbligazioni possono derivare, tra le altre fonti, da:", options:["Da una sentenza del giudice e da un atto amministrativo, un effetto giuridico che si produce previa autorizzazione di un'autorità giudiziaria","Da un contratto scritto, sottoscritto e autenticato da un notaio, una regola che trova applicazione nei rapporti tra imprenditori commerciali","Da disposizioni di legge in materia fiscale e amministrativa, una previsione richiamata da una norma di rinvio contenuta in una legge speciale","Contratto, fatto illecito o altro atto o fatto idoneo a produrle secondo l'ordinamento"], correct:3, explain:"L'art. 1173 c.c. individua come fonti delle obbligazioni il contratto, il fatto illecito e ogni altro atto o fatto idoneo a produrle in conformità all'ordinamento.", difficulty:"facile"},
  {topic:"Contratti", q:"Gli elementi essenziali del contratto, secondo l'art. 1325 c.c., comprendono:", options:["La forma scritta, richiesta indipendentemente dal tipo di contratto","L'accordo verbale tra le parti, senza ulteriori requisiti","La presenza di un notaio rogante e di due testimoni","Accordo delle parti, causa, oggetto e, quando richiesta, la forma"], correct:3, explain:"L'art. 1325 c.c. individua come requisiti essenziali del contratto l'accordo, la causa, l'oggetto e, se prescritta dalla legge, la forma.", difficulty:"facile"},
  {topic:"Diritti reali", q:"I beni immobili, secondo la definizione del codice civile, comprendono:", options:["Tutti i beni che possono essere spostati senza deterioramento","Il suolo e tutto ciò che è incorporato al suolo, come edifici e alberi","I beni di consumo deperibili in un breve lasso di tempo","I beni mobili registrati come autoveicoli e imbarcazioni"], correct:1, explain:"L'art. 812 c.c. qualifica come immobili il suolo e tutto ciò che vi è naturalmente o artificialmente incorporato, come edifici, alberi e sorgenti.", difficulty:"facile"},
  {topic:"Persone giuridiche", q:"Le fondazioni si distinguono dalle associazioni principalmente perché:", options:["Non possono in alcun caso perseguire scopi di utilità sociale","Sono caratterizzate da un patrimonio destinato stabilmente al perseguimento di uno scopo, senza una base associativa di persone","Non possono in alcun caso perseguire scopi di utilità sociale, una disciplina che riguarda un istituto giuridico affine ma concettualmente distinto","Richiedono un numero minimo di dieci soci fondatori"], correct:1, explain:"La fondazione si fonda su un patrimonio vincolato a uno scopo, mentre l'associazione si fonda su un insieme di persone (soci) organizzate per un fine comune.", difficulty:"media"},
  {topic:"Contratti", q:"Il contratto preliminare, rispetto al contratto definitivo, ha la funzione di:", options:["Sostituire integralmente e in via definitiva il contratto finale, un istituto che presuppone comunque un accordo formalizzato tra le parti interessate","Obbligare le parti a stipulare in futuro il contratto definitivo alle condizioni pattuite","Estinguere immediatamente ogni obbligazione tra le parti, una previsione che opera in via residuale rispetto alla disciplina codicistica generale","Trasferire immediatamente la proprietà del bene oggetto dell'accordo, un effetto giuridico che si produce previa autorizzazione di un'autorità giudiziaria"], correct:1, explain:"Il contratto preliminare crea l'obbligo per le parti di stipulare successivamente il contratto definitivo, senza produrne ancora gli effetti reali o finali.", difficulty:"media"},
  {topic:"Obbligazioni", q:"La mora del debitore si verifica quando:", options:["Il debitore, pur potendo adempiere, ritarda ingiustificatamente l'adempimento dell'obbligazione","L'obbligazione si estingue per prescrizione del diritto, una regola che trova applicazione nei rapporti tra imprenditori commerciali","Le parti concordano consensualmente una proroga del termine, una previsione richiamata da una norma di rinvio contenuta in una legge speciale","Il creditore rifiuta senza motivo la prestazione offerta dal debitore, un principio elaborato dalla giurisprudenza in una fattispecie parzialmente diversa"], correct:0, explain:"La mora debendi si configura quando il debitore ritarda colpevolmente l'adempimento pur essendo in grado di eseguirlo, con conseguenze quali il risarcimento del danno da ritardo.", difficulty:"media"},
  {topic:"Diritti reali", q:"La servitù prediale consiste in:", options:["Il diritto del proprietario di alienare liberamente il proprio bene, una disciplina che riguarda un istituto giuridico affine ma concettualmente distinto","Un diritto che si estingue automaticamente alla morte del proprietario del fondo dominante","Un peso imposto su un fondo (servente) a vantaggio di un altro fondo (dominante) appartenente a diverso proprietario","Il diritto del proprietario di alienare liberamente il proprio bene"], correct:2, explain:"La servitù prediale (art. 1027 c.c.) è un peso imposto su un fondo servente a vantaggio di un fondo dominante, appartenenti a proprietari diversi.", difficulty:"media"},
  {topic:"Diritto di famiglia", q:"La separazione personale dei coniugi, a differenza del divorzio, comporta che:", options:["Non è più possibile per i coniugi tornare in futuro alla piena convivenza","I coniugi perdono automaticamente la capacità di agire","Il vincolo matrimoniale non si estingue, ma vengono sospesi alcuni doveri coniugali","Il matrimonio si scioglie definitivamente con effetto immediato"], correct:2, explain:"Con la separazione il vincolo matrimoniale permane, pur attenuandosi alcuni doveri (come la convivenza), mentre il divorzio scioglie definitivamente il matrimonio.", difficulty:"media"},
  {topic:"Contratti", q:"La rescissione del contratto, a differenza dell'annullamento, riguarda in particolare i casi di:", options:["Violazione di norme imperative relative alla forma del contratto, una previsione che opera in via residuale rispetto alla disciplina codicistica generale","Stato di pericolo o stato di bisogno con approfittamento della controparte (lesione)","Incapacità legale di una delle parti contraenti, un effetto giuridico che si produce previa autorizzazione di un'autorità giudiziaria","Errore essenziale sulla natura del contratto, una regola che trova applicazione nei rapporti tra imprenditori commerciali"], correct:1, explain:"La rescissione (artt. 1447-1448 c.c.) riguarda i contratti conclusi in stato di pericolo o di bisogno, con approfittamento della controparte (lesione), diversamente dall'annullabilità.", difficulty:"difficile"},
  {topic:"Diritti reali", q:"L'accessione, come modo di acquisto della proprietà, si verifica quando:", options:["Due soggetti stipulano un contratto di compravendita immobiliare, una previsione richiamata da una norma di rinvio contenuta in una legge speciale","Un bene si unisce o si incorpora stabilmente a un altro bene, facendo sì che il proprietario del bene principale acquisti anche l'accessorio","Il possessore utilizza il bene ininterrottamente per il tempo previsto dalla legge, un principio elaborato dalla giurisprudenza in una fattispecie parzialmente diversa","Un bene mobile viene registrato in un pubblico registro, una disciplina che riguarda un istituto giuridico affine ma concettualmente distinto"], correct:1, explain:"L'accessione (artt. 934 e ss. c.c.) è un modo di acquisto della proprietà per incorporazione stabile di un bene accessorio a uno principale, a differenza dell'usucapione basata sul possesso prolungato.", difficulty:"difficile"},
  {topic:"Obbligazioni", q:"La compensazione, quale modo di estinzione delle obbligazioni, opera quando:", options:["Due soggetti sono reciprocamente creditori e debitori l'uno dell'altro, e i rispettivi debiti si estinguono per le quantità corrispondenti","Sopraggiunge un evento che rende la prestazione materialmente impossibile, una fattispecie disciplinata da una norma speciale, distinta da quella generale richiamata qui","Il debitore versa una somma di denaro maggiore rispetto al dovuto, un istituto che presuppone comunque un accordo formalizzato tra le parti interessate","Il creditore rinuncia gratuitamente e unilateralmente al proprio credito, una previsione che opera in via residuale rispetto alla disciplina codicistica generale"], correct:0, explain:"La compensazione (art. 1241 c.c.) estingue reciproci debiti e crediti tra due soggetti per le quantità corrispondenti, quando ricorrono i requisiti di legge (omogeneità, liquidità, esigibilità).", difficulty:"difficile"},
  {topic:"Successioni", q:"La quota di legittima riservata dalla legge tutela in particolare:", options:["I familiari più stretti (legittimari), garantendo loro una quota minima di eredità anche contro la volontà del testatore","I soli enti di beneficenza eventualmente beneficiari, un effetto giuridico che si produce previa autorizzazione di un'autorità giudiziaria","I soli enti di beneficenza eventualmente beneficiari","I vicini di casa del defunto indicati come testimoni"], correct:0, explain:"La legittima tutela coniuge, figli e in mancanza altri ascendenti (legittimari), riservando loro per legge una quota di eredità indisponibile dal testatore.", difficulty:"difficile"},
  {topic:"Contratti", q:"L'eccessiva onerosità sopravvenuta consente la risoluzione del contratto quando:", options:["Una delle parti semplicemente cambia idea sul contratto stipulato, un principio elaborato dalla giurisprudenza in una fattispecie parzialmente diversa","Le parti concordano preventivamente una clausola risolutiva espressa, una disciplina che riguarda un istituto giuridico affine ma concettualmente distinto","Eventi straordinari e imprevedibili rendono la prestazione di una parte notevolmente più onerosa rispetto a quanto pattuito","Il contratto viene concluso in forma verbale anziché scritta, una fattispecie disciplinata da una norma speciale, distinta da quella generale richiamata qui"], correct:2, explain:"L'art. 1467 c.c. consente la risoluzione dei contratti a esecuzione continuata o differita quando eventi straordinari e imprevedibili alterano notevolmente l'equilibrio tra le prestazioni.", difficulty:"difficile"},
  {topic:"Concetti generali", q:"Le fonti del diritto privato italiano comprendono, tra le altre:", options:["Le sentenze dei giudici di merito e le circolari ministeriali, un istituto che presuppone comunque un accordo formalizzato tra le parti interessate","I contratti stipulati tra privati e gli accordi sindacali, una previsione che opera in via residuale rispetto alla disciplina codicistica generale","La Costituzione, le leggi ordinarie, i regolamenti e, per specifiche materie, il diritto dell'Unione Europea","Gli usi e le consuetudini locali, in assenza di una legge scritta di riferimento, un effetto giuridico che si produce previa autorizzazione di un'autorità giudiziaria"], correct:2, explain:"Le fonti del diritto privato si articolano gerarchicamente in Costituzione, leggi ordinarie, regolamenti e, per le materie di competenza, normativa europea, oltre a usi e consuetudini.", difficulty:"facile"},

  {topic:"Macroeconomia", q:"Il PIL reale, a differenza di quello nominale:", options:["Non tiene conto dei prezzi correnti, un fenomeno legato al ciclo economico più che alla crescita di lungo periodo","È corretto per l'effetto dell'inflazione, permettendo confronti nel tempo","Considera i beni destinati all'esportazione anziché quelli per il mercato interno","Viene calcolato senza tenere conto della produzione dei servizi"], correct:1, explain:"Il PIL reale utilizza prezzi costanti (di un anno base) per depurare la misura dall'effetto della variazione dei prezzi (inflazione).", difficulty:"difficile"},
  {topic:"Macroeconomia", q:"L'inflazione è definita come:", options:["Una diminuzione generale e persistente dei prezzi","Un aumento generale e persistente del livello dei prezzi","La crescita del PIL reale","Una diminuzione della disoccupazione"], correct:1, explain:"L'inflazione indica un aumento diffuso e continuativo del livello generale dei prezzi in un'economia.", difficulty:"media"},
  {topic:"Macroeconomia", q:"La deflazione è definita come:", options:["Un aumento generale dei prezzi, una dinamica legata alle aspettative razionali degli operatori di mercato","Una diminuzione generale e persistente del livello dei prezzi","Una fase di forte crescita economica, un fenomeno che dipende dal grado di apertura commerciale dell'economia","Un aumento dei salari reali, una relazione che i modelli macroeconomici più recenti tendono a ridimensionare"], correct:1, explain:"La deflazione è l'opposto dell'inflazione: un calo continuativo del livello generale dei prezzi.", difficulty:"facile"},
  {topic:"Macroeconomia", q:"Il tasso di disoccupazione è definito come:", options:["Il rapporto tra occupati e popolazione totale, un effetto rilevante soprattutto in un contesto di cambi fissi tra valute","Il rapporto tra persone in cerca di occupazione e forza lavoro totale","Il numero assoluto di disoccupati, una dinamica osservata principalmente nel breve periodo, non nel lungo periodo","Il rapporto tra PIL e popolazione, un fenomeno legato al ciclo economico più che alla crescita di lungo periodo"], correct:1, explain:"Il tasso di disoccupazione è calcolato dividendo il numero di persone in cerca di lavoro per la forza lavoro complessiva (occupati + disoccupati).", difficulty:"difficile"},
  {topic:"Politiche economiche", q:"La politica fiscale è condotta principalmente da:", options:["La Banca Centrale, una relazione che si osserva prevalentemente nei modelli di equilibrio parziale","Il Governo, tramite spesa pubblica e tassazione","Le singole imprese private, un effetto che si manifesta in presenza di rigidità nei prezzi e nei salari","I sindacati, una dinamica legata alle aspettative razionali degli operatori di mercato"], correct:1, explain:"La politica fiscale riguarda le decisioni di spesa pubblica e tassazione adottate dal Governo per influenzare l'economia.", difficulty:"facile"},
  {topic:"Politiche economiche", q:"La politica monetaria è condotta principalmente da:", options:["Il Parlamento","La Banca Centrale","I Ministeri delle finanze regionali","Le associazioni di categoria"], correct:1, explain:"La politica monetaria è di competenza della Banca Centrale, che agisce su tassi di interesse, offerta di moneta e altri strumenti.", difficulty:"facile"},
  {topic:"Politiche economiche", q:"Uno strumento tipico di politica monetaria è:", options:["La variazione dei tassi di interesse ufficiali","L'aumento delle imposte dirette","La costruzione di infrastrutture pubbliche","La riduzione della spesa sanitaria"], correct:0, explain:"Le banche centrali utilizzano principalmente la variazione dei tassi di interesse (e altri strumenti come le operazioni di mercato aperto) per condurre la politica monetaria.", difficulty:"facile"},
  {topic:"Politiche economiche", q:"L'obiettivo primario dichiarato della Banca Centrale Europea (BCE) è:", options:["Massimizzare l'occupazione a ogni costo, un fenomeno che dipende dal grado di apertura commerciale dell'economia","Mantenere la stabilità dei prezzi nell'area euro","Finanziare direttamente i governi, una relazione che i modelli macroeconomici più recenti tendono a ridimensionare","Fissare i salari minimi europei, un effetto rilevante soprattutto in un contesto di cambi fissi tra valute"], correct:1, explain:"Il mandato principale della BCE, sancito dai Trattati, è il mantenimento della stabilità dei prezzi nell'Eurozona.", difficulty:"media"},
  {topic:"Concetti fondamentali", q:"Il costo opportunità di una scelta è:", options:["Il costo monetario diretto sostenuto, una dinamica osservata principalmente nel breve periodo, non nel lungo periodo","Il valore della migliore alternativa a cui si rinuncia effettuando quella scelta","Il costo monetario diretto sostenuto per l'acquisto di un bene","La somma di tutti i costi fissi sostenuti dall'impresa"], correct:1, explain:"Il costo opportunità rappresenta ciò a cui si rinuncia scegliendo un'alternativa rispetto alla migliore opzione disponibile non scelta.", difficulty:"media"},
  {topic:"Concetti fondamentali", q:"I rendimenti di scala crescenti si verificano quando:", options:["Un aumento proporzionale di tutti gli input genera un aumento più che proporzionale dell'output","L'output rimane costante all'aumentare degli input, un effetto che si manifesta in presenza di rigidità nei prezzi e nei salari","Un raddoppio di tutti gli input produce un output meno che doppio","Non esiste alcuna relazione tra input e output, un fenomeno che dipende dal grado di apertura commerciale dell'economia"], correct:0, explain:"Si parla di rendimenti di scala crescenti quando raddoppiando tutti gli input, l'output aumenta più che proporzionalmente.", difficulty:"difficile"},
  {topic:"Benessere e mercato", q:"Il surplus del consumatore è dato da:", options:["Il prezzo pagato per il bene, una relazione che i modelli macroeconomici più recenti tendono a ridimensionare","La differenza tra la disponibilità a pagare del consumatore e il prezzo effettivamente pagato","Il costo di produzione del bene, un effetto rilevante soprattutto in un contesto di cambi fissi tra valute","Il totale delle tasse pagate, una dinamica osservata principalmente nel breve periodo, non nel lungo periodo"], correct:1, explain:"Il surplus del consumatore misura il beneficio netto ottenuto dal consumatore rispetto a quanto sarebbe stato disposto a pagare.", difficulty:"difficile"},
  {topic:"Benessere e mercato", q:"Il surplus del produttore è dato da:", options:["Il costo totale di produzione, un fenomeno legato al ciclo economico più che alla crescita di lungo periodo","La differenza tra il prezzo di vendita ricevuto e il prezzo minimo a cui il produttore sarebbe stato disposto a vendere","Il fatturato lordo dell'impresa, una relazione che si osserva prevalentemente nei modelli di equilibrio parziale","Le tasse pagate dal produttore, un effetto che si manifesta in presenza di rigidità nei prezzi e nei salari"], correct:1, explain:"Il surplus del produttore rappresenta il guadagno netto del venditore rispetto al prezzo minimo accettabile per la vendita.", difficulty:"difficile"},
  {topic:"Fallimenti di mercato", q:"Un'esternalità negativa si verifica quando:", options:["Un'attività economica genera un beneficio per soggetti terzi non coinvolti, una dinamica legata alle aspettative razionali degli operatori di mercato","Un'attività economica impone un costo a soggetti terzi non coinvolti nella transazione (es. inquinamento)","Il mercato funziona in modo perfettamente efficiente, un fenomeno che dipende dal grado di apertura commerciale dell'economia","Non esistono effetti esterni all'attività economica, una relazione che i modelli macroeconomici più recenti tendono a ridimensionare"], correct:1, explain:"Le esternalità negative sono costi che ricadono su terzi estranei alla transazione economica che le genera, come nel caso dell'inquinamento.", difficulty:"difficile"},
  {topic:"Fallimenti di mercato", q:"I beni pubblici sono caratterizzati da:", options:["Escludibilità e rivalità nel consumo, un effetto rilevante soprattutto in un contesto di cambi fissi tra valute","Non escludibilità e non rivalità nel consumo","Un elevato grado di rivalità nel consumo tra gli utenti","Facile esclusione dei soggetti che non pagano un prezzo"], correct:1, explain:"I beni pubblici (es. difesa nazionale, illuminazione stradale) non possono escludere alcuno dal consumo e il consumo di uno non riduce la disponibilità per gli altri.", difficulty:"facile"},
  {topic:"Economia internazionale", q:"La bilancia dei pagamenti registra:", options:["Il livello del debito pubblico accumulato nel tempo","L'insieme delle transazioni economiche di un paese con il resto del mondo in un dato periodo","Il bilancio dello Stato, un effetto che si manifesta in presenza di rigidità nei prezzi e nei salari","Il debito pubblico interno, una dinamica legata alle aspettative razionali degli operatori di mercato"], correct:1, explain:"La bilancia dei pagamenti riepiloga tutte le transazioni economiche (beni, servizi, capitali) tra residenti e non residenti.", difficulty:"facile"},
  {topic:"Economia internazionale", q:"Il tasso di cambio è definito come:", options:["Il tasso di interesse pagato sui titoli di Stato, un fenomeno che dipende dal grado di apertura commerciale dell'economia","Il prezzo di una valuta espresso in termini di un'altra valuta","Il livello generale dei prezzi interni, una relazione che i modelli macroeconomici più recenti tendono a ridimensionare","Il tasso di crescita del PIL, un effetto rilevante soprattutto in un contesto di cambi fissi tra valute"], correct:1, explain:"Il tasso di cambio indica quante unità di una valuta sono necessarie per acquistarne un'unità di un'altra.", difficulty:"media"},
  {topic:"Finanza pubblica", q:"Il debito pubblico rappresenta:", options:["Il disavanzo di un singolo anno, una dinamica osservata principalmente nel breve periodo, non nel lungo periodo","L'ammontare complessivo dei prestiti contratti nel tempo dallo Stato e non ancora rimborsati","Le tasse pagate in un anno, un fenomeno legato al ciclo economico più che alla crescita di lungo periodo","Il patrimonio netto dello Stato, una relazione che si osserva prevalentemente nei modelli di equilibrio parziale"], correct:1, explain:"Il debito pubblico è lo stock cumulato di tutti i disavanzi (deficit) pubblici accumulati nel tempo, al netto dei rimborsi.", difficulty:"media"},
  {topic:"Finanza pubblica", q:"Il disavanzo (deficit) pubblico di un anno è dato da:", options:["Il totale del debito pubblico accumulato, un effetto che si manifesta in presenza di rigidità nei prezzi e nei salari","La differenza negativa tra entrate e uscite pubbliche in quell'anno","Il PIL nominale dell'anno, una dinamica legata alle aspettative razionali degli operatori di mercato","Le esportazioni nette, un fenomeno che dipende dal grado di apertura commerciale dell'economia"], correct:1, explain:"Il deficit pubblico annuale è la differenza tra le uscite e le entrate dello Stato in un singolo esercizio finanziario, quando le uscite superano le entrate.", difficulty:"media"},
  {topic:"Macroeconomia", q:"La domanda aggregata di un'economia è tipicamente composta da:", options:["Dai consumi delle famiglie e dal risparmio privato","Consumi, investimenti, spesa pubblica ed esportazioni nette","Dalle esportazioni e dalle riserve valutarie","Dagli investimenti delle imprese e dagli ammortamenti"], correct:1, explain:"La domanda aggregata (Y = C + I + G + NX) somma consumi, investimenti, spesa pubblica ed esportazioni nette.", difficulty:"media"},
  {topic:"Macroeconomia", q:"La moneta svolge principalmente le funzioni di:", options:["Mezzo di scambio e strumento di politica fiscale","Mezzo di scambio, unità di conto e riserva di valore","Strumento di investimento e garanzia bancaria","Strumento di tassazione e regolazione doganale"], correct:1, explain:"La moneta assolve a tre funzioni fondamentali: facilitare gli scambi, fungere da unità di misura dei valori, e conservare valore nel tempo.", difficulty:"facile"},
  {topic:"Macroeconomia", q:"Il tasso di interesse reale è calcolato come:", options:["Tasso nominale più tasso di inflazione","Tasso nominale meno tasso di inflazione","Tasso di inflazione diviso il PIL","Tasso nominale moltiplicato per l'inflazione"], correct:1, explain:"Il tasso di interesse reale approssima la differenza tra il tasso nominale e il tasso di inflazione, misurando il rendimento in termini di potere d'acquisto.", difficulty:"media"},
  {topic:"Macroeconomia", q:"La curva di Phillips descrive, nel breve periodo, la relazione tra:", options:["PIL e popolazione","Inflazione e disoccupazione","Tassi di cambio e esportazioni","Debito pubblico e tasso di interesse"], correct:1, explain:"La curva di Phillips ipotizza, nel breve periodo, una relazione inversa tra tasso di inflazione e tasso di disoccupazione.", difficulty:"facile"},
  {topic:"Macroeconomia", q:"Il moltiplicatore keynesiano descrive:", options:["L'effetto amplificato di una variazione della spesa autonoma sul reddito nazionale complessivo","La relazione tra tasso di cambio ed esportazioni, una relazione che i modelli macroeconomici più recenti tendono a ridimensionare","Il rapporto tra debito pubblico e PIL, un effetto rilevante soprattutto in un contesto di cambi fissi tra valute","La quota di risparmio delle famiglie, una dinamica osservata principalmente nel breve periodo, non nel lungo periodo"], correct:0, explain:"Secondo la teoria keynesiana, una variazione della spesa autonoma (es. investimenti pubblici) genera un effetto moltiplicato sul reddito nazionale, superiore alla spesa iniziale.", difficulty:"difficile"},
  {topic:"Microeconomia", q:"Un bene si definisce normale quando, all'aumentare del reddito, la quantità domandata:", options:["Diminuisce in ogni circostanza","Aumenta","Diventa negativa","Resta identica indipendentemente dal livello di reddito raggiunto"], correct:1, explain:"Per i beni normali la domanda cresce al crescere del reddito del consumatore, a differenza dei beni inferiori.", difficulty:"facile"},
  {topic:"Macroeconomia", q:"Una politica monetaria espansiva, tipicamente attuata riducendo i tassi di interesse, mira a:", options:["Eliminare strutturalmente la disoccupazione frizionale","Ridurre immediatamente e in modo diretto il debito pubblico","Stimolare consumi e investimenti sostenendo la domanda aggregata","Aumentare automaticamente le esportazioni nette a zero costo"], correct:2, explain:"Riducendo i tassi di interesse si abbassa il costo del credito, incentivando consumi e investimenti e sostenendo così la domanda aggregata.", difficulty:"media"},
  {topic:"Microeconomia", q:"In un mercato di concorrenza perfetta, ciascuna impresa è:", options:["Price maker, in grado di fissare liberamente il prezzo di vendita, un fenomeno legato al ciclo economico più che alla crescita di lungo periodo","Price taker, cioè accetta il prezzo di mercato senza poterlo influenzare individualmente","Protetta da barriere all'entrata insormontabili, una relazione che si osserva prevalentemente nei modelli di equilibrio parziale","L'unica offerente presente sul mercato di riferimento, un effetto che si manifesta in presenza di rigidità nei prezzi e nei salari"], correct:1, explain:"In concorrenza perfetta, data la numerosità di imprese e l'omogeneità del prodotto, ciascuna impresa prende il prezzo come dato (price taker).", difficulty:"media"},
  {topic:"Macroeconomia", q:"L'inflazione da domanda si manifesta principalmente quando:", options:["I costi delle materie prime diminuiscono stabilmente nel tempo, una dinamica legata alle aspettative razionali degli operatori di mercato","La domanda aggregata cresce più rapidamente della capacità produttiva del sistema economico","Il tasso di cambio si apprezza in modo permanente, un fenomeno che dipende dal grado di apertura commerciale dell'economia","La disoccupazione raggiunge il suo livello naturale, una relazione che i modelli macroeconomici più recenti tendono a ridimensionare"], correct:1, explain:"Quando la domanda aggregata supera la capacità dell'offerta di adeguarsi, si generano pressioni al rialzo sui prezzi (inflazione da domanda).", difficulty:"media"},
  {topic:"Commercio internazionale", q:"Secondo il principio del vantaggio comparato, un paese conviene specializzarsi nella produzione del bene per cui presenta:", options:["Il costo opportunità relativamente più basso rispetto agli altri beni","Il prezzo di vendita interno più elevato","Il costo assoluto più basso in termini monetari rispetto agli altri paesi","La maggiore disponibilità di manodopera in assoluto"], correct:0, explain:"Il vantaggio comparato riguarda il costo opportunità relativo: conviene specializzarsi dove tale costo è minore, anche senza un vantaggio assoluto.", difficulty:"difficile"},
  {topic:"Macroeconomia", q:"La curva di Phillips, nella sua formulazione originaria, ipotizza una relazione tra:", options:["Tasso di disoccupazione e tasso di inflazione (o crescita salariale)","Produttività del lavoro e ore di straordinario, un effetto rilevante soprattutto in un contesto di cambi fissi tra valute","Tasso di cambio e bilancia commerciale, una dinamica osservata principalmente nel breve periodo, non nel lungo periodo","Tasso di interesse reale e debito pubblico, un fenomeno legato al ciclo economico più che alla crescita di lungo periodo"], correct:0, explain:"La curva di Phillips originaria ipotizza una relazione inversa tra disoccupazione e inflazione (o dinamica salariale) nel breve periodo.", difficulty:"difficile"},
  {topic:"Microeconomia", q:"L'elasticità della domanda al prezzo è definita come:", options:["Il prodotto tra prezzo e quantità venduta, una relazione che si osserva prevalentemente nei modelli di equilibrio parziale","La differenza assoluta tra prezzo e quantità domandata, un effetto che si manifesta in presenza di rigidità nei prezzi e nei salari","Il rapporto tra variazione percentuale della quantità domandata e variazione percentuale del prezzo","Il rapporto tra reddito e prezzo di mercato, una dinamica legata alle aspettative razionali degli operatori di mercato"], correct:2, explain:"L'elasticità al prezzo misura la sensibilità della quantità domandata al variare percentuale del prezzo del bene.", difficulty:"difficile"},
  {topic:"Macroeconomia", q:"Un deficit di bilancia commerciale si verifica quando:", options:["Il tasso di cambio è fisso rispetto alle altre valute","Il tasso di cambio è fisso rispetto alle altre valute, una relazione che i modelli macroeconomici più recenti tendono a ridimensionare","Il valore delle importazioni supera quello delle esportazioni in un dato periodo","Il PIL cresce più velocemente dell'inflazione, un effetto rilevante soprattutto in un contesto di cambi fissi tra valute"], correct:2, explain:"Il deficit commerciale si registra quando il valore dei beni e servizi importati eccede quello dei beni e servizi esportati.", difficulty:"difficile"},
  {topic:"Concetti generali", q:"L'economia politica studia principalmente:", options:["Le norme giuridiche che regolano il commercio tra imprese, una dinamica osservata principalmente nel breve periodo, non nel lungo periodo","La contabilità interna e i bilanci delle singole imprese, un fenomeno legato al ciclo economico più che alla crescita di lungo periodo","Il modo in cui gli individui e la società allocano risorse scarse per soddisfare bisogni illimitati","Il funzionamento delle istituzioni politiche e amministrative di uno Stato, una relazione che si osserva prevalentemente nei modelli di equilibrio parziale"], correct:2, explain:"L'economia politica studia come individui e società allocano risorse scarse tra usi alternativi per soddisfare bisogni potenzialmente illimitati.", difficulty:"facile"},
  {topic:"Microeconomia", q:"La curva di domanda ha tipicamente un andamento:", options:["Crescente rispetto al prezzo in ogni circostanza","Decrescente rispetto al prezzo, per la legge della domanda","Costante indipendentemente dal prezzo di mercato","Perfettamente orizzontale indipendentemente dal bene"], correct:1, explain:"La curva di domanda è generalmente decrescente: al crescere del prezzo la quantità domandata tende a ridursi, coerentemente con la legge della domanda.", difficulty:"facile"},
  {topic:"Microeconomia", q:"Il costo opportunità di una scelta economica è:", options:["Il valore della migliore alternativa a cui si rinuncia effettuando quella scelta","Il costo monetario diretto sostenuto per l'acquisto di un bene, un effetto che si manifesta in presenza di rigidità nei prezzi e nei salari","La somma di tutti i costi fissi sostenuti dall'impresa, una dinamica legata alle aspettative razionali degli operatori di mercato","Il prezzo di mercato corrente del bene scelto, un fenomeno che dipende dal grado di apertura commerciale dell'economia"], correct:0, explain:"Il costo opportunità rappresenta ciò a cui si rinuncia scegliendo un'alternativa rispetto alla migliore tra quelle scartate.", difficulty:"facile"},
  {topic:"Macroeconomia", q:"Il tasso di disoccupazione è calcolato come:", options:["Differenza tra popolazione attiva e popolazione occupata in valore assoluto","Rapporto tra persone in cerca di occupazione e forze di lavoro totali","Rapporto tra occupati e popolazione totale del paese","Rapporto tra PIL e numero di occupati"], correct:1, explain:"Il tasso di disoccupazione è il rapporto percentuale tra il numero di persone in cerca di occupazione e il totale delle forze di lavoro (occupati più disoccupati).", difficulty:"facile"},
  {topic:"Microeconomia", q:"Un monopolio si configura quando in un mercato:", options:["Sono presenti moltissime piccole imprese che vendono un prodotto omogeneo","Un'unica impresa è l'unica offerente del bene, senza sostituti stretti disponibili","Poche imprese di grandi dimensioni si dividono l'intero mercato","Tutte le imprese vendono lo stesso bene a un prezzo fissato dallo Stato"], correct:1, explain:"Nel monopolio un'unica impresa detiene l'intera offerta del bene, in assenza di validi sostituti, potendo influenzare il prezzo di mercato.", difficulty:"facile"},
  {topic:"Macroeconomia", q:"La politica fiscale espansiva viene attuata tipicamente attraverso:", options:["Una riduzione della base monetaria in circolazione","Un aumento dei tassi di interesse fissati dalla banca centrale","Un aumento della spesa pubblica e/o una riduzione delle imposte","L'imposizione di dazi doganali sulle importazioni"], correct:2, explain:"La politica fiscale espansiva mira a stimolare la domanda aggregata aumentando la spesa pubblica e/o riducendo il carico fiscale su famiglie e imprese.", difficulty:"media"},
  {topic:"Microeconomia", q:"L'equilibrio di mercato in concorrenza si realizza nel punto in cui:", options:["L'offerta supera costantemente la domanda a ogni livello di prezzo","Il prezzo raggiunge il suo valore minimo storico","La quantità domandata eguaglia la quantità offerta al prezzo di equilibrio","Il prezzo è fissato indipendentemente da domanda e offerta"], correct:2, explain:"L'equilibrio di mercato si determina nel punto di incontro tra curva di domanda e curva di offerta, dove quantità domandata e offerta coincidono.", difficulty:"media"},
  {topic:"Macroeconomia", q:"Un aumento della base monetaria da parte della banca centrale, a parità di altre condizioni, tende a produrre nel breve periodo:", options:["Una riduzione strutturale del debito pubblico, una relazione che i modelli macroeconomici più recenti tendono a ridimensionare","Un aumento immediato e automatico dei tassi di interesse, un effetto rilevante soprattutto in un contesto di cambi fissi tra valute","Una contrazione della domanda aggregata, una dinamica osservata principalmente nel breve periodo, non nel lungo periodo","Una riduzione dei tassi di interesse e uno stimolo a consumi e investimenti"], correct:3, explain:"Un'espansione della base monetaria tende, nel breve periodo, a ridurre i tassi di interesse, incentivando consumi e investimenti attraverso il canale del credito.", difficulty:"media"},
  {topic:"Commercio internazionale", q:"Il tasso di cambio tra due valute esprime:", options:["Il livello generale dei prezzi di un'economia rispetto a un'altra in termini assoluti","La quantità di moneta emessa da una banca centrale in un anno","Il valore delle esportazioni nette rispetto al PIL","Il rapporto al quale una valuta può essere scambiata con un'altra sul mercato dei cambi"], correct:3, explain:"Il tasso di cambio indica il rapporto di conversione tra due valute, determinato dal mercato dei cambi (o fissato da accordi istituzionali nei regimi a cambio fisso).", difficulty:"media"},
  {topic:"Microeconomia", q:"Un bene inferiore è tale perché, all'aumentare del reddito del consumatore, la relativa domanda:", options:["Aumenta in proporzione più che doppia rispetto al reddito","Diventa negativa in valore assoluto","Resta invariata indipendentemente dal livello di reddito","Tende a diminuire"], correct:3, explain:"Per i beni inferiori la domanda si riduce all'aumentare del reddito, poiché i consumatori li sostituiscono con beni ritenuti qualitativamente superiori.", difficulty:"media"},
  {topic:"Macroeconomia", q:"Il debito pubblico di un paese rappresenta:", options:["La somma dei soli interessi pagati sui titoli di Stato in un anno, un fenomeno legato al ciclo economico più che alla crescita di lungo periodo","Il valore complessivo delle esportazioni nette annue, una relazione che si osserva prevalentemente nei modelli di equilibrio parziale","Il disavanzo di bilancio registrato in un singolo anno, un effetto che si manifesta in presenza di rigidità nei prezzi e nei salari","L'ammontare complessivo delle passività finanziarie accumulate dallo Stato nel tempo per finanziare i propri disavanzi"], correct:3, explain:"Il debito pubblico è lo stock complessivo di passività accumulate dallo Stato nel tempo, distinto dal disavanzo (deficit) che è il flusso annuale che lo alimenta.", difficulty:"media"},
  {topic:"Microeconomia", q:"In presenza di un'esternalità negativa di produzione, il costo sociale di un'attività risulta:", options:["Inferiore al costo privato sostenuto dall'impresa, una dinamica legata alle aspettative razionali degli operatori di mercato","Indipendente da qualunque effetto sui soggetti terzi","Indipendente da qualunque effetto sui soggetti terzi, una relazione che i modelli macroeconomici più recenti tendono a ridimensionare","Superiore al costo privato sostenuto dall'impresa che la produce"], correct:3, explain:"Con un'esternalità negativa (es. inquinamento), il costo sociale eccede il costo privato dell'impresa, perché include anche i danni imposti a soggetti terzi non compensati.", difficulty:"difficile"},
  {topic:"Macroeconomia", q:"La legge di Okun descrive empiricamente la relazione tra:", options:["Tasso di interesse nominale e tasso di interesse reale, un effetto rilevante soprattutto in un contesto di cambi fissi tra valute","Tasso di cambio e bilancia commerciale di un paese, una dinamica osservata principalmente nel breve periodo, non nel lungo periodo","Spesa pubblica e gettito fiscale complessivo, un fenomeno legato al ciclo economico più che alla crescita di lungo periodo","Variazioni del tasso di disoccupazione e variazioni della crescita del PIL"], correct:3, explain:"La legge di Okun individua una relazione empirica inversa tra variazioni della disoccupazione e variazioni della crescita del prodotto interno lordo.", difficulty:"difficile"},
