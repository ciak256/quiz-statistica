  {topic:"Tendenze centrali e variabilità (paniere2)", q:"La proprietà moltiplicativa degli indici di tendenza centrale:", options:["Permette cambiamenti di scala nell'indice","Riguarda solo l'addizione di una costante","Si applica esclusivamente alla mediana","Non ha alcuna applicazione pratica"], correct:0, explain:"La proprietà moltiplicativa riguarda l'effetto di un cambiamento di scala (moltiplicazione per una costante) sull'indice di posizione.", difficulty:"media"},
  {topic:"Tendenze centrali e variabilità (paniere2)", q:"La proprietà lineare degli indici di tendenza centrale:", options:["È diversa da quella moltiplicativa","Coincide esattamente con quella moltiplicativa","Si applica solo a trasformazioni non lineari","Riguarda esclusivamente la moda"], correct:0, explain:"La proprietà lineare (traslazione additiva) è concettualmente distinta da quella moltiplicativa (cambiamento di scala).", difficulty:"media"},
  {topic:"Tendenze centrali e variabilità (paniere2)", q:"La proprietà lineare degli indici di tendenza centrale è basata sulla:", options:["Relazione di linearità tra le variabili e i rispettivi indici di posizione","Relazione esclusivamente moltiplicativa tra i dati, una grandezza calcolata sulla base della distribuzione marginale della variabile","Sola presenza di valori negativi nella distribuzione, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Assenza totale di variabilità nei dati, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata"], correct:0, explain:"La proprietà lineare si fonda sulla relazione di linearità che lega la trasformazione dei dati alla trasformazione dell'indice di posizione.", difficulty:"difficile"},
  {topic:"Tendenze centrali e variabilità (paniere2)", q:"La proprietà di monotonicità degli indici di tendenza centrale è basata sulla:", options:["Comparazione tra le variabili e i rispettivi indici di posizione","Sola trasformazione moltiplicativa dei dati, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","Assenza di ordinamento tra i valori osservati, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Uguaglianza tra tutte le osservazioni, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe"], correct:0, explain:"La monotonicità riguarda la comparazione ordinata tra i valori delle variabili e i corrispondenti indici di posizione.", difficulty:"difficile"},
  {topic:"Tendenze centrali e variabilità (paniere2)", q:"Una variabilità alta, in luogo di una bassa, a parità di altre condizioni:", options:["Diminuisce le capacità previsive dei modelli statistici","Aumenta sempre la precisione delle previsioni","Non ha alcun effetto sulle capacità previsive dei modelli","Elimina automaticamente gli outlier dai dati"], correct:0, explain:"Una maggiore variabilità nei dati tende a ridurre la capacità previsiva dei modelli statistici, aumentando l'incertezza delle stime.", difficulty:"media"},
  {topic:"Tendenze centrali e variabilità (paniere2)", q:"La varianza si calcola:", options:["Per popolazioni e per campioni","Con riferimento alle sole popolazioni di dimensione finita","Con riferimento ai soli campioni di grandi dimensioni","Con riferimento alle sole variabili qualitative"], correct:0, explain:"La varianza può essere calcolata sia con riferimento all'intera popolazione sia a un campione estratto da essa.", difficulty:"facile"},
  {topic:"Tendenze centrali e variabilità (paniere2)", q:"La varianza del campione è:", options:["Calcolata con i dati del campione rappresentativo della popolazione","Sempre identica alla varianza della popolazione, un parametro stimato tramite il metodo dei momenti applicato al campione","Calcolabile solo se la popolazione è infinita, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Indipendente dalla dimensione del campione estratto, una grandezza calcolata sulla base della distribuzione marginale della variabile"], correct:0, explain:"La varianza campionaria si calcola sui dati effettivamente osservati nel campione estratto dalla popolazione.", difficulty:"media"},
  {topic:"Misure di variabilità (paniere2)", q:"Calcola il range delle osservazioni (2,3,4,2,5,4,6,7,7,2,12,0,0,0,0,1,29):", options:["29","28","12","30"], correct:0, explain:"Il range è la differenza tra valore massimo (29) e minimo (0) dell'insieme di dati, pari a 29.", difficulty:"media"},
  {topic:"Misure di variabilità (paniere2)", q:"Calcola il range parziale delle stesse osservazioni escludendo il valore anomalo 29:", options:["12","29","10","14"], correct:0, explain:"Escludendo il valore anomalo 29, il range parziale (tra 0 e 12) risulta pari a 12.", difficulty:"media"},
  {topic:"Misure di variabilità (paniere2)", q:"Calcola il range delle osservazioni (2,3,4,2,5,4,6,7,7,2,12,0,0,0,0,1,2):", options:["12","10","7","14"], correct:0, explain:"Il range è la differenza tra valore massimo (12) e minimo (0), pari a 12.", difficulty:"media"},
  {topic:"Misure di variabilità (paniere2)", q:"Calcola il range parziale delle osservazioni (2,3,4,2,5,4,6,7,7,2,21,0,0,0,0,1,29) escludendo i valori più estremi:", options:["7","29","21","12"], correct:0, explain:"Escludendo i valori più estremi (21 e 29), il range parziale calcolato sui restanti dati risulta pari a 7.", difficulty:"difficile"},
  {topic:"Misure di variabilità (paniere2)", q:"Lo scostamento semplice medio riguarda:", options:["Lo scostamento di ogni valore dalla media, preso in valore assoluto","La somma algebrica degli scarti dalla media, che è sempre nulla","Il rapporto tra deviazione standard e media","La differenza tra terzo e primo quartile"], correct:0, explain:"Lo scostamento semplice medio è la media dei valori assoluti degli scarti di ciascuna osservazione dalla media.", difficulty:"media"},
  {topic:"Misure di variabilità (paniere2)", q:"Lo scostamento quadratico medio riguarda:", options:["La media degli scarti al quadrato tra i dati e la media","La media degli scarti in valore assoluto dalla mediana","Il rapporto tra il valore massimo e quello minimo","La somma cumulata delle frequenze relative"], correct:0, explain:"Lo scostamento quadratico medio (varianza) è la media dei quadrati degli scarti di ciascun dato dalla media.", difficulty:"media"},
  {topic:"Misure di variabilità (paniere2)", q:"Una variabilità pari a 65, in luogo di 80, ottenuta eliminando i valori outlier:", options:["Può aumentare le capacità descrittive e previsive del modello statistico","Indica sempre un errore di calcolo nei dati, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Rende il modello statistico del tutto inutilizzabile, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","Non ha alcun effetto pratico sull'analisi, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte"], correct:0, explain:"Rimuovendo valori anomali che distorcono la variabilità, il modello può risultare più rappresentativo del fenomeno tipico osservato.", difficulty:"media"},
  {topic:"Misure di variabilità (paniere2)", q:"Una variabilità pari a 80, in luogo di 65, ottenuta eliminando i valori outlier:", options:["Indica che è stato commesso qualche errore nei calcoli o nel programma","Conferma la correttezza della procedura di calcolo adottata","È il risultato normale e atteso dell'eliminazione degli outlier","Non richiede alcuna verifica ulteriore"], correct:0, explain:"Se la rimozione di outlier fa aumentare (anziché diminuire) la variabilità, è probabile un errore nei calcoli o nella procedura seguita.", difficulty:"difficile"},
  {topic:"Misure di variabilità (paniere2)", q:"La varianza fornisce:", options:["La misura sintetica di quanto le unità differiscono dalla media aritmetica","Il valore centrale della distribuzione ordinata, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","La proporzione di osservazioni superiori alla mediana, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Il numero totale di modalità osservate, un parametro stimato tramite il metodo dei momenti applicato al campione"], correct:0, explain:"La varianza sintetizza in un unico valore quanto le osservazioni si discostano mediamente (al quadrato) dalla media aritmetica.", difficulty:"media"},
  {topic:"Misure di variabilità (paniere2)", q:"Usando la mediana in luogo della media nel calcolo della variabilità:", options:["È bene eliminare i valori anomali ed estremi","È necessario aumentare la dimensione del campione osservato","Il risultato coincide con la varianza calcolata classicamente","Non risulta possibile calcolare alcun indice di dispersione"], correct:0, explain:"Quando si utilizza la mediana come riferimento (più robusta), conviene comunque valutare l'eliminazione di valori anomali ed estremi per una lettura più corretta.", difficulty:"difficile"},
  {topic:"Numeri Indice (paniere2)", q:"La Statistica è sinonimo di:", options:["Scienze statistiche","Scienze economiche","Scienze sociali in senso stretto","Matematica applicata pura"], correct:0, explain:"Il termine 'Statistica' è generalmente inteso come sinonimo di 'Scienze statistiche'.", difficulty:"facile"},
  {topic:"Numeri Indice (paniere2)", q:"Il rapporto statistico di derivazione si ottiene:", options:["Dividendo la modalità di un fenomeno per quella di un altro che ne costituisce causa o presupposto logico","Dividendo la frequenza di una modalità per quella corrispondente di un'altra modalità, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Dividendo il valore rilevato per l'analogo valore dell'intera popolazione, una grandezza calcolata sulla base della distribuzione marginale della variabile","Rapportando la dimensione di un fenomeno a quella spaziale di riferimento, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi"], correct:0, explain:"Il rapporto di derivazione mette in relazione un fenomeno con un altro che, logicamente o temporalmente, ne costituisce causa o presupposto.", difficulty:"media"},
  {topic:"Numeri Indice (paniere2)", q:"Il rapporto statistico di coesistenza si ottiene:", options:["Mediante il rapporto tra la frequenza di una modalità rispetto a quella corrispondente di un'altra modalità","Dividendo il valore rilevato per l'analogo valore dell'intera popolazione, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","Rapportando la dimensione di un fenomeno a quella spaziale di riferimento, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","Dividendo una modalità per quella che ne costituisce causa logica, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate"], correct:0, explain:"Il rapporto di coesistenza confronta la frequenza di una modalità con quella corrispondente di un'altra modalità dello stesso fenomeno.", difficulty:"media"},
  {topic:"Numeri Indice (paniere2)", q:"Il rapporto statistico di composizione si ottiene:", options:["Dividendo il valore rilevato in una data circostanza per l'analogo valore dell'intera popolazione","Dividendo la modalità di un fenomeno per quella che ne costituisce causa, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Rapportando la dimensione globale di un fenomeno a quella spaziale, un parametro stimato tramite il metodo dei momenti applicato al campione","Confrontando la frequenza di due modalità dello stesso fenomeno, un indice che si ottiene dalla trasformazione logaritmica dei dati originari"], correct:0, explain:"Il rapporto di composizione esprime quanta parte di un fenomeno complessivo è rappresentata da una specifica componente.", difficulty:"media"},
  {topic:"Numeri Indice (paniere2)", q:"Il rapporto statistico di densità si ottiene:", options:["Mediante il rapporto tra la dimensione globale di un fenomeno e quella spaziale a cui esso si riferisce","Dividendo il valore rilevato per l'analogo valore dell'intera popolazione, una grandezza calcolata sulla base della distribuzione marginale della variabile","Confrontando due modalità coesistenti dello stesso fenomeno, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Dividendo una modalità per quella che ne costituisce causa logica, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata"], correct:0, explain:"Il rapporto di densità mette in relazione la dimensione di un fenomeno con l'estensione territoriale a cui si riferisce (es. abitanti/km²).", difficulty:"media"},
  {topic:"Numeri Indice (paniere2)", q:"I numeri indice sono:", options:["Rapporti statistici","Valori assoluti privi di possibilità di confronto","Indicatori di natura esclusivamente qualitativa","Definiti unicamente per serie storiche di cadenza mensile"], correct:0, explain:"I numeri indice sono particolari rapporti statistici, utilizzati per confrontare valori in tempi o contesti diversi.", difficulty:"facile"},
  {topic:"Numeri Indice (paniere2)", q:"Costruendo i numeri indice della serie storica del fatturato per due aziende, vogliamo in particolare:", options:["Capire quale delle due unità presenta un andamento migliore","Calcolare il fatturato assoluto delle due aziende, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","Determinare la forma giuridica delle due aziende, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Eliminare ogni forma di confronto tra le due serie, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe"], correct:0, explain:"I numeri indice permettono di confrontare l'andamento relativo di due serie, indipendentemente dai loro valori assoluti di partenza.", difficulty:"media"},
  {topic:"Numeri Indice (paniere2)", q:"L'anno con valore pari a 100 nella serie storica dei numeri indice è:", options:["L'anno base","L'ultimo anno della serie","L'anno con il valore osservato più elevato","L'anno con il valore osservato più basso"], correct:0, explain:"L'anno base è, per convenzione, l'anno di riferimento a cui viene attribuito il valore 100.", difficulty:"facile"},
  {topic:"Numeri Indice (paniere2)", q:"Il valore dell'anno con numero indice pari a 100 nella serie storica osservata è:", options:["Il denominatore nel calcolo del numero indice","Il numeratore in ogni calcolo successivo","Sempre il valore più alto osservato nella serie","Ininfluente ai fini del calcolo dei numeri indice successivi"], correct:0, explain:"Il valore dell'anno base è utilizzato come denominatore nella formula di calcolo di tutti i numeri indice della serie.", difficulty:"media"},
  {topic:"Tassi di incremento (paniere2)", q:"L'inflazione è:", options:["La diminuzione del potere di acquisto della moneta","L'aumento del potere di acquisto della moneta","La diminuzione generalizzata dei prezzi","Sinonimo di deflazione"], correct:0, explain:"L'inflazione comporta una diminuzione del potere d'acquisto della moneta, a fronte dell'aumento generale dei prezzi.", difficulty:"facile"},
  {topic:"Tassi di incremento (paniere2)", q:"L'inflazione è anche definita come:", options:["L'aumento prolungato del livello medio generale dei prezzi di beni e servizi in un dato periodo","La diminuzione prolungata del livello medio dei prezzi, un parametro stimato tramite il metodo dei momenti applicato al campione","Un fenomeno che riguarda esclusivamente i beni importati, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Un indicatore calcolato solo su base mensile, una grandezza calcolata sulla base della distribuzione marginale della variabile"], correct:0, explain:"L'inflazione è definita come l'aumento prolungato e generalizzato del livello dei prezzi in un dato periodo di tempo.", difficulty:"facile"},
  {topic:"Tassi di incremento (paniere2)", q:"La variazione congiunturale riguarda in statistica economica il confronto con:", options:["Il mese precedente","L'anno precedente","Il trimestre successivo","La media storica decennale"], correct:0, explain:"La variazione congiunturale confronta il dato attuale con quello del periodo immediatamente precedente (es. il mese precedente).", difficulty:"media"},
  {topic:"Tassi di incremento (paniere2)", q:"La variazione tendenziale riguarda in statistica economica il confronto con:", options:["L'anno precedente","Il mese precedente","La settimana precedente","Il trimestre corrente"], correct:0, explain:"La variazione tendenziale confronta il dato attuale con quello corrispondente dell'anno precedente, depurando l'effetto di stagionalità.", difficulty:"media"},
  {topic:"Tassi di incremento (paniere2)", q:"Nel calcolo del tasso di inflazione congiunturale, al denominatore c'è:", options:["Il numero indice dei prezzi del mese precedente","Il numero indice dei prezzi dello stesso mese dell'anno precedente","Il numero indice medio dell'intero anno","La popolazione media del periodo"], correct:0, explain:"Il tasso congiunturale confronta il mese corrente con il mese immediatamente precedente, posto al denominatore.", difficulty:"media"},
  {topic:"Tassi di incremento (paniere2)", q:"Nel calcolo del tasso di inflazione tendenziale, al denominatore c'è:", options:["Il numero indice dei prezzi dello stesso mese dell'anno precedente","Il numero indice del mese immediatamente precedente, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","La media dei prezzi dell'intero anno in corso, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","Il numero indice dell'anno base originario, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte"], correct:0, explain:"Il tasso tendenziale confronta il mese corrente con lo stesso mese dell'anno precedente, posto al denominatore.", difficulty:"media"},
  {topic:"Tassi di incremento (paniere2)", q:"La deflazione si calcola con:", options:["I tassi di variazione","Solo i valori assoluti dei prezzi","Esclusivamente il numero indice a base fissa","La sola media aritmetica dei prezzi"], correct:0, explain:"La deflazione, come l'inflazione, si esprime attraverso i tassi di variazione dei prezzi nel tempo.", difficulty:"media"},
  {topic:"Tassi di incremento (paniere2)", q:"La deflazione è:", options:["Espressa in percentuale","Sempre espressa in valore assoluto monetario","Calcolabile solo su base annuale","Indipendente dal livello dei prezzi"], correct:0, explain:"Come l'inflazione, anche la deflazione viene espressa in termini percentuali.", difficulty:"media"},
  {topic:"Tassi di incremento (paniere2)", q:"Il rapporto annuo tra tasso di inflazione e deflazione dell'anno x in un paese determinato:", options:["Non esiste, essendo fenomeni alternativi nello stesso periodo","È sempre calcolabile e pari a 1, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Coincide sempre con il tasso di cambio, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","È un indicatore standard OCSE, un parametro stimato tramite il metodo dei momenti applicato al campione"], correct:0, explain:"Inflazione e deflazione sono fenomeni alternativi: in un dato periodo si osserva l'uno o l'altro, non un loro rapporto significativo.", difficulty:"difficile"},
  {topic:"Tassi di incremento (paniere2)", q:"Nel calcolo dei tassi di incremento tra t e t-1, al denominatore vi è:", options:["Il dato dell'anno t-1","Il dato dell'anno t","La media dei due anni a confronto","Il dato dell'anno base originario"], correct:0, explain:"Il tasso di incremento tra due periodi si calcola ponendo al denominatore il valore del periodo precedente (t-1).", difficulty:"media"},
  {topic:"Correlazione e covarianza (paniere2)", q:"La covarianza è positiva quando:", options:["X e Y variano tendenzialmente nella stessa direzione","X e Y variano sempre in direzioni opposte, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","X e Y sono statisticamente indipendenti, una grandezza calcolata sulla base della distribuzione marginale della variabile","La varianza di X è nulla, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi"], correct:0, explain:"Una covarianza positiva indica che le due variabili tendono a crescere o decrescere insieme.", difficulty:"facile"},
  {topic:"Correlazione e covarianza (paniere2)", q:"La covarianza è negativa quando:", options:["Al crescere di X la Y tende a diminuire e viceversa","X e Y crescono sempre insieme, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","X e Y sono perfettamente indipendenti, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","La varianza di Y è nulla, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate"], correct:0, explain:"Una covarianza negativa indica una relazione inversa: al crescere di X, Y tende a diminuire.", difficulty:"facile"},
  {topic:"Correlazione e covarianza (paniere2)", q:"La covarianza è nulla quando:", options:["X e Y sono linearmente indipendenti","X e Y sono perfettamente correlate","X e Y crescono sempre insieme in modo proporzionale","La varianza di X è massima"], correct:0, explain:"Una covarianza nulla indica assenza di relazione lineare tra X e Y.", difficulty:"media"},
  {topic:"Correlazione e covarianza (paniere2)", q:"La covarianza è nulla quando anche:", options:["X e Y non sono correlate","X e Y sono perfettamente correlate in modo diretto","X e Y sono perfettamente correlate in modo inverso","La deviazione standard di X è massima"], correct:0, explain:"Una covarianza nulla si associa all'assenza di correlazione lineare tra le due variabili.", difficulty:"media"},
  {topic:"Correlazione e covarianza (paniere2)", q:"La correlazione indica:", options:["Il grado della relazione tra variabili, valutando quanto bene un'equazione la descrive","Solo la direzione della relazione, mai la sua intensità, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Esclusivamente relazioni di tipo causale dirette, un parametro stimato tramite il metodo dei momenti applicato al campione","Il valore medio di una singola variabile, un indice che si ottiene dalla trasformazione logaritmica dei dati originari"], correct:0, explain:"La correlazione misura il grado della relazione tra variabili e quanto bene un modello (lineare o meno) la descrive.", difficulty:"media"},
  {topic:"Correlazione e covarianza (paniere2)", q:"Con un coefficiente di correlazione pari a r=-0,8, i valori di una variabile:", options:["Crescono al decrescere dei valori dell'altra","Crescono al crescere dei valori dell'altra","Non hanno alcuna relazione con l'altra variabile","Sono identici a quelli dell'altra variabile"], correct:0, explain:"Un coefficiente negativo indica una relazione inversa: al decrescere di una variabile, l'altra tende a crescere.", difficulty:"media"},
  {topic:"Correlazione e covarianza (paniere2)", q:"Con un coefficiente di correlazione pari a r=-0,9, i valori di una variabile:", options:["Crescono al decrescere dei valori dell'altra, in modo marcato","Crescono al crescere dei valori dell'altra, una grandezza calcolata sulla base della distribuzione marginale della variabile","Sono del tutto indipendenti dall'altra variabile, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Restano costanti indipendentemente dall'altra, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata"], correct:0, explain:"Un valore vicino a -1 indica una relazione inversa molto forte tra le due variabili.", difficulty:"media"},
  {topic:"Correlazione e covarianza (paniere2)", q:"Con un coefficiente di correlazione pari a r=-0,5, i valori di una variabile:", options:["Tendono a crescere al decrescere dei valori dell'altra, ma in maniera blanda","Crescono in modo molto marcato al crescere dell'altra, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","Non presentano alcuna relazione con l'altra variabile, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Coincidono esattamente con quelli dell'altra, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe"], correct:0, explain:"Un valore di -0,5 indica una relazione inversa moderata, non particolarmente intensa.", difficulty:"media"},
  {topic:"Correlazione e covarianza (paniere2)", q:"Con un coefficiente di correlazione pari a r=+0,8, i valori di una variabile:", options:["Crescono al crescere dei valori dell'altra","Crescono al decrescere dei valori dell'altra","Non hanno alcuna relazione con l'altra variabile","Sono sempre identici tra loro"], correct:0, explain:"Un coefficiente positivo e prossimo a 1 indica una relazione diretta forte tra le due variabili.", difficulty:"media"},
  {topic:"Correlazione e covarianza (paniere2)", q:"Nella correlazione spuria, si rileva che:", options:["R varia tra -1 e 1 e può essere elevato, ma le variabili non sono legate da un rapporto serio di causalità","R è sempre pari a zero per definizione, un parametro stimato tramite il metodo dei momenti applicato al campione","Le variabili sono sempre legate da un nesso causale diretto, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Il coefficiente di correlazione non è calcolabile, una grandezza calcolata sulla base della distribuzione marginale della variabile"], correct:0, explain:"Nella correlazione spuria, un valore anche elevato di r non implica un reale legame causale tra le variabili.", difficulty:"media"},
  {topic:"Correlazione illusoria e spuria (paniere2)", q:"Ad un valore elevato di r corrisponde:", options:["In diversi casi un effettivo legame tra i due caratteri quantitativi considerati","Sempre e comunque una relazione priva di senso, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","L'assenza di qualunque relazione tra i caratteri, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","Un valore di covarianza necessariamente nullo, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte"], correct:0, explain:"Un valore elevato di r suggerisce spesso, ma non sempre, un effettivo legame tra le variabili considerate.", difficulty:"media"},
  {topic:"Correlazione illusoria e spuria (paniere2)", q:"Ad un valore basso di r corrisponde:", options:["In diversi casi un legame debole tra i due caratteri quantitativi considerati","Sempre un legame fortissimo tra le variabili, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","L'impossibilità di calcolare la covarianza, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Un errore sistematico nei dati raccolti, un parametro stimato tramite il metodo dei momenti applicato al campione"], correct:0, explain:"Un valore basso di r suggerisce, in molti casi, un legame debole (lineare) tra i caratteri considerati.", difficulty:"media"},
  {topic:"Correlazione illusoria e spuria (paniere2)", q:"Un tipico caso di correlazione non reale comporta che:", options:["Uno dei due caratteri comprende l'altro","I due caratteri siano perfettamente indipendenti tra loro","La covarianza sia sempre negativa","Il coefficiente di correlazione sia sempre nullo"], correct:0, explain:"Un tipico caso di correlazione spuria si verifica quando uno dei due caratteri include (comprende) concettualmente l'altro.", difficulty:"difficile"},
  {topic:"Correlazione illusoria e spuria (paniere2)", q:"Un altro tipico caso di correlazione non reale comporta che:", options:["I due caratteri siano influenzati da circostanze comuni","I due caratteri siano perfettamente indipendenti","La covarianza sia sempre pari a zero","Non esista alcun fattore esterno rilevante"], correct:0, explain:"La correlazione spuria si verifica anche quando entrambi i caratteri sono influenzati da fattori esterni comuni, senza legame diretto tra loro.", difficulty:"media"},
  {topic:"Correlazione illusoria e spuria (paniere2)", q:"Un altro caso di correlazione non reale comporta che:", options:["Altri fattori variabili influiscano su quelli presi in considerazione","Nessun fattore esterno influisca sui due caratteri, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","I due caratteri siano perfettamente indipendenti tra loro, una grandezza calcolata sulla base della distribuzione marginale della variabile","Il coefficiente di correlazione sia sempre pari a 1, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi"], correct:0, explain:"Fattori variabili esterni, diversi da quelli osservati, possono generare una correlazione apparente ma non reale tra i due caratteri.", difficulty:"media"},
  {topic:"Correlazione illusoria e spuria (paniere2)", q:"R deve esprimere correttamente:", options:["Il legame di interdipendenza tra le variabili","Sempre e solo un legame di causa-effetto diretto","L'assenza totale di relazione tra le variabili","Il valore medio delle due variabili"], correct:0, explain:"Il coefficiente di correlazione r deve esprimere correttamente il grado di interdipendenza (non necessariamente causale) tra le variabili.", difficulty:"media"},
  {topic:"Correlazione illusoria e spuria (paniere2)", q:"Dividendo il numero delle nascite in una comunità in un periodo per la popolazione media dello stesso periodo si ottiene:", options:["Il coefficiente di natalità","Il coefficiente di mortalità","Il coefficiente di correlazione","Il coefficiente di variazione"], correct:0, explain:"Il rapporto tra nascite e popolazione media del periodo è definito coefficiente (o tasso) di natalità.", difficulty:"media"},
  {topic:"Correlazione illusoria e spuria (paniere2)", q:"Dividendo il numero delle morti in una comunità in un periodo per la popolazione media dello stesso periodo si ottiene:", options:["Il coefficiente di mortalità","Il coefficiente di natalità","Il coefficiente di variazione","Il coefficiente di correlazione"], correct:0, explain:"Il rapporto tra decessi e popolazione media del periodo è definito coefficiente (o tasso) di mortalità.", difficulty:"media"},
  {topic:"Correlazione illusoria e spuria (paniere2)", q:"Rapportando morti e nascite rispettivamente alla popolazione media dello stesso periodo, si può ottenere:", options:["Correlazione spuria se l'andamento della popolazione non è correlato col numero di nati e morti","Sempre una relazione causale diretta tra i due tassi, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","Un valore di r necessariamente pari a zero, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","Un indice privo di significato statistico, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate"], correct:0, explain:"Confrontando tassi di natalità e mortalità calcolati sulla stessa base di popolazione, si può generare una correlazione spuria se la popolazione stessa varia indipendentemente dai due fenomeni.", difficulty:"difficile"},
  {topic:"Esercitazione Numeri Indice (paniere2)", q:"I numeri indice comparano:", options:["Le variazioni dei livelli della variabile nel tempo con riferimento ad una base","Solo i valori assoluti osservati in un singolo periodo, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Esclusivamente due periodi consecutivi, senza base di riferimento, un parametro stimato tramite il metodo dei momenti applicato al campione","Il numero di modalità osservate in una distribuzione, un indice che si ottiene dalla trasformazione logaritmica dei dati originari"], correct:0, explain:"I numeri indice confrontano i livelli di una variabile in periodi diversi rispetto a un periodo di riferimento (base).", difficulty:"facile"},
  {topic:"Esercitazione Numeri Indice (paniere2)", q:"I numeri indice sono inferiori a 100 se:", options:["Il livello della variabile tende a scendere rispetto all'anno base","Il livello della variabile tende a crescere rispetto all'anno base","Il livello coincide esattamente con l'anno base","La serie storica è priva di variazioni"], correct:0, explain:"Un numero indice inferiore a 100 segnala un livello della variabile inferiore rispetto al periodo base.", difficulty:"facile"},
  {topic:"Esercitazione Numeri Indice (paniere2)", q:"I numeri indice sono superiori a 100 se:", options:["Il livello della variabile tende a crescere rispetto all'anno base","Il livello della variabile tende a scendere rispetto all'anno base","La serie storica ha un'unica osservazione","Il periodo base non è stato definito"], correct:0, explain:"Un numero indice superiore a 100 segnala un livello della variabile superiore rispetto al periodo base.", difficulty:"facile"},
  {topic:"Esercitazione Numeri Indice (paniere2)", q:"La formula per calcolare il numero indice tra l'anno t e t-1 in Excel è preceduta da:", options:["Il segno uguale","Il simbolo di percentuale","Le doppie virgolette","Il simbolo del cancelletto"], correct:0, explain:"In Excel, ogni formula di calcolo (incluso il numero indice) deve essere preceduta dal segno uguale (=).", difficulty:"facile"},
  {topic:"Esercitazione Numeri Indice (paniere2)", q:"Se il tasso di incremento tra t e t-1 è pari a 1,2%, il numero indice in t con base t-1 sarà:", options:["101,2","1,2","100,0","112,0"], correct:0, explain:"Un tasso di incremento dell'1,2% corrisponde a un numero indice pari a 100+1,2=101,2.", difficulty:"media"},
  {topic:"Esercitazione Numeri Indice (paniere2)", q:"Se il tasso di incremento tra t e t-1 è pari a 2,2%, il numero indice in t con base t-1 sarà:", options:["102,2","100,0","122,0","2,2"], correct:0, explain:"Un tasso di incremento del 2,2% corrisponde a un numero indice pari a 100+2,2=102,2.", difficulty:"media"},
  {topic:"Esercitazione Numeri Indice (paniere2)", q:"Se il tasso di incremento tra t e t-2 è pari a 1,2%, il numero indice in t con base t-2 sarà:", options:["101,2","112,0","110,2","100,0"], correct:0, explain:"Analogamente al caso precedente, un incremento dell'1,2% corrisponde a un numero indice pari a 101,2.", difficulty:"media"},
  {topic:"Esercitazione Numeri Indice (paniere2)", q:"Se il tasso di decremento tra t e t-1 è pari a -1,2%, il numero indice in t con base t-1 sarà:", options:["98,8","101,2","88,0","99,0"], correct:0, explain:"Un decremento dell'1,2% corrisponde a un numero indice pari a 100-1,2=98,8.", difficulty:"media"},
  {topic:"Esercitazione Numeri Indice (paniere2)", q:"Se il tasso di decremento tra t e t-2 è pari a -5,2%, il numero indice in t con base t-2 sarà:", options:["94,8","95,2","98,8","90,0"], correct:0, explain:"Un decremento del 5,2% corrisponde a un numero indice pari a 100-5,2=94,8.", difficulty:"media"},
  {topic:"La regressione lineare (paniere2)", q:"Per rappresentare graficamente la forma della relazione tra due variabili X e Y si utilizza:", options:["Il diagramma a dispersione","L'istogramma di frequenza","Il diagramma circolare","Il box plot"], correct:0, explain:"Il diagramma a dispersione (scatter plot) rappresenta graficamente la relazione tra due variabili quantitative.", difficulty:"facile"},
  {topic:"La regressione lineare (paniere2)", q:"Studiare la relazione tra due variabili X e Y significa:", options:["Studiare la tendenza che X e Y hanno a variare insieme","Calcolare esclusivamente la media di ciascuna variabile","Determinare la sola varianza di X, ignorando Y","Eliminare ogni forma di dipendenza tra le due variabili"], correct:0, explain:"Studiare la relazione tra due variabili significa analizzare come esse tendono a variare congiuntamente.", difficulty:"media"},
  {topic:"La regressione lineare (paniere2)", q:"Il coefficiente di correlazione r di Pearson può essere usato per calcolare la correlazione:", options:["Tra variabili misurate su scale a intervalli o a rapporti equivalenti","Tra variabili qualitative sconnesse, prive di ordine","Tra variabili misurate su scala nominale","Tra variabili dicotomiche con due soli valori possibili"], correct:0, explain:"Il coefficiente r di Pearson è applicabile a variabili quantitative misurate su scale a intervalli o rapporti.", difficulty:"media"},
  {topic:"La regressione lineare (paniere2)", q:"Quando a valori crescenti di X corrispondono valori crescenti di Y si ha:", options:["Una relazione positiva","Una relazione negativa","Nessuna relazione tra le variabili","Una relazione esclusivamente non lineare"], correct:0, explain:"Quando X e Y crescono insieme, si parla di relazione positiva (diretta) tra le due variabili.", difficulty:"facile"},
  {topic:"La regressione lineare (paniere2)", q:"Quando al diminuire dei valori di X corrisponde il diminuire dei valori di Y si ha:", options:["Una relazione positiva","Una relazione negativa","L'assenza di qualunque relazione","Una relazione di tipo esclusivamente quadratico"], correct:0, explain:"Se X e Y diminuiscono insieme, si tratta ancora di una relazione positiva (diretta), poiché variano nella stessa direzione.", difficulty:"media"},
  {topic:"La regressione lineare (paniere2)", q:"Date coppie di valori X e Y, l'equazione di regressione può essere considerata:", options:["Una formula di predizione di Y","Un indice di variabilità di X","Un sinonimo di coefficiente di correlazione","Una misura di asimmetria della distribuzione"], correct:0, explain:"L'equazione di regressione consente di prevedere il valore atteso di Y a partire da un dato valore di X.", difficulty:"media"},
  {topic:"La regressione lineare (paniere2)", q:"L'equazione di regressione lineare è l'equazione di una:", options:["Retta","Parabola","Circonferenza","Iperbole"], correct:0, explain:"L'equazione di regressione lineare rappresenta geometricamente una retta nel piano cartesiano.", difficulty:"facile"},
  {topic:"La regressione lineare (paniere2)", q:"Date coppie di valori X e Y, la retta di regressione è:", options:["Una, e ben definita, tra le infinite rette possibili nel diagramma a dispersione","Una qualsiasi tra le rette tracciabili, scelta arbitrariamente, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","Sempre parallela all'asse delle ascisse, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Priva di equazione matematica definita, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe"], correct:0, explain:"Tra le infinite rette tracciabili in un diagramma a dispersione, la retta di regressione ai minimi quadrati è unica e ben definita.", difficulty:"media"},
  {topic:"La regressione lineare (paniere2)", q:"Se X è la variabile indipendente e Y quella dipendente, è corretto definire X come:", options:["Predittore","Valore predetto","Residuo del modello","Devianza spiegata"], correct:0, explain:"La variabile indipendente X, usata per prevedere Y, è definita predittore.", difficulty:"media"},
  {topic:"La regressione lineare (paniere2)", q:"Se X è la variabile indipendente e Y quella dipendente, è corretto definire Y' (il valore stimato) come:", options:["Valore predetto","Predittore","Residuo del modello","Devianza totale"], correct:0, explain:"Il valore Y' stimato dal modello di regressione è definito valore predetto.", difficulty:"media"},
  {topic:"Serie storiche e medie mobili (paniere2)", q:"Una serie storica è costituita:", options:["Dai dati osservati a intervalli regolari di tempo","Da dati osservati in un unico istante temporale","Da dati privi di qualunque riferimento temporale","Esclusivamente da dati di natura qualitativa"], correct:0, explain:"Una serie storica raccoglie osservazioni di un fenomeno rilevate a intervalli regolari di tempo.", difficulty:"facile"},
  {topic:"Serie storiche e medie mobili (paniere2)", q:"Una serie storica è costituita anche:", options:["Dalle osservazioni di dati quantitativi nel tempo (mensili, giornaliere, annuali)","Solo da osservazioni qualitative sconnesse, un parametro stimato tramite il metodo dei momenti applicato al campione","Solo da dati rilevati in un singolo punto nel tempo, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Da dati privi di cadenza regolare, una grandezza calcolata sulla base della distribuzione marginale della variabile"], correct:0, explain:"Le serie storiche possono avere diverse cadenze temporali: mensile, giornaliera, annuale, ecc.", difficulty:"facile"},
  {topic:"Serie storiche e medie mobili (paniere2)", q:"La media mobile è:", options:["La somma ponderata dei valori della serie storica","Un sinonimo di numero indice a base fissa","Il valore massimo osservato nella serie storica","La differenza tra due valori consecutivi della serie"], correct:0, explain:"La media mobile è una somma ponderata (spesso semplice media) dei valori della serie calcolata su una finestra mobile.", difficulty:"media"},
  {topic:"Serie storiche e medie mobili (paniere2)", q:"La media mobile di ordine n consiste:", options:["In una serie di medie aritmetiche calcolate su n periodi contigui","Nella media aritmetica dell'intera serie storica, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Nella somma cumulata di tutti i valori della serie, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","Nel valore centrale della distribuzione dei dati, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte"], correct:0, explain:"La media mobile di ordine n calcola ripetutamente la media aritmetica su finestre di n periodi contigui, facendo scorrere la finestra lungo la serie.", difficulty:"media"},
  {topic:"Serie storiche e medie mobili (paniere2)", q:"Data la serie storica (3,5,3,4,6,7), quante medie mobili di ordine tre si possono calcolare:", options:["4","3","6","5"], correct:0, explain:"Con n=6 osservazioni e ordine 3, si possono calcolare n-ordine+1 = 6-3+1 = 4 medie mobili.", difficulty:"media"},
  {topic:"Serie storiche e medie mobili (paniere2)", q:"Data la serie storica (3,5,3,4,6,7), quante medie mobili di ordine cinque si possono calcolare:", options:["2","4","5","3"], correct:0, explain:"Con n=6 osservazioni e ordine 5, si possono calcolare n-ordine+1 = 6-5+1 = 2 medie mobili.", difficulty:"media"},
  {topic:"Serie storiche e medie mobili (paniere2)", q:"Data la serie storica (3,5,3,4,6,7,0), quante medie mobili di ordine tre si possono calcolare:", options:["5","4","7","6"], correct:0, explain:"Con n=7 osservazioni e ordine 3, si possono calcolare n-ordine+1 = 7-3+1 = 5 medie mobili.", difficulty:"media"},
  {topic:"Serie storiche e medie mobili (paniere2)", q:"Data la serie storica (3,5,3,4,6,7), la prima media mobile di ordine tre calcolabile in tempo reale è:", options:["11/3","12/3","10/3","13/3"], correct:0, explain:"La prima media mobile di ordine 3 si calcola sui primi tre valori (3+5+3)/3=11/3.", difficulty:"media"},
  {topic:"Serie storiche e medie mobili (paniere2)", q:"Data la serie storica (3,5,3,4,6,7), la prima media mobile di ordine cinque calcolabile in tempo reale è:", options:["21/5","20/5","22/5","19/5"], correct:0, explain:"La prima media mobile di ordine 5 si calcola sui primi cinque valori (3+5+3+4+6)/5=21/5.", difficulty:"media"},
  {topic:"Serie storiche e medie mobili (paniere2)", q:"Data la serie storica (2,2,3,5,3,4,6,7), quante medie mobili pesate di ordine tre si possono calcolare:", options:["6","8","5","7"], correct:0, explain:"Con n=8 osservazioni e ordine 3, si possono calcolare n-ordine+1 = 8-3+1 = 6 medie mobili.", difficulty:"media"},
  {topic:"Strutture dei dati (paniere2)", q:"I dati informatici sono utilizzabili per:", options:["Le analisi statistiche","La sola memorizzazione, indipendentemente da ogni analisi","Applicazioni riguardanti unicamente testi non numerici","La crittografia dei documenti riservati"], correct:0, explain:"I dati informatici, opportunamente strutturati, sono la base per condurre analisi statistiche.", difficulty:"facile"},
  {topic:"Strutture dei dati (paniere2)", q:"Una fotografia è un dato:", options:["Complesso","Elementare e semplice","Puramente testuale","Esclusivamente numerico intero"], correct:0, explain:"Una fotografia è considerata un dato complesso, non riducibile a un singolo valore elementare.", difficulty:"media"},
  {topic:"Strutture dei dati (paniere2)", q:"Il tipo di dato elementare 4.5 è:", options:["Reale","Intero","Booleano","Carattere alfanumerico"], correct:0, explain:"Un valore con parte decimale, come 4.5, è classificato come dato di tipo reale.", difficulty:"facile"},
  {topic:"Strutture dei dati (paniere2)", q:"Nella somma logica con operandi A=1 e B=1, il totale sarà:", options:["1","0","2","Indefinito"], correct:0, explain:"Nella somma logica (OR), se almeno uno degli operandi è 1, il risultato è 1: quindi con A=1 e B=1 il totale è 1.", difficulty:"media"},
  {topic:"Strutture dei dati (paniere2)", q:"Nella somma logica con operandi A=0 e B=0, il totale sarà:", options:["0","1","Indefinito","2"], correct:0, explain:"Nella somma logica (OR), se entrambi gli operandi sono 0, il risultato è 0.", difficulty:"media"},
  {topic:"Strutture dei dati (paniere2)", q:"Nel prodotto logico con operandi A=0 e B=1, il totale sarà:", options:["0","1","Indefinito","2"], correct:0, explain:"Nel prodotto logico (AND), il risultato è 1 solo se entrambi gli operandi sono 1; con A=0 il risultato è 0.", difficulty:"media"},
  {topic:"Strutture dei dati (paniere2)", q:"Nel prodotto logico con operandi A=VERO e B=FALSO, il totale sarà:", options:["F (Falso)","V (Vero)","Indefinito","Dipende dall'ordine degli operandi"], correct:0, explain:"Nel prodotto logico (AND), se anche un solo operando è falso, il risultato complessivo è falso.", difficulty:"media"},
  {topic:"Strutture dei dati (paniere2)", q:"Nel prodotto logico con operandi A=VERO e B=VERO, il totale sarà:", options:["V (Vero)","F (Falso)","Indefinito","Dipende dal contesto applicativo"], correct:0, explain:"Nel prodotto logico (AND), se entrambi gli operandi sono veri, il risultato è vero.", difficulty:"media"},
  {topic:"Strutture dei dati (paniere2)", q:"La negazione logica dell'operando A=0 è:", options:["1","0","Indefinita","Dipende dal valore di B"], correct:0, explain:"La negazione logica (NOT) di 0 è 1, e viceversa.", difficulty:"facile"},
  {topic:"Strutture dei dati (paniere2)", q:"Nella congiunzione tra insiemi si valuta:", options:["Quando i due eventi si realizzano entrambi","Quando almeno uno dei due eventi si realizza","Quando nessuno dei due eventi si realizza","La sola probabilità marginale di un evento"], correct:0, explain:"La congiunzione (intersezione) tra insiemi valuta il verificarsi simultaneo di entrambi gli eventi considerati.", difficulty:"media"},
  {topic:"La probabilità - Prima Parte (paniere2)", q:"La probabilità che si verifichi un evento può assumere valori:", options:["Tra 0 e 1","Tra -1 e 1","Tra 0 e 100 esclusivamente in percentuale","Senza alcun limite superiore definito"], correct:0, explain:"La probabilità di un evento è per definizione compresa tra 0 (impossibile) e 1 (certo).", difficulty:"facile"},
  {topic:"La probabilità - Prima Parte (paniere2)", q:"Due eventi sono indipendenti quando:", options:["Il verificarsi dell'uno non modifica la probabilità di verificarsi dell'altro","Il verificarsi dell'uno esclude sempre il verificarsi dell'altro","Sono per definizione sempre incompatibili tra loro","Presentano la stessa identica probabilità di verificarsi"], correct:0, explain:"Due eventi indipendenti sono tali che il verificarsi dell'uno non altera la probabilità dell'altro.", difficulty:"facile"},
  {topic:"La probabilità - Prima Parte (paniere2)", q:"La probabilità del verificarsi di due eventi che si escludono a vicenda è data dal:", options:["Somma delle probabilità del verificarsi di ciascuno dei due eventi","Prodotto delle probabilità dei due eventi, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Rapporto tra le probabilità dei due eventi, una grandezza calcolata sulla base della distribuzione marginale della variabile","Reciproco della somma delle probabilità, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi"], correct:0, explain:"Per eventi incompatibili (che si escludono a vicenda), la probabilità dell'unione è la somma delle probabilità individuali.", difficulty:"media"},
  {topic:"La probabilità - Prima Parte (paniere2)", q:"La somma delle probabilità di eventi che si escludono a vicenda ed esaustivi è:", options:["Uguale a 1","Uguale a 0","Sempre maggiore di 1","Dipendente dal numero di eventi considerati"], correct:0, explain:"Se gli eventi sono incompatibili ed esaustivi (coprono tutto lo spazio campionario), la somma delle loro probabilità è pari a 1.", difficulty:"media"},
  {topic:"La probabilità - Prima Parte (paniere2)", q:"Due eventi non sono indipendenti quando:", options:["Il verificarsi dell'uno modifica la probabilità del verificarsi dell'altro","Il verificarsi dell'uno non ha alcun effetto sull'altro, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","Sono sempre esaustivi rispetto allo spazio campionario, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","Hanno probabilità individuale nulla, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate"], correct:0, explain:"Due eventi sono dipendenti quando il verificarsi dell'uno altera la probabilità di verificarsi dell'altro.", difficulty:"facile"},
  {topic:"La probabilità - Prima Parte (paniere2)", q:"Nella teoria statistica, i termini popolazione e campione sono:", options:["Indicativi del fatto che il campione è un sottoinsieme della popolazione","Sinonimi perfettamente intercambiabili, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Concetti privi di relazione tra loro, un parametro stimato tramite il metodo dei momenti applicato al campione","Applicabili solo a popolazioni infinite, un indice che si ottiene dalla trasformazione logaritmica dei dati originari"], correct:0, explain:"Popolazione e campione sono concetti collegati: il campione è, per definizione, un sottoinsieme della popolazione.", difficulty:"facile"},
  {topic:"La probabilità - Prima Parte (paniere2)", q:"Se si effettua un'estrazione senza reimmissione, la probabilità di estrarre un altro elemento:", options:["Viene modificata","Resta sempre invariata","Diventa automaticamente nulla","Dipende solo dal colore degli elementi estratti"], correct:0, explain:"Nell'estrazione senza reimmissione, la composizione della popolazione residua cambia, modificando le probabilità successive.", difficulty:"media"},
  {topic:"La probabilità - Prima Parte (paniere2)", q:"Da un mazzo di 40 carte viene estratta una carta. La probabilità di ottenere un asso è:", options:["0,1","0,25","0,4","0,05"], correct:0, explain:"Con 4 assi su 40 carte, la probabilità è 4/40=0,1.", difficulty:"media"},
  {topic:"La probabilità - Prima Parte (paniere2)", q:"Da un mazzo di 40 carte viene estratta una carta. La probabilità di ottenere una carta di bastoni è:", options:["0,25","0,10","0,50","0,40"], correct:0, explain:"Con 10 carte di bastoni su 40, la probabilità è 10/40=0,25.", difficulty:"media"},
  {topic:"La probabilità - Prima Parte (paniere2)", q:"Da un mazzo di carte viene estratta una carta. La probabilità di ottenere una figura è:", options:["12/40","10/40","16/40","8/40"], correct:0, explain:"Con 12 figure (3 per ciascun seme × 4 semi) su 40 carte, la probabilità è 12/40.", difficulty:"media"},
  {topic:"La probabilità - Seconda Parte (paniere2)", q:"Da un mazzo di 40 carte viene estratta una carta. La probabilità di ottenere un fante o un re è:", options:["8/40","4/40","12/40","16/40"], correct:0, explain:"Ci sono 4 fanti e 4 re, per un totale di 8 carte favorevoli su 40: probabilità 8/40.", difficulty:"media"},
  {topic:"La probabilità - Seconda Parte (paniere2)", q:"Da un mazzo di 40 carte viene estratta una carta. La probabilità di ottenere una figura o una carta inferiore a 6 è:", options:["32/40","12/40","20/40","28/40"], correct:0, explain:"Sommando figure e carte inferiori a 6 (senza sovrapposizioni), si ottiene una probabilità pari a 32/40.", difficulty:"difficile"},
  {topic:"La probabilità - Seconda Parte (paniere2)", q:"Da un mazzo di 40 carte, in due estrazioni con reimmissione, la probabilità di un re alla prima e una carta di coppe alla seconda è:", options:["1/40","1/16","1/10","1/4"], correct:0, explain:"P(re)=4/40=1/10 e P(coppe)=10/40=1/4; moltiplicando (eventi indipendenti con reimmissione): 1/10×1/4=1/40.", difficulty:"difficile"},
  {topic:"La probabilità - Seconda Parte (paniere2)", q:"Da un mazzo di 40 carte, in due estrazioni con reimmissione, la probabilità di ottenere un re e un asso (in un ordine qualsiasi) è:", options:["2/100","1/100","4/100","1/40"], correct:0, explain:"Considerando le due sequenze possibili (re poi asso, o asso poi re), ciascuna con probabilità 1/10×1/10, si ottiene un totale di 2/100.", difficulty:"difficile"},
  {topic:"La probabilità - Seconda Parte (paniere2)", q:"Considerando come successo l'evento 'faccia con il numero sei' nel lancio di un dado, la probabilità di successo in un lancio è:", options:["1/6","1/2","5/6","1/3"], correct:0, explain:"Su un dado a 6 facce equiprobabili, la probabilità di ottenere il numero 6 è 1/6.", difficulty:"facile"},
  {topic:"La probabilità - Seconda Parte (paniere2)", q:"Considerando come successo l'evento 'faccia con il numero sei', la probabilità di insuccesso in un lancio è:", options:["5/6","1/6","1/2","2/3"], correct:0, explain:"La probabilità di insuccesso è il complemento della probabilità di successo: 1-1/6=5/6.", difficulty:"facile"},
  {topic:"La probabilità - Seconda Parte (paniere2)", q:"Dieci adolescenti hanno ottenuto i punteggi (2,7,9,2,1,7,5,4,6,2) in una prova di abilità. Estraendo a caso un punteggio, la probabilità di ottenere un numero pari e inferiore a 6 è:", options:["4/10","3/10","5/10","2/10"], correct:0, explain:"I punteggi pari e inferiori a 6 nella serie sono 2,2,4,2 (quattro casi su dieci): probabilità 4/10.", difficulty:"difficile"},
  {topic:"La probabilità - Seconda Parte (paniere2)", q:"Nella stessa serie di punteggi, estraendo a caso un punteggio, la probabilità di ottenere un numero pari o inferiore a 6 è:", options:["0,7","0,4","0,5","0,9"], correct:0, explain:"Contando i punteggi pari o inferiori a 6 nella serie (escludendo doppioni), si ottiene una probabilità pari a 0,7.", difficulty:"difficile"},
  {topic:"La probabilità - Seconda Parte (paniere2)", q:"Estraendo a caso due punteggi con reimmissione dalla stessa serie, la probabilità di ottenere almeno un 7 alla prima estrazione è:", options:["0,2","0,1","0,3","0,4"], correct:0, explain:"Il valore 7 compare 2 volte su 10 nella serie, quindi la probabilità alla prima estrazione è 2/10=0,2.", difficulty:"media"},
  {topic:"La probabilità - Seconda Parte (paniere2)", q:"Estraendo a caso due punteggi con reimmissione dalla stessa serie, la probabilità che la somma sia 9 è:", options:["14/100","10/100","20/100","5/100"], correct:0, explain:"Contando tutte le combinazioni di coppie di punteggi la cui somma è 9, si ottiene una probabilità pari a 14/100.", difficulty:"difficile"},
  {topic:"Esercitazione Proporzioni (paniere2)", q:"Il numero di cuori negli esseri viventi e il numero di battiti cardiaci al minuto possono entrambi essere definiti:", options:["Il numero di battiti solamente può essere definito variabile","Entrambi possono essere definiti variabili nello stesso modo","Nessuno dei due può essere definito variabile","Solo il numero di cuori può essere definito variabile"], correct:0, explain:"Il numero di cuori è tipicamente costante (una caratteristica fissa), mentre il numero di battiti varia da individuo a individuo, qualificandosi come vera variabile.", difficulty:"media"},
  {topic:"Esercitazione Proporzioni (paniere2)", q:"Data la distribuzione di 10 individui per nazionalità (Italiani 3, Francesi 4, Spagnoli 3), la caratteristica nazionalità è misurata su scala:", options:["Nominale","Ordinale","A intervalli","A rapporti"], correct:0, explain:"La nazionalità è un carattere qualitativo sconnesso, misurato su scala nominale, priva di ordine naturale.", difficulty:"facile"},
  {topic:"Esercitazione Proporzioni (paniere2)", q:"Le frequenze percentuali di una distribuzione si calcolano facendo:", options:["Il rapporto tra ciascuna frequenza e il totale, moltiplicato per 100","Il rapporto tra il totale e ciascuna frequenza, una grandezza calcolata sulla base della distribuzione marginale della variabile","La somma di tutte le frequenze assolute, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","La differenza tra frequenza massima e minima, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata"], correct:0, explain:"Le frequenze percentuali si ottengono dividendo ciascuna frequenza per il totale e moltiplicando per 100.", difficulty:"facile"},
  {topic:"Esercitazione Proporzioni (paniere2)", q:"Quando si calcolano le frequenze cumulate percentuali, l'ultimo valore che si ottiene, il più elevato, è:", options:["100","1","0","Dipende dal numero di classi"], correct:0, explain:"La frequenza cumulata percentuale relativa all'ultima modalità è sempre pari a 100.", difficulty:"facile"},
  {topic:"Esercitazione Proporzioni (paniere2)", q:"La mediana è:", options:["La categoria o il punteggio al di sopra e al di sotto del quale cade un ugual numero di casi","Il valore più frequente della distribuzione, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","La somma di tutti i valori divisa per la numerosità, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Il valore massimo osservato nella distribuzione, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe"], correct:0, explain:"La mediana divide la distribuzione ordinata in due parti uguali, lasciando lo stesso numero di casi sopra e sotto.", difficulty:"facile"},
  {topic:"Esercitazione Proporzioni (paniere2)", q:"La deviazione standard può assumere valori:", options:["Solo positivi","Sia positivi sia negativi","Solo compresi tra 0 e 1","Sempre uguali alla varianza"], correct:0, explain:"La deviazione standard, essendo una radice quadrata di una somma di quadrati, può assumere solo valori positivi (o nulli).", difficulty:"facile"},
  {topic:"Esercitazione Proporzioni (paniere2)", q:"La media:", options:["È sensibile ai valori estremi","Non risente in alcun modo dei valori estremi della distribuzione","Coincide concettualmente con la mediana","È applicabile ai soli caratteri qualitativi"], correct:0, explain:"La media aritmetica è sensibile ai valori estremi (outlier), che possono spostarla significativamente rispetto al valore tipico.", difficulty:"facile"},
  {topic:"Esercitazione Proporzioni (paniere2)", q:"Un test fornisce punteggi tra 0 e 120. Se la media calcolata su un campione risulta 142,9, il risultato è:", options:["Sicuramente sbagliato","Perfettamente plausibile","Indicativo di una distribuzione fortemente asimmetrica ma corretta","Normale se il campione è molto numeroso"], correct:0, explain:"Una media superiore al punteggio massimo possibile (120) indica necessariamente un errore di calcolo o di trascrizione.", difficulty:"media"},
  {topic:"Esercitazione Proporzioni (paniere2)", q:"Un test fornisce sicuramente punteggi tra 0 e 120. Se la mediana risulta 142,9, il punteggio massimo ottenibile è:", options:["120","142,9","0","Non determinabile"], correct:0, explain:"Il punteggio massimo ottenibile al test resta 120, come specificato nel testo, indipendentemente dal valore errato della mediana riportato.", difficulty:"media"},
  {topic:"Esercitazione Proporzioni (paniere2)", q:"In una distribuzione di frequenza si può ottenere:", options:["Più di una moda","Sempre e solo un'unica moda","Nessuna moda in alcun caso","Una moda negativa"], correct:0, explain:"Una distribuzione può presentare più mode (bimodale, plurimodale) se più valori condividono la massima frequenza.", difficulty:"facile"},
  {topic:"Esercitazione Regressione lineare (paniere2)", q:"Nella retta di regressione Y'=aY+bYX, il termine aY rappresenta:", options:["La distanza tra l'origine degli assi e il punto in cui la retta taglia l'asse delle ordinate","La pendenza della retta di regressione, un parametro stimato tramite il metodo dei momenti applicato al campione","Il coefficiente di correlazione tra X e Y, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","La devianza residua del modello, una grandezza calcolata sulla base della distribuzione marginale della variabile"], correct:0, explain:"Il termine aY è l'intercetta, cioè il valore di Y quando X=0, rappresentando dove la retta taglia l'asse delle ordinate.", difficulty:"media"},
  {topic:"Esercitazione Regressione lineare (paniere2)", q:"Quando la correlazione tra X e Y è molto elevata, pari a rxy=0.92, i valori di Y e Y':", options:["Differiscono, seppur di poco","Coincidono sempre esattamente","Non hanno alcuna relazione tra loro","Sono sempre opposti in segno"], correct:0, explain:"Anche con correlazione molto elevata ma non perfetta (r≠±1), i valori osservati Y e quelli predetti Y' differiscono, seppur di poco.", difficulty:"media"},
  {topic:"Esercitazione Regressione lineare (paniere2)", q:"Quando la correlazione tra X e Y è molto bassa, pari a rxy=0.22, i valori di Y e Y':", options:["Differiscono notevolmente","Coincidono quasi perfettamente","Sono sempre uguali per costruzione","Non sono mai confrontabili"], correct:0, explain:"Con correlazione bassa, il modello spiega poco della variabilità di Y, quindi i valori osservati e predetti differiscono notevolmente.", difficulty:"media"},
  {topic:"Esercitazione Regressione lineare (paniere2)", q:"Quando la correlazione tra X e Y è pari a rxy=+1, i valori di Y e Y':", options:["Coincidono","Differiscono sempre notevolmente","Sono sempre opposti in segno","Non sono definiti"], correct:0, explain:"Con correlazione perfetta (r=+1), tutti i punti giacciono esattamente sulla retta, quindi Y e Y' coincidono.", difficulty:"media"},
  {topic:"Esercitazione Regressione lineare (paniere2)", q:"Quando la correlazione tra X e Y è pari a rxy=-1, i valori di Y e Y':", options:["Coincidono","Differiscono sempre notevolmente","Non hanno alcuna relazione","Sono indefiniti"], correct:0, explain:"Anche con correlazione perfetta negativa (r=-1), tutti i punti giacciono esattamente sulla retta, quindi Y e Y' coincidono.", difficulty:"media"},
  {topic:"Esercitazione Regressione lineare (paniere2)", q:"Quando rxy=0, le due rette di regressione Y'=ay+byX e X'=ax+bxY sono:", options:["Perpendicolari tra loro","Coincidenti","Parallele tra loro senza mai incontrarsi","Indefinite"], correct:0, explain:"Con correlazione nulla, le due rette di regressione (di Y su X e di X su Y) risultano perpendicolari tra loro.", difficulty:"difficile"},
  {topic:"Esercitazione Regressione lineare (paniere2)", q:"Quando rxy=-1, le due rette di regressione Y'=ay+byX e X'=ax+bxY sono:", options:["Coincidenti","Perpendicolari tra loro","Sempre parallele senza mai coincidere","Indefinite"], correct:0, explain:"Con correlazione perfetta (positiva o negativa), le due rette di regressione coincidono in un'unica retta.", difficulty:"difficile"},
  {topic:"Esercitazione Regressione lineare (paniere2)", q:"Tra X='abilità manuali' e Y='abilità tecniche' vi è una relazione lineare con coefficiente di correlazione 0.76: il coefficiente di determinazione sarà pari a:", options:["0,58","0,76","0,38","0,94"], correct:0, explain:"Il coefficiente di determinazione è il quadrato del coefficiente di correlazione: 0,76²=0,58.", difficulty:"media"},
  {topic:"Esercitazione Regressione lineare (paniere2)", q:"Tra X e Y vi è una relazione non lineare con coefficiente di determinazione uguale a -1: il coefficiente di correlazione sarà pari a:", options:["Non è possibile calcolarlo con i dati a disposizione, che non sono corretti","-1, per analogia diretta, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","1, essendo il quadrato di -1, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","0, essendo un valore anomalo, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte"], correct:0, explain:"Il coefficiente di determinazione non può mai essere negativo (essendo un quadrato); un valore -1 indica un dato errato, quindi il coefficiente di correlazione non è calcolabile con questi dati.", difficulty:"difficile"},
  {topic:"Esercitazione Tendenza e Media mobile (paniere2)", q:"La media mobile di ordine 5 permette di:", options:["Eliminare valori erratici","Amplificare le oscillazioni casuali della serie","Aumentare la variabilità osservata","Eliminare completamente il trend della serie"], correct:0, explain:"Le medie mobili di ordine elevato attenuano le oscillazioni erratiche (rumore casuale) della serie storica.", difficulty:"media"},
  {topic:"Esercitazione Tendenza e Media mobile (paniere2)", q:"La media mobile di ordine 3 permette di:", options:["Eliminare valori anomali","Aumentare l'effetto degli outlier sulla serie","Duplicare la lunghezza della serie storica","Eliminare qualunque tipo di stagionalità"], correct:0, explain:"Le medie mobili attenuano l'effetto di valori anomali isolati, smussando l'andamento della serie.", difficulty:"media"},
  {topic:"Esercitazione Tendenza e Media mobile (paniere2)", q:"La media mobile di ordine 3 permette anche di:", options:["Effettuare lo smoothing delle serie storiche","Aumentare la rumorosità del segnale osservato","Calcolare direttamente il coefficiente di correlazione","Eliminare la necessità di raccogliere nuovi dati"], correct:0, explain:"Lo smoothing (lisciamento) delle serie storiche è uno degli scopi principali delle medie mobili.", difficulty:"media"},
  {topic:"Esercitazione Tendenza e Media mobile (paniere2)", q:"Nella serie (100,200,350,500,600), le medie mobili di ordine 3 con 2 cifre decimali sono:", options:["216,67; 350,00; 483,33","200,00; 350,00; 500,00","150,00; 300,00; 450,00","216,67; 400,00; 500,00"], correct:0, explain:"Calcolando le medie a tre a tre valori contigui si ottengono 216,67; 350,00 e 483,33.", difficulty:"difficile"},
  {topic:"Esercitazione Tendenza e Media mobile (paniere2)", q:"Nella serie (10,100,200,350,500,600), le medie mobili di ordine 5 sono:", options:["232 e 350","250 e 400","200 e 350","300 e 450"], correct:0, explain:"Calcolando le medie su due finestre di 5 valori contigui si ottengono 232 e 350.", difficulty:"difficile"},
  {topic:"Esercitazione Tendenza e Media mobile (paniere2)", q:"Nella serie (10,100,200,350,500,600), le medie mobili senza cifre decimali di ordine 3 sono:", options:["103, 217, 350, 483","100, 200, 350, 500","110, 220, 330, 440","103, 250, 400, 500"], correct:0, explain:"Calcolando le medie a tre a tre valori contigui e arrotondando, si ottengono 103, 217, 350 e 483.", difficulty:"difficile"},
  {topic:"Esercitazione Tendenza e Media mobile (paniere2)", q:"La funzione TENDENZA in Excel serve per:", options:["Calcolare il valore di una funzione stimata","Calcolare la deviazione standard di un campione","Ordinare automaticamente una serie di dati","Contare il numero di celle non vuote"], correct:0, explain:"La funzione TENDENZA in Excel calcola i valori stimati da una funzione di regressione lineare.", difficulty:"media"},
  {topic:"Esercitazione Tendenza e Media mobile (paniere2)", q:"La funzione TENDENZA in Excel serve anche per:", options:["Prevedere le serie storiche","Calcolare la mediana di una distribuzione","Eliminare i valori duplicati da un elenco","Sommare automaticamente una colonna di dati"], correct:0, explain:"La funzione TENDENZA permette di effettuare previsioni su serie storiche basandosi su un modello di regressione.", difficulty:"media"},
  {topic:"Esercitazione Tendenza e Media mobile (paniere2)", q:"La funzione TENDENZA in Excel serve inoltre per:", options:["Prevedere il valore al tempo t in una funzione stimata y*","Calcolare la varianza di due campioni indipendenti","Contare le occorrenze di un valore in un intervallo","Ordinare i dati in ordine alfabetico"], correct:0, explain:"TENDENZA prevede il valore di y al tempo t sulla base della funzione di regressione stimata.", difficulty:"media"},
  {topic:"Esercitazione Tendenza e Media mobile (paniere2)", q:"La funzione TENDENZA in Excel serve infine per:", options:["Calcolare il valore stimato al tempo t in relazione a una funzione di regressione y*","Calcolare il coefficiente di variazione di un campione, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Contare il numero di righe di una tabella, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Determinare la moda di una distribuzione, un parametro stimato tramite il metodo dei momenti applicato al campione"], correct:0, explain:"TENDENZA calcola il valore stimato al tempo t basandosi sulla funzione di regressione lineare stimata sui dati storici.", difficulty:"media"},
  {topic:"Inferenza e Campionamento (paniere2)", q:"La stima del parametro è:", options:["Un concetto diverso da quello di stimatore","Un sinonimo perfetto di stimatore","Sempre uguale al valore vero del parametro","Applicabile solo a popolazioni infinite"], correct:0, explain:"La stima (valore numerico ottenuto da un campione specifico) è concettualmente distinta dallo stimatore (variabile casuale, funzione generale del campione).", difficulty:"media"},
  {topic:"Inferenza e Campionamento (paniere2)", q:"La stima del parametro nella popolazione è:", options:["Calcolata attraverso i dati campionari","Sempre nota con certezza assoluta","Indipendente dai dati raccolti","Calcolabile solo con un censimento completo"], correct:0, explain:"La stima del parametro della popolazione si ottiene elaborando i dati raccolti su un campione.", difficulty:"media"},
  {topic:"Inferenza e Campionamento (paniere2)", q:"Riguardo alla stima del parametro nel campione:", options:["Non è opportuno parlare di stima del parametro nel campione, ma nella popolazione","È sempre equivalente concettualmente alla stima nella popolazione","Si riferisce unicamente al valore osservato nel campione stesso","Coincide con la moda calcolata sul campione osservato"], correct:0, explain:"Concettualmente, la stima riguarda sempre il parametro della popolazione, non un valore 'nel' campione, che è già osservato direttamente.", difficulty:"difficile"},
  {topic:"Inferenza e Campionamento (paniere2)", q:"La stima del campione è:", options:["Un concetto diverso da quello di stimatore","Sempre identica al concetto di stimatore","Un sinonimo di popolazione infinita","Applicabile solo a variabili qualitative"], correct:0, explain:"Anche la stima riferita al campione resta concettualmente distinta dallo stimatore, che è una funzione generale, non un valore specifico.", difficulty:"media"},
  {topic:"Inferenza e Campionamento (paniere2)", q:"La funzione stimatore del parametro dovrebbe essere:", options:["Centrata, consistente, efficiente","Sempre distorta per garantire maggiore precisione","Indipendente dalla dimensione campionaria","Priva di qualunque proprietà statistica specifica"], correct:0, explain:"Le proprietà desiderabili di uno stimatore sono correttezza (centratura), consistenza ed efficienza.", difficulty:"media"},
  {topic:"Inferenza e Campionamento (paniere2)", q:"Su 2000 pazienti, 500 sono risultati sensibili a un farmaco. La proporzione campionaria di persone sensibili è:", options:["0,25","0,50","0,75","0,20"], correct:0, explain:"500 su 2000 corrisponde a una proporzione campionaria pari a 500/2000=0,25.", difficulty:"facile"},
  {topic:"Inferenza e Campionamento (paniere2)", q:"Su 2000 pazienti, 1000 sono risultati sensibili a un farmaco. La proporzione nella popolazione di persone sensibili è:", options:["Non si può sapere con certezza dal solo dato campionario","Esattamente 0,50, senza alcuna incertezza, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","Sempre superiore al valore campionario osservato","Sempre inferiore al valore campionario osservato"], correct:0, explain:"Il dato campionario fornisce solo una stima; il valore esatto nella popolazione non è conoscibile con certezza assoluta dal solo campione.", difficulty:"media"},
  {topic:"Inferenza e Campionamento (paniere2)", q:"Su 2000 pazienti, 500 sono risultati sensibili a un farmaco. La proporzione campionaria di persone NON sensibili è:", options:["0,75","0,25","0,50","0,80"], correct:0, explain:"Se 500 su 2000 sono sensibili (0,25), i non sensibili sono 1500 su 2000, cioè 0,75.", difficulty:"facile"},
  {topic:"Inferenza e Campionamento (paniere2)", q:"Su 2000 pazienti, 500 sensibili a un farmaco, con un grado di fiducia del 95% la proporzione nella popolazione è compresa tra:", options:["0,23 e 0,27","0,20 e 0,30","0,15 e 0,35","0,24 e 0,26"], correct:0, explain:"Applicando la formula dell'intervallo di confidenza per una proporzione con z=1,96, si ottiene un intervallo pari a [0,23; 0,27].", difficulty:"difficile"},
  {topic:"Analisi della dipendenza (paniere2)", q:"La proporzione di varianza comune a X e Y, espressa da r²xy, è denominata:", options:["Coefficiente di determinazione","Coefficiente di correlazione","Codevianza standardizzata","Errore standard della stima"], correct:0, explain:"Il quadrato del coefficiente di correlazione (r²) è denominato coefficiente di determinazione.", difficulty:"media"},
  {topic:"Analisi della dipendenza (paniere2)", q:"La proporzione di varianza comune a X e Y, espressa da r²xy, esprime:", options:["La varianza spiegata dal modello","La varianza totale non spiegata","Il valore medio della variabile dipendente","La devianza residua in valore assoluto"], correct:0, explain:"Il coefficiente di determinazione r²xy esprime la quota di varianza di Y spiegata dalla relazione con X.", difficulty:"media"},
  {topic:"Analisi della dipendenza (paniere2)", q:"La quantità 1-r²xy è denominata:", options:["Varianza residua","Varianza spiegata","Coefficiente di correlazione","Devianza di regressione"], correct:0, explain:"Il complemento a 1 del coefficiente di determinazione rappresenta la quota di varianza non spiegata, cioè la varianza residua.", difficulty:"media"},
  {topic:"Analisi della dipendenza (paniere2)", q:"Con r=0,76 tra abilità manuali (X) e tecniche (Y, dipendente), il coefficiente di determinazione sarà pari a:", options:["0,58","0,76","0,38","0,94"], correct:0, explain:"Elevando al quadrato 0,76 si ottiene un coefficiente di determinazione pari a 0,58.", difficulty:"media"},
  {topic:"Analisi della dipendenza (paniere2)", q:"Con r=-1 tra grassi saturi (X, indipendente) e speranza di vita (Y, dipendente), il coefficiente di determinazione sarà pari a:", options:["1","-1","0","0,5"], correct:0, explain:"Il coefficiente di determinazione, essendo un quadrato, è sempre non negativo: (-1)²=1.", difficulty:"media"},
  {topic:"Analisi della dipendenza (paniere2)", q:"Con r=0,76 tra abilità manuali e tecniche (dipendente), la varianza residua sarà pari a:", options:["42%","58%","76%","24%"], correct:0, explain:"La varianza residua è il complemento a 100% del coefficiente di determinazione: 100%-58%=42%.", difficulty:"difficile"},
  {topic:"Analisi della dipendenza (paniere2)", q:"Con r=0,76 tra abilità manuali e tecniche (dipendente), la varianza comune (spiegata) sarà pari a:", options:["58%","42%","76%","24%"], correct:0, explain:"La varianza comune (spiegata) coincide col coefficiente di determinazione: 0,76²=0,58, cioè 58%.", difficulty:"difficile"},
  {topic:"Analisi della dipendenza (paniere2)", q:"In uno studio su 70 ragazzi con Y'=10+2X (r²=0,64), la variabile indipendente è:", options:["L'attitudine all'Inglese (punteggio al test attitudinale)","Il punteggio al test di profitto finale, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","Il numero di ragazzi iscritti al corso, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","La deviazione standard degli errori, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe"], correct:0, explain:"X, il punteggio al test attitudinale, è la variabile indipendente usata per prevedere Y (il profitto finale).", difficulty:"media"},
  {topic:"Analisi della dipendenza (paniere2)", q:"Con Y'=10+2X, il punteggio al test di profitto per chi sbaglia tutte le domande al test attitudinale (X=0) è:", options:["10","0","2","12"], correct:0, explain:"Sostituendo X=0 nell'equazione Y'=10+2X si ottiene Y'=10.", difficulty:"media"},
  {topic:"Analisi della dipendenza (paniere2)", q:"Con Y'=10+2X, per ogni risposta corretta in più al test attitudinale il punteggio al test di profitto aumenta di:", options:["2 punti","10 punti","1 punto","0,5 punti"], correct:0, explain:"Il coefficiente angolare (2) indica di quanti punti aumenta Y per ogni unità aggiuntiva di X.", difficulty:"media"},
  {topic:"Analisi dell'Interdipendenza (paniere2)", q:"Con Y'=15+2X (r²=0,74; se=3,5), l'errore medio di previsione è pari a:", options:["3,5","0,74","15","2"], correct:0, explain:"L'errore standard della stima (se) rappresenta direttamente l'errore medio di previsione, pari a 3,5.", difficulty:"media"},
  {topic:"Analisi dell'Interdipendenza (paniere2)", q:"Con Y'=15+3X (r²=0,74; se=3,5), per ogni risposta corretta il punteggio aumenta di 3 punti; questo parametro si chiama:", options:["Coefficiente di regressione","Coefficiente di correlazione","Errore standard della stima","Devianza residua"], correct:0, explain:"Il valore che indica di quanto varia Y per ogni unità di X è definito coefficiente di regressione (angolare).", difficulty:"media"},
  {topic:"Analisi dell'Interdipendenza (paniere2)", q:"Con un coefficiente di correlazione pari a -0,88 tra punteggi di letteratura inglese e abilità matematica, si può evidenziare che:", options:["Le due variabili sono correlate negativamente","Le due variabili sono correlate positivamente","Non esiste alcuna relazione tra le due variabili","Il coefficiente indica un errore di calcolo"], correct:0, explain:"Un coefficiente negativo (-0,88) indica una relazione inversa marcata tra le due variabili considerate.", difficulty:"media"},
  {topic:"Analisi dell'Interdipendenza (paniere2)", q:"Con lo stesso coefficiente -0,88, si può anche evidenziare che:", options:["Le persone con punteggi bassi in matematica tendono ad avere buone prestazioni in letteratura inglese","Le persone con punteggi alti in matematica hanno sempre punteggi alti anche in letteratura","Non esiste alcuna relazione osservabile tra le due abilità","Il punteggio in letteratura è indipendente da quello in matematica"], correct:0, explain:"Una correlazione fortemente negativa implica che, in questo campione, punteggi bassi in un ambito si associno a punteggi alti nell'altro.", difficulty:"media"},
  {topic:"Analisi dell'Interdipendenza (paniere2)", q:"L'indice r misura relazioni di tipo:", options:["Lineare","Esclusivamente quadratico","Esclusivamente esponenziale","Di qualunque forma funzionale, incluse quelle non lineari"], correct:0, explain:"Il coefficiente di correlazione r di Pearson misura specificamente relazioni di tipo lineare tra due variabili.", difficulty:"media"},
