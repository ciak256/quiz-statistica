  {topic:"Analisi dei costi", q:"I costi semivariabili (o misti) sono quelli che:", options:["Contengono una componente fissa e una variabile al variare della produzione","Coincidono sempre con i costi diretti di produzione, una semplificazione poco utile ai fini dell'analisi di bilancio","Restano sempre costanti qualunque sia il volume prodotto, un approccio che trascura aspetti rilevanti della gestione aziendale","Variano soltanto in base al prezzo di vendita, una valutazione che non tiene conto dei principi contabili di riferimento"], correct:0, explain:"I costi semivariabili, come le utenze con quota fissa e consumo, combinano una parte indipendente dai volumi e una parte proporzionale ad essi.", difficulty:"media"},
  {topic:"Indici di bilancio", q:"Il rapporto tra ROI e ROE, nella scomposizione della leva finanziaria, mette in evidenza:", options:["L'effetto moltiplicativo dell'indebitamento sulla redditività del capitale proprio","La quota di ammortamento annua degli impianti, un criterio che in pratica porta a risultati distorti","Solo il livello delle rimanenze di magazzino, una lettura parziale che non coglie il reale significato gestionale","Il valore nominale delle azioni in circolazione, un'impostazione poco coerente con la logica economico-aziendale"], correct:0, explain:"La leva finanziaria mostra come il ricorso al debito possa amplificare, in positivo o in negativo, il ROE rispetto al ROI operativo.", difficulty:"media"},
  {topic:"Contabilità", q:"Il principio di competenza economica prevede che costi e ricavi siano imputati:", options:["Solo nell'esercizio in cui avviene il relativo movimento di cassa, un criterio adottato solo in contesti gestionali molto particolari","Sempre nell'esercizio successivo a quello di manifestazione, un'interpretazione che non riflette la prassi contabile ordinaria","All'esercizio a cui si riferiscono economicamente, indipendentemente dal momento dell'incasso o del pagamento","In base esclusivamente alla data della fattura di vendita, una semplificazione poco utile ai fini dell'analisi di bilancio"], correct:2, explain:"Il principio di competenza impone di rilevare costi e ricavi nel periodo a cui si riferiscono economicamente, a prescindere dai flussi di cassa.", difficulty:"media"},
  {topic:"Forme giuridiche", q:"Nella Società in Accomandita Semplice (SAS) coesistono:", options:["Soltanto soci con responsabilità illimitata per tutti i debiti sociali, un approccio che trascura aspetti rilevanti della gestione aziendale","Soltanto soci con responsabilità limitata alla quota conferita, una valutazione che non tiene conto dei principi contabili di riferimento","Soci accomandatari con responsabilità illimitata e soci accomandanti con responsabilità limitata","Un unico socio che risponde con il proprio patrimonio personale, un criterio che in pratica porta a risultati distorti"], correct:2, explain:"La SAS prevede due categorie di soci: accomandatari (gestione e responsabilità illimitata) e accomandanti (responsabilità limitata al capitale conferito).", difficulty:"media"},
  {topic:"Analisi dei costi", q:"Il costo opportunità di una scelta gestionale rappresenta:", options:["Il costo storico effettivamente sostenuto per un bene, una lettura parziale che non coglie il reale significato gestionale","Il valore della migliore alternativa a cui si rinuncia scegliendo una determinata opzione","La somma dei soli costi variabili di produzione, un'impostazione poco coerente con la logica economico-aziendale","L'ammortamento residuo di un cespite, un criterio adottato solo in contesti gestionali molto particolari"], correct:1, explain:"Il costo opportunità non compare in contabilità ma esprime il beneficio a cui si rinuncia scegliendo un'alternativa rispetto a un'altra.", difficulty:"difficile"},
  {topic:"Indici di bilancio", q:"Un current ratio (attivo circolante / passività correnti) inferiore a 1 segnala tipicamente:", options:["Una possibile difficoltà a coprire gli impegni a breve termine con le attività correnti","Una redditività del capitale proprio molto elevata, un'interpretazione che non riflette la prassi contabile ordinaria","Un livello di ammortamento eccessivo, una semplificazione poco utile ai fini dell'analisi di bilancio","Una situazione patrimoniale sempre solida, un approccio che trascura aspetti rilevanti della gestione aziendale"], correct:0, explain:"Un current ratio sotto 1 indica che le attività a breve non coprono interamente le passività correnti, segnalando tensioni di liquidità.", difficulty:"difficile"},
  {topic:"Bilancio", q:"Il Rendiconto Finanziario, a differenza del Conto Economico, evidenzia principalmente:", options:["Le variazioni delle disponibilità liquide generate dalla gestione operativa, di investimento e finanziaria","Il valore delle immobilizzazioni immateriali, una valutazione che non tiene conto dei principi contabili di riferimento","Il solo utile o la sola perdita d'esercizio, un criterio che in pratica porta a risultati distorti","La composizione del patrimonio netto, una lettura parziale che non coglie il reale significato gestionale"], correct:0, explain:"Il Rendiconto Finanziario riclassifica i flussi di cassa per area (operativa, investimento, finanziaria), offrendo una lettura complementare al Conto Economico.", difficulty:"difficile"},
  {topic:"Efficienza e strategia", q:"Il vantaggio competitivo di costo, secondo l'impostazione di Porter, si realizza quando l'impresa:", options:["Aumenta il prezzo di vendita senza modificare i costi, un'impostazione poco coerente con la logica economico-aziendale","Riduce la qualità percepita del prodotto per ridurre i ricavi, un criterio adottato solo in contesti gestionali molto particolari","Vende esclusivamente prodotti di lusso a prezzo elevato, un'interpretazione che non riflette la prassi contabile ordinaria","Riesce a offrire un prodotto comparabile sostenendo costi inferiori rispetto ai concorrenti"], correct:3, explain:"Il vantaggio di costo consiste nel produrre a costi inferiori a parità di valore offerto, permettendo margini più ampi o prezzi più competitivi.", difficulty:"difficile"},
  {topic:"Concetti generali", q:"L'azienda, in senso economico-aziendale, può essere definita come:", options:["Una struttura la cui attività si esaurisce in un solo esercizio, un criterio adottato solo in contesti gestionali molto particolari","Un istituto economico che opera per il soddisfacimento dei bisogni umani attraverso la produzione o lo scambio di beni e servizi","Un ente che opera esclusivamente senza fini di lucro, un'interpretazione che non riflette la prassi contabile ordinaria","Un insieme di soli beni materiali privi di organizzazione, una semplificazione poco utile ai fini dell'analisi di bilancio"], correct:1, explain:"L'azienda è un istituto economico durevole che, attraverso un'organizzazione di persone e mezzi, soddisfa bisogni umani mediante produzione o scambio.", difficulty:"facile"},
  {topic:"Contabilità", q:"Il piano dei conti è lo strumento che:", options:["Viene redatto una sola volta nella vita dell'impresa e mai aggiornato, un approccio che trascura aspetti rilevanti della gestione aziendale","Elenca in modo sistematico e codificato tutti i conti utilizzati dall'impresa nella rilevazione contabile","Contiene esclusivamente i conti relativi ai debiti verso fornitori, una valutazione che non tiene conto dei principi contabili di riferimento","Sostituisce integralmente il bilancio d'esercizio, un criterio che in pratica porta a risultati distorti"], correct:1, explain:"Il piano dei conti organizza in modo sistematico e codificato l'insieme dei conti che l'impresa utilizza per registrare le proprie operazioni.", difficulty:"facile"},
  {topic:"Forme giuridiche", q:"L'impresa individuale si caratterizza per il fatto che:", options:["Un unico soggetto è titolare dell'attività e risponde con tutto il proprio patrimonio delle obbligazioni assunte","La responsabilità del titolare è sempre limitata al capitale conferito, una lettura parziale che non coglie il reale significato gestionale","Deve obbligatoriamente avere almeno due soci fondatori, un'impostazione poco coerente con la logica economico-aziendale","Il capitale è sempre suddiviso in azioni negoziabili sul mercato, un criterio adottato solo in contesti gestionali molto particolari"], correct:0, explain:"Nell'impresa individuale l'imprenditore è l'unico titolare e risponde illimitatamente con il proprio patrimonio personale delle obbligazioni assunte.", difficulty:"facile"},
  {topic:"Bilancio", q:"L'attivo dello Stato Patrimoniale accoglie, tra l'altro:", options:["Le immobilizzazioni e l'attivo circolante dell'impresa","Solo il patrimonio netto dell'impresa, un'interpretazione che non riflette la prassi contabile ordinaria","Unicamente i costi di competenza dell'esercizio, una semplificazione poco utile ai fini dell'analisi di bilancio","Esclusivamente i debiti verso banche e fornitori"], correct:0, explain:"L'attivo dello Stato Patrimoniale comprende le immobilizzazioni (materiali, immateriali, finanziarie) e l'attivo circolante (rimanenze, crediti, liquidità).", difficulty:"facile"},
  {topic:"Analisi dei costi", q:"I costi diretti di produzione sono quelli che:", options:["Restano sempre costanti indipendentemente dai volumi prodotti, un approccio che trascura aspetti rilevanti della gestione aziendale","Coincidono sempre con i soli costi di manodopera, una valutazione che non tiene conto dei principi contabili di riferimento","Possono essere attribuiti in modo univoco e certo a uno specifico prodotto o commessa","Non possono in alcun modo essere attribuiti a un prodotto specifico, un criterio che in pratica porta a risultati distorti"], correct:2, explain:"I costi diretti sono imputabili con certezza a un determinato oggetto di costo (prodotto, commessa), a differenza di quelli indiretti che richiedono un criterio di ripartizione.", difficulty:"facile"},
  {topic:"Concetti generali", q:"La gestione aziendale si suddivide tradizionalmente in:", options:["Solamente gestione caratteristica e gestione straordinaria, una lettura parziale che non coglie il reale significato gestionale","Gestione esclusivamente commerciale e produttiva, un'impostazione poco coerente con la logica economico-aziendale","Gestione caratteristica, gestione finanziaria, gestione straordinaria e gestione tributaria","Un'unica area indistinta priva di suddivisioni interne, un criterio adottato solo in contesti gestionali molto particolari"], correct:2, explain:"La gestione aziendale viene generalmente scomposta in area caratteristica, finanziaria, straordinaria (accessoria) e tributaria, ciascuna con proprie dinamiche economiche.", difficulty:"facile"},
  {topic:"Bilancio", q:"Il postulato della chiarezza nella redazione del bilancio richiede che:", options:["I dati contabili possano essere presentati in modo ambiguo se necessario, un'interpretazione che non riflette la prassi contabile ordinaria","Il bilancio sia redatto in modo comprensibile e trasparente per i suoi destinatari","Le voci di bilancio possano essere omesse liberamente dall'amministratore","Il bilancio venga redatto senza rispettare schemi predefiniti dalla legge"], correct:1, explain:"Il principio di chiarezza (art. 2423 c.c.) impone che il bilancio sia redatto in modo da consentire una lettura trasparente e comprensibile della situazione aziendale.", difficulty:"media"},
  {topic:"Indici di bilancio", q:"L'indice di indebitamento (rapporto tra capitale di terzi e capitale proprio) fornisce indicazioni su:", options:["Il grado di dipendenza finanziaria dell'impresa dal capitale di debito rispetto ai mezzi propri","La sola redditività del capitale investito nell'attività caratteristica, una semplificazione poco utile ai fini dell'analisi di bilancio","La quantità di rimanenze di magazzino a fine esercizio, un approccio che trascura aspetti rilevanti della gestione aziendale","Il valore di mercato delle azioni dell'impresa quotata, una valutazione che non tiene conto dei principi contabili di riferimento"], correct:0, explain:"Questo indice misura quanto l'impresa fa ricorso a capitale di terzi rispetto al capitale proprio, evidenziando il grado di leva finanziaria adottato.", difficulty:"media"},
  {topic:"Analisi dei costi", q:"Il full costing, a differenza del direct costing, imputa al prodotto:", options:["Sia i costi diretti sia una quota dei costi indiretti (fissi) di produzione","Nessun costo relativo alla struttura produttiva, un criterio che in pratica porta a risultati distorti","Esclusivamente i costi variabili di produzione, una lettura parziale che non coglie il reale significato gestionale","Solamente i costi diretti di manodopera, un'impostazione poco coerente con la logica economico-aziendale"], correct:0, explain:"Il full costing (costo pieno) attribuisce al prodotto anche una quota dei costi fissi/indiretti, mentre il direct costing considera solo i costi variabili.", difficulty:"media"},
  {topic:"Contabilità", q:"Le scritture di assestamento vengono effettuate:", options:["Alla fine dell'esercizio, per rendere i valori contabili conformi al principio di competenza economica","Esclusivamente su richiesta dell'Agenzia delle Entrate, un criterio adottato solo in contesti gestionali molto particolari","Ogni giorno, per registrare le operazioni di cassa correnti, un'interpretazione che non riflette la prassi contabile ordinaria","Solo in caso di apertura di una nuova attività d'impresa, una semplificazione poco utile ai fini dell'analisi di bilancio"], correct:0, explain:"Le scritture di assestamento (ammortamenti, ratei, risconti, rimanenze) adeguano i saldi contabili al principio di competenza in chiusura d'esercizio.", difficulty:"media"},
  {topic:"Governance e organizzazione", q:"La struttura organizzativa gerarchico-funzionale si basa su:", options:["L'assenza totale di livelli gerarchici all'interno dell'impresa","Un modello adottato esclusivamente dalle imprese di piccolissime dimensioni","Un'unica linea di comando affiancata da funzioni specializzate di staff e di line","Divisioni completamente autonome per ciascun prodotto realizzato"], correct:2, explain:"Nella struttura gerarchico-funzionale convivono una linea di comando (line) e funzioni specialistiche di supporto (staff), tipiche di molte medie e grandi imprese.", difficulty:"media"},
  {topic:"Marketing", q:"Il marketing mix comprende tradizionalmente le cosiddette 4P, ovvero:", options:["Produzione, Personale, Profitto e Pianificazione","Prodotto, Progetto, Programma e Previsione","Prodotto, Prezzo, Punto vendita (distribuzione) e Promozione","Prezzo, Persone, Processo e Fisicità soltanto per i servizi"], correct:2, explain:"Le 4P del marketing mix classico sono Product, Price, Place e Promotion, ovvero prodotto, prezzo, distribuzione e promozione.", difficulty:"media"},
  {topic:"Bilancio", q:"Il criterio del costo storico, nella valutazione delle immobilizzazioni, prevede che il bene sia iscritto:", options:["Al costo sostenuto per il suo acquisto o la sua produzione, salvo rettifiche previste dalla normativa","Sempre al suo valore di mercato corrente indipendentemente dal costo di acquisto, un approccio che trascura aspetti rilevanti della gestione aziendale","Al solo valore nominale indicato nell'atto costitutivo della società, una valutazione che non tiene conto dei principi contabili di riferimento","A un valore convenzionale fissato liberamente dall'amministratore, un criterio che in pratica porta a risultati distorti"], correct:0, explain:"Il criterio del costo storico impone di iscrivere il bene al costo di acquisizione, rettificato da ammortamenti ed eventuali svalutazioni.", difficulty:"media"},
  {topic:"Indici di bilancio", q:"Un miglioramento del margine di struttura (patrimonio netto meno immobilizzazioni) indica generalmente:", options:["Una maggiore capacità dei mezzi propri di coprire gli investimenti durevoli dell'impresa","Un peggioramento della solidità patrimoniale dell'impresa, una lettura parziale che non coglie il reale significato gestionale","Una diminuzione della liquidità immediata disponibile, un'impostazione poco coerente con la logica economico-aziendale","L'aumento automatico del fatturato dell'esercizio, un criterio adottato solo in contesti gestionali molto particolari"], correct:0, explain:"Un margine di struttura positivo e crescente segnala che il patrimonio netto copre adeguatamente le immobilizzazioni, indice di solidità patrimoniale.", difficulty:"difficile"},
  {topic:"Analisi dei costi", q:"Nel calcolo del break-even point, il margine di contribuzione unitario è dato da:", options:["Prezzo di vendita unitario meno costo variabile unitario","Costo variabile unitario meno costo fisso unitario","Prezzo di vendita unitario meno costo fisso totale","Ricavo totale diviso il numero di unità prodotte"], correct:0, explain:"Il margine di contribuzione unitario (prezzo meno costo variabile unitario) indica quanto ogni unità venduta contribuisce a coprire i costi fissi e generare utile.", difficulty:"difficile"},
  {topic:"Governance e organizzazione", q:"L'esternalizzazione (outsourcing) di un'attività aziendale consiste nel:", options:["Assumere internamente nuovo personale specializzato in modo permanente, un'interpretazione che non riflette la prassi contabile ordinaria","Affidare a soggetti esterni lo svolgimento di attività prima gestite internamente all'impresa","Integrare verticalmente a monte una nuova fase produttiva, una semplificazione poco utile ai fini dell'analisi di bilancio","Fondersi con un'impresa concorrente operante nello stesso settore, un approccio che trascura aspetti rilevanti della gestione aziendale"], correct:1, explain:"L'outsourcing consiste nell'affidare a terzi la gestione di attività o processi, spesso non core, prima svolti internamente, per ridurre costi o aumentare flessibilità.", difficulty:"difficile"},
  {topic:"Bilancio", q:"La rivalutazione dei beni d'impresa, quando consentita dalla normativa, comporta tipicamente:", options:["La riduzione automatica degli ammortamenti futuri a zero, una valutazione che non tiene conto dei principi contabili di riferimento","L'obbligo di vendita immediata del bene rivalutato, un criterio che in pratica porta a risultati distorti","L'iscrizione di un maggior valore del bene in contropartita di una riserva di patrimonio netto","La cancellazione del bene dall'attivo dello Stato Patrimoniale, una lettura parziale che non coglie il reale significato gestionale"], correct:2, explain:"La rivalutazione, ove ammessa da leggi speciali, adegua il valore contabile del bene al suo maggior valore, generando una riserva di rivalutazione nel patrimonio netto.", difficulty:"difficile"},
  {topic:"Analisi dei costi", q:"L'activity based costing (ABC) si distingue dai metodi tradizionali di calcolo dei costi perché:", options:["Ignora completamente i costi indiretti nell'attribuzione al prodotto, un'impostazione poco coerente con la logica economico-aziendale","Considera esclusivamente i costi variabili di produzione, un criterio adottato solo in contesti gestionali molto particolari","Attribuisce i costi indiretti sulla base delle attività che effettivamente li generano, anziché di basi di ripartizione generiche","Si applica soltanto alle imprese di servizi di piccole dimensioni, un'interpretazione che non riflette la prassi contabile ordinaria"], correct:2, explain:"L'ABC ripartisce i costi indiretti in base alle attività (cost driver) che li originano, offrendo un'attribuzione più precisa rispetto ai criteri tradizionali generici.", difficulty:"difficile"},
  {topic:"Marketing", q:"Il posizionamento di un prodotto sul mercato riguarda principalmente:", options:["La quantità fisica di prodotto immagazzinata, una semplificazione poco utile ai fini dell'analisi di bilancio","Il solo canale distributivo utilizzato per la vendita, un approccio che trascura aspetti rilevanti della gestione aziendale","L'ammontare del prezzo di listino stabilito dall'impresa, una valutazione che non tiene conto dei principi contabili di riferimento","Il modo in cui il prodotto viene percepito dai consumatori rispetto alla concorrenza"], correct:3, explain:"Il posizionamento riguarda la percezione del prodotto nella mente del consumatore rispetto alle alternative concorrenti, costruita attraverso attributi distintivi e comunicazione.", difficulty:"difficile"},
  {topic:"Governance e organizzazione", q:"La responsabilità limitata dei soci in una società di capitali implica che:", options:["I soci rispondono sempre illimitatamente con il proprio patrimonio personale","I creditori sociali possono sempre aggredire direttamente il patrimonio dei singoli soci","La società non ha mai un proprio patrimonio distinto da quello dei soci","I soci rispondono delle obbligazioni sociali solo nei limiti del capitale conferito"], correct:3, explain:"Nelle società di capitali (SPA, SRL) i soci rispondono, salvo eccezioni, limitatamente al capitale conferito, mentre delle obbligazioni sociali risponde la società con il proprio patrimonio.", difficulty:"difficile"},
  {topic:"Concetti generali", q:"Il patrimonio aziendale, in un dato momento, è rappresentato da:", options:["La differenza tra ricavi e costi di un singolo mese, una valutazione che non tiene conto dei principi contabili di riferimento","L'insieme dei beni, dei crediti e dei debiti riferibili all'impresa in quel momento","Il solo utile prodotto durante l'ultimo esercizio, un criterio che in pratica porta a risultati distorti","L'importo del capitale sociale sottoscritto dai soci, una lettura parziale che non coglie il reale significato gestionale"], correct:1, explain:"Il patrimonio è l'insieme di attività (beni e crediti) e passività (debiti) riferibili all'azienda in un determinato istante, la cui differenza dà il patrimonio netto.", difficulty:"facile"},
  {topic:"Contabilità", q:"Il conto economico riclassificato a valore aggiunto evidenzia in particolare:", options:["Il solo ammontare dei debiti a breve termine, un'impostazione poco coerente con la logica economico-aziendale","Il valore creato dall'impresa al netto dei costi per materie e servizi esterni","Esclusivamente l'utile netto d'esercizio, un criterio adottato solo in contesti gestionali molto particolari","La composizione dettagliata dell'attivo circolante, un'interpretazione che non riflette la prassi contabile ordinaria"], correct:1, explain:"Il valore aggiunto misura la ricchezza generata dall'impresa al netto dei costi per beni e servizi acquistati da terzi, prima di remunerare lavoro, capitale e Stato.", difficulty:"facile"},
  {topic:"Forme giuridiche", q:"Nella Società in Nome Collettivo (SNC), i soci rispondono delle obbligazioni sociali:", options:["In nessun caso, essendo la responsabilità esclusivamente della società","Sempre e soltanto nei limiti della quota di capitale conferita","Solo se espressamente previsto da un'apposita clausola statutaria","Solidalmente e illimitatamente con il proprio patrimonio personale"], correct:3, explain:"Nella SNC tutti i soci rispondono solidalmente e illimitatamente delle obbligazioni sociali, anche con il proprio patrimonio personale.", difficulty:"facile"},
  {topic:"Analisi dei costi", q:"I costi fissi di un'impresa sono quelli che:", options:["Sono sempre nulli se la produzione è pari a zero, una semplificazione poco utile ai fini dell'analisi di bilancio","Variano in proporzione diretta con le quantità prodotte, un approccio che trascura aspetti rilevanti della gestione aziendale","Coincidono sempre con i costi diretti di materia prima, una valutazione che non tiene conto dei principi contabili di riferimento","Non variano al variare del volume di produzione, entro un certo intervallo di attività"], correct:3, explain:"I costi fissi restano costanti al variare della produzione entro un dato intervallo di capacità produttiva, a differenza dei costi variabili.", difficulty:"facile"},
  {topic:"Bilancio", q:"Il Conto Economico ha la funzione di rappresentare:", options:["La situazione patrimoniale dell'impresa in un dato istante, un criterio che in pratica porta a risultati distorti","Il valore di mercato delle azioni della società, una lettura parziale che non coglie il reale significato gestionale","Esclusivamente i flussi di cassa entrati e usciti nell'esercizio, un'impostazione poco coerente con la logica economico-aziendale","Il risultato economico dell'esercizio attraverso il confronto tra costi e ricavi di competenza"], correct:3, explain:"Il Conto Economico espone costi e ricavi di competenza dell'esercizio, il cui saldo determina l'utile o la perdita del periodo.", difficulty:"facile"},
  {topic:"Concetti generali", q:"L'imprenditore commerciale, secondo il codice civile, è soggetto tra l'altro:", options:["All'obbligo esclusivo di operare solo con clienti privati, un criterio adottato solo in contesti gestionali molto particolari","All'obbligo di operare esclusivamente in forma di società di capitali, un'interpretazione che non riflette la prassi contabile ordinaria","Al divieto assoluto di assumere dipendenti, una semplificazione poco utile ai fini dell'analisi di bilancio","All'obbligo di iscrizione nel registro delle imprese e alla tenuta delle scritture contabili"], correct:3, explain:"L'imprenditore commerciale è soggetto, tra gli altri obblighi, all'iscrizione nel registro delle imprese e alla tenuta di scritture contabili obbligatorie (artt. 2195 e ss. c.c.).", difficulty:"media"},
  {topic:"Indici di bilancio", q:"Il ROS (Return on Sales) esprime:", options:["La quota di indebitamento complessivo dell'impresa, un approccio che trascura aspetti rilevanti della gestione aziendale","Il tempo medio di incasso dei crediti verso clienti, una valutazione che non tiene conto dei principi contabili di riferimento","Il rapporto tra utile netto e patrimonio netto dell'impresa, un criterio che in pratica porta a risultati distorti","Il rapporto tra reddito operativo e ricavi di vendita, misurando la redditività delle vendite"], correct:3, explain:"Il ROS misura quanta parte dei ricavi di vendita si traduce in reddito operativo, esprimendo l'efficienza reddituale della gestione caratteristica.", difficulty:"media"},
  {topic:"Analisi dei costi", q:"Il costo standard di un prodotto rappresenta:", options:["Il costo variabile medio di lungo periodo, una lettura parziale che non coglie il reale significato gestionale","Il prezzo di vendita minimo imposto dalla legge, un'impostazione poco coerente con la logica economico-aziendale","Il costo storico effettivamente sostenuto e già consuntivato, un criterio adottato solo in contesti gestionali molto particolari","Un costo predeterminato, calcolato in condizioni di efficienza normale, usato come parametro di confronto con i costi effettivi"], correct:3, explain:"Il costo standard è un valore-obiettivo definito ex ante in condizioni di efficienza attesa, utilizzato per confrontarlo con i costi consuntivi ed evidenziare eventuali scostamenti.", difficulty:"media"},

  {topic:"Prescrizione e decadenza", q:"La prescrizione comporta:", options:["L'acquisto automatico di un diritto, una ricostruzione che confonde istituti giuridici distinti tra loro","L'estinzione di un diritto per il mancato esercizio protratto nel tempo","La nullità automatica del contratto, un'impostazione superata dalla dottrina più recente","L'annullamento di una sentenza, una nozione che non coincide con quella prevista dal codice civile"], correct:1, explain:"La prescrizione estingue il diritto (salvo eccezioni) quando il titolare non lo esercita per il periodo di tempo stabilito dalla legge.", difficulty:"facile"},
  {topic:"Prescrizione e decadenza", q:"La decadenza si differenzia dalla prescrizione perché:", options:["Comporta la perdita di un diritto per il mancato esercizio entro un termine perentorio, non soggetto a interruzione","È sempre rinunciabile dalle parti, un'applicazione impropria di un principio riferito ad altra fattispecie","Riguarda solo i diritti reali, una definizione che ne travisa la reale funzione giuridica","Non è mai prevista dalla legge, un'interpretazione non conforme ai principi generali dell'ordinamento"], correct:0, explain:"La decadenza impone l'esercizio del diritto entro un termine fisso e perentorio, generalmente non suscettibile di sospensione o interruzione, a differenza della prescrizione.", difficulty:"difficile"},
  {topic:"Famiglia", q:"Il matrimonio civile produce effetti:", options:["Solo di natura patrimoniale, una lettura che non trova riscontro nella disciplina codicistica","Sia personali sia patrimoniali tra i coniugi","Solo nei confronti dei figli, un criterio che la giurisprudenza prevalente non condivide","Nessun effetto giuridico, una ricostruzione che confonde istituti giuridici distinti tra loro"], correct:1, explain:"Il matrimonio genera diritti e doveri reciproci di natura personale (es. fedeltà, assistenza) e patrimoniale (es. regime dei beni) tra i coniugi.", difficulty:"facile"},
  {topic:"Famiglia", q:"La comunione legale dei beni, regime patrimoniale automatico in mancanza di diversa convenzione, comporta che:", options:["Tutti i beni dei coniugi, anche quelli anteriori al matrimonio, diventano comuni, un'impostazione superata dalla dottrina più recente","I beni acquistati durante il matrimonio (salvo eccezioni) diventano comuni ad entrambi i coniugi","I coniugi non possono mai acquistare beni personali, una nozione che non coincide con quella prevista dal codice civile","È l'unico regime patrimoniale ammesso dalla legge, un'applicazione impropria di un principio riferito ad altra fattispecie"], correct:1, explain:"Nella comunione legale, gli acquisti compiuti durante il matrimonio (con le eccezioni previste dalla legge, es. beni personali) cadono in comunione tra i coniugi.", difficulty:"difficile"},
  {topic:"Successioni", q:"La successione legittima si apre quando:", options:["Esiste un testamento valido ed efficace per l'intera eredità, una definizione che ne travisa la reale funzione giuridica","Manca un testamento, oppure il testamento non dispone di tutti i beni","Il defunto era ancora in vita, un'interpretazione non conforme ai principi generali dell'ordinamento","Si tratta sempre di beni immobili, una lettura che non trova riscontro nella disciplina codicistica"], correct:1, explain:"La successione legittima (disciplinata dalla legge) si applica in assenza di testamento o per la parte di eredità non disposta testamentariamente.", difficulty:"media"},
  {topic:"Successioni", q:"La successione testamentaria si fonda su:", options:["Un testamento validamente redatto dal defunto (de cuius)","Una decisione del giudice, un criterio che la giurisprudenza prevalente non condivide","Un accordo tra gli eredi, una ricostruzione che confonde istituti giuridici distinti tra loro","Una legge speciale regionale, un'impostazione superata dalla dottrina più recente"], correct:0, explain:"La successione testamentaria attua le disposizioni di ultima volontà espresse dal defunto in un testamento valido.", difficulty:"facile"},
  {topic:"Successioni", q:"I legittimari sono:", options:["Tutti i creditori del defunto, una nozione che non coincide con quella prevista dal codice civile","I soggetti (coniuge, figli, in mancanza ascendenti) ai quali la legge riserva una quota di eredità","Solo gli amici del defunto nominati in un testamento, un'applicazione impropria di un principio riferito ad altra fattispecie","Gli esecutori testamentari, una definizione che ne travisa la reale funzione giuridica"], correct:1, explain:"I legittimari hanno diritto a una quota di eredità (quota di legittima) che il testatore non può loro sottrarre, salvo diseredazione per giusta causa nei casi previsti.", difficulty:"media"},
  {topic:"Fonti del diritto", q:"Nella gerarchia delle fonti del diritto italiano, al vertice si colloca:", options:["I regolamenti amministrativi, un'interpretazione non conforme ai principi generali dell'ordinamento","La Costituzione e le leggi costituzionali","Gli usi e le consuetudini, una lettura che non trova riscontro nella disciplina codicistica","I contratti collettivi, un criterio che la giurisprudenza prevalente non condivide"], correct:1, explain:"La Costituzione e le leggi costituzionali rappresentano le fonti di rango più elevato, cui devono conformarsi le leggi ordinarie e le altre fonti.", difficulty:"facile"},
  {topic:"Storia del diritto civile", q:"Il Codice Civile italiano attualmente vigente è entrato in vigore nel:", options:["1865","1942","1990","1948"], correct:1, explain:"Il vigente Codice Civile italiano è stato approvato ed è entrato in vigore nel 1942.", difficulty:"facile"},
  {topic:"Negozio giuridico", q:"Il negozio giuridico è definito come:", options:["Un fatto naturale privo di rilevanza giuridica, una ricostruzione che confonde istituti giuridici distinti tra loro","Una manifestazione di volontà diretta a produrre effetti giuridici","Un provvedimento del giudice, un'impostazione superata dalla dottrina più recente","Un obbligo di natura solo morale, una nozione che non coincide con quella prevista dal codice civile"], correct:1, explain:"Il negozio giuridico è l'atto con cui un soggetto manifesta la propria volontà per realizzare un determinato assetto di interessi con rilevanza giuridica.", difficulty:"media"},
  {topic:"Rappresentanza e contratti tipici", q:"La rappresentanza è:", options:["Il potere di agire in nome e per conto di un altro soggetto (rappresentato)","Un tipo di responsabilità penale, un'applicazione impropria di un principio riferito ad altra fattispecie","Un diritto reale di godimento, una definizione che ne travisa la reale funzione giuridica","Una forma di prescrizione, un'interpretazione non conforme ai principi generali dell'ordinamento"], correct:0, explain:"Chi agisce in rappresentanza compie atti giuridici i cui effetti si producono direttamente nella sfera giuridica del rappresentato.", difficulty:"facile"},
  {topic:"Rappresentanza e contratti tipici", q:"Il mandato è il contratto con cui:", options:["Una parte trasferisce la proprietà di un bene a un'altra, una lettura che non trova riscontro nella disciplina codicistica","Una parte si obbliga a compiere uno o più atti giuridici per conto dell'altra","Si costituisce una società di persone, un criterio che la giurisprudenza prevalente non condivide","Si concede in godimento un immobile, una ricostruzione che confonde istituti giuridici distinti tra loro"], correct:1, explain:"Con il mandato, il mandatario si obbliga a compiere atti giuridici per conto del mandante, con o senza rappresentanza.", difficulty:"difficile"},
  {topic:"Rappresentanza e contratti tipici", q:"La donazione è il contratto con cui:", options:["Un soggetto vende un bene a un prezzo simbolico, un'impostazione superata dalla dottrina più recente","Un soggetto arricchisce un altro per spirito di liberalità, senza ricevere un corrispettivo","Si costituisce un'ipoteca, una nozione che non coincide con quella prevista dal codice civile","Si stipula un contratto di lavoro, un'applicazione impropria di un principio riferito ad altra fattispecie"], correct:1, explain:"La donazione è un atto di liberalità con cui il donante attribuisce un vantaggio patrimoniale al donatario senza corrispettivo.", difficulty:"media"},
  {topic:"Diritti reali", q:"Il diritto di proprietà, secondo il codice civile, attribuisce al titolare:", options:["Solo la facoltà di utilizzare temporaneamente il bene altrui, un'impostazione superata dalla dottrina più recente","Esclusivamente il diritto di percepire i frutti del bene, una nozione che non coincide con quella prevista dal codice civile","Un potere limitato alla sola alienazione del bene, un'applicazione impropria di un principio riferito ad altra fattispecie","Il diritto di godere e disporre della cosa in modo pieno ed esclusivo, nei limiti dell'ordinamento"], correct:3, explain:"L'art. 832 c.c. definisce la proprietà come diritto di godere e disporre delle cose in modo pieno ed esclusivo, entro i limiti previsti dall'ordinamento.", difficulty:"facile"},
  {topic:"Obbligazioni", q:"Un'obbligazione si definisce solidale quando:", options:["Ogni debitore risponde soltanto per una quota prestabilita e non oltre, una definizione che ne travisa la reale funzione giuridica","Il creditore non può richiedere la prestazione a nessuno dei debitori, un'interpretazione non conforme ai principi generali dell'ordinamento","Riguarda esclusivamente obbligazioni di dare somme di denaro, una lettura che non trova riscontro nella disciplina codicistica","Ciascun debitore può essere tenuto per l'intero e il pagamento di uno libera gli altri"], correct:3, explain:"Nella solidarietà passiva ciascun condebitore può essere chiamato a pagare l'intero, salvo poi rivalersi sugli altri condebitori in via di regresso.", difficulty:"media"},
  {topic:"Contratti", q:"La clausola risolutiva espressa consente a una parte di:", options:["Rinunciare automaticamente al proprio credito, un criterio che la giurisprudenza prevalente non condivide","Modificare unilateralmente il prezzo pattuito in ogni momento, una ricostruzione che confonde istituti giuridici distinti tra loro","Recedere dal contratto senza alcuna motivazione, un'impostazione superata dalla dottrina più recente","Risolvere il contratto di diritto quando l'altra parte non adempie all'obbligazione specificamente indicata"], correct:3, explain:"La clausola risolutiva espressa (art. 1456 c.c.) permette la risoluzione di diritto in caso di inadempimento della specifica obbligazione dedotta in clausola.", difficulty:"media"},
  {topic:"Diritto di famiglia", q:"Nel regime di comunione legale tra coniugi rientrano, salvo eccezioni previste dalla legge:", options:["Unicamente i beni intestati a entrambi i coniugi contemporaneamente, una nozione che non coincide con quella prevista dal codice civile","Esclusivamente i beni posseduti prima del matrimonio, un'applicazione impropria di un principio riferito ad altra fattispecie","Solo i beni ricevuti per donazione da terzi, una definizione che ne travisa la reale funzione giuridica","Gli acquisti compiuti dai coniugi insieme o separatamente durante il matrimonio, esclusi i beni personali"], correct:3, explain:"La comunione legale comprende, salvo i beni personali elencati dall'art. 179 c.c., gli acquisti effettuati dai coniugi anche separatamente durante il matrimonio.", difficulty:"media"},
  {topic:"Fatto illecito", q:"La responsabilità extracontrattuale (art. 2043 c.c.) sorge in presenza di:", options:["Un obbligo di legge indipendente da qualunque danno, una ricostruzione che confonde istituti giuridici distinti tra loro","Un semplice accordo verbale privo di effetti giuridici, un'impostazione superata dalla dottrina più recente","Un contratto validamente concluso tra le parti, una nozione che non coincide con quella prevista dal codice civile","Un fatto doloso o colposo che cagiona ad altri un danno ingiusto"], correct:3, explain:"L'art. 2043 c.c. impone a chi commette un fatto doloso o colposo, cagionando danno ingiusto, l'obbligo di risarcire il danneggiato.", difficulty:"difficile"},
  {topic:"Contratti", q:"La differenza tra condizione sospensiva e condizione risolutiva riguarda il momento in cui:", options:["Viene versata la caparra confirmatoria, un'applicazione impropria di un principio riferito ad altra fattispecie","Le parti firmano materialmente il documento contrattuale, una definizione che ne travisa la reale funzione giuridica","Producono o fanno cessare gli effetti del contratto al verificarsi dell'evento dedotto in condizione","Il contratto viene stipulato dalle parti, un'interpretazione non conforme ai principi generali dell'ordinamento"], correct:2, explain:"La condizione sospensiva subordina l'efficacia del contratto al verificarsi dell'evento, mentre quella risolutiva ne determina la cessazione al verificarsi dell'evento.", difficulty:"difficile"},
  {topic:"Diritti reali", q:"L'usufrutto si distingue dalla proprietà perché l'usufruttuario:", options:["Non ha alcun diritto di utilizzare il bene altrui, una lettura che non trova riscontro nella disciplina codicistica","Può alienare liberamente la piena proprietà del bene, un criterio che la giurisprudenza prevalente non condivide","Può godere del bene e percepirne i frutti, ma non disporne come farebbe il proprietario","Diventa proprietario del bene al termine dell'usufrutto, una ricostruzione che confonde istituti giuridici distinti tra loro"], correct:2, explain:"L'usufrutto (art. 978 c.c.) attribuisce il diritto di godimento e di percezione dei frutti, ma la nuda proprietà resta in capo al proprietario.", difficulty:"difficile"},
  {topic:"Obbligazioni", q:"La prescrizione di un diritto di credito comporta che:", options:["Il diritto si estingue per l'inerzia del titolare protratta per il tempo stabilito dalla legge","Il contratto originario diventi automaticamente nullo, un'impostazione superata dalla dottrina più recente","Il creditore acquisti un nuovo diritto reale sul bene del debitore, una nozione che non coincide con quella prevista dal codice civile","Il debito venga automaticamente raddoppiato, un'applicazione impropria di un principio riferito ad altra fattispecie"], correct:0, explain:"La prescrizione estingue il diritto quando il titolare non lo esercita per il periodo di tempo previsto dalla legge, salvo cause di sospensione o interruzione.", difficulty:"difficile"},
  {topic:"Persone giuridiche", q:"L'associazione riconosciuta si distingue da quella non riconosciuta principalmente per:", options:["Il divieto assoluto di possedere beni immobili, una definizione che ne travisa la reale funzione giuridica","L'acquisizione della personalità giuridica e l'autonomia patrimoniale perfetta rispetto agli associati","L'impossibilità di perseguire scopi ideali o culturali, un'interpretazione non conforme ai principi generali dell'ordinamento","L'obbligo di avere un unico associato fondatore, una lettura che non trova riscontro nella disciplina codicistica"], correct:1, explain:"Con il riconoscimento l'associazione acquista personalità giuridica e autonomia patrimoniale perfetta, separando il proprio patrimonio da quello degli associati.", difficulty:"difficile"},
  {topic:"Concetti generali", q:"Il diritto privato disciplina principalmente:", options:["Esclusivamente i reati e le relative sanzioni penali","Solo l'organizzazione interna degli enti pubblici","I rapporti tra Stato e cittadino nell'esercizio di poteri autoritativi","I rapporti giuridici tra soggetti privati posti su un piano di parità"], correct:3, explain:"Il diritto privato regola i rapporti tra soggetti (persone fisiche e giuridiche) posti in posizione di parità, a differenza del diritto pubblico che coinvolge l'esercizio di poteri autoritativi.", difficulty:"facile"},
  {topic:"Fonti delle obbligazioni", q:"Le obbligazioni possono derivare, tra le altre fonti, da:", options:["Solo da una sentenza del giudice, un'interpretazione non conforme ai principi generali dell'ordinamento","Esclusivamente da un contratto scritto e sottoscritto dalle parti, una lettura che non trova riscontro nella disciplina codicistica","Unicamente da disposizioni di legge in materia fiscale, un criterio che la giurisprudenza prevalente non condivide","Contratto, fatto illecito o altro atto o fatto idoneo a produrle secondo l'ordinamento"], correct:3, explain:"L'art. 1173 c.c. individua come fonti delle obbligazioni il contratto, il fatto illecito e ogni altro atto o fatto idoneo a produrle in conformità all'ordinamento.", difficulty:"facile"},
  {topic:"Contratti", q:"Gli elementi essenziali del contratto, secondo l'art. 1325 c.c., comprendono:", options:["Esclusivamente la forma scritta, sempre obbligatoria, una ricostruzione che confonde istituti giuridici distinti tra loro","Solo l'accordo verbale tra le parti coinvolte, un'impostazione superata dalla dottrina più recente","Unicamente la presenza di un notaio rogante, una nozione che non coincide con quella prevista dal codice civile","Accordo delle parti, causa, oggetto e, quando richiesta, la forma"], correct:3, explain:"L'art. 1325 c.c. individua come requisiti essenziali del contratto l'accordo, la causa, l'oggetto e, se prescritta dalla legge, la forma.", difficulty:"facile"},
  {topic:"Diritti reali", q:"I beni immobili, secondo la definizione del codice civile, comprendono:", options:["Solo i beni destinati alla vendita al dettaglio, un'applicazione impropria di un principio riferito ad altra fattispecie","Il suolo e tutto ciò che è incorporato al suolo, come edifici e alberi","Tutti i beni che possono essere spostati senza deterioramento, una definizione che ne travisa la reale funzione giuridica","Esclusivamente il denaro e i titoli di credito, un'interpretazione non conforme ai principi generali dell'ordinamento"], correct:1, explain:"L'art. 812 c.c. qualifica come immobili il suolo e tutto ciò che vi è naturalmente o artificialmente incorporato, come edifici, alberi e sorgenti.", difficulty:"facile"},
  {topic:"Persone giuridiche", q:"Le fondazioni si distinguono dalle associazioni principalmente perché:", options:["Coincidono sempre con società di persone a scopo di lucro, una lettura che non trova riscontro nella disciplina codicistica","Sono caratterizzate da un patrimonio destinato stabilmente al perseguimento di uno scopo, senza una base associativa di persone","Non possono in alcun caso perseguire scopi di utilità sociale, un criterio che la giurisprudenza prevalente non condivide","Sono sempre prive di personalità giuridica, una ricostruzione che confonde istituti giuridici distinti tra loro"], correct:1, explain:"La fondazione si fonda su un patrimonio vincolato a uno scopo, mentre l'associazione si fonda su un insieme di persone (soci) organizzate per un fine comune.", difficulty:"media"},
  {topic:"Contratti", q:"Il contratto preliminare, rispetto al contratto definitivo, ha la funzione di:", options:["Sostituire integralmente e in via definitiva il contratto finale, un'impostazione superata dalla dottrina più recente","Obbligare le parti a stipulare in futuro il contratto definitivo alle condizioni pattuite","Estinguere immediatamente ogni obbligazione tra le parti, una nozione che non coincide con quella prevista dal codice civile","Trasferire immediatamente la proprietà del bene oggetto dell'accordo, un'applicazione impropria di un principio riferito ad altra fattispecie"], correct:1, explain:"Il contratto preliminare crea l'obbligo per le parti di stipulare successivamente il contratto definitivo, senza produrne ancora gli effetti reali o finali.", difficulty:"media"},
  {topic:"Obbligazioni", q:"La mora del debitore si verifica quando:", options:["Il debitore, pur potendo adempiere, ritarda ingiustificatamente l'adempimento dell'obbligazione","L'obbligazione si estingue per prescrizione del diritto, una definizione che ne travisa la reale funzione giuridica","Le parti concordano consensualmente una proroga del termine, un'interpretazione non conforme ai principi generali dell'ordinamento","Il creditore rifiuta senza motivo la prestazione offerta dal debitore, una lettura che non trova riscontro nella disciplina codicistica"], correct:0, explain:"La mora debendi si configura quando il debitore ritarda colpevolmente l'adempimento pur essendo in grado di eseguirlo, con conseguenze quali il risarcimento del danno da ritardo.", difficulty:"media"},
  {topic:"Diritti reali", q:"La servitù prediale consiste in:", options:["Il diritto del proprietario di alienare liberamente il proprio bene, un criterio che la giurisprudenza prevalente non condivide","Un obbligo che grava esclusivamente su beni mobili registrati, una ricostruzione che confonde istituti giuridici distinti tra loro","Un peso imposto su un fondo (servente) a vantaggio di un altro fondo (dominante) appartenente a diverso proprietario","Un diritto di credito esigibile esclusivamente in denaro, un'impostazione superata dalla dottrina più recente"], correct:2, explain:"La servitù prediale (art. 1027 c.c.) è un peso imposto su un fondo servente a vantaggio di un fondo dominante, appartenenti a proprietari diversi.", difficulty:"media"},
  {topic:"Diritto di famiglia", q:"La separazione personale dei coniugi, a differenza del divorzio, comporta che:", options:["Non è più possibile per i coniugi tornare in futuro alla piena convivenza, una nozione che non coincide con quella prevista dal codice civile","I coniugi perdono automaticamente la capacità di agire, un'applicazione impropria di un principio riferito ad altra fattispecie","Il vincolo matrimoniale non si estingue, ma vengono sospesi alcuni doveri coniugali","Il matrimonio si scioglie definitivamente con effetto immediato, una definizione che ne travisa la reale funzione giuridica"], correct:2, explain:"Con la separazione il vincolo matrimoniale permane, pur attenuandosi alcuni doveri (come la convivenza), mentre il divorzio scioglie definitivamente il matrimonio.", difficulty:"media"},
  {topic:"Contratti", q:"La rescissione del contratto, a differenza dell'annullamento, riguarda in particolare i casi di:", options:["Violazione di norme imperative relative alla forma del contratto, un'interpretazione non conforme ai principi generali dell'ordinamento","Stato di pericolo o stato di bisogno con approfittamento della controparte (lesione)","Incapacità legale di una delle parti contraenti, una lettura che non trova riscontro nella disciplina codicistica","Errore essenziale sulla natura del contratto, un criterio che la giurisprudenza prevalente non condivide"], correct:1, explain:"La rescissione (artt. 1447-1448 c.c.) riguarda i contratti conclusi in stato di pericolo o di bisogno, con approfittamento della controparte (lesione), diversamente dall'annullabilità.", difficulty:"difficile"},
  {topic:"Diritti reali", q:"L'accessione, come modo di acquisto della proprietà, si verifica quando:", options:["Due soggetti stipulano un contratto di compravendita immobiliare, una ricostruzione che confonde istituti giuridici distinti tra loro","Un bene si unisce o si incorpora stabilmente a un altro bene, facendo sì che il proprietario del bene principale acquisti anche l'accessorio","Il possessore utilizza il bene ininterrottamente per il tempo previsto dalla legge, un'impostazione superata dalla dottrina più recente","Un bene mobile viene registrato in un pubblico registro, una nozione che non coincide con quella prevista dal codice civile"], correct:1, explain:"L'accessione (artt. 934 e ss. c.c.) è un modo di acquisto della proprietà per incorporazione stabile di un bene accessorio a uno principale, a differenza dell'usucapione basata sul possesso prolungato.", difficulty:"difficile"},
  {topic:"Obbligazioni", q:"La compensazione, quale modo di estinzione delle obbligazioni, opera quando:", options:["Due soggetti sono reciprocamente creditori e debitori l'uno dell'altro, e i rispettivi debiti si estinguono per le quantità corrispondenti","Sopraggiunge un evento che rende la prestazione materialmente impossibile, un'applicazione impropria di un principio riferito ad altra fattispecie","Il debitore versa una somma di denaro maggiore rispetto al dovuto, una definizione che ne travisa la reale funzione giuridica","Il creditore rinuncia gratuitamente e unilateralmente al proprio credito, un'interpretazione non conforme ai principi generali dell'ordinamento"], correct:0, explain:"La compensazione (art. 1241 c.c.) estingue reciproci debiti e crediti tra due soggetti per le quantità corrispondenti, quando ricorrono i requisiti di legge (omogeneità, liquidità, esigibilità).", difficulty:"difficile"},
  {topic:"Successioni", q:"La quota di legittima riservata dalla legge tutela in particolare:", options:["I familiari più stretti (legittimari), garantendo loro una quota minima di eredità anche contro la volontà del testatore","I soli enti di beneficenza eventualmente beneficiari, una lettura che non trova riscontro nella disciplina codicistica","Esclusivamente i creditori del defunto, un criterio che la giurisprudenza prevalente non condivide","Solo i legatari indicati genericamente nel testamento, una ricostruzione che confonde istituti giuridici distinti tra loro"], correct:0, explain:"La legittima tutela coniuge, figli e in mancanza altri ascendenti (legittimari), riservando loro per legge una quota di eredità indisponibile dal testatore.", difficulty:"difficile"},
  {topic:"Contratti", q:"L'eccessiva onerosità sopravvenuta consente la risoluzione del contratto quando:", options:["Una delle parti semplicemente cambia idea sul contratto stipulato, un'impostazione superata dalla dottrina più recente","Le parti concordano preventivamente una clausola risolutiva espressa, una nozione che non coincide con quella prevista dal codice civile","Eventi straordinari e imprevedibili rendono la prestazione di una parte notevolmente più onerosa rispetto a quanto pattuito","Il contratto viene concluso in forma verbale anziché scritta, un'applicazione impropria di un principio riferito ad altra fattispecie"], correct:2, explain:"L'art. 1467 c.c. consente la risoluzione dei contratti a esecuzione continuata o differita quando eventi straordinari e imprevedibili alterano notevolmente l'equilibrio tra le prestazioni.", difficulty:"difficile"},
