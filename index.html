  {topic:"Proprietà della media aritmetica (dispensa)", q:"Un appello universitario con 46 iscritti è diviso in 2 turni: 37 studenti nel 1° turno con media 28,3 e 9 studenti nel 2° turno con media 25,6. Quale proprietà della media aritmetica si utilizza per calcolare il voto medio complessivo (27,8) senza dover ricalcolare tutti i singoli voti?", options:["La proprietà per cui la media generale è la media ponderata delle medie dei sottogruppi, con pesi pari alle loro numerosità","La proprietà per cui la mediana è meno sensibile ai valori estremi","La proprietà secondo cui la somma dei valori è pari al prodotto tra media e numerosità, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","La proprietà per cui la media di una trasformazione lineare è a·media+b, una grandezza calcolata sulla base della distribuzione marginale della variabile"], correct:0, explain:"La quarta proprietà della media aritmetica permette di ottenere la media generale come media ponderata delle medie dei sottoinsiemi, usando come pesi le rispettive numerosità: (28,3×37+25,6×9)/46 = 27,8.", difficulty:"media"},
  {topic:"Proprietà della media aritmetica (dispensa)", q:"Un sito americano vende 10 libri con prezzo medio di 32,5 dollari. Sapendo che il cambio dollaro/euro è 0,9 e che ogni libro comporta 2 euro di spese postali, il prezzo medio in euro (31,25€) si ottiene applicando quale proprietà della media?", options:["La proprietà secondo cui la media di una trasformazione lineare Y=αX+β è pari a α volte la media di X più β","La proprietà secondo cui la somma degli scarti dalla media è nulla, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","La proprietà secondo cui il coefficiente di variazione è adimensionale, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","La proprietà secondo cui la mediana è meno sensibile ai valori estremi, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte"], correct:0, explain:"Applicando Y=αX+β con α=0,9 e β=2, si ottiene 0,9×32,5+2 = 31,25€: la media di una trasformazione lineare è la stessa trasformazione applicata alla media originaria.", difficulty:"media"},
  {topic:"Media geometrica (dispensa)", q:"Un macchinario produce 10, 15 e 20 pezzi per kWh in tre mesi diversi. Perché la dispensa consiglia la media geometrica (14,42) invece della media aritmetica in questo caso?", options:["Perché con soli tre valori non è possibile calcolare la media aritmetica","Perché i valori rappresentano rapporti/efficienze relative, e la media geometrica tiene conto delle variazioni proporzionali senza sovrastimare il risultato","Perché la media geometrica ignora completamente il valore centrale dei tre mesi","Perché con soli tre valori non è possibile calcolare la media aritmetica, un parametro stimato tramite il metodo dei momenti applicato al campione"], correct:1, explain:"La media geometrica è indicata per dati di natura moltiplicativa o proporzionale, come rapporti o tassi di efficienza, e fornisce un valore più realistico della media aritmetica in questi casi.", difficulty:"media"},
  {topic:"Media geometrica (dispensa)", q:"Un risparmiatore ottiene tassi di interesse annui del 1,5%, 2%, 7,2%, 9%, 7,4% e 4,5% in sei anni successivi. Il tasso di interesse medio annuo, calcolato come media geometrica dei coefficienti di incremento, risulta pari al 5,23%. Quale coefficiente si utilizza per ciascun anno prima di applicare la radice sesta?", options:["Il capitale a fine anno diviso il capitale iniziale dell'intero periodo","Il coefficiente di incremento (1 + tasso di interesse dell'anno)","Il tasso di interesse medio aritmetico calcolato sui sei anni","La differenza tra il tasso dell'anno e quello dell'anno precedente"], correct:1, explain:"Si calcola la media geometrica dei coefficienti di incremento (1+tasso) di ciascun anno; nell'esempio: (1,015×1,02×1,072×1,09×1,074×1,045)^(1/6) ≈ 1,05229, cioè un tasso medio del 5,23%.", difficulty:"difficile"},
  {topic:"Trimmed mean (dispensa)", q:"Dati i valori 3, 5, 5, 6, 8, 8, 9, 150, la trimmed mean al 50% esclude il 25% dei valori più piccoli e il 25% più grandi, ottenendo una media di 6,75 sui valori centrali (5,6,8,8). Qual è il principale motivo per usare la trimmed mean invece della media aritmetica in questo caso?", options:["Aumentare artificialmente il valore medio calcolato, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Aumentare artificialmente il valore medio calcolato","Ridurre l'effetto distorsivo del valore anomalo 150 sulla sintesi della distribuzione","Evitare di dover ordinare i dati prima del calcolo, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi"], correct:2, explain:"La trimmed mean riduce l'influenza dei valori estremi (come 150) escludendo una quota di valori più piccoli e più grandi, a differenza della media aritmetica che ne risente pienamente (in questo caso la media aritmetica sarebbe 24,5).", difficulty:"media"},
  {topic:"Mediana (dispensa)", q:"Cinque negozi vendono rispettivamente 18, 27, 15, 11 e 6 capi in un giorno. Ordinando i valori (6,11,15,18,27), qual è la mediana della distribuzione?", options:["11","18","15","16,5"], correct:2, explain:"Con n=5 (dispari), l'unità centrale ha posizione (5+1)/2=3, che corrisponde al valore 15 nella serie ordinata 6,11,15,18,27.", difficulty:"facile"},
  {topic:"Mediana (dispensa)", q:"Aggiungendo un sesto negozio con 20 capi venduti alla serie precedente (6,11,15,18,20,27), la mediana ora si calcola come semisomma di due valori centrali, ottenendo 16,5. Quali sono le due posizioni centrali quando n è pari?", options:["Le posizioni n/2 e (n/2)+1","Le posizioni (n+1)/2 e (n+1)/2 −1","La prima e l'ultima posizione della serie ordinata","Le posizioni corrispondenti al primo e all'ultimo quartile"], correct:0, explain:"Quando n è pari, le due unità centrali si trovano alle posizioni n/2 e (n/2)+1; nell'esempio, posizioni 3 e 4, cioè i valori 15 e 18, la cui semisomma è 16,5.", difficulty:"facile"},
  {topic:"Mediana (dispensa)", q:"Secondo l'indagine ISTAT 'Reddito e condizioni di vita' del 2018 citata a lezione, per le famiglie italiane nel 2017 il reddito medio mensile era di 2.616 euro contro un reddito mediano di 2.120 euro. Perché in questo caso la mediana è considerata più rappresentativa della media?", options:["Perché la media aritmetica in questo caso è più bassa del reddito reale della maggioranza delle famiglie","Perché alcune famiglie con redditi molto elevati distorcono verso l'alto la media aritmetica, mentre la maggior parte delle famiglie ha un reddito inferiore a 2.616 euro","Perché il reddito familiare non può essere sintetizzato tramite alcun indice di posizione","Perché la media aritmetica in questo caso è più bassa del reddito reale della maggioranza delle famiglie, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate"], correct:1, explain:"La media risente dei valori estremi (redditi molto alti di poche famiglie), mentre la mediana indica che almeno metà delle famiglie ha un reddito inferiore o uguale a 2.120 euro, risultando più rappresentativa della distribuzione tipica.", difficulty:"media"},
  {topic:"Mediana per classi (dispensa)", q:"In una distribuzione di 115 impiegati per classi di anni di servizio (0-1, 1-5, 5-10, 10-20, 20-30), la classe mediana risulta essere 5-10 con frequenza cumulata relativa che passa da 0,22 a 0,61. Applicando l'interpolazione lineare, la mediana approssimata è pari a 8,59. Quale formula si utilizza per questo calcolo?", options:["Me ≈ media aritmetica semplice dei valori centrali di tutte le classi, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe, una grandezza calcolata sulla base della distribuzione marginale della variabile","Me ≈ estremo inferiore della classe mediana + [(0,5 − frequenza cumulata classe precedente)/(frequenza cumulata classe mediana − frequenza cumulata classe precedente)] × ampiezza della classe mediana","Me ≈ valore centrale della classe mediana, senza alcuna correzione, un parametro stimato tramite il metodo dei momenti applicato al campione, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Me ≈ estremo superiore della classe precedente alla mediana, un indice che si ottiene dalla trasformazione logaritmica dei dati originari, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata"], correct:1, explain:"La formula di interpolazione lineare per la mediana approssimata di un carattere suddiviso in classi utilizza l'estremo inferiore della classe mediana corretto in proporzione alla posizione relativa del 50% all'interno della classe.", difficulty:"difficile"},
  {topic:"Varianza (dispensa)", q:"5 studenti prendono i voti 18, 19, 23, 28, 30 (media 23,6). La dispensa calcola una varianza di 22,64. Cosa succederebbe alla varianza se tutti gli studenti avessero preso lo stesso voto, ad esempio 25?", options:["La varianza diventerebbe negativa, essendo i voti tutti uguali tra loro","La varianza aumenterebbe, perché il voto 25 è diverso dalla media originaria di 23,6","La varianza rimarrebbe 22,64, indipendentemente dai valori osservati","La varianza sarebbe pari a zero, perché non ci sarebbe alcuna dispersione dei valori dalla media"], correct:3, explain:"La varianza è la media dei quadrati degli scarti dalla media: se tutte le osservazioni coincidono con la media, ogni scarto è zero e quindi la varianza è nulla, come indicato esplicitamente nella dispensa.", difficulty:"facile"},
  {topic:"Varianza di una trasformazione lineare (dispensa)", q:"Una variabile X ha media 5,6 e varianza 125,64. Applicando la trasformazione Y=3X+4, la dispensa calcola Var(Y)=1130,76. Come si ottiene questo risultato?", options:["Sommando alla varianza di X il valore di β al quadrato","Moltiplicando la varianza di X per il coefficiente α e sommando β (cioè 3×125,64+4)","Dividendo la varianza di X per il coefficiente α","Moltiplicando la varianza di X per il quadrato del coefficiente α (cioè 3² × 125,64)"], correct:3, explain:"La varianza di una trasformazione lineare Y=αX+β è Var(Y)=α²·Var(X): nell'esempio, 3²×125,64 = 1.130,76. Da notare che β non influisce sulla varianza, perché è una traslazione che non cambia la dispersione.", difficulty:"media"},
  {topic:"Difetto della varianza (dispensa)", q:"La dispensa segnala che, misurando la statura in cm, la varianza risulta espressa in cm². Qual è la conseguenza pratica di questo problema, e come viene risolto?", options:["Il problema si risolve moltiplicando la varianza per 100 per ottenere una percentuale, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","Il problema si risolve moltiplicando la varianza per 100 per ottenere una percentuale","La varianza in cm² è comunque più precisa della deviazione standard in cm, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","La varianza non è nella stessa unità di misura dei dati originali; si risolve calcolando la deviazione standard, che è la radice quadrata della varianza"], correct:3, explain:"Poiché la varianza deriva da scarti elevati al quadrato, la sua unità di misura è al quadrato rispetto ai dati originali; la deviazione standard, essendo la radice quadrata della varianza, riporta l'indice alla stessa unità di misura dei dati.", difficulty:"media"},
  {topic:"Coefficiente di variazione (dispensa)", q:"Due dispositivi anti-inquinanti A e B emettono rispettivamente in media 64,67 e 34,22 g/min di pulviscolo, con deviazioni standard di 13,65 e 12,02. Guardando solo le deviazioni standard sembrerebbe che A sia più variabile di B, ma calcolando i coefficienti di variazione (CV_A=21%, CV_B=35%) si scopre il contrario. Perché?", options:["Perché il calcolo del CV corregge un errore di misurazione presente nei dati originali, un parametro stimato tramite il metodo dei momenti applicato al campione","Perché A e B hanno lo stesso numero di osservazioni e quindi il confronto diretto è comunque valido, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Perché il calcolo del CV corregge un errore di misurazione presente nei dati originali","Perché il CV, essendo un rapporto tra deviazione standard e media, tiene conto delle diverse grandezze medie dei due dataset, mentre la deviazione standard da sola no"], correct:3, explain:"Il CV (deviazione standard/media × 100) è un indice relativo: pur avendo una deviazione standard assoluta minore, B ha anche una media molto più bassa, il che lo rende relativamente più variabile di A.", difficulty:"difficile"},
  {topic:"Teorema di Chebyshev (dispensa)", q:"La statura media di una popolazione è 170 cm con deviazione standard 20 cm. Applicando il teorema di Chebyshev con k=2, la dispensa conclude che non più del 25% della popolazione ha una statura superiore a 210 cm o inferiore a 130 cm. Da dove deriva il valore soglia del 25%?", options:["Dal presupposto che la distribuzione della statura sia esattamente Normale","Dal rapporto tra deviazione standard e media (coefficiente di variazione)","Da una stima empirica basata sui soli dati osservati nel campione","Dal limite 1/k² del teorema di Chebyshev, con k=2 (cioè 1/4=0,25)"], correct:3, explain:"Il teorema di Chebyshev afferma che f(|xi−media|≥kσ) ≤ 1/k²; con k=2 si ottiene 1/4=25%, valido per qualunque distribuzione, senza assumerne la forma.", difficulty:"media"},
  {topic:"Teorema di Markov (dispensa)", q:"In un supermercato ci sono 200 persone con una media di denaro contante di 40€. Applicando il teorema di Markov con a=150€, la dispensa stima che al massimo 53 persone possiedano almeno 150€. Quale limite teorico viene usato per questo calcolo?", options:["f(X≥a) ≤ a/media, valido solo per variabili con media nulla, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","f(X≥a) ≤ 1/a², indipendentemente dal valore della media, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","f(X≥a) ≤ deviazione standard/a, applicabile a qualunque tipo di variabile, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","f(X≥a) ≤ media/a, applicabile solo se la variabile assume esclusivamente valori non negativi"], correct:3, explain:"Il teorema di Markov si applica a variabili non negative e stabilisce che f(X≥a) ≤ media/a; nell'esempio: 40/150 ≈ 0,2667, da cui 200×0,2667≈53 persone al massimo.", difficulty:"media"},
  {topic:"Standardizzazione (dispensa)", q:"Data la serie di valori 2,4,5,5,6,8,10,12,18,20 con media 9 e deviazione standard 5,73, la standardizzazione trasforma ciascun valore xi in yi=(xi−media)/deviazione standard. Quali sono media e deviazione standard della distribuzione dei valori standardizzati risultanti?", options:["Media e deviazione standard che dipendono comunque dall'unità di misura originaria dei dati","Media pari a 1 e deviazione standard pari a 0","Media pari a 9 e deviazione standard pari a 5,73, identiche a quelle originarie","Media pari a 0 e deviazione standard pari a 1, indipendentemente dai dati di partenza"], correct:3, explain:"Per costruzione, la standardizzazione produce sempre una distribuzione con media 0 e deviazione standard 1, rendendo le variabili confrontabili indipendentemente dalla loro scala e unità di misura originaria.", difficulty:"facile"},
  {topic:"Concentrazione e Gini (dispensa)", q:"In un esempio della dispensa, 5 individui possiedono rispettivamente 20, 40, 80, 80 e 180 euro di contante (totale 400€). Il rapporto di concentrazione di Gini calcolato su questi dati risulta pari a 0,45. Se invece tutti e 5 gli individui possedessero 80€ ciascuno, quale sarebbe il valore dell'indice di Gini?", options:["0,45, lo stesso valore del caso originario, perché l'indice non dipende dalla distribuzione effettiva","Un valore negativo, dato che tutti gli individui possiedono lo stesso importo","0, perché si tratterebbe di una situazione di perfetta equidistribuzione","1, perché aumenterebbe la concentrazione rispetto al caso originario"], correct:2, explain:"Quando l'ammontare è equidistribuito (ogni unità possiede la stessa quota), l'indice di Gini raggiunge il suo valore minimo pari a 0, come mostrato esplicitamente nell'esempio della dispensa con 80€ a testa.", difficulty:"media"},
  {topic:"Concentrazione e Gini (dispensa)", q:"Nell'esempio di massima concentrazione della dispensa, un solo individuo su 5 possiede l'intero ammontare di 400€ mentre gli altri 4 non possiedono nulla. Quale valore assume in questo caso il rapporto di concentrazione di Gini?", options:["Un valore che dipende dal numero totale di euro posseduti, non dalla loro distribuzione","0,5, un valore intermedio tra le due situazioni estreme","1, il valore massimo possibile dell'indice","0, il valore minimo possibile dell'indice"], correct:2, explain:"Quando l'intero ammontare è concentrato in un'unica unità, il rapporto di concentrazione di Gini assume il suo valore massimo pari a 1, come mostrato nell'esempio della dispensa.", difficulty:"media"},
  {topic:"Curva di Lorenz (dispensa)", q:"Nella curva di Lorenz, gli assi rappresentano rispettivamente le frequenze relative cumulate delle unità (Fi) e le corrispondenti quote cumulate di ammontare del carattere (Qi). Cosa indica una spezzata di concentrazione molto vicina alla linea di equidistribuzione (la diagonale a 45°)?", options:["Che l'intero ammontare del carattere è posseduto da una sola unità","Che l'ammontare del carattere è distribuito in modo relativamente omogeneo tra le unità del collettivo","Che il carattere osservato non è di tipo trasferibile e quindi la curva non ha significato","Che la deviazione standard del carattere osservato è pari a zero"], correct:1, explain:"Più la spezzata di concentrazione è vicina alla linea di equidistribuzione (dove Qi=Fi per ogni i), più l'ammontare del carattere risulta equamente ripartito tra le unità del collettivo.", difficulty:"media"},
  {topic:"Correlazione lineare (dispensa)", q:"In un esempio della dispensa su 7 unità, si ottiene una covarianza di -6,76 e un coefficiente di correlazione di Pearson pari a -1. Cosa indica esattamente un valore di correlazione uguale a -1?", options:["Che tra le due variabili esiste un perfetto legame lineare di segno discorde (al crescere di una, l'altra diminuisce in modo perfettamente proporzionale)","Che una delle due variabili ha varianza nulla, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Che la relazione tra le due variabili non può essere rappresentata da una retta, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Che le due variabili sono completamente indipendenti tra loro, un parametro stimato tramite il metodo dei momenti applicato al campione"], correct:0, explain:"Un coefficiente di correlazione pari a -1 indica un perfetto legame lineare discorde tra le variabili: crescendo l'una, l'altra decresce in modo esattamente proporzionale, come nell'esempio con covarianza -6,76.", difficulty:"media"},
  {topic:"Correlazione lineare (dispensa)", q:"Nell'esempio del libro di testo citato a lezione (25 studenti, voti scritto e orale di statistica), il coefficiente di correlazione lineare risulta ρ=0,609. Come si interpreta correttamente questo valore secondo la dispensa?", options:["Una correlazione abbastanza alta e positiva: a voti alti nello scritto corrispondono in genere voti alti anche nell'orale","L'assenza totale di relazione tra i risultati delle due prove, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Un errore di calcolo, poiché il coefficiente di correlazione non può superare 0,5, una grandezza calcolata sulla base della distribuzione marginale della variabile","Una correlazione perfetta e negativa tra le due prove d'esame, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi"], correct:0, explain:"Un valore di 0,609, essendo positivo e relativamente vicino a 1, indica che i voti dello scritto e dell'orale tendono a variare nella stessa direzione con un'associazione abbastanza marcata.", difficulty:"media"},
  {topic:"Regressione lineare (dispensa)", q:"Nell'esempio della dispensa su 20 aree amministrative (redditi pro-capite 1989 e 1999), si stima la retta ŷ=0,595+1,255X. Con quale metodo si ottengono questi coefficienti a partire dai dati osservati?", options:["Il metodo del teorema di Bayes applicato alle due variabili quantitative, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","Il metodo dei minimi quadrati, che minimizza la somma dei quadrati degli scarti tra valori osservati e valori stimati dalla retta","Il metodo del coefficiente di variazione applicato alla variabile Y, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","Il metodo della media geometrica applicato ai valori di X e Y, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate"], correct:1, explain:"I coefficienti di regressione β̂0 e β̂1 vengono stimati con il metodo dei minimi quadrati, che minimizza la funzione di perdita data dalla somma dei quadrati degli scarti tra valori osservati e stimati.", difficulty:"media"},
  {topic:"Regressione lineare (dispensa)", q:"Una proprietà della retta di regressione stimata, dimostrata nella dispensa, afferma che tale retta passa sempre per un punto particolare. Quale?", options:["L'origine degli assi (0,0), indipendentemente dai dati osservati","Il punto corrispondente al valore minimo osservato di Y","Il punto di coordinate (media di X, media di Y)","Il punto corrispondente al valore massimo osservato di X"], correct:2, explain:"Poiché β̂0 = ȳ − β̂1·x̄, sostituendo nell'equazione della retta si dimostra che per x=x̄ si ottiene ŷ=ȳ: la retta di regressione stimata passa sempre per il punto (x̄, ȳ).", difficulty:"difficile"},
  {topic:"Assunzioni della regressione (dispensa)", q:"Tra le assunzioni del modello di regressione lineare semplice viste a lezione, l'ipotesi di omoschedasticità richiede che:", options:["I valori della variabile esplicativa X siano affetti da errore di misura","I valori di X siano tutti positivi e crescenti nel tempo","La varianza degli errori sia costante per ogni valore della variabile esplicativa X","I residui siano fortemente correlati con la variabile dipendente Y"], correct:2, explain:"L'omoschedasticità richiede che, per ogni valore fissato di X, gli errori abbiano sempre la stessa varianza σ²; se la variabilità di Y cresce al crescere di X, questa assunzione viene violata.", difficulty:"difficile"},
  {topic:"Teorema di Bayes (dispensa)", q:"In una popolazione il 10% è affetto da una patologia. Un test dà falsi negativi nel 10% dei malati e falsi positivi nel 20% dei sani. Applicando il teorema di Bayes, la dispensa calcola che, risultando positivi al test, la probabilità di essere effettivamente malati è 0,33. Perché questo valore è relativamente basso nonostante il test sembri abbastanza accurato?", options:["Perché la bassa prevalenza della malattia (10%) nella popolazione fa sì che, anche con pochi falsi positivi, il numero assoluto di sani erroneamente positivi sia comunque rilevante rispetto ai malati veri positivi","Perché il teorema di Bayes non è applicabile a problemi di tipo diagnostico, un indice che si ottiene dalla trasformazione logaritmica dei dati originari, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","Perché il teorema di Bayes non è applicabile a problemi di tipo diagnostico","Perché il test ha in realtà una probabilità di errore superiore al 50%, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate"], correct:0, explain:"Con una prevalenza bassa (10%), anche un tasso di falsi positivi relativamente contenuto (20% dei sani, che sono il 90% della popolazione) produce un numero assoluto di falsi positivi paragonabile ai veri positivi, abbassando la probabilità a posteriori.", difficulty:"difficile"},
  {topic:"Teorema di Bayes (dispensa)", q:"In un comune, il 90% dei laureati è occupato contro il 70% dei non laureati; il 50% dei residenti è laureato. Applicando Bayes, la dispensa calcola che la probabilità di essere laureato dato che si è occupati è 0,5625. Quale delle seguenti affermazioni descrive correttamente il ragionamento?", options:["Si combinano le probabilità a priori di essere laureato/non laureato con le rispettive probabilità di essere occupati, per ottenere la probabilità a posteriori di essere laureato dato lo stato occupazionale","Si ignora la probabilità a priori di essere laureato nel calcolo finale","Si calcola semplicemente la media aritmetica tra il 90% e il 70%, un parametro stimato tramite il metodo dei momenti applicato al campione, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Si ignora la probabilità a priori di essere laureato nel calcolo finale, un indice che si ottiene dalla trasformazione logaritmica dei dati originari, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata"], correct:0, explain:"Il teorema di Bayes combina le probabilità a priori (50% laureati, 50% non laureati) con le verosimiglianze (90% e 70% di occupazione rispettivamente) per ottenere la probabilità a posteriori P(laureato|occupato)=0,5625.", difficulty:"difficile"},
  {topic:"Teorema di Bayes (dispensa)", q:"Le probabilità che una squadra di casa vinca, pareggi o perda sono 0,5, 0,3 e 0,2. La bandiera dei tifosi è esposta solo se la squadra non ha perso (quindi con probabilità 1 se vince o pareggia, 0 se perde). Vedendo la bandiera esposta, la dispensa calcola P(vittoria|bandiera)=0,625. Come si ottiene questo risultato?", options:["Dividendo la probabilità di vittoria per la probabilità di sconfitta","Dividendo la probabilità a priori di vittoria (0,5) per la probabilità totale di osservare la bandiera esposta (0,8), calcolata sommando i contributi di vittoria e pareggio","Dividendo la probabilità di vittoria per la probabilità di sconfitta, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Moltiplicando semplicemente 0,5 per 0,3, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe"], correct:1, explain:"P(bandiera)=1×0,5+1×0,3+0×0,2=0,8; quindi P(vittoria|bandiera)=0,5/0,8=0,625, applicando la formula generale del teorema di Bayes con partizione esaustiva degli eventi.", difficulty:"difficile"},
  {topic:"Scostamenti semplici medi (dispensa)", q:"In un ospedale, l'età media delle madri al parto è 22,88 anni (mediana 23). La dispensa calcola uno scostamento semplice medio dalla media pari a 1,47 e dalla mediana pari a 1,43. Che cosa rappresentano questi due indici?", options:["Il rapporto tra deviazione standard e media della distribuzione, un parametro stimato tramite il metodo dei momenti applicato al campione","La media aritmetica dei valori assoluti degli scarti dei dati, rispettivamente dalla media e dalla mediana della distribuzione","La differenza tra il valore massimo e il valore minimo della distribuzione, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","La varianza della distribuzione calcolata in due modi alternativi, una grandezza calcolata sulla base della distribuzione marginale della variabile"], correct:1, explain:"Gli scostamenti semplici medi sono la media aritmetica dei valori assoluti degli scarti dei dati da un valore di riferimento (media o mediana), e non gli scarti al quadrato come nella varianza.", difficulty:"media"},
  {topic:"Requisiti di un indice di variabilità (dispensa)", q:"Secondo la dispensa, quali sono i due requisiti principali che un indice di variabilità dovrebbe soddisfare?", options:["Dipendere esclusivamente dal numero di osservazioni e non dai valori osservati, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Assumere il valore minimo se e solo se tutte le unità hanno la stessa modalità, e aumentare all'aumentare della diversità tra le modalità","Essere sempre compreso tra 0 e 1 ed essere espresso in percentuale, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","Coincidere sempre numericamente con la deviazione standard della distribuzione, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte"], correct:1, explain:"Un buon indice di variabilità deve annullarsi in caso di totale omogeneità (stessa modalità per tutte le unità) e crescere all'aumentare della diversità tra le modalità osservate.", difficulty:"facile"},
  {topic:"Concetti di probabilità (dispensa)", q:"La dispensa presenta tre definizioni di probabilità: classica, frequentista e soggettivista. Pearson lanciò una moneta 24.000 volte ottenendo 12.012 volte testa, calcolando P(Testa)=0,5005. A quale definizione di probabilità corrisponde questo approccio?", options:["La definizione classica, basata sul rapporto tra casi favorevoli e casi possibili ugualmente probabili","Nessuna delle tre definizioni classiche di probabilità menzionate a lezione","La definizione soggettivista, basata sul grado di fiducia personale nell'evento","La definizione frequentista, basata sul limite della frequenza relativa al crescere del numero di prove"], correct:3, explain:"La definizione frequentista definisce la probabilità come il limite della frequenza relativa di un evento quando il numero di prove tende all'infinito, esattamente come nell'esperimento di Pearson con la moneta.", difficulty:"facile"},
  {topic:"Concetti di probabilità (dispensa)", q:"Secondo la definizione soggettivista di probabilità presentata a lezione (paradigma della scommessa di de Finetti), attribuire probabilità 0,7 al verificarsi di un evento E significa:", options:["Che la probabilità dell'evento complementare è pari a 0,7, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Aver osservato l'evento E verificarsi nel 70% delle prove passate, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Che l'evento E è impossibile nel 30% dei casi in modo oggettivo, un parametro stimato tramite il metodo dei momenti applicato al campione","Essere disposti a pagare 7€ per ricevere 10€ solo nel caso in cui E si verifichi"], correct:3, explain:"Secondo de Finetti, la probabilità soggettiva è il prezzo che un individuo coerente ritiene equo pagare per un importo unitario esigibile solo al verificarsi dell'evento: 0,7 significa pagare 7€ per ricevere 10€ se E si verifica.", difficulty:"media"},
  {topic:"Algebra di eventi (dispensa)", q:"In un'urna con 100 palline (30 nere, 70 bianche) si estraggono 3 palline con reimmissione. Definito l'evento A 'non si estrae alcuna pallina nera', qual è la negazione di A secondo la dispensa?", options:["'Si estraggono esattamente 3 palline nere'","'Si estrae almeno una pallina nera'","'Non si estrae alcuna pallina bianca'","'Si estraggono al massimo 2 palline nere'"], correct:1, explain:"La negazione di un evento A è l'evento 'A non si verifica': se A è 'non si estrae alcuna pallina nera', la sua negazione è 'si estrae almeno una pallina nera'.", difficulty:"facile"},
  {topic:"Algebra di eventi (dispensa)", q:"Quale delle seguenti proprietà dell'algebra di eventi, elencata nella dispensa, è corretta?", options:["L'unione di un evento A con se stesso è sempre l'evento impossibile","L'unione di un evento A con la sua negazione è sempre un evento certo (A∪Ā=E)","La negazione di un evento certo è ancora un evento certo","L'intersezione di un evento A con la sua negazione è sempre un evento certo"], correct:1, explain:"Come derivato dai postulati dell'algebra di Boole applicata agli eventi, l'unione di un evento con la propria negazione copre tutto lo spazio campionario, risultando nell'evento certo (A∪Ā=E), mentre la loro intersezione è l'evento impossibile.", difficulty:"media"},
  {topic:"Proprietà assiomatiche della probabilità (dispensa)", q:"Lanciando un dado, sia A l'evento 'esce il numero 2 o 4' (P(A)=0,33) e B l'evento 'esce un numero pari' (P(B)=0,5). Poiché A⊂B, la dispensa verifica la proprietà P(A)≤P(B). Da quale postulato generale deriva questa proprietà?", options:["Se un evento ha probabilità 0, allora corrisponde all'evento certo","La probabilità di unione di due eventi equivale al prodotto delle loro probabilità individuali","Se un evento A è contenuto in un evento B, allora la probabilità di A non può superare quella di B","Se due eventi sono incompatibili, la probabilità della loro unione equivale a 1"], correct:2, explain:"Dai postulati della probabilità deriva che se A⊂B, allora P(A)≤P(B): nell'esempio, A={2,4} è contenuto in B={2,4,6}, quindi P(A)=0,33 ≤ P(B)=0,5.", difficulty:"media"},
  {topic:"Probabilità condizionata (dispensa)", q:"Lanciando un dado, sia A 'esce il numero 2' (P(A)=1/6) e B 'esce un numero pari' (P(B)=3/6). Sapendo che si è verificato B, la dispensa calcola P(A|B)=1/3. Come si ottiene questo valore?", options:["Sommando P(A) e P(B) e dividendo per 2, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Sottraendo P(B) da P(A) in valore assoluto, una grandezza calcolata sulla base della distribuzione marginale della variabile","Restringendo lo spazio campionario ai soli casi favorevoli a B={2,4,6} e considerando quanti di questi sono favorevoli anche ad A","Moltiplicando semplicemente P(A) per P(B), un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi"], correct:2, explain:"Condizionare a B riduce lo spazio campionario a Ω*={2,4,6}; tra questi, solo il caso 2 è favorevole ad A, quindi P(A|B)=1/3, coerentemente con la formula P(A|B)=P(A∩B)/P(B)=（1/6)/(3/6)=1/3.", difficulty:"media"},
  {topic:"Eventi indipendenti (dispensa)", q:"Lanciando un dado, con A 'esce il 2' e B 'esce un numero pari', la dispensa dimostra che P(A|B)=1/3 ≠ P(A)=1/6, concludendo che A e B NON sono indipendenti. Quale criterio generale è stato usato per questa verifica?", options:["Due eventi sono indipendenti se la somma delle loro probabilità è pari a 1, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","Due eventi sono indipendenti se hanno la stessa probabilità di verificarsi, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","Due eventi sono indipendenti se e solo se P(A∩B)=P(A)·P(B), equivalente a verificare che P(A|B)=P(A)","Due eventi sono indipendenti se la loro intersezione è sempre l'evento impossibile, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate"], correct:2, explain:"Il criterio di indipendenza stocastica richiede P(A∩B)=P(A)·P(B); equivalentemente, se A e B fossero indipendenti si avrebbe P(A|B)=P(A), condizione che nell'esempio del dado non è soddisfatta (1/3≠1/6).", difficulty:"media"},
  {topic:"Distribuzione di Poisson (dispensa)", q:"Il numero di chiamate a un centralino di emergenza tra le 22:00 e le 23:00 segue una Poisson con λ=2. La dispensa calcola P(X=0)=0,1353 e P(X=1)=P(X=2)=0,2767. Perché P(X=1) e P(X=2) risultano uguali tra loro in questo caso specifico?", options:["Perché il calcolo nella dispensa contiene un errore di arrotondamento, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Perché con λ=2, applicando la formula P(x)=(λˣ/x!)e⁻λ, i valori per x=1 e x=2 producono coincidentalmente lo stesso risultato numerico","Perché λ=2 rende la distribuzione identica a una Normale standardizzata","Perché in questo caso il valore atteso coincide con la deviazione standard"], correct:1, explain:"Con λ=2: P(X=1)=(2¹/1!)e⁻²=2·e⁻²=0,2707 e P(X=2)=(2²/2!)e⁻²=2·e⁻²=0,2707 (il testo arrotonda a 0,2767): per λ=2 il calcolo di x=1 e x=2 produce esattamente lo stesso valore, poiché λ¹/1!=λ²/2! quando λ=2.", difficulty:"difficile"},
  {topic:"Distribuzione di Poisson (dispensa)", q:"Il numero di pazienti al pronto soccorso in un'ora segue una Poisson con media λ=5. La dispensa calcola P(X≤2)=0,1246. Quale espressione è stata usata per ottenere questo risultato?", options:["Il rapporto tra λ e il valore massimo osservabile della variabile","La somma delle probabilità puntuali P(X=0)+P(X=1)+P(X=2)","Il prodotto tra P(X=0) e P(X=2)","Il complementare della probabilità di ricevere esattamente 5 pazienti"], correct:1, explain:"P(X≤2) si ottiene sommando le probabilità puntuali P(X=0)=0,0067, P(X=1)=0,0337 e P(X=2)=0,0842, per un totale di 0,1246, come mostrato esplicitamente nella dispensa.", difficulty:"media"},
  {topic:"Poisson come approssimazione della Binomiale (dispensa)", q:"Un'azienda produce schede con l'1,2% di probabilità di difetto. Su 100 schede selezionate, la dispensa calcola P(X=3 difettose) sia con la Binomiale (0,0866) sia con la Poisson di parametro λ=nπ=1,2 (0,0867), trovando risultati quasi identici. Quando è opportuno usare questa approssimazione secondo la dispensa?", options:["Quando n è grande e π è piccolo, in modo da mantenere nπ costante","Quando n è piccolo e π è vicino a 0,5","Quando la varianza della Binomiale supera il valore atteso","Quando la media e la varianza della Binomiale sono numericamente identiche"], correct:0, explain:"La dispensa specifica che, al crescere di n e al diminuire di π mantenendo nπ costante, la distribuzione Binomiale tende a una Poisson di parametro λ=nπ, come verificato nell'esempio delle schede difettose.", difficulty:"difficile"},
  {topic:"Distribuzione Binomiale (dispensa)", q:"Estraendo 5 carte con reinserimento da un mazzo di 52 (13 di cuori), la variabile X 'numero di cuori estratti' è Binomiale con n=5 e π=0,25. La dispensa calcola E(X)=1,25 e Var(X)=0,9375. Con quali formule si ottengono questi valori?", options:["E(X)=n·π e Var(X)=n·π·(1−π)","E(X)=n·π² e Var(X)=n·π, una grandezza calcolata sulla base della distribuzione marginale della variabile","E(X)=π e Var(X)=n·π, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","E(X)=n/π e Var(X)=π/n, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata"], correct:0, explain:"Per una v.c. Binomiale(n,π): E(X)=nπ=5×0,25=1,25 e Var(X)=nπ(1−π)=5×0,25×0,75=0,9375, coerentemente con l'esempio delle carte di cuori.", difficulty:"media"},
  {topic:"Distribuzione Binomiale (dispensa)", q:"Secondo le proprietà della distribuzione Binomiale elencate nella dispensa, per quale valore del parametro π la distribuzione risulta perfettamente simmetrica rispetto al proprio valore atteso?", options:["π=0,25, indipendentemente dal valore di n","π=0","π=0,5","π=1"], correct:2, explain:"La dispensa indica esplicitamente che la distribuzione Binomiale è simmetrica per π=0,5 rispetto al proprio valore atteso nπ=n/2; per n→+∞ tende comunque alla simmetria indipendentemente da π.", difficulty:"media"},
  {topic:"Distribuzione Uniforme discreta (dispensa)", q:"Il lancio di un dado regolare è un esempio di variabile casuale Uniforme discreta con P(x)=1/6 per ciascuna faccia. Se invece consideriamo l'estrazione di un numero al lotto (valori possibili 1-90), quale sarà la probabilità di ciascun singolo numero secondo la stessa logica?", options:["1/6, la stessa probabilità del lancio del dado, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","Dipende dal numero specifico estratto, non è costante, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","1/90 per ciascun numero, essendo tutti i 90 valori ugualmente possibili","1/2, poiché ogni numero può uscire o non uscire, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe"], correct:2, explain:"In una v.c. Uniforme discreta con s valori possibili, ciascun valore ha probabilità 1/s; per l'estrazione al lotto (90 numeri possibili), ogni numero ha probabilità 1/90, esattamente come indicato nella dispensa.", difficulty:"facile"},
  {topic:"Distribuzione Normale (dispensa)", q:"Secondo la dispensa, per la variabile casuale Normale X~N(μ,σ²), il parametro μ corrisponde contemporaneamente a quali tre misure di sintesi della distribuzione?", options:["Varianza, deviazione standard e coefficiente di variazione","Valore atteso, mediana e moda","Primo, secondo e terzo quartile","Campo di variazione, scarto medio e range interquartile"], correct:1, explain:"Data la forma simmetrica e unimodale della densità Normale, μ coincide contemporaneamente con il valore atteso, la mediana e la moda della distribuzione, punto in cui la densità raggiunge il proprio massimo.", difficulty:"facile"},
  {topic:"Normale standardizzata (dispensa)", q:"Dalle tavole della Normale standardizzata presentate a lezione, Φ(1,55)=P(Z≤1,55)=0,9394. Utilizzando la proprietà di simmetria Φ(−z)=1−Φ(z), quanto vale Φ(−1,55)?", options:["1 − 0,9394 = 0,0606","0,9394, lo stesso valore di Φ(1,55)","Non calcolabile senza consultare nuovamente le tavole per il valore negativo","Il valore centrale della distribuzione standardizzata, pari a 0,5"], correct:0, explain:"La proprietà di simmetria della Normale standardizzata afferma che Φ(−z)=1−Φ(z); quindi Φ(−1,55)=1−0,9394=0,0606.", difficulty:"media"},
  {topic:"Teorema del limite centrale (dispensa)", q:"Un test attitudinale con 100 domande a risposta binaria si supera rispondendo correttamente ad almeno 60 domande. Rispondendo a caso, X~Bin(0,5;100). Applicando il teorema del limite centrale, la dispensa approssima X con una Normale di quali parametri, e calcola P(X≥60)=0,0228?", options:["N(50; 25), cioè media nπ=50 e varianza nπ(1−π)=25","N(0,5; 1), utilizzando direttamente i parametri della Binomiale","N(60; 100), usando direttamente la soglia di superamento come media","N(100; 50), scambiando il ruolo di media e varianza"], correct:0, explain:"Con n=100 e π=0,5, si ha E(X)=nπ=50 e Var(X)=nπ(1−π)=25; approssimando X~N(50,25), si calcola P(X≥60)=P(Z≥2)=1−0,9772=0,0228, sfruttando le tavole della Normale standardizzata.", difficulty:"difficile"},
  {topic:"Proprietà degli stimatori (dispensa)", q:"Da un campione di 10 osservazioni con media di popolazione μ, la dispensa confronta due stimatori: T1=(X1+...+X10)/10 e T2=(X1+...+X10)/5. Si dimostra che E(T1)=μ mentre E(T2)=2μ. Cosa si può concludere su T2?", options:["T2 è uno stimatore distorto, con distorsione B(T2)=2μ−μ=μ","T2 ha distorsione nulla se μ=0, e in ogni altro caso è comunque corretto","T2 è uno stimatore corretto, esattamente come T1","T2 ha la stessa varianza di T1, pur avendo valore atteso diverso"], correct:0, explain:"Poiché E(T2)=2μ≠μ (per μ≠0), T2 è uno stimatore distorto della media della popolazione, con distorsione B(T2)=E(T2)−μ=2μ−μ=μ, mentre T1 è corretto essendo E(T1)=μ.", difficulty:"media"},
  {topic:"Errore quadratico medio (MSE) (dispensa)", q:"Secondo la dispensa, l'errore quadratico medio (MSE) di uno stimatore T si scompone come MSE(T)=Var(T)+B(T)². Se uno stimatore T è corretto (non distorto), a cosa si riduce il suo MSE?", options:["MSE(T)=B(T)², poiché la varianza diventa irrilevante per stimatori corretti","MSE(T) diventa pari alla radice quadrata della varianza","MSE(T)=Var(T), poiché la distorsione B(T) è nulla e quindi il suo quadrato si annulla","MSE(T)=Var(T)², elevando al quadrato anche la varianza"], correct:2, explain:"Se lo stimatore è corretto, B(T)=0, quindi B(T)²=0 e la formula generale MSE(T)=Var(T)+B(T)² si riduce a MSE(T)=Var(T): tra stimatori corretti, il migliore è quello con varianza minore.", difficulty:"media"},
  {topic:"Errori di I e II tipo (dispensa)", q:"Nell'esempio della dispensa su un nuovo farmaco, l'errore di primo tipo consiste nel mettere in vendita il farmaco pur essendo equivalente al precedente (H0 vera ma rifiutata), mentre l'errore di secondo tipo consiste nel mantenere il vecchio farmaco che è in realtà meno efficace. Perché in questo caso si fissa un valore di α molto piccolo?", options:["Perché un valore di α piccolo elimina completamente il rischio di errore di secondo tipo, un parametro stimato tramite il metodo dei momenti applicato al campione","Perché un valore di α piccolo elimina completamente il rischio di errore di secondo tipo","Perché si considera più grave, per motivi prudenziali, commettere l'errore di primo tipo (immettere sul mercato un farmaco non realmente migliore)","Perché un α piccolo aumenta automaticamente la potenza del test, una grandezza calcolata sulla base della distribuzione marginale della variabile"], correct:2, explain:"In ambito farmaceutico si preferisce essere prudenti ed evitare di immettere sul mercato un farmaco che in realtà non è più efficace (errore di I tipo), accettando quindi un valore di α molto basso, anche a costo di un β più elevato.", difficulty:"media"},
  {topic:"Errori di I e II tipo (dispensa)", q:"La dispensa afferma che tra α (probabilità di errore di primo tipo) e β (probabilità di errore di secondo tipo) esiste una relazione inversa: più piccola è la zona di rifiuto, minore è α ma maggiore è β. Cosa rappresenta invece la quantità 1−β?", options:["La potenza del test, cioè la probabilità di rifiutare correttamente H0 quando è effettivamente falsa","Il livello di significatività del test, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","La probabilità di accettare erroneamente H0 quando è vera, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","La dimensione campionaria minima richiesta per il test, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte"], correct:0, explain:"1−β è definita nella dispensa come la potenza del test, ovvero la probabilità di rifiutare correttamente l'ipotesi nulla quando essa è realmente falsa.", difficulty:"media"},
  {topic:"Procedura di verifica delle ipotesi (dispensa)", q:"Una società di marketing vuole verificare se, dopo una campagna pubblicitaria, l'acquisto medio annuo di caffè per cliente (μ=2.500 grammi in precedenza) sia aumentato. Come viene formulato correttamente il sistema di ipotesi secondo la dispensa?", options:["H0: μ=2.500 contro H1: μ>2.500","H0: μ>2.500 contro H1: μ=2.500","H0: μ≠2.500 contro H1: μ=2.500","H0: μ=2.500 contro H1: μ≠2.500, essendo l'unica formulazione possibile"], correct:0, explain:"Poiché si vuole verificare se l'acquisto sia aumentato rispetto al valore storico, l'ipotesi nulla mantiene lo status quo (μ=2.500) mentre l'alternativa esprime l'aumento atteso (μ>2.500), un test unilaterale destro.", difficulty:"media"},
  {topic:"Test per la media (dispensa)", q:"Per verificare un'ipotesi sulla media di una popolazione Normale con varianza nota, la dispensa utilizza la statistica test Z0=(X̄−μ0)/(σ/√n), che si distribuisce come una Normale standardizzata sotto H0. Cosa cambia in questa statistica quando la varianza della popolazione NON è nota?", options:["La statistica test rimane identica, distribuita comunque come una Normale standardizzata, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Non è più possibile effettuare alcun test sulla media in questo caso","Non è più possibile effettuare alcun test sulla media in questo caso, un parametro stimato tramite il metodo dei momenti applicato al campione","Si sostituisce σ con lo stimatore corretto S e la statistica si distribuisce come una t di Student con n−1 gradi di libertà"], correct:3, explain:"Quando σ² è ignoto, si sostituisce con lo stimatore corretto S nella statistica T=(X̄−μ0)/(S/√n), che sotto H0 si distribuisce come una t di Student con n−1 gradi di libertà, anziché come Normale standardizzata.", difficulty:"difficile"},
  {topic:"Campionamento casuale semplice (dispensa)", q:"Nel campionamento casuale semplice senza ripetizione da una popolazione di N unità, la dispensa mostra che la probabilità di estrazione cambia a ogni estrazione successiva (1/N, poi 1/(N−1), ecc.). Cosa succede invece nel campionamento con ripetizione?", options:["La probabilità di estrazione diventa nulla dopo la prima estrazione, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Non è possibile definire una probabilità di estrazione costante in nessuno dei due casi, una grandezza calcolata sulla base della distribuzione marginale della variabile","La probabilità di estrazione aumenta progressivamente a ogni estrazione successiva, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi","Ogni unità mantiene sempre probabilità 1/N di essere estratta a ogni estrazione, perché le unità estratte vengono reintrodotte nella popolazione"], correct:3, explain:"Nel campionamento con ripetizione, ogni unità estratta viene reintrodotta nella popolazione, quindi la probabilità di estrazione rimane costante e pari a 1/N a ogni estrazione, a differenza del campionamento senza ripetizione.", difficulty:"media"},
  {topic:"Campionamento stratificato (dispensa)", q:"Secondo la dispensa, il campionamento casuale stratificato si adotta quando:", options:["Non si dispone di alcuna lista delle unità della popolazione da campionare, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","Si vuole eliminare completamente la casualità nella selezione delle unità, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","La popolazione è composta da un numero infinito di unità non enumerabili, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Si possiedono informazioni aggiuntive sulla popolazione che permettono di suddividerla in sottopopolazioni (strati) omogenee al loro interno"], correct:3, explain:"Il campionamento stratificato sfrutta informazioni note a priori sulla popolazione per suddividerla in strati omogenei al loro interno, da cui poi estrarre le unità campionarie tramite campionamento casuale semplice.", difficulty:"media"},
  {topic:"Popolazioni finite e infinite (dispensa)", q:"Secondo la distinzione presentata nella dispensa, quale delle seguenti è un esempio di popolazione finita?", options:["L'insieme di tutte le possibili misurazioni future della temperatura in una città","L'insieme di tutti i possibili lanci futuri di una moneta","L'insieme di tutte le unità potenzialmente osservabili in un esperimento ripetibile all'infinito","L'insieme di tutti gli studenti iscritti in un dato anno accademico a una specifica università"], correct:3, explain:"Una popolazione finita è costituita da un numero N definito di unità realmente esistenti, come nel caso degli studenti iscritti in un dato anno; le popolazioni infinite comprendono invece unità potenzialmente osservabili e non necessariamente già esistenti.", difficulty:"facile"},
  {topic:"Introduzione alla Statistica (paniere2)", q:"La statistica ci offre gli strumenti per:", options:["Organizzare, riassumere e analizzare i dati relativi a un fenomeno, ottenuti attraverso le misurazioni","Prevedere con certezza assoluta l'esito di un evento futuro, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Sostituire il giudizio umano nelle decisioni aziendali, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Eliminare la necessità di raccogliere dati sul campo, un parametro stimato tramite il metodo dei momenti applicato al campione"], correct:0, explain:"La statistica fornisce gli strumenti per organizzare, riassumere e analizzare dati relativi a un fenomeno osservato.", difficulty:"facile"},
  {topic:"Introduzione alla Statistica (paniere2)", q:"L'Inferenza ha lo scopo di:", options:["Dedurre le caratteristiche dell'intera popolazione a partire da dati raccolti su un campione","Descrivere unicamente i dati già raccolti, senza generalizzazioni, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Calcolare la popolazione totale di un territorio, una grandezza calcolata sulla base della distribuzione marginale della variabile","Eliminare la variabilità naturale dei fenomeni osservati, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi"], correct:0, explain:"L'inferenza statistica deduce le caratteristiche della popolazione a partire dai dati campionari raccolti.", difficulty:"facile"},
  {topic:"Introduzione alla Statistica (paniere2)", q:"La statistica descrittiva:", options:["Organizza e riassume i dati","Fa inferenza sulla popolazione a partire dal campione","Si applica esclusivamente a popolazioni di tipo finito","Richiede l'uso di un campione probabilistico"], correct:0, explain:"La statistica descrittiva si occupa di organizzare e riassumere i dati raccolti, senza fare inferenze sulla popolazione.", difficulty:"facile"},
  {topic:"Introduzione alla Statistica (paniere2)", q:"La popolazione è:", options:["L'universo di elementi che forma l'oggetto di uno studio statistico","Un sottoinsieme scelto casualmente per comodità di analisi","Il valore medio di un fenomeno osservato, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","L'insieme dei soli dati mancanti in un'indagine, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte"], correct:0, explain:"La popolazione è l'universo completo di elementi oggetto dello studio statistico.", difficulty:"facile"},
  {topic:"Introduzione alla Statistica (paniere2)", q:"Il campione è:", options:["Un sottoinsieme della popolazione","L'intero universo di elementi oggetto di studio","La media aritmetica della popolazione","Un sinonimo di popolazione infinita"], correct:0, explain:"Il campione è un sottoinsieme della popolazione, estratto per condurre l'indagine statistica.", difficulty:"facile"},
  {topic:"Introduzione alla Statistica (paniere2)", q:"Un campione rappresentativo è:", options:["Casuale","Scelto in base alla comodità del ricercatore","Composto dalle unità più facilmente reperibili","Sempre coincidente con l'intera popolazione"], correct:0, explain:"Un campione rappresentativo si ottiene tipicamente tramite selezione casuale delle unità dalla popolazione.", difficulty:"facile"},
  {topic:"Introduzione alla Statistica (paniere2)", q:"Il campionamento sistematico è:", options:["Caratterizzato dalla selezione di un elemento ogni k elementi successivi","Caratterizzato dalla suddivisione della popolazione in sottogruppi omogenei","Caratterizzato dalla selezione di interi gruppi (cluster)","Basato sulla scelta soggettiva del ricercatore"], correct:0, explain:"Il campionamento sistematico seleziona un elemento ogni k elementi successivi, secondo un passo costante.", difficulty:"media"},
  {topic:"Introduzione alla Statistica (paniere2)", q:"Il campionamento stratificato è:", options:["Caratterizzato da popolazione divisa in sottogruppi omogenei","Caratterizzato dalla selezione di un elemento ogni k elementi successivi","Basato sulla selezione di interi gruppi (cluster) dalla popolazione","Privo di qualunque criterio di suddivisione della popolazione"], correct:0, explain:"Il campionamento stratificato divide la popolazione in sottogruppi (strati) omogenei al loro interno.", difficulty:"media"},
  {topic:"Introduzione alla Statistica (paniere2)", q:"Il campionamento a blocchi è:", options:["Caratterizzato da cluster","Caratterizzato dalla suddivisione della popolazione in strati omogenei","Basato sulla selezione di un elemento ogni k elementi","Privo di qualunque struttura di gruppo"], correct:0, explain:"Il campionamento a blocchi (a grappoli) seleziona interi cluster di unità dalla popolazione.", difficulty:"media"},
  {topic:"Introduzione alla Statistica (paniere2)", q:"La statistica permette di ragionare:", options:["Facendo deduzioni ed induzioni","Solo attraverso deduzioni, mai induzioni","Solo attraverso induzioni, mai deduzioni","Senza alcun collegamento tra dati osservati e conclusioni"], correct:0, explain:"La statistica combina ragionamento deduttivo e induttivo per analizzare fenomeni e trarre conclusioni.", difficulty:"media"},
  {topic:"L'indagine statistica (paniere2)", q:"Le fasi di una indagine statistica si conviene siano le seguenti:", options:["Definizione degli obiettivi; rilevazione dei dati; elaborazione metodologica; presentazione dei risultati; utilizzazione dei risultati","Solo la raccolta dei dati, senza fasi successive, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Solo l'elaborazione statistica, senza definizione preventiva degli obiettivi, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe","Definizione degli obiettivi e basta, senza ulteriori fasi operative, un parametro stimato tramite il metodo dei momenti applicato al campione"], correct:0, explain:"Un'indagine statistica si articola tipicamente in definizione obiettivi, rilevazione, elaborazione, presentazione e utilizzazione dei risultati.", difficulty:"media"},
  {topic:"L'indagine statistica (paniere2)", q:"L'indagine statistica può essere:", options:["Campionaria o di tipo censuario","Solo di tipo censuario","Solo di tipo campionario","Né campionaria né censuaria"], correct:0, explain:"L'indagine statistica può rilevare l'intera popolazione (censuaria) oppure un campione (campionaria).", difficulty:"facile"},
  {topic:"L'indagine statistica (paniere2)", q:"La statistica induttiva:", options:["Fa inferenza","Si limita a descrivere i dati osservati","Non utilizza mai il campione","Coincide con la statistica descrittiva"], correct:0, explain:"La statistica induttiva (inferenziale) fa inferenza sulla popolazione a partire dai dati campionari.", difficulty:"facile"},
  {topic:"L'indagine statistica (paniere2)", q:"La mutabile è:", options:["Un carattere qualitativo","Un carattere quantitativo continuo","Un carattere quantitativo discreto","Un sinonimo di variabile casuale"], correct:0, explain:"La mutabile è il termine tecnico che indica un carattere qualitativo, per distinguerlo dalla variabile (quantitativa).", difficulty:"media"},
  {topic:"L'indagine statistica (paniere2)", q:"Il numero di lanci di una moneta è una:", options:["Variabile discreta","Variabile continua","Un carattere qualitativo sconnesso","Una mutabile ordinabile"], correct:0, explain:"Il numero di lanci è una variabile discreta, potendo assumere solo valori interi numerabili.", difficulty:"facile"},
  {topic:"L'indagine statistica (paniere2)", q:"Il reddito pro-capite è una:", options:["Variabile continua","Variabile discreta","Un carattere qualitativo ordinabile","Una mutabile sconnessa"], correct:0, explain:"Il reddito pro-capite è una variabile continua, potendo assumere qualunque valore in un intervallo.", difficulty:"facile"},
  {topic:"L'indagine statistica (paniere2)", q:"Consideriamo la relazione y=f(x), dove x è rappresentato dall'inflazione ed y sono i tassi di interesse nell'Euro Area:", options:["x è la variabile indipendente","y è la variabile indipendente","Sia x sia y sono variabili indipendenti","Né x né y possono essere considerate variabili in questo contesto"], correct:0, explain:"Nella relazione y=f(x), x (l'inflazione) è per definizione la variabile indipendente da cui dipende y.", difficulty:"media"},
  {topic:"L'indagine statistica (paniere2)", q:"Considera la relazione causa-effetto y=-f(x): calcola la y sapendo che f(x)=-10 ed indica il tipo di relazione:", options:["y=10; la relazione è lineare","y=-10; la relazione non è lineare","y=100; la relazione è lineare","y=0; la relazione non è definita"], correct:0, explain:"Sostituendo f(x)=-10 nella relazione y=-f(x), si ottiene y=-(-10)=10; essendo y proporzionale a f(x), la relazione è lineare.", difficulty:"media"},
  {topic:"L'indagine statistica (paniere2)", q:"Considera la relazione causa-effetto y=-f(x)², calcola la y sapendo che f(x)=-10 ed indica il tipo di relazione:", options:["y=-100; la relazione non è lineare","y=100; la relazione è lineare","y=10; la relazione è lineare","y=-10; la relazione non è definita"], correct:0, explain:"Sostituendo f(x)=-10: y=-(-10)²=-(100)=-100; essendo y funzione del quadrato di f(x), la relazione non è lineare.", difficulty:"difficile"},
  {topic:"L'indagine statistica (paniere2)", q:"La sommatoria di tutte le frequenze relative di una tabella di frequenza è pari a:", options:["1","100","Il numero totale di modalità osservate","La numerosità del collettivo"], correct:0, explain:"La somma di tutte le frequenze relative di una distribuzione è per definizione pari a 1.", difficulty:"facile"},
  {topic:"La Statistica: approfondimenti (paniere2)", q:"Che cosa è l'unità statistica:", options:["L'unità elementare oggetto di osservazione e di studio","Il valore medio calcolato sull'intera popolazione","Un sinonimo di campione rappresentativo","La differenza tra due modalità osservate"], correct:0, explain:"L'unità statistica è l'unità elementare (persona, oggetto, evento) su cui si effettua l'osservazione.", difficulty:"facile"},
  {topic:"La Statistica: approfondimenti (paniere2)", q:"La popolazione è finita quando:", options:["È determinabile il numero di unità che la compongono","Non è mai possibile numerarne le unità","Coincide sempre con un campione","È composta da un numero infinito di elementi teorici"], correct:0, explain:"Una popolazione si dice finita quando è possibile determinare esattamente il numero di unità che la compongono.", difficulty:"facile"},
  {topic:"La Statistica: approfondimenti (paniere2)", q:"Il lancio di una moneta è un esempio di:", options:["Popolazione infinita","Popolazione finita e determinabile con precisione","Campione rappresentativo","Carattere qualitativo sconnesso"], correct:0, explain:"Il lancio ripetuto di una moneta rappresenta una popolazione infinita di prove potenzialmente ripetibili.", difficulty:"media"},
  {topic:"La Statistica: approfondimenti (paniere2)", q:"Il carattere sesso è:", options:["Carattere qualitativo sconnesso","Carattere qualitativo ordinabile","Carattere quantitativo discreto","Carattere quantitativo continuo"], correct:0, explain:"Il sesso è un carattere qualitativo sconnesso, non esistendo un ordine naturale tra le sue modalità.", difficulty:"facile"},
  {topic:"La Statistica: approfondimenti (paniere2)", q:"Il carattere età è:", options:["Un carattere continuo","Un carattere qualitativo sconnesso","Un carattere qualitativo ordinabile","Una mutabile priva di modalità numeriche"], correct:0, explain:"L'età è un carattere quantitativo continuo, potendo assumere teoricamente qualunque valore in un intervallo.", difficulty:"facile"},
  {topic:"La Statistica: approfondimenti (paniere2)", q:"Il carattere titolo di studio è:", options:["Un carattere qualitativo ordinabile","Un carattere qualitativo sconnesso","Un carattere quantitativo discreto","Un carattere quantitativo continuo"], correct:0, explain:"Il titolo di studio è un carattere qualitativo ordinabile, esistendo una gerarchia naturale tra i suoi livelli.", difficulty:"facile"},
  {topic:"La Statistica: approfondimenti (paniere2)", q:"Il carattere stato civile è:", options:["Carattere qualitativo sconnesso","Carattere qualitativo ordinabile","Carattere quantitativo discreto","Carattere quantitativo continuo"], correct:0, explain:"Lo stato civile è un carattere qualitativo sconnesso, privo di un ordine naturale tra le modalità.", difficulty:"facile"},
  {topic:"La Statistica: approfondimenti (paniere2)", q:"Il carattere numero di figli è:", options:["Carattere discreto","Carattere continuo","Carattere qualitativo sconnesso","Carattere qualitativo ordinabile"], correct:0, explain:"Il numero di figli è un carattere quantitativo discreto, assumendo solo valori interi numerabili.", difficulty:"facile"},
  {topic:"La Statistica: approfondimenti (paniere2)", q:"Il carattere professione è:", options:["Un carattere qualitativo sconnesso","Un carattere qualitativo ordinabile","Un carattere quantitativo discreto","Un carattere quantitativo continuo"], correct:0, explain:"La professione è un carattere qualitativo sconnesso, non esistendo un ordine naturale tra le diverse professioni.", difficulty:"facile"},
  {topic:"La Statistica: approfondimenti (paniere2)", q:"Non è una scala di misura delle manifestazioni di un carattere statistico:", options:["La scala semilogaritmica","La scala nominale","La scala ordinale","La scala a intervalli"], correct:0, explain:"La scala semilogaritmica è una modalità di rappresentazione grafica, non una scala di misura dei caratteri (nominale, ordinale, a intervalli, a rapporti).", difficulty:"media"},
  {topic:"Frequenza e distribuzioni (paniere2)", q:"La frequenza assoluta è:", options:["Il numero di volte in cui la modalità è stata osservata","Il rapporto tra la frequenza e il totale delle osservazioni","Sempre un valore compreso tra 0 e 1","La differenza tra frequenza cumulata e frequenza relativa"], correct:0, explain:"La frequenza assoluta è il numero di volte (ni) in cui una data modalità è stata osservata nel collettivo.", difficulty:"facile"},
  {topic:"Frequenza e distribuzioni (paniere2)", q:"La frequenza relativa è uguale a:", options:["ni/n (frequenza assoluta diviso il totale delle osservazioni)","n (il totale delle osservazioni)","La differenza tra frequenza assoluta e frequenza cumulata","Il quadrato della frequenza assoluta"], correct:0, explain:"La frequenza relativa si calcola dividendo la frequenza assoluta (ni) per il totale delle osservazioni (n).", difficulty:"facile"},
  {topic:"Frequenza e distribuzioni (paniere2)", q:"In una distribuzione statistica, la somma delle frequenze relative:", options:["È sempre uguale a 1","È sempre uguale a 100","Dipende dal numero di modalità osservate","Non è mai calcolabile con precisione"], correct:0, explain:"La somma delle frequenze relative di tutte le modalità di una distribuzione è, per definizione, sempre pari a 1.", difficulty:"facile"},
  {topic:"Frequenza e distribuzioni (paniere2)", q:"Una classe è aperta:", options:["Se entrambi gli estremi sono esclusi","Se entrambi gli estremi sono inclusi","Se solo l'estremo sinistro è incluso","Se solo l'estremo destro è incluso"], correct:0, explain:"Una classe si dice aperta quando entrambi gli estremi (inferiore e superiore) sono esclusi dalla classe stessa.", difficulty:"media"},
  {topic:"Frequenza e distribuzioni (paniere2)", q:"Una classe è chiusa:", options:["Se entrambi gli estremi sono inclusi","Se entrambi gli estremi sono esclusi","Se solo l'estremo sinistro è escluso","Se l'ampiezza della classe è pari a zero"], correct:0, explain:"Una classe si dice chiusa quando entrambi gli estremi (inferiore e superiore) sono inclusi nella classe.", difficulty:"media"},
  {topic:"Frequenza e distribuzioni (paniere2)", q:"L'ampiezza della classe è:", options:["La differenza tra estremo superiore ed estremo inferiore della classe","La semisomma tra estremo superiore ed estremo inferiore, un indice che si ottiene dalla trasformazione logaritmica dei dati originari","Il prodotto tra i due estremi della classe, una grandezza calcolata sulla base della distribuzione marginale della variabile","La frequenza assoluta della classe, un valore che dipende dalla scelta arbitraria dell'ampiezza delle classi"], correct:0, explain:"L'ampiezza di una classe è la differenza tra il suo estremo superiore e il suo estremo inferiore.", difficulty:"facile"},
  {topic:"Frequenza e distribuzioni (paniere2)", q:"La classe è chiusa a sinistra se:", options:["Solo l'estremo sinistro è incluso","Solo l'estremo destro è incluso","Entrambi gli estremi sono inclusi","Entrambi gli estremi sono esclusi"], correct:0, explain:"Una classe chiusa a sinistra include il proprio estremo inferiore ma esclude quello superiore.", difficulty:"media"},
  {topic:"Frequenza e distribuzioni (paniere2)", q:"Il valore centrale di una classe è:", options:["La semisomma dei due estremi","Il prodotto dei due estremi","La differenza tra i due estremi","La frequenza relativa della classe"], correct:0, explain:"Il valore centrale di una classe è la semisomma (media) tra estremo inferiore e superiore della classe.", difficulty:"facile"},
  {topic:"Frequenza e distribuzioni (paniere2)", q:"In una tabella doppia, se entrambe le variabili sono qualitative, si parla di:", options:["Tabella di contingenza","Tabella di correlazione","Tabella di regressione","Tabella di connessione lineare"], correct:0, explain:"Quando entrambe le variabili di una tabella doppia sono qualitative, si parla di tabella di contingenza.", difficulty:"media"},
  {topic:"Frequenza e distribuzioni (paniere2)", q:"In una tabella doppia, se entrambe le variabili sono quantitative, si parla di:", options:["Tabella di correlazione","Tabella di contingenza","Tabella di composizione","Tabella di connessione"], correct:0, explain:"Quando entrambe le variabili sono quantitative, la tabella doppia viene definita tabella di correlazione.", difficulty:"media"},
  {topic:"Rappresentazioni grafiche (paniere2)", q:"La rappresentazione grafica di distribuzioni di frequenze che si sviluppa attraverso una serie di rettangoli contigui viene chiamata:", options:["Istogramma","Diagramma circolare","Box plot","Ortogramma"], correct:0, explain:"L'istogramma rappresenta le distribuzioni di frequenza tramite una serie di rettangoli contigui.", difficulty:"facile"},
  {topic:"Rappresentazioni grafiche (paniere2)", q:"Le densità di frequenza di un istogramma:", options:["Si ottengono dal rapporto tra la frequenza di una classe e l'ampiezza della classe medesima","Coincidono sempre con la frequenza assoluta della classe, una stima ottenuta applicando il teorema di Chebyshev alla distribuzione osservata","Si calcolano moltiplicando la frequenza per l'ampiezza della classe, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","Sono indipendenti dall'ampiezza delle classi, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate"], correct:0, explain:"La densità di frequenza si ottiene dividendo la frequenza di una classe per la sua ampiezza, permettendo il confronto tra classi di ampiezza diversa.", difficulty:"media"},
  {topic:"Rappresentazioni grafiche (paniere2)", q:"Come viene classificato l'ortogramma:", options:["Sia a nastro sia a colonne","Come un grafico circolare a spicchi","Come un box plot verticale","Come una curva di Lorenz"], correct:0, explain:"L'ortogramma può essere rappresentato sia a nastro (barre orizzontali) sia a colonne (barre verticali).", difficulty:"media"},
  {topic:"Rappresentazioni grafiche (paniere2)", q:"Costituiscono rappresentazioni grafiche adatte per caratteri quantitativi:", options:["Diagramma circolare e istogramma","Solo l'ortogramma","Solo il diagramma a nastro","Nessuna rappresentazione grafica specifica"], correct:0, explain:"Il diagramma circolare e l'istogramma sono rappresentazioni grafiche adatte a visualizzare caratteri quantitativi.", difficulty:"media"},
  {topic:"Rappresentazioni grafiche (paniere2)", q:"La rappresentazione grafica che si sviluppa attraverso una circonferenza suddivisa in tanti spicchi viene chiamata:", options:["Diagramma circolare","Istogramma","Box plot","Ortogramma a nastro"], correct:0, explain:"Il diagramma circolare (a torta) suddivide una circonferenza in spicchi proporzionali alle frequenze delle modalità.", difficulty:"facile"},
  {topic:"Rappresentazioni grafiche (paniere2)", q:"Per la costruzione di un box plot si utilizzano i seguenti valori:", options:["Valore minimo, primo quartile, mediana, terzo quartile, valore massimo","La media e la deviazione standard","Il valore massimo e quello minimo, senza ulteriori indicazioni","La moda e la mediana della distribuzione"], correct:0, explain:"Il box plot si costruisce a partire da Xmin, Q1, mediana, Q3 e Xmax della distribuzione.", difficulty:"media"},
  {topic:"Rappresentazioni grafiche (paniere2)", q:"Il box plot, rappresentato tramite un rettangolo, è diviso al suo interno:", options:["Dalla mediana","Dalla media aritmetica","Dal valore massimo","Dal campo di variazione"], correct:0, explain:"Il rettangolo del box plot è diviso al suo interno da una linea corrispondente alla mediana della distribuzione.", difficulty:"media"},
  {topic:"Rappresentazioni grafiche (paniere2)", q:"Il box plot fornisce informazioni:", options:["Sulla variabilità, sulla presenza di valori anomali e sulla simmetria/asimmetria della distribuzione","Riguardanti la media aritmetica e il valore modale della distribuzione","Riguardanti la numerosità e la forma giuridica del campione","Riguardanti il solo valore centrale, senza indicazioni sulla dispersione"], correct:0, explain:"Il box plot sintetizza informazioni su variabilità, valori anomali (outlier) e simmetria/asimmetria della distribuzione.", difficulty:"media"},
  {topic:"Rappresentazioni grafiche (paniere2)", q:"All'interno del rettangolo del box plot sono contenute:", options:["Il 50% delle osservazioni","Il 25% delle osservazioni","Il 75% delle osservazioni","Tutte le osservazioni della distribuzione"], correct:0, explain:"Il rettangolo (box) del box plot, delimitato da Q1 e Q3, contiene il 50% centrale delle osservazioni.", difficulty:"media"},
  {topic:"Rappresentazioni grafiche (paniere2)", q:"Costituiscono rappresentazioni grafiche adatte per caratteri qualitativi:", options:["Ortogramma e diagramma circolare","Istogramma e box plot","Solo il diagramma a dispersione","Solo la curva di Lorenz"], correct:0, explain:"Ortogramma e diagramma circolare sono le rappresentazioni grafiche più adatte per caratteri qualitativi.", difficulty:"media"},
  {topic:"Relazioni statistiche (paniere2)", q:"Tra due variabili vi è indipendenza assoluta se:", options:["Le frequenze osservate sono uguali alle frequenze teoriche","Le frequenze osservate sono sempre diverse da quelle teoriche","La covarianza tra le due variabili è massima","Il coefficiente di correlazione è pari a 1"], correct:0, explain:"L'indipendenza assoluta tra due variabili si verifica quando le frequenze osservate coincidono con quelle teoriche attese sotto indipendenza.", difficulty:"media"},
  {topic:"Relazioni statistiche (paniere2)", q:"Si chiama contingenza:", options:["La differenza tra frequenze osservate e frequenze teoriche","La somma tra frequenze osservate e frequenze teoriche","Il rapporto tra frequenza assoluta e frequenza relativa","La radice quadrata delle frequenze osservate"], correct:0, explain:"La contingenza è definita come la differenza tra le frequenze effettivamente osservate e quelle teoriche attese sotto indipendenza.", difficulty:"media"},
  {topic:"Relazioni statistiche (paniere2)", q:"La somma delle contingenze di ciascuna riga e di ciascuna colonna sono:", options:["Nulle","Sempre positive","Sempre negative","Uguali al totale generale della tabella"], correct:0, explain:"Per costruzione, la somma delle contingenze di ciascuna riga e di ciascuna colonna di una tabella è sempre nulla.", difficulty:"difficile"},
  {topic:"Relazioni statistiche (paniere2)", q:"L'indice chi-quadrato di Pearson (χ²):", options:["Dipende dalla dimensione del collettivo","È indipendente dalla numerosità del collettivo","Assume sempre valori negativi","Varia sempre tra -1 e 1"], correct:0, explain:"Il chi-quadrato di Pearson dipende dalla dimensione del collettivo osservato, per questo si usano anche indici relativi come phi-quadrato.", difficulty:"media"},
  {topic:"Relazioni statistiche (paniere2)", q:"Se si raddoppia la numerosità campionaria, il valore del chi-quadrato:", options:["Raddoppia","Resta invariato","Si dimezza","Diventa nullo"], correct:0, explain:"A parità di struttura delle frequenze relative, raddoppiando la numerosità campionaria il valore del chi-quadrato raddoppia.", difficulty:"difficile"},
  {topic:"Relazioni statistiche (paniere2)", q:"Il max χ² è uguale a:", options:["n × [min(r-1; c-1)]","n / [min(r-1; c-1)]","r × c, indipendentemente da n","La somma delle frequenze marginali"], correct:0, explain:"Il valore massimo teorico del chi-quadrato è pari a n moltiplicato per il minimo tra (r-1) e (c-1).", difficulty:"difficile"},
  {topic:"Relazioni statistiche (paniere2)", q:"L'indice di contingenza quadratica media φ² è uguale a:", options:["χ²/n","χ²×n","n/χ²","La radice quadrata di χ²"], correct:0, explain:"L'indice phi-quadrato si ottiene dividendo il chi-quadrato per la numerosità n del collettivo.", difficulty:"difficile"},
  {topic:"Relazioni statistiche (paniere2)", q:"L'indice di connessione di Cramer varia:", options:["Tra zero e uno","Tra meno uno e uno","Tra zero e la numerosità campionaria","Senza alcun limite superiore definito"], correct:0, explain:"L'indice di Cramer, essendo un indice relativo di associazione, varia sempre tra 0 (indipendenza) e 1 (massima dipendenza).", difficulty:"media"},
  {topic:"Relazioni statistiche (paniere2)", q:"L'indice chi-quadrato è un indice:", options:["Simmetrico","Asimmetrico rispetto alle due variabili","Applicabile solo a variabili quantitative","Sempre compreso tra 0 e 1"], correct:0, explain:"Il chi-quadrato è un indice simmetrico: il suo valore non cambia scambiando il ruolo delle due variabili.", difficulty:"media"},
  {topic:"Relazioni statistiche (paniere2)", q:"Tra questi indici, quale è relativo (normalizzato):", options:["L'indice di connessione di Cramer","Il chi-quadrato di Pearson, un indicatore ricavato dal confronto tra due distribuzioni di frequenza distinte","La contingenza assoluta, un valore calcolato a partire dalla distribuzione cumulata delle frequenze osservate","Il max chi-quadrato teorico, una misura derivata dal rapporto tra scarto interquartile e ampiezza di classe"], correct:0, explain:"L'indice di Cramer è un indice relativo, normalizzato tra 0 e 1, a differenza del chi-quadrato che dipende dalla numerosità.", difficulty:"media"},
  {topic:"Le medie razionali (paniere2)", q:"Vengono prelevate 15 compresse da un lotto di produzione con pesi 0,485; 0,442; 0,466; 0,448; 0,419; 0,415; 0,450; 0,435; 0,443; 0,410; 0,434; 0,450; 0,422; 0,440; 0,464. Il peso medio è:", options:["0,4415","0,4500","0,4650","0,4190"], correct:0, explain:"Sommando i 15 valori e dividendo per 15 si ottiene una media aritmetica pari a 0,4415.", difficulty:"media"},
  {topic:"Le medie razionali (paniere2)", q:"Considerando le classi 10-20 (freq. 5), 20-30 (freq. 8), 30-40 (freq. 12), 40-50 (freq. 9), 50-60 (freq. 3), la media aritmetica è:", options:["34,19","30,00","40,19","28,50"], correct:0, explain:"Usando i valori centrali delle classi ponderati per le frequenze, la media aritmetica risulta pari a 34,19.", difficulty:"media"},
  {topic:"Le medie razionali (paniere2)", q:"La media geometrica è uguale:", options:["Alla radice n-esima del prodotto dei termini","Alla somma dei termini divisa per n","Al reciproco della media aritmetica dei reciproci","Alla differenza tra il valore massimo e minimo dei termini"], correct:0, explain:"La media geometrica di n termini è la radice n-esima del loro prodotto.", difficulty:"facile"},
  {topic:"Le medie razionali (paniere2)", q:"Trovare la media geometrica dei valori 3, 5, 6, 6, 7, 10, 12:", options:["6,43","7,00","6,00","8,43"], correct:0, explain:"La radice settima del prodotto dei sette valori (3×5×6×6×7×10×12) restituisce una media geometrica pari a 6,43.", difficulty:"media"},
  {topic:"Le medie razionali (paniere2)", q:"Calcolare la media geometrica relativa all'andamento dei prezzi di un prodotto con coefficienti 1,103; 1,031; 0,939; 1,097:", options:["1,04","1,10","0,97","1,17"], correct:0, explain:"La radice quarta del prodotto dei quattro coefficienti di variazione dei prezzi restituisce una media geometrica pari a 1,04.", difficulty:"difficile"},
